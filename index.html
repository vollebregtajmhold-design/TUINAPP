const VERPAKKINGEN_DEF = [
  { naam:"Tray 65",  aantal:65  },
  { naam:"Tray 179", aantal:179 },
  { naam:"Tray 260", aantal:260 },
];
// Zorg dat bestaande verpDef ook Tray 179 en 260 heeft
function zorgVerpDef(verpDef) {
  const GEWENSTE_VOLGORDE = ["Tray 65","Tray 179","Tray 260"];
  // Verwijder zaaitrays uit de lijst (worden intern gebruikt)
  const zonderZaai = verpDef.filter(v=>!v.naam.toLowerCase().includes("zaai"));
  const uniek = zonderZaai.filter((v,i,a)=>a.findIndex(x=>x.naam===v.naam)===i);
  // Voeg ontbrekende aflevertrays toe
  if(!uniek.find(x=>x.aantal===179)) uniek.push({naam:"Tray 179",aantal:179});
  if(!uniek.find(x=>x.aantal===260)) uniek.push({naam:"Tray 260",aantal:260});
  // Sorteer op gewenste volgorde
  return uniek.sort((a,b)=>{
    const ia = GEWENSTE_VOLGORDE.indexOf(a.naam);
    const ib = GEWENSTE_VOLGORDE.indexOf(b.naam);
    if(ia>=0&&ib>=0) return ia-ib;
    if(ia>=0) return -1;
    if(ib>=0) return 1;
    return a.naam.localeCompare(b.naam);
  });
}

// Helper: vind verpDef op naam of op dichtstbijzijnde aantal
// Bekende aantallen per fusttype
const VASTE_AANTALLEN = {"65":65,"66":66,"179":179,"180":180,"260":260,"264":264};

function vindVd(verpDef, naam) {
  if(!naam) return null;
  // Exacte match
  let r = verpDef.find(v=>v.naam===naam);
  if(r&&r.aantal>0) return r;
  // Case-insensitive
  r = verpDef.find(v=>v.naam.toLowerCase().trim()===naam.toLowerCase().trim());
  if(r&&r.aantal>0) return r;
  // Zoek op getal in naam — gebruik hardcoded waarde, nooit zaaitray
  const m = naam.match(/(\d+)/);
  if(m) {
    const getal = m[1];
    const aantal = VASTE_AANTALLEN[getal];
    if(aantal) {
      // Zoek eerst in verpDef op dit getal, maar niet zaaitray
      const rGetal = verpDef.find(v=>v.naam.includes(getal)&&!v.naam.toLowerCase().includes("zaai"));
      if(rGetal&&rGetal.aantal>0) return rGetal;
      return {naam, aantal};
    }
  }
  return r || null;
}

function getWeekNr(datum) {
  const d = new Date(datum);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - (d.getDay()+6)%7);
  const week1 = new Date(d.getFullYear(),0,4);
  return 1 + Math.round(((d-week1)/86400000 - 3 + (week1.getDay()+6)%7)/7);
}
function getJaar(datum) { return new Date(datum).getFullYear(); }
function weekLabel(datum) {
  return `${String(getJaar(datum)).slice(-2)}${String(getWeekNr(datum)).padStart(2,"0")}`;
}
function zaterdagVanWeek(jaar, week) {
  const jan4 = new Date(jaar, 0, 4);
  const startWeek1 = new Date(jan4);
  startWeek1.setDate(jan4.getDate() - (jan4.getDay()+6)%7);
  const maandag = new Date(startWeek1);
  maandag.setDate(startWeek1.getDate() + (week-1)*7);
  const zaterdag = new Date(maandag);
  zaterdag.setDate(maandag.getDate() + 5);
  return zaterdag.toISOString().split("T")[0];
}
function huidigZaterdag() {
  const nu = new Date();
  return zaterdagVanWeek(getJaar(nu), getWeekNr(nu));
}
function weekOpties() {
  const opties = [];
  const nu = new Date();
  for (let i = -4; i <= 26; i++) {
    const d = new Date(nu);
    d.setDate(d.getDate() + i*7);
    const jaar = getJaar(d);
    const week = getWeekNr(d);
    const zat = zaterdagVanWeek(jaar, week);
    opties.push({ label:`${String(jaar).slice(-2)}${String(week).padStart(2,"0")}`, datum:zat });
  }
  const seen = new Set();
  return opties.filter(o => { if(seen.has(o.label)) return false; seen.add(o.label); return true; });
}

function SoortItem({ soort, onDelete, onRename }) {
  const [bewerk, setBewerk] = useState(false);
  const [val, setVal] = useState(soort);
  if(bewerk) return (
    <div style={{display:"flex",alignItems:"center",gap:4,background:"#fff",border:`1px solid ${groen}`,borderRadius:20,padding:"2px 6px"}}>
      <input autoFocus style={{border:"none",outline:"none",fontSize:12,fontWeight:600,color:groen,width:120,background:"transparent"}}
        value={val} onChange={e=>setVal(e.target.value)}
        onKeyDown={e=>{if(e.key==="Enter"){onRename(val);setBewerk(false);}if(e.key==="Escape"){setVal(soort);setBewerk(false);}}}
        onBlur={()=>{onRename(val);setBewerk(false);}}
      />
      <button style={{background:"none",border:"none",cursor:"pointer",color:groen,fontSize:11,padding:0}} onClick={()=>{onRename(val);setBewerk(false);}}>✓</button>
    </div>
  );
  return (
    <div style={{display:"flex",alignItems:"center",gap:5,background:lichtGroen,color:groen,borderRadius:20,padding:"4px 10px",fontSize:12,fontWeight:600}}>
      <span style={{cursor:"pointer"}} title="Klik om te bewerken" onClick={()=>{setVal(soort);setBewerk(true);}}>{soort}</span>
      <button style={{background:"none",border:"none",cursor:"pointer",color:groen,fontSize:10,padding:0}} title="Bewerken" onClick={()=>{setVal(soort);setBewerk(true);}}>✏️</button>
      <button style={{background:"none",border:"none",cursor:"pointer",color:groen,fontSize:11,padding:0}} onClick={onDelete}>✕</button>
    </div>
  );
}

  const [si,setSi]=useState(""); const [delGw,setDelGw]=useState(null); const [delS,setDelS]=useState(null);
  const gefilterd=gewassen.filter(g=>g.naam.toLowerCase().includes(zoek.toLowerCase()));

  function gwSave(){if(!gwN.trim())return;if(bew){const b=gewassen.map(g=>g.id===bew.id?{...g,naam:gwN}:g);setGewassen(b);setGes(b.find(g=>g.id===bew.id));}else setGewassen([...gewassen,{id:Date.now(),naam:gwN,soorten:[]}]);setGwN("");setGwF(false);setBew(null);}
  function gwDel(id){setGewassen(gewassen.filter(g=>g.id!==id));if(ges?.id===id)setGes(null);setDelGw(null);}
  function sAdd(id){if(!si.trim())return;const b=gewassen.map(g=>g.id===id?{...g,soorten:[...g.soorten,si.trim()]}:g);setGewassen(b);setGes(b.find(g=>g.id===id));setSi("");}
  function sDel(id,s){const b=gewassen.map(g=>g.id===id?{...g,soorten:g.soorten.filter(x=>x!==s)}:g);setGewassen(b);setGes(b.find(g=>g.id===id));setDelS(null);}

  return (
    <div style={{display:"flex",height:"calc(100vh - 50px)"}}>
      <div style={{width:260,borderRight:`1px solid ${rand}`,background:wit,overflowY:"auto",padding:10}}>
        <input style={{...gs.input,marginBottom:8}} placeholder="🔍 Zoek gewas..." value={zoek} onChange={e=>setZoek(e.target.value)} />
        <button style={{...gs.knopPrimair,width:"100%",marginBottom:8}} onClick={()=>{setBew(null);setGwN("");setGwF(true);}}>+ Nieuw gewas</button>
        <div style={{fontSize:10,color:subtekst,marginBottom:6}}>{gefilterd.length} gewas(sen)</div>
        {gefilterd.map(g=>(
          <div key={g.id} onClick={()=>setGes(g)}
            style={{padding:"8px 10px",borderRadius:6,cursor:"pointer",marginBottom:3,
              background:ges?.id===g.id?lichtGroen:"transparent",border:`1px solid ${ges?.id===g.id?groen:"transparent"}`}}>
            <div style={{fontWeight:600}}>{g.naam}</div>
            <div style={{fontSize:11,color:subtekst}}>{g.soorten.length} soort(en)</div>
          </div>
        ))}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:20}}>
        {ges?(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h2 style={{fontSize:16,fontWeight:700}}>{ges.naam}</h2>
              <div style={{display:"flex",gap:6}}>
                <button style={gs.knopKlein} onClick={()=>{setBew(ges);setGwN(ges.naam);setGwF(true);}}>✏️ Bewerk</button>
                <button style={gs.knopVerwijder} onClick={()=>setDelGw(ges.id)}>🗑️</button>
              </div>
            </div>
            <div style={gs.sectie}><div style={gs.sectieLabel}>Soorten</div>
              {ges.soorten.length===0&&<div style={{color:subtekst,fontSize:12,marginBottom:10}}>Nog geen soorten</div>}
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
                {ges.soorten.map((s,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                    <SoortItem soort={s}
                      onDelete={()=>setDelS({id:ges.id,soort:s})}
                      onRename={(nieuw)=>{
                        if(!nieuw.trim()||nieuw===s) return;
                        const bijgewerkt=gewassen.map(g=>g.id===ges.id?{...g,soorten:g.soorten.map(x=>x===s?nieuw.trim():x)}:g);
                        setGewassen(bijgewerkt);
                        setGes(bijgewerkt.find(g=>g.id===ges.id));
                      }}
                    />
                    <input
                      style={{...gs.input,width:90,fontSize:11,padding:"2px 6px"}}
                      placeholder="Intern nr."
                      value={(ges.internNrs||{})[s]||""}
                      onChange={e=>{
                        const bijgewerkt=gewassen.map(g=>g.id===ges.id?{...g,internNrs:{...(g.internNrs||{}),[s]:e.target.value}}:g);
                        setGewassen(bijgewerkt);
                        setGes(bijgewerkt.find(g=>g.id===ges.id));
                      }}
                    />

                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:8}}>
                <input style={{...gs.input,flex:1}} placeholder="Nieuwe soort..." value={si} onChange={e=>setSi(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sAdd(ges.id)} />
                <button style={gs.knopPrimair} onClick={()=>sAdd(ges.id)}>+ Toevoegen</button>
              </div>
            </div>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:subtekst,gap:10}}>
            <div style={{fontSize:40}}>🌿</div><div>Selecteer een gewas of maak een nieuwe aan</div>
          </div>
        )}
      </div>
      {gwF&&(<div style={gs.overlay}><div style={{...gs.modal,width:300,textAlign:"center"}}>
        <div style={{fontSize:24,marginBottom:10}}>🌱</div>
        <div style={gs.modalTitel}>{bew?"Gewas bewerken":"Nieuw gewas"}</div>
        <input style={{...gs.input,marginBottom:12}} placeholder="Naam gewas" value={gwN} autoFocus onChange={e=>setGwN(e.target.value)} onKeyDown={e=>e.key==="Enter"&&gwSave()} />
        <div style={{display:"flex",gap:8,justifyContent:"center"}}>
          <button style={gs.knopPrimair} onClick={gwSave}>💾 Opslaan</button>
          <button style={gs.knopSecundair} onClick={()=>{setGwF(false);setBew(null);setGwN("");}}>Annuleren</button>
        </div>
      </div></div>)}
      {delGw&&<BevestigModal tekst="Gewas verwijderen?" onJa={()=>gwDel(delGw)} onNee={()=>setDelGw(null)} />}
      {delS&&<BevestigModal tekst={`Soort "${delS.soort}" verwijderen?`} onJa={()=>sDel(delS.id,delS.soort)} onNee={()=>setDelS(null)} />}
    </div>
  );
}

// ════════════════════════════════════════════════════════
// MODULE 3 — PRIJZEN (matrix per klant)
// ════════════════════════════════════════════════════════
function PrijsInput({ prijs, onSave, style }) {
  const [val, setVal] = useState(prijs);
  useEffect(()=>setVal(prijs), [prijs]);
  return (
    <input
      style={{...style, background:val!==""&&val!==undefined?"#f0fff8":"#fff"}}
      type="number" step="0.001" min="0" placeholder="—"
      value={val??""} 
      onFocus={e=>e.target.select()}
      onChange={e=>setVal(e.target.value)}
      onBlur={e=>onSave(e.target.value)}
      onKeyDown={e=>{if(e.key==="Enter"||e.key==="Tab")e.target.blur();}}
    />
  );
}

function Prijzen({ klanten, gewassen, prijzen, setPrijzen, verpDef }) {
  const [selKlant, setSelKlant] = useState(klanten[0]?.id||0);
  const [kopModal, setKopModal] = useState(false);
  const [kopNaarKlant, setKopNaarKlant] = useState("");
  const [vulKolom, setVulKolom] = useState({}); // {verpakking: prijs} voor bulk vullen
  const [vulGewas, setVulGewas] = useState({});
  const [openGewas, setOpenGewas] = useState(()=>Object.fromEntries((gewassen||[]).map(g=>["prijsOpen_"+g.naam,false]))); // {gewas: prijs} voor bulk vullen

  // Haal prijs op voor klant/gewas/soort/verpakking
  function getPrijs(klantId, gewas, soort, verpakking) {
    const p = prijzen.find(x=>x.klantId===Number(klantId)&&x.gewas===gewas&&x.soort===soort&&x.verpakking===verpakking);
    return p ? p.prijs : "";
  }

  // Sla prijs op — functional update om stale closure te vermijden
  function setPrijs(klantId, gewas, soort, verpakking, prijs) {
    const nieuweId = ('p_'+Number(klantId)+'_'+gewas+'_'+soort+'_'+verpakking).replace(/[\/]/g,'_').trim();
    setPrijzen(huidig => {
      const bestaand = huidig.find(x=>x.klantId===Number(klantId)&&x.gewas===gewas&&x.soort===soort&&x.verpakking===verpakking);
      if(prijs===""||prijs===null) {
        return bestaand ? huidig.filter(x=>x.id!==bestaand.id) : huidig;
      }
      if(bestaand) return huidig.map(x=>x.id===bestaand.id?{...x,prijs:parseFloat(prijs)}:x);
      return [...huidig,{id:nieuweId,klantId:Number(klantId),gewas,soort,verpakking,prijs:parseFloat(prijs)}];
    });
  }

  // Kopieer hele prijslijst van klant naar andere klant
  function kopeerKlant() {
    if(!kopNaarKlant) return;
    setPrijzen(huidig=>{
      const vanPrijzen = huidig.filter(p=>p.klantId===Number(selKlant));
      const naarPrijzen = huidig.filter(p=>p.klantId!==Number(kopNaarKlant));
      const nieuw = vanPrijzen.map(p=>({...p,id:'p_'+Number(kopNaarKlant)+'_'+p.gewas+'_'+p.soort+'_'+p.verpakking,klantId:Number(kopNaarKlant)}));
      return [...naarPrijzen,...nieuw];
    });
    setKopModal(false);
  }

  // Bulk: vul alle soorten van een verpakking
  function vulAlleVerpakking(verpakking, prijs) {
    if(prijs==="") return;
    const nieuw = [...prijzen];
    gewassen.forEach(g=>{
      g.soorten.forEach(s=>{
        const idx = nieuw.findIndex(x=>x.klantId===Number(selKlant)&&x.gewas===g.naam&&x.soort===s&&x.verpakking===verpakking);
        if(idx>=0) nieuw[idx]={...nieuw[idx],prijs:parseFloat(prijs)};
        else nieuw.push({id:Date.now()+Math.random(),klantId:Number(selKlant),gewas:g.naam,soort:s,verpakking,prijs:parseFloat(prijs)});
      });
    });
    setPrijzen(nieuw);
  }

  // Bulk: vul alle verpakkingen van een gewas
  function vulAlleGewas(gewas, prijs) {
    if(prijs==="") return;
    const gw = gewassen.find(g=>g.naam===gewas);
    if(!gw) return;
    const nieuw = [...prijzen];
    gw.soorten.forEach(s=>{
      verpDef.forEach(v=>{
        const idx = nieuw.findIndex(x=>x.klantId===Number(selKlant)&&x.gewas===gewas&&x.soort===s&&x.verpakking===v.naam);
        if(idx>=0) nieuw[idx]={...nieuw[idx],prijs:parseFloat(prijs)};
        else nieuw.push({id:Date.now()+Math.random(),klantId:Number(selKlant),gewas,soort:s,verpakking:v.naam,prijs:parseFloat(prijs)});
      });
    });
    setPrijzen(nieuw);
  }

  const iS = {padding:"2px 4px",border:`1px solid ${rand}`,borderRadius:3,fontSize:12,width:65,textAlign:"right",background:"#fafffe"};
  const mTH = {...TH,padding:"4px 8px",background:"#dff0e8",color:groen,fontSize:11};
  const mTD = {padding:"3px 5px",fontSize:12,borderBottom:`1px solid ${rand}`};

  return (
    <div style={{display:"flex",height:"calc(100vh - 50px)"}}>
      {/* Linker sidebar: klantenkeuze */}
      <div style={{width:200,borderRight:`1px solid ${rand}`,background:wit,overflowY:"auto",padding:10,flexShrink:0}}>
        <div style={{fontSize:10,fontWeight:700,color:groen,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Klant</div>
        {klanten.map(k=>(
          <div key={k.id} onClick={()=>setSelKlant(k.id)}
            style={{padding:"7px 10px",borderRadius:6,cursor:"pointer",marginBottom:3,
              background:selKlant===k.id?lichtGroen:"transparent",
              border:`1px solid ${selKlant===k.id?groen:"transparent"}`,
              fontWeight:selKlant===k.id?700:400,fontSize:14}}>
            {k.naam}
            <div style={{fontSize:10,color:subtekst}}>{prijzen.filter(p=>p.klantId===k.id).length} prijzen</div>
          </div>
        ))}
      </div>

      {/* Hoofd: prijsmatrix */}
      <div style={{flex:1,overflowY:"auto",overflowX:"auto",padding:14}}>
        {!selKlant ? (
          <div style={{textAlign:"center",color:subtekst,padding:40}}>Selecteer een klant</div>
        ) : (()=>{
          const kl = klanten.find(k=>k.id===selKlant);
          return (
            <div>
              {/* Topbalk */}
              {(()=>{
                const alleOpenP = gewassen.every(g=>openGewas["prijsOpen_"+g.naam]===true);
                return (
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12,flexWrap:"wrap"}}>
                    <h2 style={{fontSize:15,fontWeight:700,color:groen}}>💰 {kl?.naam}</h2>
                    <span style={{color:subtekst,fontSize:12}}>{prijzen.filter(p=>p.klantId===selKlant).length} prijzen ingevuld</span>
                    <button style={{...gs.knopSecundair,fontSize:11,padding:"3px 10px"}} onClick={()=>{
                      const nieuw={};
                      gewassen.forEach(g=>nieuw["prijsOpen_"+g.naam]=!alleOpenP);
                      setOpenGewas(nieuw);
                    }}>{alleOpenP?"▲ Inklappen":"▼ Uitklappen"}</button>
                    <div style={{marginLeft:"auto",display:"flex",gap:6}}>
                      <button style={gs.knopKlein} onClick={()=>{setKopModal(true);setKopNaarKlant("");}}>📋 Kopieer naar andere klant</button>
                      <button style={{...gs.knopVerwijder}} onClick={()=>{if(window.confirm("Alle prijzen van "+kl?.naam+" verwijderen?"))setPrijzen(prijzen.filter(p=>p.klantId!==selKlant));}}>🗑️ Wis alle prijzen</button>
                    </div>
                  </div>
                );
              })()}

              {/* Matrix per gewas — inklapbaar */}
              {gewassen.map(gw=>{
                const openKey = "prijsOpen_"+gw.naam;
                const isOpen = openGewas[openKey]===true;
                const aantalIngevuld = prijzen.filter(p=>p.klantId===selKlant&&p.gewas===gw.naam).length;
                return (
                  <div key={gw.naam} style={{background:wit,border:`1px solid ${rand}`,borderRadius:6,marginBottom:6,overflow:"hidden"}}>
                    {/* Gewas header — alleen naam + telling + wis */}
                    <div style={{display:"flex",alignItems:"center",gap:8,padding:"5px 10px",background:"#f0f7f4",borderBottom:isOpen?`1px solid ${rand}`:"none",cursor:"pointer"}}
                      onClick={()=>setOpenGewas({...openGewas,[openKey]:!isOpen})}>
                      <span style={{fontSize:12,color:groen}}>{isOpen?"▼":"▶"}</span>
                      <span style={{fontWeight:700,fontSize:14,color:groen,flex:1}}>{gw.naam}</span>
                      <span style={{fontSize:10,color:subtekst}}>{aantalIngevuld} prijzen</span>
                      <button style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:4,padding:"2px 6px",cursor:"pointer",fontSize:10}}
                        onClick={e=>{e.stopPropagation();if(window.confirm("Alle prijzen van "+gw.naam+" voor "+kl?.naam+" wissen?"))setPrijzen(prijzen.filter(p=>!(p.klantId===selKlant&&p.gewas===gw.naam)));}}
                      >🗑️</button>
                    </div>
                    {/* Soorten tabel — alleen als open */}
                    {isOpen&&(
                      <table style={{width:"auto",tableLayout:"fixed"}}>
                        <colgroup>
                          <col style={{width:180}}/>
                          {verpDef.map(v=><col key={v.naam} style={{width:80}}/>)}
                        </colgroup>
                        <thead>
                          <tr>
                            <th style={{...mTH,textAlign:"left",padding:"4px 8px"}}>Soort</th>
                            {verpDef.map(v=>(
                              <th key={v.naam} style={{...mTH,textAlign:"left",padding:"4px 8px"}}>{v.naam}</th>
                            ))}
                          </tr>
                          <tr style={{background:"#e8f5ee"}}>
                            <td style={{...mTD,padding:"3px 8px",fontSize:10,color:subtekst,fontStyle:"italic"}}>Vul alle soorten:</td>
                            {verpDef.map(v=>(
                              <td key={v.naam} style={{...mTD,padding:"2px 4px"}}>
                                <input style={{...iS,width:68,textAlign:"left",background:"#d4edda"}}
                                  type="number" step="0.001" min="0" placeholder="Allen"
                                  value={vulGewas[gw.naam+"_"+v.naam]||""}
                                  onChange={e=>setVulGewas({...vulGewas,[gw.naam+"_"+v.naam]:e.target.value})}
                                  onBlur={e=>{if(e.target.value){
                                    const nieuw=[...prijzen];
                                    gw.soorten.forEach(s=>{
                                      const idx=nieuw.findIndex(x=>x.klantId===selKlant&&x.gewas===gw.naam&&x.soort===s&&x.verpakking===v.naam);
                                      if(idx>=0)nieuw[idx]={...nieuw[idx],prijs:parseFloat(e.target.value)};
                                      else nieuw.push({id:'p_'+selKlant+'_'+gw.naam+'_'+s+'_'+v.naam,klantId:selKlant,gewas:gw.naam,soort:s,verpakking:v.naam,prijs:parseFloat(e.target.value)});
                                    });
                                    setPrijzen(nieuw);
                                    setVulGewas({...vulGewas,[gw.naam+"_"+v.naam]:""});
                                  }}}
                                />
                              </td>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {gw.soorten.map((s,si)=>(
                            <tr key={s} style={{background:si%2===0?wit:"#f9fcfb"}}>
                              <td style={{...mTD,paddingLeft:8,whiteSpace:"nowrap"}}>{s}</td>
                              {verpDef.map(v=>{
                                const prijs=getPrijs(selKlant,gw.naam,s,v.naam);
                                return (
                                  <td key={v.naam} style={{...mTD,padding:"2px 4px"}}>
                                    <PrijsInput
                                      key={selKlant+"_"+gw.naam+"_"+s+"_"+v.naam}
                                      prijs={prijs}
                                      style={{...iS,width:68,textAlign:"left"}}
                                      onSave={nieuwePrijs=>setPrijs(selKlant,gw.naam,s,v.naam,nieuwePrijs)}
                                    />
                                  </td>
                                );
                              })}
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })()}
      </div>

      {/* Kopieer modal */}
      {kopModal&&(<div style={gs.overlay}><div style={{...gs.modal,width:320}}>
        <div style={gs.modalTitel}>📋 Prijslijst kopiëren</div>
        <div style={{color:subtekst,fontSize:12,marginBottom:12}}>
          Kopieer alle prijzen van <strong>{klanten.find(k=>k.id===selKlant)?.naam}</strong> naar:
        </div>
        <div style={gs.veldGroep}>
          <select style={gs.input} value={kopNaarKlant} onChange={e=>setKopNaarKlant(e.target.value)}>
            <option value="">— Kies klant —</option>
            {klanten.filter(k=>k.id!==selKlant).map(k=><option key={k.id} value={k.id}>{k.naam}</option>)}
          </select>
        </div>
        <div style={{color:"#f59e0b",fontSize:11,marginBottom:12}}>⚠️ Bestaande prijzen van de doelklant worden overschreven.</div>
        <div style={{display:"flex",gap:8}}>
          <button style={gs.knopPrimair} onClick={kopeerKlant} disabled={!kopNaarKlant}>📋 Kopiëren</button>
          <button style={gs.knopSecundair} onClick={()=>setKopModal(false)}>Annuleren</button>
        </div>
      </div></div>)}
    </div>
  );
}

// ORDER DETAIL + BEWERKEN — gedeelde compacte layout

function PrijsVeldRegel({ waarde, onSave, stijl, type="number", min="0", resetKey=0 }) {
  const [val, setVal] = useState(waarde??'');
  useEffect(()=>setVal(waarde??''), [waarde, resetKey]);
  return (
    <input style={{...stijl,background:val!==''&&val!==undefined?"#fafffe":"#fff"}}
      type={type} step="0.001" min={min} placeholder="—"
      value={val}
      onFocus={e=>e.target.select()}
      onChange={e=>setVal(e.target.value)}
      onBlur={e=>onSave(e.target.value)}
      onKeyDown={e=>{if(e.key==="Enter"||e.key==="Tab"){e.preventDefault();onSave(val);}}}
    />
  );
}

function RegelRij({ r, verpDef, gewassen, bewerkbaar, status, onVerwijder, onKopie, onUpdate }) {
  const [waarschuwing, setWaarschuwing] = useState(null);
  const [tijdelijkeSoort, setTijdelijkeSoort] = useState(r.soort);
  const [resetTeller, setResetTeller] = useState(0);
  function updMet(k,v){
    if(onUpdate && (status==="bevestigd"||status==="geleverd")) {
      const oud = r[k];
      if(String(oud)!==String(v)) {
        setWaarschuwing({veld:k,oud,nieuw:v});
        return;
      }
    }
    if(onUpdate) {
      onUpdate({...r,[k]:v});
    }
  }
  const vd = vindVd(verpDef, r.verpakking);
  const planten = ((vd?.aantal||0)*r.aantal).toLocaleString();
  function upd(k,v){ if(onUpdate) onUpdate({...r,[k]:v}); }
  // kernvelden krijgen waarschuwing, vrije velden (nummers/datum) altijd direct
  const kernVelden = ["gewas","soort","verpakking","aantal","prijs"];
  const cel  = {padding:"3px 5px",fontSize:12,borderBottom:`1px solid ${rand}`,verticalAlign:"middle"};
  const celR = {...cel,textAlign:"right"};
  // Inline input stijl — past in de cel, geen border als niet-bewerkbaar
  const inp  = (w)=>({padding:"2px 4px",border:`1px solid ${rand}`,borderRadius:3,fontSize:12,width:w,background:"#fafffe"});
  const soorten = gewassen?.find(g=>g.naam===r.gewas)?.soorten||[];
  const veldLabel = {"gewas":"Gewas","soort":"Soort","verpakking":"Fust","aantal":"Trays","prijs":"Prijs"};
  return (
    <>
    {waarschuwing&&(
      <tr><td colSpan={10} style={{padding:0}}>
        <div style={{background:"#fff8e1",border:"1px solid #f59e0b",borderRadius:4,padding:"6px 10px",margin:"2px 0",fontSize:11,display:"flex",gap:10,alignItems:"center"}}>

        </div>

    )}

      <td style={cel}>{bewerkbaar
        ? <select style={inp(184)} value={r.soort} onChange={e=>setTijdelijkeSoort(e.target.value)} onBlur={e=>updMet("soort",tijdelijkeSoort||r.soort)}>
            {soorten.map(s=><option key={s}>{s}</option>)}
          </select>
        : r.soort}
      </td>
      {/* Verpakking */}
      <td style={cel}>{bewerkbaar
        ? <select style={inp(90)} value={r.verpakking} onChange={e=>updMet("verpakking",e.target.value)}>

      <td style={celR}>{bewerkbaar

        : r.aantal}
      </td>
      {/* Planten — berekend */}
      <td style={{...celR,fontWeight:600,color:groen}}>{planten}</td>
      {/* €/st */}
      <td style={celR}>{bewerkbaar
        ? <PrijsVeldRegel waarde={r.prijs} onSave={v=>updMet("prijs",v)} resetKey={resetTeller}
              stijl={{...inp(55),textAlign:"right",borderColor:r.prijs===""?"#f59e0b":rand}} />
        : (r.prijs!==""?"€"+Number(r.prijs).toFixed(3):<span style={{color:"#f59e0b"}}>—</span>)}
      </td>

      {/* Vast — bevestigd plantenaantal */}
      <td style={{...celR,fontWeight:600}}>
        {bewerkbaar
          ? <input style={{...inp(70),textAlign:"right",background:status==="reservering"?"#f3f4f6":"#fff9e6",borderColor:status==="reservering"?rand:"#f59e0b"}}
              type="number" min="0"
              value={status==="reservering" ? "" : (r.vastPlanten??"")}
              readOnly={status==="reservering"}
              placeholder={status==="reservering" ? ((vd?.aantal||0)*r.aantal).toLocaleString() : "Invullen"}
              title={status==="reservering"?"Wordt pas vast na bevestiging":"Handmatig aan te passen"}
              onChange={e=>status!=="reservering"&&upd("vastPlanten",Number(e.target.value))} />
          : <span style={{color:status==="reservering"?subtekst:tekst}}>
              {status==="reservering" ? <em style={{color:"#bbb"}}>—</em> : (r.vastPlanten??<em style={{color:"#bbb"}}>—</em>)}
            </span>

      {/* Verschil: planten - vastPlanten */}
      {(()=>{
        const pl=(vd?.aantal||0)*r.aantal;
        const vast=r.vastPlanten??null;
        const verschil=vast!==null?pl-vast:null;
        return (
          <td style={{...celR,fontWeight:verschil?700:400,
            color:verschil>0?"#16a34a":verschil<0?"#dc2626":subtekst,

      <td style={cel}>{bewerkbaar

// ── WEEKGROEP COMPONENT ─────────────────────────────────
function WeekGroep({ wk, weekOrders, klanten, ges, verpDef, onOpen, onKopie, plantenTotaal, forceOpen }) {
  const [open, setOpen] = useState(false);
  useEffect(()=>{ if(forceOpen!==null&&forceOpen!==undefined) setOpen(forceOpen); },[forceOpen]);
  const totaalPlanten = weekOrders.reduce((s,o)=>s+plantenTotaal(o.regels),0);

  function handleWeekKlik() {
    if(weekOrders.length===1) {
      // Direct die ene order openen
      onOpen(weekOrders[0]);
    } else {
      // Meerdere orders: uitklappen
      setOpen(!open);
    }
  }

  return (
    <div style={{marginBottom:4}}>
      {/* Week header */}
      <div onClick={handleWeekKlik} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
        padding:"4px 6px",background:"#e8f5ee",borderRadius:5,cursor:"pointer",marginBottom:2}}>
        <span style={{fontWeight:700,fontSize:12,color:groen}}>
          {weekOrders.length===1 ? "▶" : open ? "▼" : "▶"} {wk}
        </span>
        <span style={{fontSize:10,color:subtekst}}>{weekOrders.length} orders · {totaalPlanten.toLocaleString()} pl.</span>
      </div>
      {/* Orders — altijd tonen als open of als actieve order in deze week zit */}
      {(open || weekOrders.some(o=>o.id===ges?.id)) && weekOrders.map(o=>{
        const kl=klanten.find(k=>k.id===o.klantId);
        const actief = ges?.id===o.id;
        return (
          <div key={o.id} style={{padding:"5px 7px",borderRadius:5,cursor:"pointer",marginBottom:3,
            background:actief?lichtGroen:"transparent",border:`1px solid ${actief?groen:"transparent"}`}}
            onClick={()=>onOpen(o)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14,color:tekst,lineHeight:1.2}}>{kl?.naam}</div>
                <div style={{fontSize:10,color:subtekst,marginTop:1}}>{o.orderNr} · {plantenTotaal(o.regels).toLocaleString()} pl.</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
                {o.bevestigingNr
                  ? <div style={{background:"#7c3aed",color:"#fff",borderRadius:4,padding:"2px 6px",fontSize:9,fontWeight:700,textAlign:"center"}}>
                      ✅ #{o.bevestigingNr} · {o.bevestigdOp||(o.bevestigingGemaild?new Date(o.bevestigingGemaild).toLocaleDateString("nl-NL"):"—")}
                    </div>
                  : <span style={{fontSize:10,fontWeight:600,background:S_BG[o.status],color:S_KLEUR[o.status],borderRadius:20,padding:"1px 6px"}}>{S_LABEL[o.status]}</span>
                }
                {!o.bevestigingNr&&!o.seizoensGemaild&&(
                  <span style={{fontSize:9,color:"#9ca3af",fontStyle:"italic"}}>eerst mailen</span>
                )}
                {!o.bevestigingNr&&o.seizoensGemaild&&(
                  <span style={{fontSize:9,fontWeight:600,background:"#ede9fe",color:"#7c3aed",borderRadius:20,padding:"1px 6px"}}>📧 klaar voor bevestiging</span>
                )}
                {o.factuurNr&&!o.betaaldOp&&(
                  <span style={{fontSize:9,fontWeight:600,background:"#fef3c7",color:"#b45309",borderRadius:20,padding:"1px 6px"}}>🧾 open</span>
                )}
                {o.factuurNr&&o.betaaldOp&&(
                  <span style={{fontSize:9,fontWeight:600,background:"#dcfce7",color:"#16a34a",borderRadius:20,padding:"1px 6px"}}>💶 betaald</span>
                )}
                <div style={{display:"flex",gap:2}}>
                  <button title="Kopiëren" style={{background:"none",border:"none",cursor:"pointer",fontSize:10,padding:"0 2px",color:groen,lineHeight:1}}

const STATUSSEN = ["reservering","bevestigd","geleverd"];
const S_KLEUR = {reservering:"#7c3aed",bevestigd:groen,geleverd:subtekst};
const S_BG    = {reservering:"#ede9fe",bevestigd:lichtGroen,geleverd:"#f3f4f6"};
const S_LABEL = {reservering:"Reservering",bevestigd:"Bevestigd",geleverd:"Geleverd"};

// ── MATRIX FILTERPANEEL ─────────────────────────────────
function MatrixFilterPaneel({ klanten, gewassen, orders, verpDef, weken }) {
  const nu = new Date();
  const huidigeWeekLabel = `${String(getJaar(nu)).slice(-2)}${String(getWeekNr(nu)).padStart(2,"0")}`;
  const beginIdx = Math.max(0, weken.findIndex(w=>w.label===huidigeWeekLabel));
  const eindIdx  = Math.min(weken.length-1, beginIdx+7);

  const [filtKlant,   setFiltKlant]    = useState("TOTAAL");
  const [filtGewas,   setFiltGewas]    = useState("TOTAAL");
  const [filtSoort,   setFiltSoort]    = useState("TOTAAL");
  const [filtStatus,  setFiltStatus]   = useState("ORDER");
  const [filtBegin,   setFiltBegin]    = useState(weken[beginIdx]?.label || "");
  const [filtEind,    setFiltEind]     = useState(weken[eindIdx]?.label  || "");
  const [filtWaarde,  setFiltWaarde]   = useState("planten");
  const [filtVerp,    setFiltVerp]     = useState("TOTAAL");

  const soorten = filtGewas==="TOTAAL"
    ? []
    : (gewassen.find(g=>g.naam===filtGewas)?.soorten||[]);

  function plantenPerRegel(r){
    const v=verpDef.find(x=>x.naam===r.verpakking);
    return (v?.aantal||0)*r.aantal;
  }

  // Filter orders op basis van instellingen
  const gefilterdOrders = orders.filter(o=>{
    if(filtKlant!=="TOTAAL" && filtKlant!=="GESPECIFICEERD" && o.klantId!==Number(filtKlant)) return false;
    if(filtStatus==="ORDER" && o.status==="geleverd") return false;
    if(filtStatus!=="ORDER" && filtStatus!=="TOTAAL" && o.status!==filtStatus) return false;
    const wk=weekLabel(o.leverdatum);
    if(filtBegin && wk<filtBegin) return false;
    if(filtEind  && wk>filtEind)  return false;
    return true;
  });

  // Alle weken in range
  const wekenInRange = weken.filter(w=>{
    if(filtBegin && w.label<filtBegin) return false;
    if(filtEind  && w.label>filtEind)  return false;
    return true;
  });

  // Bouw matrixdata
  // Rijen: klant → gewas - soort (verpakking)
  const matrixData = {}; // { rijKey: { klantId, klantNaam, regelKey, weekLabel: waarde } }

  gefilterdOrders.forEach(o=>{
    const kl = klanten.find(k=>k.id===o.klantId);
    const klantNaam = kl?.naam||"?";
    const wk = weekLabel(o.leverdatum);

    o.regels.forEach(r=>{
      if(filtGewas!=="TOTAAL" && filtGewas!=="GESPECIFICEERD" && r.gewas!==filtGewas) return;
      if(filtSoort!=="TOTAAL" && filtSoort!=="GESPECIFICEERD" && r.soort!==filtSoort) return;
      if(filtVerp!=="TOTAAL" && filtVerp!=="GESPECIFICEERD" && r.verpakking!==filtVerp) return;

      const rijKlant = filtKlant==="TOTAAL" ? "TOTAAL" : o.klantId;
      const rijGewas = (filtGewas==="TOTAAL") ? "TOTAAL" : r.gewas;
      const rijSoort = (filtSoort==="TOTAAL") ? "TOTAAL" : r.soort;
      const rijVerp  = (filtVerp==="TOTAAL") ? "TOTAAL" : r.verpakking;
      const rijKey = `${rijKlant}||${rijGewas}||${rijSoort}||${rijVerp}`;
      if(!matrixData[rijKey]) matrixData[rijKey]={klantId:rijKlant,klantNaam:filtKlant==="TOTAAL"?"Alle klanten":klantNaam,gewas:filtGewas==="TOTAAL"?"Alle teelten":r.gewas,soort:filtSoort==="TOTAAL"?"Alle soorten":r.soort,verpakking:filtVerp==="TOTAAL"?"Alle verpakkingen":r.verpakking,weken:{}};

      let waarde=0;
      if(filtWaarde==="planten"||filtWaarde==="duizend") waarde=plantenPerRegel(r);
      else if(filtWaarde==="trays") waarde=r.aantal;
      else if(filtWaarde==="bedrag") waarde=Number(r.prijs||0)*r.aantal;

      matrixData[rijKey].weken[wk]=(matrixData[rijKey].weken[wk]||0)+waarde;
    });
  });

  const rijen = Object.values(matrixData);

  // Groepeer rijen per klant
  const perKlant = {};
  rijen.forEach(r=>{
    if(!perKlant[r.klantId]) perKlant[r.klantId]={naam:r.klantNaam,rijen:[]};
    perKlant[r.klantId].rijen.push(r);
  });

  // Totaal per week (onderste rij)
  function weekTotaal(wk){
    return rijen.reduce((s,r)=>s+(r.weken[wk]||0),0);
  }
  function rijTotaal(r){
    return Object.values(r.weken).reduce((s,v)=>s+v,0);
  }
  function grootTotaal(){
    return rijen.reduce((s,r)=>s+rijTotaal(r),0);
  }

  const selectStijl = {
    padding:"5px 8px",
    border:"1px solid #b7c0bb",
    borderRadius:4,
    background:"#f5f9f7",
    fontSize:12,
    minWidth:140,
    color:tekst,
    cursor:"pointer"
  };
  const labelStijl = {
    fontSize:11,
    fontWeight:600,
    color:subtekst,
    marginBottom:3,
    display:"block"
  };
  const filterRij = {display:"flex",gap:16,alignItems:"flex-end",flexWrap:"wrap"};

  const mTH={...TH,background:"#dff0e8",color:groen,padding:"4px 6px",fontSize:11};
  const mTD={...TD,padding:"4px 6px",textAlign:"right",fontSize:12};
  const mTDL={...TD,padding:"4px 6px",textAlign:"left",fontSize:12};

  const eenheid = filtWaarde==="bedrag" ? "€" : filtWaarde==="duizend" ? "x1000" : filtWaarde==="planten" ? "pl." : "trays";
  const formatWaarde = (v)=>{
    if(v===0||!v) return <span style={{color:"#ccc"}}>—</span>;
    if(filtWaarde==="bedrag") return `€ ${v.toFixed(2)}`;
    if(filtWaarde==="duizend") return (v/1000).toFixed(1);
    return v.toLocaleString();
  };

  return (
    <div>
      {/* Filterpaneel */}
      <div style={{background:"#f0f7f4",border:`1px solid ${rand}`,borderRadius:8,padding:14,marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:12,color:groen,marginBottom:10,textTransform:"uppercase",letterSpacing:0.5}}>
          📊 Matrix filters
        </div>
        <div style={filterRij}>
          <div>
            <label style={labelStijl}>Klant</label>
            <select style={selectStijl} value={filtKlant} onChange={e=>setFiltKlant(e.target.value)}>

function Orders({ klanten, gewassen, prijzen, orders, setOrders, verpDef, bedrijf }) {

  const maakLeeg=()=>({id:null,klantId:klanten[0]?.id||0,leverdatum:defWeek.datum,status:"reservering",notitie:"",regels:[],aanmaakdatum:new Date().toISOString().split("T")[0]});

    async function verstuurMetPdf() {
      setMailStatus("📧 PDF genereren...");
      try {
        // Maak hidden div met de matrix HTML
        const div = document.createElement('div');
        div.style.cssText = 'position:fixed;left:-9999px;top:0;width:900px;background:#fff;padding:20px;font-family:Arial,sans-serif;font-size:11px';
        div.innerHTML = berichtHtml;
        document.body.appendChild(div);

        const canvas = await window.html2canvas(div, {scale:1.5, useCORS:true, backgroundColor:'#fff'});
        document.body.removeChild(div);

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({orientation:'landscape', unit:'mm', format:'a4'});
        const imgData = canvas.toDataURL('image/jpeg', 0.85);
        const pdfW = pdf.internal.pageSize.getWidth();
        const pdfH = (canvas.height * pdfW) / canvas.width;

        // Splits over meerdere pagina's als nodig
        const pageH = pdf.internal.pageSize.getHeight();
        let y = 0;
        while(y < pdfH) {
          if(y > 0) pdf.addPage();
          pdf.addImage(imgData, 'JPEG', 0, -y, pdfW, pdfH);
          y += pageH;
        }

        const pdfBase64 = pdf.output('datauristring').split(',')[1];
        const bestandsnaam = 'Bevestiging_'+kl.naam+'_wk'+weekLabel(order.leverdatum)+'.pdf';

      } catch(err) {

                            <div style={{color:subtekst,fontSize:12,paddingTop:14}}>↔</div>
                            <div style={{flex:1}}>
                              <div style={{fontSize:9,color:subtekst,marginBottom:1}}>Planten</div>
                              <input style={{...gs.input,padding:"3px 6px",fontSize:12,width:"100%"}}
                                type="text" inputMode="numeric"
                                value={berekendePlanten||""}
                                placeholder={perTray?"÷"+perTray:""}

              <div style={{flex:1,background:wit,border:`1px solid ${rand}`,borderRadius:6,overflow:"hidden"}}>
                {data.regels.length===0
                  ? <div style={{color:subtekst,fontSize:12,padding:16,textAlign:"center"}}>Nog geen regels</div>
                  : <table style={{fontSize:12,width:"100%"}}>
                      <thead>
                        {[["Gewas",125],["Soort",184],["Fust",90],["Trays",55],["Planten",70],["€/st",60],["Vast",70],["Verschil",60],["Datum",95],["BK",24],["",32]].map(([h,w],i)=>(
                          <th key={h+i} style={{...TH,padding:"3px 5px",fontSize:11,textAlign:i>=3&&i<=7?"right":"left",minWidth:w,width:w,title:h==="BK"?"Behandelkosten meerekenen":undefined}}>{h}</th>
                        ))}
                      </thead>
                      <tbody>{data.regels.map(r=>(
                        <RegelRij key={r.id} r={r} verpDef={verpDef} gewassen={gewassen} bewerkbaar={true} status={data.status||"reservering"}
                          onVerwijder={()=>setData({...data,regels:data.regels.filter(x=>x.id!==r.id)})}
                          onUpdate={bijgewerkt=>setData({...data,regels:data.regels.map(x=>x.id===bijgewerkt.id?bijgewerkt:x)})}
                        />
                      ))}</tbody>
                      <tfoot>
                        {(()=>{
                          const totVast=data.regels.reduce((s,r)=>{const vd=verpDef.find(v=>v.naam===r.verpakking);return s+(r.vastPlanten??((vd?.aantal||0)*r.aantal));},0);
                          const totPlanten=plantenTotaal(data.regels);
                          const totVerschil=totPlanten-totVast;
                          const bS={padding:"4px 5px",fontSize:12,fontWeight:700,borderTop:`2px solid ${groen}`};
                          return <tr style={{background:"#e8f5ee"}}>
                            <td style={{...bS,color:groen,fontSize:11}} colSpan={3}>Totaal</td>
                            <td style={{...bS,color:groen,textAlign:"right"}}>{data.regels.reduce((s,x)=>s+x.aantal,0)}</td>
                            <td style={{...bS,color:groen,textAlign:"right"}}>{plantenTotaal(data.regels).toLocaleString()}</td>
                            <td style={bS}></td><td style={bS}></td>
                            <td style={{...bS,textAlign:"right",color:totVerschil>0?"#16a34a":totVerschil<0?"#dc2626":groen}}>
                              {totVerschil===0?"✓":totVerschil>0?"+"+totVerschil.toLocaleString():totVerschil.toLocaleString()}
                            </td>
                            <td style={bS} colSpan={2}></td>
                          </tr>;
                        })()}
                      </tfoot>
                    </table>
                }
              </div>
            </div>
          </div>
        ) : ges ? (()=>{
          const kl=klanten.find(k=>k.id===ges.klantId);
          return (
            <OrderDetail
              ges={ges} kl={kl} klanten={klanten} verpDef={verpDef} gewassen={gewassen}
              setSt={setSt} setData={setData} setRegel={setRegel} legeRegel={legeRegel}
              setForm={setForm} setTab={setTab} setKopO={setKopO} setKopR={setKopR} setKopRDoel={setKopRDoel}
              setDelId={setDelId} defWeek={defWeek} WEKEN={WEKEN} orders={orders} setOrders={setOrders}
              plantenTotaal={plantenTotaal} totaal={totaal}
            />
          );
        })() : (
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"60%",gap:16}}>
            <div style={{fontSize:48}}>📦</div>
            <div style={{fontSize:15,color:subtekst,marginBottom:8}}>Kies een klant om te beginnen</div>
            <select
              style={{fontSize:16,fontWeight:700,color:"#fff",background:groen,border:"none",
                borderRadius:8,padding:"12px 24px",cursor:"pointer",minWidth:220,textAlign:"center",
                boxShadow:"0 4px 12px rgba(45,106,79,0.3)"}}
              value={filtK}
              onChange={e=>{setFiltK(e.target.value);setGes(null);setForm(false);}}>
              <option value={0}>— Kies een klant —</option>
              {klanten.sort((a,b)=>a.naam.localeCompare(b.naam)).map(k=><option key={k.id} value={k.id}>{k.naam}</option>)}

          </div>
        ))}

        {tab==="matrix" && (
          <MatrixFilterPaneel klanten={klanten} gewassen={gewassen} orders={orders} verpDef={verpDef} weken={WEKEN} />
        )}

        </div>
      </div>

      {kopO&&(<div style={gs.overlay}><div style={{...gs.modal,width:340}}>
        <div style={gs.modalTitel}>📋 Order kopiëren</div>
        <div style={{color:subtekst,fontSize:12,marginBottom:12}}>Kopie van <strong>{kopO.orderNr}</strong> · {kopO.regels.length} regel(s) · status wordt Reservering</div>
        <div style={gs.veldGroep}><label style={gs.label}>Nieuwe leverweek</label>
          <select style={gs.input} value={kopODat} onChange={e=>setKopODat(e.target.value)}>
            {WEKEN.map(w=><option key={w.datum} value={w.datum}>{w.label}</option>)}
          </select></div>
        <div style={{display:"flex",gap:8}}><button style={gs.knopPrimair} onClick={kopOUit}>📋 Kopiëren</button><button style={gs.knopSecundair} onClick={()=>setKopO(null)}>Annuleren</button></div>
      </div></div>)}

      {kopR&&(<div style={gs.overlay}><div style={{...gs.modal,width:400}}>
        <div style={gs.modalTitel}>📋 Regel kopiëren</div>
        <div style={{background:achtergrond,borderRadius:6,padding:8,marginBottom:12,fontSize:12}}>
          <strong>{kopR.regel.gewas}</strong> {kopR.regel.soort} · {kopR.regel.verpakking} · {kopR.regel.aantal}x
        </div>
        {/* Toevoegen aan huidige order */}
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {(form||ges)&&<button style={{...gs.knopPrimair,flex:1}} onClick={()=>{
            if(form){kopRUit("HUIDIG");}
            else if(ges){
              const b=orders.map(o=>o.id===ges.id?{...o,regels:[...o.regels,{...kopR.regel,id:Date.now()}]}:o);
              setOrders(b);setGes(b.find(o=>o.id===ges.id));setKopR(null);
            }
          }}>
            📋 Toevoegen aan {form?"huidige order":ges?.orderNr}
          </button>}
        </div>
        {/* 2-staps keuze: klant → week → order */}
        <div style={gs.veldGroep}>
          <label style={gs.label}>Of kopieer naar andere order</label>
          <select style={{...gs.input,marginBottom:6}} value={kopRKlant} onChange={e=>{setKopRKlant(e.target.value);setKopRWk("");setKopRDoel("");}}>
            <option value="">— Kies klant —</option>
            {klanten.sort((a,b)=>a.naam.localeCompare(b.naam)).map(k=><option key={k.id} value={k.id}>{k.naam}</option>)}
          </select>
          {kopRKlant&&(()=>{
            const klantOrders = orders.filter(o=>o.klantId===Number(kopRKlant));
            const weken = [...new Set(klantOrders.map(o=>weekLabel(o.leverdatum)))].sort();
            return <select style={{...gs.input,marginBottom:6}} value={kopRWk} onChange={e=>{setKopRWk(e.target.value);setKopRDoel("");}}>
              <option value="">— Kies week —</option>
              {weken.map(w=><option key={w}>{w}</option>)}
            </select>;
          })()}
          {kopRWk&&(()=>{
            const weekOrders = orders.filter(o=>o.klantId===Number(kopRKlant)&&weekLabel(o.leverdatum)===kopRWk);
            return <select style={gs.input} value={kopRDoel} onChange={e=>setKopRDoel(e.target.value)}>
              <option value="">— Kies order —</option>
              {weekOrders.map(o=>{
                const isHuidig = data?.id && o.id===data.id;
                return <option key={o.id} value={o.id}>{isHuidig?"★ ":""}{o.orderNr}</option>;
              })}
            </select>;
          })()}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button style={gs.knopPrimair} onClick={()=>kopRUit(kopRDoel)} disabled={!kopRDoel}>📋 Kopiëren</button>
          <button style={gs.knopSecundair} onClick={()=>{setKopR(null);setKopRKlant("");setKopRWk("");setKopRDoel("");}}>Annuleren</button>
        </div>
      </div></div>)}

      {delId&&<BevestigModal tekst="Order verwijderen?" onJa={()=>verwijder(delId)} onNee={()=>setDelId(null)} />}
    </div>
  );
}

// MODULE — TEELTDUUR (instelbaar per gewas+soort+fust)
// ════════════════════════════════════════════════════════
function TeeltduurInput({ waarde, onSave, stijl }) {
  const [val, setVal] = useState(waarde??'');
  useEffect(()=>setVal(waarde??''), [waarde]);
  return (
    <input style={{...stijl, background:val!==''?"#f0fff8":"#fff", textAlign:"right"}}
      type="number" min="0" max="52" step="1" placeholder="—"
      value={val}
      onFocus={e=>e.target.select()}
      onChange={e=>setVal(e.target.value)}
      onBlur={e=>onSave(e.target.value)}
      onKeyDown={e=>{if(e.key==="Enter"||e.key==="Tab") e.target.blur();}}
    />
  );
}

function Teeltduur({ gewassen, verpDef, teeltduur, setTeeltduur }) {
  const [openGewas, setOpenGewas] = useState(()=>
    Object.fromEntries((gewassen||[]).map(g=>["open_"+g.naam, false]))
  );

  function getDuur(gewas, soort, fust, veld) {
    return teeltduur.find(t=>t.gewas===gewas&&t.soort===soort&&t.fust===fust)?.[veld]??'';
  }

  function setDuur(gewas, soort, fust, veld, waarde) {
    const id = ('t_'+gewas+'_'+soort+'_'+fust).replace(/[\/]/g,'_').trim();
    setTeeltduur(huidig => {
      const v = waarde===''||waarde===null ? null : Number(waarde);
      // Zoek op id OF op gewas+soort+fust combinatie (legacy records)
      const idx = huidig.findIndex(t=>t.id===id||
        (t.gewas===gewas&&t.soort===soort&&t.fust===fust));
      if(idx>=0) {
        const bijgewerkt = {...huidig[idx], id, [veld]:v};
        if(bijgewerkt.uitzaai===null&&bijgewerkt.inboet===null)
          return huidig.filter((_,i)=>i!==idx);
        return huidig.map((t,i)=>i===idx?bijgewerkt:t);
      }
      if(v===null) return huidig;
      return [...huidig, {id, gewas, soort, fust, uitzaai:veld==="uitzaai"?v:null, inboet:veld==="inboet"?v:null}];
    });
  }

  function vulGewas(gewas, soorten, veld, waarde) {
    if(waarde==='') return;
    setTeeltduur(huidig => {
      const nieuw = [...huidig];
      soorten.forEach(s => {
        verpDef.forEach(v => {
          const id = ('t_'+gewas+'_'+s+'_'+v.naam).replace(/[\/]/g,'_').trim();
          const idx = nieuw.findIndex(t=>t.id===id||(t.gewas===gewas&&t.soort===s&&t.fust===v.naam));
          if(idx>=0) nieuw[idx] = {...nieuw[idx], id, [veld]:Number(waarde)};
          else nieuw.push({id, gewas, soort:s, fust:v.naam, uitzaai:veld==="uitzaai"?Number(waarde):null, inboet:veld==="inboet"?Number(waarde):null});
        });
      });
      return nieuw;
    });
  }

  const iS = {padding:"2px 4px", border:`1px solid ${rand}`, borderRadius:3, fontSize:12, width:45};
  const mTH = {...TH, padding:"4px 8px", background:"#dff0e8", color:groen, fontSize:11};
  const mTD = {padding:"3px 6px", fontSize:12, borderBottom:`1px solid ${rand}`};

  return (
    <div style={{display:"flex", height:"calc(100vh - 50px)"}}>
      {/* Info */}
      <div style={{width:180, borderRight:`1px solid ${rand}`, background:wit, padding:14, flexShrink:0}}>
        <div style={{fontSize:11, fontWeight:700, color:groen, marginBottom:8, textTransform:"uppercase", letterSpacing:1}}>Teeltduur</div>
        <div style={{fontSize:11, color:subtekst, lineHeight:1.7}}>
          Weken vóór levering:<br/>
          <strong style={{color:"#1d4ed8"}}>Uitzaai</strong> = start teelt<br/>
          <strong style={{color:"#0891b2"}}>Inboet</strong> = aanvullen<br/><br/>
          Bijv. levering week 25:<br/>
          Uitzaai 9 → week 16<br/>
          Inboet 2 → week 23
        </div>
        <div style={{marginTop:12, fontSize:11, color:subtekst}}>
          {teeltduur.length} combinaties ingesteld
        </div>
      </div>

      {/* Matrix */}
      <div style={{flex:1, overflowY:"auto", padding:14}}>
        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
          <button style={{...gs.knopSecundair,fontSize:11,padding:"3px 10px"}} onClick={()=>{
            const alleOpenT = gewassen.every(g=>openGewas["open_"+g.naam]===true);
            const nieuw={};
            gewassen.forEach(g=>nieuw["open_"+g.naam]=!alleOpenT);
            setOpenGewas(nieuw);
          }}>
            {gewassen.every(g=>openGewas["open_"+g.naam]===true)?"▲ Inklappen":"▼ Uitklappen"}
          </button>
        </div>
        {gewassen.map(gw => {
          const openKey = "open_"+gw.naam;
          const isOpen = openGewas[openKey] === true;
          const ingevuld = teeltduur.filter(t=>t.gewas===gw.naam).length;
          const totCombi = gw.soorten.length * verpDef.length;

          return (
            <div key={gw.naam} style={{background:wit, border:`1px solid ${rand}`, borderRadius:6, marginBottom:6, overflow:"hidden"}}>
              {/* Header */}
              <div style={{display:"flex", alignItems:"center", gap:8, padding:"5px 10px",
                background:"#f0f7f4", borderBottom:isOpen?`1px solid ${rand}`:"none", cursor:"pointer"}}
                onClick={()=>setOpenGewas({...openGewas, [openKey]:!isOpen})}>
                <span style={{fontSize:12, color:groen}}>{isOpen?"▼":"▶"}</span>
                <span style={{fontWeight:700, fontSize:14, color:groen, flex:1}}>{gw.naam}</span>
                <span style={{fontSize:10, color:subtekst}}>{ingevuld}/{totCombi} ingesteld</span>
                <button style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:4,padding:"2px 6px",cursor:"pointer",fontSize:10}}
                  onClick={e=>{e.stopPropagation();if(window.confirm("Alle teeltduur van "+gw.naam+" wissen?"))
                    setTeeltduur(t=>t.filter(x=>x.gewas!==gw.naam));}}>🗑️</button>
              </div>

              {isOpen && (
                <table style={{width:"auto", tableLayout:"fixed"}}>
                  <colgroup>
                    <col style={{width:180}}/>
                    {verpDef.map(v=><col key={v.naam} style={{width:55}}/>)}
                    {verpDef.map(v=><col key={v.naam+"i"} style={{width:55}}/>)}
                  </colgroup>
                  <thead>
                    <tr>
                      <th style={{...mTH, textAlign:"left"}} rowSpan={2}>Soort</th>
                      <th style={{...mTH, textAlign:"center", color:"#1d4ed8", background:"#dbeafe"}} colSpan={verpDef.length}>Uitzaai (weken vóór)</th>
                      <th style={{...mTH, textAlign:"center", color:"#0891b2", background:"#cffafe"}} colSpan={verpDef.length}>Inboet (weken vóór)</th>
                    </tr>
                    <tr>
                      {verpDef.map(v=><th key={v.naam} style={{...mTH, textAlign:"right", fontSize:10, background:"#dbeafe", color:"#1d4ed8"}}>{v.naam}</th>)}
                      {verpDef.map(v=><th key={v.naam+"i"} style={{...mTH, textAlign:"right", fontSize:10, background:"#cffafe", color:"#0891b2"}}>{v.naam}</th>)}
                    </tr>
                    {/* Bulk invulrij — per kolom */}
                    <tr style={{background:"#f0f9ff"}}>
                      <td style={{...mTD,fontSize:10,color:subtekst,fontStyle:"italic",padding:"2px 6px"}}>Alle soorten:</td>
                      {verpDef.map(v=>(
                        <td key={v.naam} style={{...mTD,padding:"2px 3px",background:"#dbeafe"}}>
                          <input style={{...iS,width:42,textAlign:"right",background:"#bfdbfe"}} type="number" min="0" max="52" placeholder="—"
                            onBlur={e=>{if(e.target.value){
                              setTeeltduur(huidig=>{
                                const nieuw=[...huidig];
                                gw.soorten.forEach(s=>{
                                  const id=('t_'+gw.naam+'_'+s+'_'+v.naam).replace(/[\/]/g,'_').trim();
                                  const idx=nieuw.findIndex(t=>t.id===id);
                                  if(idx>=0) nieuw[idx]={...nieuw[idx],uitzaai:Number(e.target.value)};
                                  else nieuw.push({id,gewas:gw.naam,soort:s,fust:v.naam,uitzaai:Number(e.target.value),inboet:null});
                                });
                                return nieuw;
                              });
                              e.target.value='';
                            }}}
                          />
                        </td>
                      ))}
                      {verpDef.map(v=>(
                        <td key={v.naam+"i"} style={{...mTD,padding:"2px 3px",background:"#cffafe"}}>
                          <input style={{...iS,width:42,textAlign:"right",background:"#a5f3fc"}} type="number" min="0" max="52" placeholder="—"
                            onBlur={e=>{if(e.target.value){
                              setTeeltduur(huidig=>{
                                const nieuw=[...huidig];
                                gw.soorten.forEach(s=>{
                                  const id=('t_'+gw.naam+'_'+s+'_'+v.naam).replace(/[\/]/g,'_').trim();
                                  const idx=nieuw.findIndex(t=>t.id===id);
                                  if(idx>=0) nieuw[idx]={...nieuw[idx],inboet:Number(e.target.value)};
                                  else nieuw.push({id,gewas:gw.naam,soort:s,fust:v.naam,uitzaai:null,inboet:Number(e.target.value)});
                                });
                                return nieuw;
                              });
                              e.target.value='';
                            }}}
                          />
                        </td>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {gw.soorten.map((s, si) => (
                      <tr key={s} style={{background:si%2===0?wit:"#f9fcfb"}}>
                        <td style={{...mTD}}>{s}</td>
                        {verpDef.map(v => (
                          <td key={v.naam} style={{...mTD, textAlign:"right", padding:"2px 4px"}}>
                            <TeeltduurInput waarde={getDuur(gw.naam,s,v.naam,"uitzaai")} style={iS}
                              onSave={val=>setDuur(gw.naam,s,v.naam,"uitzaai",val)} />
                          </td>
                        ))}
                        {verpDef.map(v => (
                          <td key={v.naam+"i"} style={{...mTD, textAlign:"right", padding:"2px 4px"}}>
                            <TeeltduurInput waarde={getDuur(gw.naam,s,v.naam,"inboet")} style={iS}
                              onSave={val=>setDuur(gw.naam,s,v.naam,"inboet",val)} />
                          </td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}
