// OMZET OVERZICHT — per klant en per gewas per jaar
// ════════════════════════════════════════════════════════
function OmzetOverzicht({ klanten, gewassen, orders, verpDef }) {
  const [weergave, setWeergave] = useState("euro"); // euro | planten
  const [filtStatus, setFiltStatus] = useState("bevestigd_geleverd");

  // Relevante orders filteren
  const relevanteOrders = orders.filter(o=>{
    if(filtStatus==="bevestigd_geleverd") return o.status==="bevestigd"||o.status==="geleverd";
    if(filtStatus==="geleverd") return o.status==="geleverd";
    return true;
  });

  // Alle jaren uit orders halen
  const alleJaren = [...new Set(relevanteOrders.map(o=>getJaar(o.leverdatum)))].sort();

  // Planten per regel
  function plantenRegel(r) {
    const vd = verpDef.find(v=>v.naam===r.verpakking);
    return r.vastPlanten??((vd?.aantal||0)*r.aantal);
  }

  // Omzet per regel (planten * prijs)
  function omzetRegel(r) {
    const pl = plantenRegel(r);
    return pl * Number(r.prijs||0);
  }

  // ── TABEL 1: per klant ──
  const perKlant = {};
  relevanteOrders.forEach(o=>{
    const jaar = getJaar(o.leverdatum);
    const kl = klanten.find(k=>k.id===o.klantId);
    if(!kl) return;
    if(!perKlant[kl.id]) perKlant[kl.id]={naam:kl.naam,jaren:{}};
    o.regels.forEach(r=>{
      if(!perKlant[kl.id].jaren[jaar]) perKlant[kl.id].jaren[jaar]={euro:0,planten:0};
      perKlant[kl.id].jaren[jaar].euro += omzetRegel(r);
      perKlant[kl.id].jaren[jaar].planten += plantenRegel(r);
    });
  });
  const klantRijen = Object.values(perKlant).sort((a,b)=>a.naam.localeCompare(b.naam));

  // ── TABEL 2: per gewas ──
  const perGewas = {};
  relevanteOrders.forEach(o=>{
    const jaar = getJaar(o.leverdatum);
    o.regels.forEach(r=>{
      if(!perGewas[r.gewas]) perGewas[r.gewas]={naam:r.gewas,jaren:{}};
      if(!perGewas[r.gewas].jaren[jaar]) perGewas[r.gewas].jaren[jaar]={euro:0,planten:0};
      perGewas[r.gewas].jaren[jaar].euro += omzetRegel(r);
      perGewas[r.gewas].jaren[jaar].planten += plantenRegel(r);
    });
  });
  const gewasRijen = Object.values(perGewas).sort((a,b)=>a.naam.localeCompare(b.naam));

  // Totaal per jaar
  function jaarTotaalKlant(jaar) {
    return klantRijen.reduce((s,r)=>s+(r.jaren[jaar]?.[weergave==="euro"?"euro":"planten"]||0),0);
  }
  function jaarTotaalGewas(jaar) {
    return gewasRijen.reduce((s,r)=>s+(r.jaren[jaar]?.[weergave==="euro"?"euro":"planten"]||0),0);
  }
  function rijTotaal(rij) {
    return alleJaren.reduce((s,j)=>s+(rij.jaren[j]?.[weergave==="euro"?"euro":"planten"]||0),0);
  }
  function grootTotaal(rijen) {
    return alleJaren.reduce((s,j)=>s+rijen.reduce((s2,r)=>s2+(r.jaren[j]?.[weergave==="euro"?"euro":"planten"]||0),0),0);
  }

  function fmt(v) {
    if(!v) return <span style={{color:"#ddd"}}>—</span>;
    if(weergave==="euro") return "€ "+v.toLocaleString("nl-NL",{minimumFractionDigits:0,maximumFractionDigits:0});
    return v.toLocaleString("nl-NL");
  }

  const TH4 = {padding:"5px 8px",background:"#e8f5ee",color:groen,fontWeight:700,fontSize:11,border:`1px solid ${rand}`,textAlign:"right",whiteSpace:"nowrap"};
  const THL = {...TH4,textAlign:"left"};
  const TD4 = {padding:"5px 8px",fontSize:12,border:`1px solid ${rand}`,textAlign:"right"};
  const TDL = {...TD4,textAlign:"left"};

  function Tabel({rijen, titel, jaarTotaalFn}) {
    return (
      <div style={{marginBottom:28}}>
        <div style={{fontSize:13,fontWeight:700,color:groen,marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>{titel}</div>
        <div style={{overflowX:"auto"}}>
          <table style={{borderCollapse:"collapse",minWidth:400}}>
            <thead>
              <tr>
                <th style={{...THL,minWidth:160}}>{titel==="Per klant"?"Klant":"Gewas"}</th>
                {alleJaren.map(j=><th key={j} style={{...TH4,minWidth:90}}>{j}</th>)}
                <th style={{...TH4,minWidth:100,background:"#c8e6c9"}}>Totaal</th>
              </tr>
            </thead>
            <tbody>
              {rijen.map((r,i)=>{
                const tot = rijTotaal(r);
                return (
                  <tr key={r.naam} style={{background:i%2===0?wit:"#f9fcfb"}}>
                    <td style={{...TDL,fontWeight:600}}>{r.naam}</td>
                    {alleJaren.map(j=>{
                      const v = r.jaren[j]?.[weergave==="euro"?"euro":"planten"]||0;
                      // Kleur: hoogste jaar krijgt lichtgroen
                      const max = Math.max(...alleJaren.map(jj=>r.jaren[jj]?.[weergave==="euro"?"euro":"planten"]||0));
                      const isMax = v>0&&v===max&&alleJaren.length>1;
                      return (
                        <td key={j} style={{...TD4,fontWeight:v?500:300,color:v?"#1b1b1b":"#ddd",background:isMax?"#f0fff4":"transparent"}}>
                          {fmt(v)}
                        </td>
                      );
                    })}
                    <td style={{...TD4,fontWeight:700,color:groen,background:"#f0fff4"}}>{fmt(tot)}</td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr style={{background:"#e8f5ee",fontWeight:700}}>
                <td style={{...THL,borderTop:`2px solid ${groen}`}}>Totaal</td>
                {alleJaren.map(j=>(
                  <td key={j} style={{...TD4,borderTop:`2px solid ${groen}`,color:groen,fontWeight:700}}>{fmt(jaarTotaalFn(j))}</td>
                ))}
                <td style={{...TD4,borderTop:`2px solid ${groen}`,color:groen,fontWeight:700,background:"#c8e6c9"}}>{fmt(grootTotaal(rijen))}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    );
  }

  return (
    <div style={{padding:16,overflowY:"auto",height:"calc(100vh - 50px)"}}>
      {/* Toolbar */}
      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
        <h2 style={{fontSize:15,fontWeight:700,color:groen,margin:0}}>💶 Omzetoverzicht</h2>
        {/* Weergave */}
        <div style={{display:"flex",gap:2,background:"#f0f0f0",borderRadius:6,padding:2}}>
          {[["euro","€ Omzet"],["planten","Planten"]].map(([v,l])=>(
            <button key={v} onClick={()=>setWeergave(v)}
              style={{padding:"4px 12px",border:"none",borderRadius:5,cursor:"pointer",fontSize:12,
                background:weergave===v?groen:"transparent",color:weergave===v?wit:subtekst,fontWeight:weergave===v?700:400}}>
              {l}
            </button>
          ))}
        </div>
        {/* Status filter */}
        <div style={{display:"flex",gap:2,background:"#f0f0f0",borderRadius:6,padding:2}}>
          {[["bevestigd_geleverd","Bevestigd + Geleverd"],["geleverd","Alleen geleverd"],["alle","Alle"]].map(([v,l])=>(
            <button key={v} onClick={()=>setFiltStatus(v)}
              style={{padding:"4px 12px",border:"none",borderRadius:5,cursor:"pointer",fontSize:12,
                background:filtStatus===v?groen:"transparent",color:filtStatus===v?wit:subtekst,fontWeight:filtStatus===v?700:400}}>
              {l}
            </button>
          ))}
        </div>
        <span style={{fontSize:11,color:subtekst}}>{alleJaren.length} jaar/jaren · {relevanteOrders.length} orders</span>
      </div>

      {alleJaren.length===0
        ? <div style={{textAlign:"center",color:subtekst,padding:60}}>
            <div style={{fontSize:40,marginBottom:10}}>💶</div>
            <div>Geen orders gevonden</div>
          </div>
        : <>
            <Tabel rijen={klantRijen} titel="Per klant" jaarTotaalFn={jaarTotaalKlant} />
            <Tabel rijen={gewasRijen} titel="Per gewas" jaarTotaalFn={jaarTotaalGewas} />
          </>
      }
    </div>
  );
}

// MARGE OVERZICHT — inkoop vs verkoop per soort per klant
// ════════════════════════════════════════════════════════
function MargeOverzicht({ klanten, gewassen, prijzen, verpDef, kiemkracht, traykosten, setTraykosten }) {
  // Traykosten ophalen
  const tk = traykosten||{};

  // Koppeling aflevertray → zaaitray
  function getZaaitray(fust) {
    const f = fust?.toLowerCase()||"";
    if(f.includes("65")||f.includes("66")||f.includes("260")||f.includes("264")) return "Zaaitray 264";
    if(f.includes("179")||f.includes("180")) return "Zaaitray 180";
    return "Zaaitray 264";
  }

  // Traykosten per 1000 planten voor een aflevertray (zaai + aflevering)
  function getTraykosten1000(fust) {
    const zaaitray = getZaaitray(fust);
    const kostenZaai = tk[zaaitray]!=null ? Number(tk[zaaitray]) : 0;
    const kostenAflevering = tk[fust]!=null ? Number(tk[fust]) : 0;
    return kostenZaai + kostenAflevering;
  }
  // Alle beschikbare traysizes
  const alleFusten = verpDef.filter(v=>!v.naam.toLowerCase().includes("zaai"))
    .map(v=>v.naam).sort();
  const [selFust, setSelFust] = useState(alleFusten[0]||"");
  const [sorteerOp, setSorteerOp] = useState("verschil");
  const [filtKlant, setFiltKlant] = useState("");
  const [filtGewas, setFiltGewas] = useState(""); // verschil | gewas | marge

  // Actieve klanten (hebben een verkoopprijs voor dit fust)
  const actieveKlanten = klanten.filter(kl=>
    gewassen.some(gw=>gw.soorten.some(s=>
      prijzen.some(p=>p.klantId===kl.id&&p.verpakking===selFust)
    )) && (!filtKlant || kl.id===Number(filtKlant))
  ).sort((a,b)=>a.naam.localeCompare(b.naam));

  // Bouw rijen: per gewas/soort
  const rijen = [];
  gewassen.filter(gw=>!filtGewas||gw.naam===filtGewas).forEach(gw=>{
    (gw.soorten||[]).forEach(s=>{
      const inkoopPer1000 = (gw.inkoopPrijzen||{})[s];
      // Kiemkracht ophalen voor deze soort
      const kiem = kiemkracht.find(k=>k.gewas===gw.naam&&k.soort===s);
      const kiemPct = kiem?.waarde || 90;
      // Inkoop zaad per plant = prijs per 1000 zaden / 1000 / (kiemkracht/100)
      const inkoopZaadPerPlant = inkoopPer1000 ? (inkoopPer1000 / 1000 / (kiemPct/100)) : null;
      // Traykosten per plant = (zaaitray + aflevertray) kosten per 1000 / 1000
      const traykostenPer1000 = getTraykosten1000(selFust);
      const traykostenPerPlant = traykostenPer1000 / 1000;
      // Totale kostprijs per plant
      const heeftZaad = inkoopZaadPerPlant !== null;
      const heeftTray = traykostenPer1000 > 0;
      const inkoopPrijs = (heeftZaad || heeftTray)
        ? (inkoopZaadPerPlant||0) + traykostenPerPlant
        : null;
      // Verzamel verkoop per klant
      const verkopen = {};
      actieveKlanten.forEach(kl=>{
        const p = prijzen.find(x=>x.klantId===kl.id&&x.gewas===gw.naam&&x.soort===s&&x.verpakking===selFust);
        if(p?.prijs) verkopen[kl.id] = Number(p.prijs);
      });
      // Alleen rijen waar minstens 1 klant een prijs heeft
      if(Object.keys(verkopen).length===0) return;

      const marges = Object.values(verkopen).map(vp=>
        inkoopPrijs ? ((vp - inkoopPrijs) / inkoopPrijs * 100) : null
      ).filter(m=>m!==null);
      const maxMarge = marges.length ? Math.max(...marges) : null;
      const minMarge = marges.length ? Math.min(...marges) : null;
      const maxVerschil = inkoopPrijs && Object.values(verkopen).length
        ? Math.max(...Object.values(verkopen).map(vp=>(vp-inkoopPrijs)*1000))
        : null;

      rijen.push({gewas:gw.naam, soort:s, inkoop:inkoopPrijs||null, inkoopZaad:inkoopZaadPerPlant||null, inkoopPer1000:inkoopPer1000||null, traykostenPer1000, kiemPct, verkopen, maxMarge, minMarge, maxVerschil});
    });
  });

  // Sortering
  const gesorteerd = [...rijen].sort((a,b)=>{
    if(sorteerOp==="verschil") return (b.maxVerschil||0)-(a.maxVerschil||0);
    if(sorteerOp==="marge") return (b.maxMarge||0)-(a.maxMarge||0);
    return a.gewas.localeCompare(b.gewas)||a.soort.localeCompare(b.soort);
  });

  function margeKleur(marge) {
    if(marge===null) return {bg:"transparent",kleur:subtekst};
    if(marge>=50) return {bg:"#dcfce7",kleur:"#16a34a"};
    if(marge>=25) return {bg:"#d1fae5",kleur:"#059669"};
    if(marge>=10) return {bg:"#fef9c3",kleur:"#b45309"};
    if(marge>=0)  return {bg:"#fee2e2",kleur:"#dc2626"};
    return {bg:"#fecaca",kleur:"#991b1b"};
  }

  const TH3 = {padding:"3px 5px",background:"#e8f5ee",color:groen,fontWeight:700,fontSize:11,
    border:`1px solid ${rand}`,textAlign:"center",whiteSpace:"nowrap"};
  const TD3 = {padding:"2px 5px",fontSize:11,border:`1px solid ${rand}`,textAlign:"right",whiteSpace:"nowrap"};

  return (
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 50px)",overflow:"hidden"}}>
      {/* Toolbar */}
      <div style={{display:"flex",gap:10,padding:"8px 14px",background:"#f0f7f4",borderBottom:`1px solid ${rand}`,alignItems:"center",flexShrink:0,flexWrap:"wrap"}}>
        <h2 style={{fontSize:14,fontWeight:700,color:groen,margin:0}}>💹 Marge overzicht</h2>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <label style={{fontSize:11,color:subtekst}}>Tray:</label>
          <select style={{...gs.input,fontSize:12,width:"auto",padding:"3px 8px"}}
            value={selFust} onChange={e=>setSelFust(e.target.value)}>
            {alleFusten.map(f=><option key={f}>{f}</option>)}
          </select>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <label style={{fontSize:11,color:subtekst}}>Sortering:</label>
          <select style={{...gs.input,fontSize:12,width:"auto",padding:"3px 8px"}}
            value={sorteerOp} onChange={e=>setSorteerOp(e.target.value)}>
            <option value="verschil">Grootste verschil (€)</option>
            <option value="marge">Hoogste marge (%)</option>
            <option value="gewas">Gewas / soort</option>
          </select>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <label style={{fontSize:11,color:subtekst}}>Klant:</label>
          <select style={{...gs.input,fontSize:11,width:"auto",padding:"2px 6px"}}
            value={filtKlant} onChange={e=>setFiltKlant(e.target.value)}>
            <option value="">Alle klanten</option>
            {klanten.filter(kl=>gewassen.some(gw=>gw.soorten.some(s=>prijzen.some(p=>p.klantId===kl.id&&p.verpakking===selFust))))
              .sort((a,b)=>a.naam.localeCompare(b.naam))
              .map(k=><option key={k.id} value={k.id}>{k.naam}</option>)}
          </select>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <label style={{fontSize:11,color:subtekst}}>Gewas:</label>
          <select style={{...gs.input,fontSize:11,width:"auto",padding:"2px 6px"}}
            value={filtGewas} onChange={e=>setFiltGewas(e.target.value)}>
            <option value="">Alle gewassen</option>
            {gewassen.sort((a,b)=>a.naam.localeCompare(b.naam)).map(g=><option key={g.naam}>{g.naam}</option>)}
          </select>
        </div>
        <span style={{fontSize:11,color:subtekst,marginLeft:"auto"}}>{gesorteerd.length} soorten · {actieveKlanten.length} klanten</span>
      </div>

      {/* Legenda */}
      <div style={{display:"flex",gap:8,padding:"4px 14px",background:"#fafffe",borderBottom:`1px solid ${rand}`,flexShrink:0,alignItems:"center"}}>
        <span style={{fontSize:10,color:subtekst}}>Marge:</span>
        {[["≥50%","#dcfce7","#16a34a"],["25-50%","#d1fae5","#059669"],["10-25%","#fef9c3","#b45309"],["0-10%","#fee2e2","#dc2626"],["<0%","#fecaca","#991b1b"]].map(([lbl,bg,kleur])=>(
          <span key={lbl} style={{background:bg,color:kleur,borderRadius:4,padding:"1px 8px",fontSize:10,fontWeight:600}}>{lbl}</span>
        ))}
      </div>

      {/* Matrix tabel */}
      <div style={{overflowX:"auto",overflowY:"auto",flex:1,padding:"8px 14px"}}>
        {gesorteerd.length===0
          ? <div style={{textAlign:"center",padding:60,color:subtekst}}>
              <div style={{fontSize:32,marginBottom:8}}>💹</div>
              <div>Geen verkoopprijzen gevonden voor {selFust}</div>
              <div style={{fontSize:11,marginTop:4}}>Voer eerst verkoopprijzen in via ⚙️ Stamdata → Verkoopprijzen</div>
            </div>
          : <table style={{borderCollapse:"collapse",fontSize:11,tableLayout:"fixed",width:"auto"}}>
              <colgroup>
                <col style={{width:80}}/>
                <col style={{width:120}}/>
                <col style={{width:42}}/>
                <col style={{width:58}}/>
              {actieveKlanten.map(kl=>(
                <React.Fragment key={"col_"+kl.id}>
                  <col style={{width:52}}/>
                  <col style={{width:62}}/>
                </React.Fragment>
              ))}
              <col style={{width:62}}/>
              </colgroup>
              <thead>
                <tr>
                  <th style={{...TH3,textAlign:"left",position:"sticky",left:0,zIndex:2,background:"#e8f5ee"}}>Gewas</th>
                  <th style={{...TH3,textAlign:"left",position:"sticky",left:80,zIndex:2,background:"#e8f5ee"}}>Soort</th>
                  <th style={{...TH3,background:"#f0f7f4",color:subtekst}}>Kiem%</th>
                  <th style={{...TH3,background:"#fff8e1",color:"#b45309"}}>Zaad/pl</th>
                  <th style={{...TH3,background:"#fff8e1",color:"#b45309"}}>Tray/pl</th>
                  <th style={{...TH3,background:"#fef3c7",color:"#92400e",fontWeight:700}}>Kostprijs/pl</th>
                  {actieveKlanten.map(kl=>(
                    <th key={kl.id} colSpan={2} style={{...TH3,borderLeft:`2px solid ${rand}`}}>
                      {kl.naam}
                    </th>
                  ))}
                  <th style={{...TH3,background:"#f0f7f4",borderLeft:`2px solid ${groen}`}}>Best verschil/1000</th>
                </tr>
                <tr>
                  <th style={{...TH3,position:"sticky",left:0,zIndex:2}}></th>
                  <th style={{...TH3,position:"sticky",left:90,zIndex:2}}></th>
                  <th style={{...TH3,background:"#f0f7f4",fontSize:8}}></th>
                  <th style={{...TH3,background:"#fff8e1",fontSize:8}}>zaad+kiem</th>
                  <th style={{...TH3,background:"#fff8e1",fontSize:8}}>zaai+aflever</th>
                  <th style={{...TH3,background:"#fef3c7",fontSize:8}}>totaal</th>
                  {actieveKlanten.map(kl=>(
                    <React.Fragment key={kl.id}>
                      <th style={{...TH3,fontSize:9,borderLeft:`2px solid ${rand}`}}>Verkoop €</th>
                      <th style={{...TH3,fontSize:8}}>€ verschil/1000pl</th>
                    </React.Fragment>
                  ))}
                  <th style={{...TH3,background:"#f0f7f4",fontSize:8,borderLeft:`2px solid ${groen}`}}>per 1000pl</th>
                </tr>
              </thead>
              <tbody>
                {gesorteerd.map((r,i)=>(
                  <tr key={r.gewas+"_"+r.soort} style={{background:i%2===0?wit:"#f9fcfb"}}>
                    <td style={{...TD3,textAlign:"left",fontWeight:700,color:groen,position:"sticky",left:0,background:i%2===0?wit:"#f9fcfb",zIndex:1,overflow:"hidden",textOverflow:"ellipsis"}}>{r.gewas}</td>
                    <td style={{...TD3,textAlign:"left",position:"sticky",left:0,background:i%2===0?wit:"#f9fcfb",zIndex:1,overflow:"hidden",textOverflow:"ellipsis"}}>{r.soort}</td>
                    <td style={{...TD3,color:subtekst,background:"#fafffe",textAlign:"center"}}>
                      {r.kiemPct?r.kiemPct+"%":"—"}
                    </td>
                    <td style={{...TD3,color:"#b45309",background:"#fffbeb"}}>
                      {r.inkoopZaad?"€"+Number(r.inkoopZaad).toFixed(4):"—"}
                    </td>
                    <td style={{...TD3,color:"#b45309",background:"#fffbeb"}}>
                      {r.traykostenPer1000>0?"€"+(r.traykostenPer1000/1000).toFixed(4):"—"}
                    </td>
                    <td style={{...TD3,color:"#92400e",fontWeight:700,background:"#fef9c3"}}>
                      {r.inkoop?"€"+Number(r.inkoop).toFixed(4):"—"}
                    </td>
                    {actieveKlanten.map(kl=>{
                      const vp = r.verkopen[kl.id];
                      const verschil1000 = (vp&&r.inkoop) ? ((vp-r.inkoop)*1000) : null;
                      const mk = margeKleur(verschil1000!==null ? ((vp-r.inkoop)/r.inkoop*100) : null);
                      return (
                        <React.Fragment key={kl.id}>
                          <td style={{...TD3,borderLeft:`2px solid ${rand}`,color:vp?"#222":subtekst}}>
                            {vp?"€"+vp.toFixed(3):"—"}
                          </td>
                          <td style={{...TD3,background:mk.bg,color:mk.kleur,fontWeight:verschil1000!==null?700:400}}>
                            {verschil1000!==null?(verschil1000>=0?"+":"")+verschil1000.toFixed(2):"—"}
                          </td>
                        </React.Fragment>
                      );
                    })}
                    <td style={{...TD3,fontWeight:700,color:r.maxVerschil>0?"#16a34a":"#dc2626",background:"#f0fff4",borderLeft:`2px solid ${groen}`}}>
                      {r.maxVerschil!==null?(r.maxVerschil>=0?"+":"")+r.maxVerschil.toFixed(2):"—"}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
        }
      </div>
    </div>
  );
}


// ════════════════════════════════════════════════════════
// SOORTENBEHEER
// ════════════════════════════════════════════════════════
function Soortenbeheer({ gewassen, setGewassen, kiemkracht, setKiemkracht, teeltduur, setTeeltduur, verpDef }) {
  const [openGewas, setOpenGewas] = useState({});
  const fusten = verpDef.filter(function(v){return !v.naam.toLowerCase().includes("zaai");});

  function getKiem(g,s){ const k=kiemkracht.find(function(x){return x.gewas===g&&x.soort===s;}); return k?k.waarde:""; }
  function setKiem(g,s,val){
    const id=("k_"+g+"_"+s).replace(/[\/]/g,"_");
    setKiemkracht(function(prev){
      const lijst=[...prev]; const i=lijst.findIndex(function(x){return x.id===id;});
      if(val===""){ return i>=0?lijst.filter(function(_,j){return j!==i;}):lijst; }
      if(i>=0){lijst[i]={...lijst[i],waarde:Number(val)};return lijst;}
      return [...lijst,{id:id,gewas:g,soort:s,waarde:Number(val)}];
    });
  }

  function getDuur(g,s,f,veld){ const t=teeltduur.find(function(x){return x.gewas===g&&x.soort===s&&x.fust===f;}); return t?(t[veld]??""):""; }
  function setDuur(g,s,f,veld,val){
    const id=("t_"+g+"_"+s+"_"+f).replace(/[\/]/g,"_");
    setTeeltduur(function(prev){
      const lijst=[...prev]; const i=lijst.findIndex(function(x){return x.id===id;});
      const v=val===""||val===null?null:Number(val);
      if(i>=0){lijst[i]={...lijst[i],[veld]:v};return lijst;}
      return [...lijst,{id:id,gewas:g,soort:s,fust:f,uitzaai:null,inboet:null,[veld]:v}];
    });
  }

  function getInkoop(gw,s){ return (gw.inkoopPrijzen||{})[s]??""; }
  function setInkoop(gw,s,val){
    setGewassen(gewassen.map(function(g){return g.id===gw.id?{...g,inkoopPrijzen:{...(g.inkoopPrijzen||{}),[s]:val===""?"":Number(val)}}:g;}));
  }

  function getIntern(gw,s){ return (gw.internNrs||{})[s]||""; }
  function setIntern(gw,s,val){
    setGewassen(gewassen.map(function(g){return g.id===gw.id?{...g,internNrs:{...(g.internNrs||{}),[s]:val}}:g;}));
  }

  function getOud(gw,s){ return !!((gw.oudesoorten||{})[s]); }
  function setOud(gw,s,val){
    setGewassen(gewassen.map(function(g){return g.id===gw.id?{...g,oudesoorten:{...(g.oudesoorten||{}),[s]:val}}:g;}));
  }

  const TH3={padding:"2px 4px",background:"#e8f5ee",color:groen,fontWeight:700,fontSize:10,border:"1px solid #c8e6c9",textAlign:"center",whiteSpace:"nowrap"};
  const TD3={padding:"1px 3px",fontSize:11,border:"1px solid #eee",verticalAlign:"middle"};

  return (
    <div style={{display:"flex",height:"calc(100vh - 50px)"}}>
      <div style={{width:160,borderRight:"1px solid #c8e6c9",background:wit,padding:12,flexShrink:0,fontSize:11}}>
        <div style={{fontWeight:700,color:groen,marginBottom:8}}>📋 Soortenbeheer</div>
        <div style={{color:subtekst,lineHeight:1.7,fontSize:10}}>
          <b>Kiem%</b> kiemkracht<br/>
          <b>Zaai/Inboet</b> dagen per fust<br/>
          <b>€/1000</b> inkoopprijs zaad<br/>
          <b>Oud</b> niet meer actief
        </div>
        <button style={{...gs.knopSecundair,fontSize:10,width:"100%",marginTop:12,padding:"3px 6px"}}
          onClick={function(){
            var alleOpen=gewassen.every(function(g){return openGewas[g.naam];});
            var nieuw={};
            gewassen.forEach(function(g){nieuw[g.naam]=!alleOpen;});
            setOpenGewas(nieuw);
          }}>
          {gewassen.every(function(g){return openGewas[g.naam];})?"▲ Inklappen":"▼ Alles open"}
        </button>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:10}}>
        {gewassen.map(function(gw){
          var isOpen=!!openGewas[gw.naam];
          var aantalOud=(gw.soorten||[]).filter(function(s){return getOud(gw,s);}).length;
          return (
            <div key={gw.naam} style={{border:"1px solid #c8e6c9",borderRadius:6,marginBottom:5,overflow:"hidden"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"5px 10px",background:"#f0f7f4",cursor:"pointer"}}
                onClick={function(){setOpenGewas(function(p){return {...p,[gw.naam]:!p[gw.naam]};});}}>
                <span style={{fontSize:10,color:groen}}>{isOpen?"▼":"▶"}</span>
                <span style={{fontWeight:700,fontSize:13,color:groen,flex:1}}>{gw.naam}</span>
                <span style={{fontSize:10,color:subtekst}}>{(gw.soorten||[]).length} soorten</span>
                {aantalOud>0&&<span style={{fontSize:9,color:"#9ca3af",background:"#f3f4f6",borderRadius:20,padding:"1px 6px"}}>{aantalOud} oud</span>}
              </div>

              {isOpen&&(
                <div style={{overflowX:"auto"}}>
                  <table style={{borderCollapse:"collapse",width:"100%",tableLayout:"auto"}}>
                    <thead>
                      <tr>
                        <th style={{...TH3,textAlign:"left",minWidth:140}}>Soort</th>
                        <th style={{...TH3,width:45}}>Nr</th>
                        <th style={{...TH3}}>Kiem%</th>
                        {fusten.map(function(f){return (
                          <th key={f.naam} colSpan={2} style={{...TH3,borderLeft:"2px solid #c8e6c9"}}>{f.naam}</th>
                        );})}
                        <th style={{...TH3,borderLeft:"2px solid #c8e6c9"}}>€/1000</th>
                        <th style={{...TH3}}>Oud</th>
                      </tr>
                      <tr style={{background:"#f9fcfb"}}>
                        <th style={{...TH3,background:"#f9fcfb"}}></th>
                        <th style={{...TH3,background:"#f9fcfb",fontSize:9}}></th>
                        <th style={{...TH3,background:"#f9fcfb",fontSize:9}}></th>
                        {fusten.map(function(f){return (
                          <React.Fragment key={f.naam}>
                            <th style={{...TH3,background:"#f9fcfb",fontSize:9,borderLeft:"2px solid #c8e6c9"}}>zaai</th>
                            <th style={{...TH3,background:"#f9fcfb",fontSize:9}}>inboet</th>
                          </React.Fragment>
                        );})}
                        <th style={{...TH3,background:"#f9fcfb",borderLeft:"2px solid #c8e6c9"}}></th>
                        <th style={{...TH3,background:"#f9fcfb"}}></th>
                      </tr>
                    </thead>
                    <tbody>
                      {(gw.soorten||[]).map(function(s,si){
                        var oud=getOud(gw,s);
                        return (
                          <tr key={s} style={{background:oud?"#f9fafb":si%2===0?wit:"#f9fcfb",opacity:oud?0.55:1}}>
                            <td style={{...TD3,fontWeight:oud?400:600,color:oud?subtekst:tekst,whiteSpace:"nowrap"}}>{s}</td>
                            <td style={{...TD3,textAlign:"center"}}>
                              <input style={{padding:"1px 3px",border:"1px solid #c8e6c9",borderRadius:2,fontSize:11,width:42,textAlign:"center",background:"#fafffe"}} type="text" placeholder="—"
                                value={getIntern(gw,s)}
                                onChange={function(e){setIntern(gw,s,e.target.value);}}
                              />
                            </td>
                            <td style={{...TD3,textAlign:"center"}}>
                              <input className="sb" type="number" min="0" max="100"
                                value={getKiem(gw.naam,s)}
                                onFocus={function(e){e.target.select();}}
                                onChange={function(e){setKiem(gw.naam,s,e.target.value);}}
                              />
                            </td>
                            {fusten.map(function(f){return (
                              <React.Fragment key={f.naam}>
                                <td style={{...TD3,borderLeft:"2px solid #c8e6c9"}}>
                                  <input className="sb" type="number" min="0" placeholder="—"
                                    value={getDuur(gw.naam,s,f.naam,"uitzaai")}
                                    onFocus={function(e){e.target.select();}}
                                    onChange={function(e){setDuur(gw.naam,s,f.naam,"uitzaai",e.target.value);}}
                                  />
                                </td>
                                <td style={TD3}>
                                  <input className="sb" type="number" min="0" placeholder="—"
                                    value={getDuur(gw.naam,s,f.naam,"inboet")}
                                    onFocus={function(e){e.target.select();}}
                                    onChange={function(e){setDuur(gw.naam,s,f.naam,"inboet",e.target.value);}}
                                  />
                                </td>
                              </React.Fragment>
                            );})}
                            <td style={{...TD3,borderLeft:"2px solid #c8e6c9"}}>
                              <input className="sb" type="number" step="0.01" min="0" placeholder="—"
                                value={getInkoop(gw,s)}
                                onFocus={function(e){e.target.select();}}
                                onChange={function(e){setInkoop(gw,s,e.target.value);}}
                              />
                            </td>
                            <td style={{...TD3,textAlign:"center"}}>
                              <input type="checkbox"
                                checked={getOud(gw,s)}
                                onChange={function(e){setOud(gw,s,e.target.checked);}}
                              />
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
