function maakBestellingDoc(bestellingen, alleSleutels, verbVerbruikt2, verbSzn2, verb3w2, bd, leverancierNaam, contactpersoon) {
  const vandaag = new Date().toLocaleDateString("nl-NL",{day:"2-digit",month:"long",year:"numeric"});
  const logo = bd.logo?"<img src='"+bd.logo+"' style='height:45px;max-width:120px;object-fit:contain'/>":"";

  const th  = "padding:3px 6px;background:#e8f5ee;color:#2d6a4f;border:1px solid #c8e6c9;text-align:left;font-size:11px;font-weight:700;white-space:nowrap;";
  const thR = "padding:3px 6px;background:#e8f5ee;color:#2d6a4f;border:1px solid #c8e6c9;text-align:right;font-size:11px;font-weight:700;white-space:nowrap;";
  const td  = "padding:2px 6px;border:1px solid #eee;font-size:11px;";
  const tdR = "padding:2px 6px;border:1px solid #eee;font-size:11px;text-align:right;";
  const tdG = "padding:2px 6px;border:1px solid #eee;font-size:11px;text-align:right;font-weight:700;color:#2d6a4f;";

  // Blok 1: bestelling
  const bestelRijen = bestellingen.map(({key,adv},i)=>{
    const [gewas,soort] = key.split("||");
    const aantalZaden = Math.ceil(adv.tekort3w/1000)*1000;
    // Verdeling in zakjes
    let zakjes = [];
    if(aantalZaden >= 10000) { zakjes.push(`${Math.ceil(aantalZaden/10000)}x 10k`); }
    else {
      let rest = aantalZaden;
      const z5 = Math.floor(rest/5000); rest -= z5*5000;
      const z1 = Math.ceil(rest/1000);
      if(z5>0) zakjes.push(`${z5}x 5k`);
      if(z1>0) zakjes.push(`${z1}x 1k`);
    }
    const zakjesTxt = zakjes.join(" + ");
    const bg = i%2===0?"#fff":"#f9fcfb";
    return "<tr style='background:"+bg+"'>"
      +"<td style='"+td+"font-weight:600'>"+gewas+"</td>"
      +"<td style='"+td+"'>"+soort+"</td>"
      +"<td style='"+tdG+"'>"+aantalZaden.toLocaleString("nl-NL")+"</td>"
      +"<td style='"+tdR+"color:#1d4ed8;font-weight:600'>"+zakjesTxt+"</td>"
      +"</tr>";
  }).join("");

  // Blok 2: jaarprognose — 1 kolom, compact
  const prognoseRijen = alleSleutels.map((key,i)=>{
    const [gewas,soort] = key.split("||");
    const jaarProg = verbSzn2[key]||0;
    const verbruikt = verbVerbruikt2[key]||0;
    const huidigBestel = bestellingen.find(b=>b.key===key);
    const bestelAantal = huidigBestel ? Math.ceil(huidigBestel.adv.tekort3w/1000)*1000 : 0;
    const restant = jaarProg - verbruikt - bestelAantal;
    const bg = i%2===0?"#fff":"#f9fcfb";
    const restKleur = restant<0?";color:#dc2626;font-weight:700":restant===0?";color:#888":"";
    return "<tr style='background:"+bg+"'>"
      +"<td style='"+td+"font-weight:600'>"+gewas+"</td>"
      +"<td style='"+td+"'>"+soort+"</td>"
      +"<td style='"+tdR+"'>"+jaarProg.toLocaleString("nl-NL")+"</td>"
      +"<td style='"+tdR+"'>"+verbruikt.toLocaleString("nl-NL")+"</td>"
      +"<td style='"+tdR+(bestelAantal>0?";font-weight:700;color:#dc2626":"")+"'>"+bestelAantal.toLocaleString("nl-NL")+"</td>"
      +"<td style='"+tdR+restKleur+"'>"+restant.toLocaleString("nl-NL")+"</td>"
      +"</tr>";
  }).join("");

  const aanhef = contactpersoon ? "Geachte "+contactpersoon+"," : "Geachte heer/mevrouw,";

  const headerBlok = "<div style='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #2d6a4f'>"
    +"<div style='display:flex;gap:10px;align-items:center'>"+logo+"<div>"
      +"<div style='font-size:13px;font-weight:700;color:#2d6a4f'>"+(bd.naam||"")+"</div>"
      +"<div style='font-size:11px;color:#555'>"+(bd.adres||"")+", "+(bd.postcode||"")+" "+(bd.plaats||"")+"</div>"
      +"<div style='font-size:11px;color:#555'>"+(bd.email||"")+"</div>"
    +"</div></div>"
    +"<div style='text-align:right'>"
      +"<div style='font-size:20px;font-weight:700;color:#2d6a4f'>ZAADBESTELLING</div>"
      +"<div style='font-size:11px;color:#555;margin-top:2px'>Datum: "+vandaag+"</div>"
      +(leverancierNaam?"<div style='font-size:11px;color:#555'>Aan: "+leverancierNaam+"</div>":"")
    +"</div>"
  +"</div>";

  return "<!DOCTYPE html><html><head><meta charset='UTF-8'>"
    +"<style>"
      +"@page{size:A4 portrait;margin:14mm}"
      +"body{font-family:Arial,sans-serif;font-size:11px;color:#222;margin:0}"
      +"table{border-collapse:collapse;width:100%}"
      +"thead{display:table-header-group}"
      +"tr{page-break-inside:avoid}"
      +".herhaal-header{display:none} @media print{.herhaal-header{display:table-header-group}}"
      +"@media print{button{display:none}}"
    +"</style></head><body>"
    +headerBlok
    // Brieftekst
    +"<div style='font-size:11px;color:#444;line-height:1.6;margin-bottom:14px'>"
      +aanhef+"<br/><br/>"
      +"Hierbij verzoeken wij u vriendelijk of wij de onderstaande zaden bij u kunnen afroepen op basis van onze huidige teeltplanning. "
      +"Wij ontvangen graag een bevestiging van beschikbaarheid en de verwachte levertijd. "
      +"Mocht u vragen hebben, neem dan gerust contact met ons op."
    +"</div>"
    // Blok 1
    +"<div style='font-size:11px;font-weight:700;color:#2d6a4f;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px'>Benodigd per ommegaande</div>"
    +"<table style='margin-bottom:16px'>"
      +"<thead><tr>"
        +"<th style='"+th+"'>Gewas</th>"
        +"<th style='"+th+"'>Soort</th>"
        +"<th style='"+thR+"'>Aantal zaden</th>"
        +"<th style='"+thR+"'>Verdeling zakjes</th>"
      +"</tr></thead>"
      +"<tbody>"+bestelRijen+"</tbody>"
    +"</table>"
    // Blok 2
    +"<div style='font-size:11px;font-weight:700;color:#2d6a4f;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px'>Jaarprognose alle soorten</div>"
    +"<table>"
      +"<thead><tr>"
        +"<th style='"+th+"'>Gewas</th>"
        +"<th style='"+th+"'>Soort</th>"
        +"<th style='"+thR+"'>Jaar</th>"
        +"<th style='"+thR+"'>Al geleverd</th>"
        +"<th style='"+thR+"'>Deze afroep</th>"
        +"<th style='"+thR+"'>Restant</th>"
      +"</tr></thead>"
      +"<tbody>"+prognoseRijen+"</tbody>"
    +"</table>"
    +"<div style='margin-top:16px;font-size:11px;color:#555'>"
      +"<div>Met vriendelijke groet,</div>"
      +"<div style='margin-top:4px;font-weight:700;font-size:12px'>"+(bd.naam||"")+"</div>"
      +"<div>"+(bd.email||"")+"</div>"
    +"</div>"
    +"</body></html>";
}

function mailBestelling(bestellingen, setStatus, alleSleutels, verbVerbruikt2, verbSzn2, verb3w2, contactpersoon) {
  const mailUrl = localStorage.getItem('ta_mailUrl')||'';
  if(!mailUrl) { alert('Geen mail URL ingesteld. Ga naar ⚙️ Instellingen.'); return; }

  const bd = JSON.parse(localStorage.getItem('ta_bedrijf')||'{}');
  const vandaag = new Date().toLocaleDateString("nl-NL",{day:"2-digit",month:"long",year:"numeric"});
  const leverEmail = bd.leverancierEmail||"";
  if(!leverEmail) { alert('Geen e-mailadres leverancier ingesteld.'); setStatus(""); return; }

  const pdfDoc = maakBestellingDoc(bestellingen, alleSleutels, verbVerbruikt2, verbSzn2, verb3w2, bd, bd.leverancierNaam||"", contactpersoon||"");

  // Genereer PDF via html2canvas + jsPDF
  async function verstuur() {
    setStatus("📄 PDF genereren...");
    try {
      const div = document.createElement('div');
      div.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;background:#fff;padding:15px;font-family:Arial,sans-serif;font-size:10px';
      div.innerHTML = pdfDoc.replace(/<style>.*?<\/style>/gs,'').replace(/<[!][^>]*>/g,'').replace(/<html[^>]*>|<\/html>|<head[^>]*>.*?<\/head>|<body[^>]*>|<\/body>/gs,'');
      document.body.appendChild(div);
      const canvas = await window.html2canvas(div,{scale:1.5,useCORS:true,backgroundColor:'#fff'});
      document.body.removeChild(div);
      const {jsPDF} = window.jspdf;
      const pdf = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
      const imgData = canvas.toDataURL('image/jpeg',0.88);
      const pdfW = pdf.internal.pageSize.getWidth();
      const pdfH = (canvas.height*pdfW)/canvas.width;
      const pageH = pdf.internal.pageSize.getHeight();
      let y=0;
      while(y<pdfH){if(y>0)pdf.addPage();pdf.addImage(imgData,'JPEG',0,-y,pdfW,pdfH);y+=pageH;}
      const pdfBase64 = pdf.output('datauristring').split(',')[1];
      const bestandsnaam = 'Zaadbestelling_'+new Date().toISOString().slice(0,10)+'.pdf';
      const onderwerp = "Zaadbestelling "+new Date().toLocaleDateString("nl-NL")+" - "+(bd.naam||"Vollebregt Cyclamen");

      // Mail body (kort)
      const mailHtml = "<p>Geachte heer/mevrouw,</p><p>Hierbij ontvangt u onze zaadbestelling. Zie de bijgevoegde PDF voor de details en jaarprognose.</p><p>Met vriendelijke groet,<br/><strong>"+(bd.naam||"")+"</strong><br/>"+(bd.telefoon||"")+"</p>";

      setStatus("📧 Versturen...");
      await fetch(mailUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:JSON.stringify({to_email:leverEmail,onderwerp,bericht:"",html:mailHtml,attachment:pdfBase64,attachment_name:bestandsnaam})
      });
      const logEntry={datum:new Date().toLocaleString("nl-NL"),klant:"Zaadleverancier",email:leverEmail,onderwerp,week:"—"};
      const log=JSON.parse(localStorage.getItem('ta_maillog')||'[]');
      localStorage.setItem('ta_maillog',JSON.stringify([logEntry,...log].slice(0,50)));
      setStatus("✅ Bestelling verstuurd naar "+leverEmail);
      setTimeout(()=>setStatus(""),5000);
    } catch(err) {
      setStatus("⚠️ Fout: "+err.message);
    }
  }
  verstuur();
}

function ZaadVoorraad({ zaadinkoop, orders, gewassen, kiemkracht, teeltduur, bedrijf, leveranciers }) {
  const [toonBestel, setToonBestel] = useState(false);
  const [mailBestelStatus, setMailBestelStatus] = useState("");
  const [selLev, setSelLev] = useState(null);
  const [selBestelLev, setSelBestelLev] = useState(""); // gekozen leverancier in besteladvies

  const nu = new Date();
  const huidigWk = getWeekNr(nu);
  const huidigJaar = getJaar(nu);
  const eindeSeizoensWk = 40;
  const eindeSeizoensJaar = huidigWk < 40 ? huidigJaar : huidigJaar + 1;
  const eindeLabel = `${String(eindeSeizoensJaar).slice(-2)}${String(eindeSeizoensWk).padStart(2,"0")}`;

  function wkLabel(offset) {
    let wk = huidigWk + offset; let jaar = huidigJaar;
    while(wk > 52) { wk -= 52; jaar++; }
    return `${String(jaar).slice(-2)}${String(wk).padStart(2,"0")}`;
  }
  const nu3w = wkLabel(0);
  const grens3w = wkLabel(3);

  function getKiem(gewas, soort) {
    const k = (kiemkracht||[]).find(x=>x.gewas?.toLowerCase()===gewas?.toLowerCase()&&x.soort?.toLowerCase()===soort?.toLowerCase());
    return k ? k.waarde/100 : 1;
  }
  function getDuur(gewas, soort, fust, veld) {
    return (teeltduur||[]).find(t=>t.gewas?.toLowerCase()===gewas?.toLowerCase()&&t.soort?.toLowerCase()===soort?.toLowerCase()&&t.fust?.toLowerCase()===fust?.toLowerCase())?.[veld]??null;
  }

  const seizoenStartJaar = huidigWk >= 40 ? huidigJaar : huidigJaar - 1;
  const seizoenStartLabel = `${String(seizoenStartJaar).slice(-2)}40`;

  const inkoop2 = {};
  (zaadinkoop||[]).forEach(z=>{ const key = z.gewas+"||"+z.soort; inkoop2[key] = (inkoop2[key]||0) + z.aantal; });

  const verbSzn2 = {}, verbVerbruikt2 = {}, verb3w2 = {};
  (orders||[]).filter(o=>o.status==="bevestigd"||o.status==="reservering"||o.status==="geleverd").forEach(o=>{
    (o.regels||[]).forEach(r=>{
      const kiem = getKiem(r.gewas, r.soort);
      const uitzaaiWeken = getDuur(r.gewas, r.soort, r.verpakking, "uitzaai");
      if(uitzaaiWeken===null) return;
      let zaaiWk = getWeekNr(o.leverdatum) - uitzaaiWeken;
      let zaaiJaar = getJaar(o.leverdatum);
      if(zaaiWk<=0){zaaiWk+=52;zaaiJaar--;}
      const zaaiLbl = String(zaaiJaar).slice(-2)+String(zaaiWk).padStart(2,"0");
      const fustL = r.verpakking?.toLowerCase()||"";
      const is65 = fustL.includes("65")||fustL.includes("66");
      const zaaiTrays = is65?Math.ceil(Math.ceil(r.aantal/kiem)/4):(kiem>0?Math.ceil(r.aantal/kiem):r.aantal);
      const aantalPerTray = fustL.includes("179")||fustL.includes("180")?180:264;
      const zaad = zaaiTrays * aantalPerTray;
      const key = r.gewas+"||"+r.soort;
      if(zaaiLbl >= seizoenStartLabel && zaaiLbl <= eindeLabel) {
        verbSzn2[key] = (verbSzn2[key]||0) + zaad;
        if(zaaiLbl < nu3w) verbVerbruikt2[key] = (verbVerbruikt2[key]||0) + zaad;
        if(zaaiLbl >= nu3w && zaaiLbl <= grens3w) verb3w2[key] = (verb3w2[key]||0) + zaad;
      }
    });
  });

  const alleSleutels = [...new Set([...Object.keys(inkoop2), ...Object.keys(verbSzn2)])].sort();

  function bestelAdvies(key) {
    const k1 = verbSzn2[key]||0;
    const k2 = inkoop2[key]||0;
    const k4 = verbVerbruikt2[key]||0;
    const k5 = k2 - k4;
    const k6 = verb3w2[key]||0;
    const k7 = k5 - k6;
    const restSzn = k1 - k2;
    if(restSzn <= 0) return null;
    if(k7 >= 0) return null;
    const tekort = Math.abs(k7);
    let advies = [];
    if(tekort >= 10000) { advies.push(`${Math.ceil(tekort/10000)}x 10k`); }
    else {
      let rest = Math.ceil(tekort/1000)*1000;
      const z5 = Math.floor(rest/5000); rest -= z5*5000;
      const z1 = Math.ceil(rest/1000);
      if(z5>0) advies.push(`${z5}x 5k`);
      if(z1>0) advies.push(`${z1}x 1k`);
    }
    return { tekort3w: tekort, advies: advies.join(" + ") };
  }

  const bestellingen = alleSleutels.map(key=>({key,adv:bestelAdvies(key)})).filter(x=>x.adv);

  return (
    <div style={{flex:1,overflowY:"auto",padding:16}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        {bestellingen.length===0
          ? <span style={{...gs.badge,background:"#e5e7eb",color:subtekst}}>Niets te bestellen</span>
          : <button style={{...gs.knopPrimair,background:"#dc2626"}} onClick={()=>setToonBestel(true)}>
              Besteladvies ({bestellingen.length} soorten)
            </button>
        }
        <span style={{fontSize:11,color:subtekst}}>Seizoen t/m week {eindeSeizoensWk} · 3-weken horizon</span>
      </div>

      <table style={{width:"100%"}}>
        <thead>
          <tr>{["Gewas","Soort","Jaarprognose","Geleverd","Rest seizoen","Verbruikt","Huidige voorraad","Verbruik 3w","Saldo 3w","Besteladvies"].map((h,i)=>(
            <th key={h} style={{...TH,textAlign:i>=2?"right":"left"}}>{h}</th>
          ))}</tr>
        </thead>
        <tbody>
          {alleSleutels.map((key,i)=>{
            const [gewas,soort] = key.split("||");
            const k1 = verbSzn2[key]||0;
            const k2 = inkoop2[key]||0;
            const k3 = k1 - k2;
            const k4 = verbVerbruikt2[key]||0;
            const k5 = k2 - k4;
            const k6 = verb3w2[key]||0;
            const k7 = k5 - k6;
            const adv = bestelAdvies(key);
            return (
              <tr key={key} style={{background:adv?"#fff5f5":i%2===0?wit:"#f9fcfb"}}>
                <td style={TD}><strong>{gewas}</strong></td>
                <td style={TD}>{soort}</td>
                <td style={{...TD,textAlign:"right",color:subtekst}}>{k1>0?k1.toLocaleString("nl-NL"):"—"}</td>
                <td style={{...TD,textAlign:"right",fontWeight:600}}>{k2>0?k2.toLocaleString("nl-NL"):"0"}</td>
                <td style={{...TD,textAlign:"right",color:k3<0?"#dc2626":subtekst}}>{k1>0?k3.toLocaleString("nl-NL"):"—"}</td>
                <td style={{...TD,textAlign:"right",color:subtekst}}>{k4>0?k4.toLocaleString("nl-NL"):"—"}</td>
                <td style={{...TD,textAlign:"right",fontWeight:600,color:k5<0?"#dc2626":groen}}>{k5.toLocaleString("nl-NL")}</td>
                <td style={{...TD,textAlign:"right",color:subtekst}}>{k6>0?k6.toLocaleString("nl-NL"):"—"}</td>
                <td style={{...TD,textAlign:"right",fontWeight:700,color:k7<0?"#dc2626":"#ccc"}}>
                  {k7<0?`⚠️ ${k7.toLocaleString("nl-NL")}`:"—"}
                </td>
                <td style={{...TD,textAlign:"right"}}>
                  {adv?<span style={{background:"#fee2e2",color:"#dc2626",borderRadius:4,padding:"2px 8px",fontWeight:700,fontSize:11}}>{adv.advies}</span>
                      :<span style={{color:"#ccc",fontSize:11}}>—</span>}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
      {alleSleutels.length===0&&<div style={{textAlign:"center",color:subtekst,padding:60}}><div style={{fontSize:40,marginBottom:10}}>📦</div><div>Geen data</div></div>}

      {toonBestel&&(
        <div style={gs.overlay}><div style={{...gs.modal,width:520}}>
          <div style={{...gs.modalTitel,color:"#dc2626"}}>Besteladvies zaad</div>
          <div style={{fontSize:11,color:subtekst,marginBottom:10}}>Tekort binnen 3 weken · seizoen t/m week {eindeSeizoensWk}</div>

          {/* Leverancier kiezer */}
          {leveranciers&&leveranciers.length>0&&(
            <div style={{marginBottom:12}}>
              <label style={gs.label}>Leverancier</label>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                <button onClick={()=>setSelBestelLev("")}
                  style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${rand}`,cursor:"pointer",fontSize:11,
                    background:selBestelLev===""?groen:"transparent",color:selBestelLev===""?wit:subtekst,fontWeight:selBestelLev===""?700:400}}>
                  Alle
                </button>
                {leveranciers.map(lev=>{
                  const aantalVoorLev = bestellingen.filter(({key})=>{
                    const [gewas]=key.split("||");
                    const gw=gewassen.find(g=>g.naam===gewas);
                    return String(gw?.leverancierId)===String(lev.id);
                  }).length;
                  if(aantalVoorLev===0) return null;
                  return (
                    <button key={lev.id} onClick={()=>setSelBestelLev(lev.id)}
                      style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${rand}`,cursor:"pointer",fontSize:11,
                        background:selBestelLev===lev.id?groen:"transparent",color:selBestelLev===lev.id?wit:subtekst,fontWeight:selBestelLev===lev.id?700:400}}>
                      {lev.naam} ({aantalVoorLev})
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* Tabel gefilterd op leverancier */}
          {(()=>{
            const gefilterd = bestellingen.filter(({key})=>{
              if(!selBestelLev) return true;
              const [gewas]=key.split("||");
              const gw=gewassen.find(g=>g.naam===gewas);
              return String(gw?.leverancierId)===String(selBestelLev);
            });
            const selLevObj = leveranciers?.find(l=>String(l.id)===String(selBestelLev));
            return (<>
              <table style={{width:"100%",marginBottom:12}}>
                <thead><tr>
                  <th style={TH}>Gewas</th><th style={TH}>Soort</th>
                  <th style={{...TH,textAlign:"right"}}>Tekort 3w</th>
                  <th style={{...TH,textAlign:"right"}}>Bestellen</th>
                </tr></thead>
                <tbody>
                  {gefilterd.map(({key,adv})=>{
                    const [gewas,soort]=key.split("||");
                    const gw=gewassen.find(g=>g.naam===gewas);
                    const lev=leveranciers?.find(l=>l.id===gw?.leverancierId);
                    return (
                      <tr key={key} style={{borderBottom:`1px solid ${rand}`}}>
                        <td style={{...TD,fontWeight:600}}>{gewas}</td>
                        <td style={TD}>{soort}</td>
                        <td style={{...TD,textAlign:"right",color:"#dc2626"}}>−{(adv.tekort3w).toLocaleString("nl-NL")}</td>
                        <td style={{...TD,textAlign:"right",fontWeight:700,color:groen}}>{adv.advies}</td>
                      </tr>
                    );
                  })}
                  {gefilterd.length===0&&<tr><td colSpan={4} style={{...TD,textAlign:"center",color:subtekst,padding:16}}>Geen bestellingen voor deze leverancier</td></tr>}
                </tbody>
              </table>
              {selLevObj&&<div style={{fontSize:11,color:subtekst,marginBottom:8}}>
                📧 Wordt verstuurd naar: <strong>{selLevObj.email||"— geen e-mail ingesteld —"}</strong>
              </div>}
              {mailBestelStatus&&<div style={{fontSize:11,margin:"6px 0",color:mailBestelStatus.startsWith("✅")?"#16a34a":"#f59e0b",textAlign:"center"}}>{mailBestelStatus}</div>}
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button style={{...gs.knopSecundair,background:"#f0f7f4",color:groen,border:`1px solid ${groen}`}} onClick={()=>{
                  // Preview PDF
                  const bd = JSON.parse(localStorage.getItem("ta_bedrijf")||"{}");
                  const levNaam = selLevObj?.naam||"";
                  const contactp = selLevObj?.contactpersoon||"";
                  const doc = maakBestellingDoc(gefilterd, alleSleutels, verbVerbruikt2, verbSzn2, verb3w2, bd, levNaam, contactp);
                  const w = window.open("","_blank");
                  if(w){w.document.open();w.document.write(doc);w.document.close();setTimeout(()=>w.print(),400);}
                }}>👁️ Preview PDF</button>
                <button style={{...gs.knopPrimair,background:"#1d4ed8"}} onClick={()=>{
                  const gefilterdBestel = bestellingen.filter(({key})=>{
                    if(!selBestelLev) return true;
                    const [gewas]=key.split("||");
                    const gw=gewassen.find(g=>g.naam===gewas);
                    return String(gw?.leverancierId)===String(selBestelLev);
                  });
                  if(!selBestelLev){alert("Kies eerst een leverancier");return;}
                  if(!selLevObj){
                    alert("Leverancier niet gevonden (id="+selBestelLev+", beschikbaar: "+leveranciers.map(l=>l.id).join(",")+")");
                    return;
                  }
                  const leverEmail = selLevObj.email||"";
                  if(!leverEmail){alert("Geen e-mailadres ingesteld voor "+selLevObj.naam+". Ga naar ⚙️ Stamdata → Leveranciers.");return;}
                  const mailUrl = localStorage.getItem("ta_mailUrl")||"";
                  if(!mailUrl){alert("Geen mail URL ingesteld. Ga naar ⚙️ Instellingen.");return;}
                  const bdMetEmail = {...(bedrijf||{}), leverancierEmail: leverEmail, leverancierNaam: selLevObj.naam||""};
                  const tmpBd = JSON.stringify(bdMetEmail);
                  const origBd = localStorage.getItem("ta_bedrijf");
                  localStorage.setItem("ta_bedrijf", tmpBd);
                  mailBestelling(gefilterdBestel, setMailBestelStatus, alleSleutels, verbVerbruikt2, verbSzn2, verb3w2, selLevObj?.contactpersoon||"");
                  setTimeout(()=>localStorage.setItem("ta_bedrijf", origBd||"{}"), 500);
                }}>📧 Bestelling mailen</button>
                <button style={gs.knopSecundair} onClick={()=>{setToonBestel(false);setSelBestelLev("");}}>Sluiten</button>
              </div>
            </>);
          })()}
        </div></div>
      )}
    </div>
  );
}

function Zaadinkoop({ gewassen, zaadinkoop, setZaadinkoop, orders, teeltduur, kiemkracht, verpDef, bedrijf, leveranciers }) {
  const [tab, setTab] = useState("inkoop");
  const [laasteGewas, setLaatsteGewas] = useState("");
  const [laastePrijs, setLaastePrijs] = useState("");
  const leeg = () => ({id:null, datum:new Date().toISOString().split("T")[0], gewas:laasteGewas, soort:laasteGewas?gewassen.find(g=>g.naam===laasteGewas)?.soorten[0]||"":"", leverancier:"", code:"", kiemkracht:90, aantal:"", prijs:laastePrijs});
  const [data, setData] = useState(leeg());
  const [aantalDisplay, setAantalDisplay] = useState("");
  const [delId, setDelId] = useState(null);
  const [filtGewas, setFiltGewas] = useState("");
  const [sorteer, setSorteer] = useState("datum");

  const soorten = gewassen.find(g=>g.naam===data.gewas)?.soorten||[];

  function setV(k,v) {
    if(k==="gewas") {
      const gw = gewassen.find(g=>g.naam===v);
      const soort = gw?.soorten[0]||"";
      const prijs = soort&&gw?.inkoopPrijzen?.[soort]||laastePrijs;
      setData({...data,gewas:v,soort,prijs});
    } else if(k==="soort") {
      const gw = gewassen.find(g=>g.naam===data.gewas);
      const inkoopPrijs = gw?.inkoopPrijzen?.[v]||"";
      const prijs = inkoopPrijs||laastePrijs;
      setData({...data,soort:v,prijs});
    } else {
      setData({...data,[k]:v});
    }
  }

  function opslaan(enNieuw=false) {
    const aantalWerkelijk = Number(aantalDisplay) * 1000;
    if(!data.datum||!data.gewas||!aantalWerkelijk) return;
    const gw = gewassen.find(g=>g.naam===data.gewas);
    const r = {...data, aantal:aantalWerkelijk, prijs:data.prijs?Number(data.prijs):null, leverancier:gw?.leverancier||""};
    if(r.id) setZaadinkoop(zaadinkoop.map(x=>x.id===r.id?r:x));
    else setZaadinkoop(prev=>[...prev, {...r, id:Date.now()}]);
    setLaatsteGewas(data.gewas);
    if(enNieuw) { setData({...leeg(),gewas:data.gewas,soort:data.soort}); setAantalDisplay(""); }
    else setData(leeg()); setAantalDisplay(""); if(!enNieuw) setData(leeg());
  }

  function bewerken(z) { setData({...z}); setAantalDisplay(String(z.aantal/1000)); }
  function verwijder(id) { setZaadinkoop(zaadinkoop.filter(x=>x.id!==id)); setDelId(null); }

  const gefilterd = zaadinkoop
    .filter(z=>!filtGewas||z.gewas===filtGewas)
    .sort((a,b)=>sorteer==="datum"?b.datum.localeCompare(a.datum):a.gewas.localeCompare(b.gewas)||a.soort.localeCompare(b.soort));

  const totaalAantal = gefilterd.reduce((s,z)=>s+z.aantal,0);
  const totaalBedrag = gefilterd.reduce((s,z)=>s+(z.prijs&&z.aantal?(Number(z.prijs)*z.aantal/1000):0),0);

  const sTH = {...TH, padding:"4px 6px", fontSize:11};
  const sTD = {padding:"4px 6px", fontSize:12, borderBottom:`1px solid ${rand}`, verticalAlign:"middle"};

  return (
    <div style={{display:"flex", flexDirection:"column", height:"calc(100vh - 50px)"}}>
      {/* Tabs */}
      <div style={{display:"flex",gap:3,padding:"8px 12px",background:"rgba(0,0,0,0.06)",margin:"0"}}>
        {[["inkoop","📋 Inkoop"],["voorraad","📦 Zaadvoorraad"]].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)}
            style={{padding:"5px 16px",border:"none",borderRadius:6,cursor:"pointer",fontSize:14,
              fontWeight:tab===v?700:400, background:tab===v?groen:"transparent", color:tab===v?wit:subtekst}}>
            {l}
          </button>
        ))}
      </div>

      {tab==="voorraad" && (
        <ZaadVoorraad
          zaadinkoop={zaadinkoop||[]} orders={orders||[]} gewassen={gewassen||[]}
          kiemkracht={kiemkracht||[]} teeltduur={teeltduur||[]} bedrijf={bedrijf||{}}
          leveranciers={leveranciers||[]}
        />
      )}

      {tab==="inkoop" && (
      <div style={{display:"flex", flex:1, overflow:"hidden"}}>
        {/* Links: filter + formulier */}
        <div style={{width:230, borderRight:`1px solid ${rand}`, background:wit, overflowY:"auto", flexShrink:0, display:"flex", flexDirection:"column"}}>
          <div style={{padding:10, borderBottom:`1px solid ${rand}`}}>
            <div style={{fontSize:11,fontWeight:700,color:groen,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Zaadinkoop</div>
            <div style={{fontSize:10,color:subtekst,marginBottom:3}}>Gewas</div>
            <select style={{...gs.input,fontSize:11,marginBottom:8}} value={filtGewas} onChange={e=>setFiltGewas(e.target.value)}>
              <option value="">Alle gewassen</option>
              {gewassen.map(g=><option key={g.naam}>{g.naam}</option>)}
            </select>
            <div style={{display:"flex",gap:4,marginBottom:8}}>
              {[["datum","Datum"],["gewas","Gewas"]].map(([v,l])=>(
                <button key={v} onClick={()=>setSorteer(v)}
                  style={{flex:1,padding:"3px 6px",border:"none",borderRadius:4,cursor:"pointer",fontSize:11,
                    background:sorteer===v?groen:"#f0f0f0",color:sorteer===v?wit:subtekst}}>
                  {l}
                </button>
              ))}
            </div>
            <div style={{display:"flex",gap:12}}>
              <div><div style={{fontSize:10,color:subtekst}}>Zaden</div><div style={{fontSize:14,fontWeight:700,color:groen}}>{(totaalAantal).toLocaleString("nl-NL")}</div></div>
              <div><div style={{fontSize:10,color:subtekst}}>Inkopen</div><div style={{fontSize:14,fontWeight:700,color:groen}}>{gefilterd.length}</div></div>
            </div>
          </div>

          <div style={{padding:10,flex:1,background:"#f0f7f3",borderTop:`2px solid ${groen}`}}>
            <div style={{fontSize:11,fontWeight:700,color:groen,marginBottom:8}}>{data.id?"Bewerken":"Nieuwe inkoop"}</div>
            <div style={gs.veldGroep}>
              <label style={gs.label}>Datum</label>
              <input style={gs.input} type="date" value={data.datum} onChange={e=>setV("datum",e.target.value)} />
            </div>
            <div style={gs.veldGroep}>
              <label style={gs.label}>Gewas</label>
              <select style={gs.input} value={data.gewas} onChange={e=>setV("gewas",e.target.value)}>
                <option value="">— Kies —</option>
                {gewassen.map(g=><option key={g.naam}>{g.naam}</option>)}
              </select>
            </div>
            <div style={gs.veldGroep}>
              <label style={gs.label}>Soort</label>
              <select style={gs.input} value={data.soort} onChange={e=>setV("soort",e.target.value)} disabled={!data.gewas}>
                <option value="">— Kies —</option>
                {soorten.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div style={{display:"flex",gap:6}}>
              <div style={{...gs.veldGroep,flex:1}}>
                <label style={gs.label}>Aantal <span style={{color:subtekst}}>(×1000)</span></label>
                <input style={gs.input} type="number" min="0" step="1" placeholder="0"
                  value={aantalDisplay} onChange={e=>setAantalDisplay(e.target.value)} onFocus={e=>e.target.select()} />
              </div>
              <div style={{...gs.veldGroep,flex:1}}>
                <label style={gs.label}>Kiem%</label>
                <input style={gs.input} type="number" min="0" max="100" step="1" value={data.kiemkracht}
                  onChange={e=>setV("kiemkracht",e.target.value)} onFocus={e=>e.target.select()} />
              </div>
            </div>
            <div style={gs.veldGroep}>
              <label style={gs.label}>Code</label>
              <input style={gs.input} type="text" placeholder="L2024-001" value={data.code} onChange={e=>setV("code",e.target.value)} />
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              <button style={{...gs.knopPrimair,width:"100%"}} onClick={()=>opslaan(true)}>+ Opslaan & Nieuw</button>
              <button style={{...gs.knopSecundair,width:"100%"}} onClick={()=>opslaan(false)}>Opslaan</button>
              {data.id&&<button style={{...gs.knopSecundair,width:"100%",fontSize:11}} onClick={()=>{setData(leeg());setAantalDisplay("");}}>Annuleren</button>}
            </div>
          </div>
        </div>

        {/* Rechts: overzicht */}
        <div style={{flex:1,overflowY:"auto",padding:10}}>
          {gefilterd.length===0 ? (
            <div style={{textAlign:"center",color:subtekst,padding:60}}>
              <div style={{fontSize:40,marginBottom:10}}>🌰</div>
              <div>Nog geen zaadinkoop ingevoerd</div>
            </div>
          ) : (
            <table style={{width:"auto",minWidth:"100%"}}>
              <thead>
                <tr>{["Datum","Gewas","Soort","Aantal","Kiem%","Code","Leverancier","Bedrag",""].map((h,i)=>(
                  <th key={h||i} style={{...sTH,textAlign:i>=3&&i<=4||i===7?"right":"left"}}>{h}</th>
                ))}</tr>
              </thead>
              <tbody>
                {gefilterd.map((z,i)=>(
                  <tr key={z.id} style={{background:i%2===0?wit:"#f9fcfb"}}>
                    <td style={sTD}>{z.datum}</td>
                    <td style={sTD}><strong>{z.gewas}</strong></td>
                    <td style={sTD}>{z.soort}</td>
                    <td style={{...sTD,textAlign:"right",fontWeight:700,color:groen}}>{(z.aantal).toLocaleString("nl-NL")}</td>
                    <td style={{...sTD,textAlign:"right"}}>{z.kiemkracht!=null?`${z.kiemkracht}%`:"—"}</td>
                    <td style={sTD}>{z.code||"—"}</td>
                    <td style={sTD}>{z.leverancier||"—"}</td>
                    <td style={{...sTD,textAlign:"right",color:groen,fontWeight:600}}>{z.prijs&&z.aantal?"€ "+(z.prijs*z.aantal/1000).toFixed(2):"—"}</td>
                    <td style={{...sTD,textAlign:"right",whiteSpace:"nowrap"}}>
                      <button style={gs.knopKlein} onClick={()=>bewerken(z)}>✏️</button>
                      <button style={{...gs.knopVerwijder,marginLeft:4}} onClick={()=>setDelId(z.id)}>🗑️</button>
                    </td>
                  </tr>
                ))}
              </tbody>
              <tfoot>
                <tr style={{background:"#e8f5ee",fontWeight:700}}>
                  <td colSpan={3} style={{...sTD,color:groen}}>Totaal</td>
                  <td style={{...sTD,textAlign:"right",color:groen}}>{(totaalAantal).toLocaleString("nl-NL")}</td>
                  <td colSpan={3} style={sTD}></td>
                  <td style={{...sTD,textAlign:"right",color:groen,fontWeight:700}}>€ {totaalBedrag.toFixed(2)}</td>
                </tr>
              </tfoot>
            </table>
          )}
        </div>
      </div>
      )}
      {delId&&<BevestigModal tekst="Inkoop verwijderen?" onJa={()=>verwijder(delId)} onNee={()=>setDelId(null)} />}
    </div>
  );
}

        {veld("Telefoon","telefoon","tel")}

function App() {
  const { useEffect: ue } = React;

  // ── PINCODE BEVEILIGING ──
  const OPGESLAGEN_PIN = localStorage.getItem("ta_pincode")||"";
  const [ingelogd, setIngelogd] = useState(()=>{
    // Als geen pincode ingesteld, direct ingelogd
    if(!OPGESLAGEN_PIN) return true;
    // Check sessie (blijft ingelogd tot tab gesloten wordt)
    return sessionStorage.getItem("ta_sessie")==="ok";
  });
  const [pinInvoer, setPinInvoer] = useState("");
  const [pinFout, setPinFout] = useState(false);

  function checkPin() {
    const pin = localStorage.getItem("ta_pincode")||"";
    if(pinInvoer===pin) {
      sessionStorage.setItem("ta_sessie","ok");
      setIngelogd(true);
      setPinFout(false);
    } else {
      setPinFout(true);
      setPinInvoer("");
    }
  }

  const [pagina,setPagina]     = useState("orders");
  const [kiemkracht,setKiemkracht] = useState(()=>laad("ta_kiemkracht", []));
  const [teeltduur,setTeeltduur]   = useState(()=>laad("ta_teeltduur", []));
  const [zaadinkoop,setZaadinkoop] = useState(()=>laad("ta_zaadinkoop", []));
  const [traykosten,setTraykosten] = useState(()=>laad("ta_traykosten", {}));
  const [leveranciers,setLeveranciers] = useState(()=>laad("ta_leveranciers", []));
  const [bedrijf,setBedrijf]   = useState(()=>laad("ta_bedrijf", {
    naam:"Uw Bedrijfsnaam BV", adres:"Straatnaam 1", postcode:"1234 AB", plaats:"Plaats",
    telefoon:"010-1234567", email:"info@uwbedrijf.nl", website:"", iban:"NL00 BANK 0000 0000 00",
    kvk:"", btw:""
  }));
  const [klanten,setKlanten]   = useState(()=>laad("ta_klanten",  SK));
  const [gewassen,setGewassen] = useState(()=>laad("ta_gewassen", SG));
  const [prijzen,setPrijzen]   = useState(()=>laad("ta_prijzen",  SP));
  const [orders,setOrders]     = useState(()=>laad("ta_orders",   SO));
  const [verpDef,setVerpDef]   = useState(()=>zorgVerpDef(laad("ta_verp", VERPAKKINGEN_DEF)));
  const [syncStatus,setSyncStatus] = useState("⏳ Verbinden met Firebase...");
  const [geladen,setGeladen]   = useState(false);
  const [backupHerinnering,setBackupHerinnering] = useState(false);
  const [scriptHerinnering,setScriptHerinnering] = useState(false);

  // ── BACKUP FUNCTIE ──
  function maakBackup() {
    const data = {
      versie: "TuinApp-backup-v1",
      datum: new Date().toISOString(),
      ta_klanten:    laad("ta_klanten", []),
      ta_gewassen:   laad("ta_gewassen", []),
      ta_prijzen:    laad("ta_prijzen", []),
      ta_orders:     laad("ta_orders", []),
      ta_verp:       laad("ta_verp", []),
      ta_kiemkracht: laad("ta_kiemkracht", []),
      ta_teeltduur:  laad("ta_teeltduur", []),
      ta_zaadinkoop: laad("ta_zaadinkoop", []),
      ta_bedrijf:    laad("ta_bedrijf", {}),
      ta_realisatie: laad("ta_realisatie", {}),
      ta_traykosten: laad("ta_traykosten", {}),
      ta_leveranciers: laad("ta_leveranciers", []),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const datumStr = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = "TuinApp_backup_" + datumStr + ".json";
    a.click();
    URL.revokeObjectURL(url);
    // Sla tijdstip op
    localStorage.setItem("ta_backup_laats", new Date().toISOString());
    setBackupHerinnering(false);
  }

  // ── BACKUP HERINNERING TIMER ──
  useEffect(()=>{
    function checkBackup() {
      const intervalUur = Number(laad("ta_backup_interval", 24));
      if(intervalUur) {
        const laats = localStorage.getItem("ta_backup_laats");
        if(!laats) { setBackupHerinnering(true); }
        else {
          const verschilUur = (new Date() - new Date(laats)) / (1000*60*60);
          if(verschilUur >= intervalUur) setBackupHerinnering(true);
        }
      }
      const scriptIntervalUur = Number(laad("ta_script_interval", 24));
      if(scriptIntervalUur) {
        const scriptLaats = localStorage.getItem("ta_script_laats");
        if(!scriptLaats) { setScriptHerinnering(true); }
        else {
          const verschilUur = (new Date() - new Date(scriptLaats)) / (1000*60*60);
          if(verschilUur >= scriptIntervalUur) setScriptHerinnering(true);
        }
      }
    }
    checkBackup();
    const timer = setInterval(checkBackup, 60*60*1000);
    return ()=>clearInterval(timer);
  }, [geladen]);

  // Laad data uit Firebase bij opstarten
  useEffect(()=>{
    function laadVanLocalStorage() {
      const k=laad("ta_klanten",SK); if(k&&k.length>0) setKlanten(k);
      const g=laad("ta_gewassen",SG); if(g&&g.length>0) setGewassen(g);
      const p=laad("ta_prijzen",SP); if(p&&p.length>0) setPrijzen(p);
      const o=laad("ta_orders",SO); if(o&&o.length>0) setOrders(o);
      const v=laad("ta_verp",VERPAKKINGEN_DEF); setVerpDef(zorgVerpDef(v));
      const km=laad("ta_kiemkracht",[]); if(km&&km.length>0) setKiemkracht(km);
      const td=laad("ta_teeltduur",[]); if(td&&td.length>0) setTeeltduur(td);
      const zi=laad("ta_zaadinkoop",[]); if(zi&&zi.length>0) setZaadinkoop(zi);
      setGeladen(true);
      setSyncStatus("💾 Lokaal geladen");
    }
    async function laadVanFirebase() {
      // Laad altijd eerst localStorage
      laadVanLocalStorage();
      // Skip Firebase als quota exceeded
      if(localStorage.getItem('ta_quota_exceeded')) {
        setSyncStatus("💾 Lokaal opgeslagen");
        return;
      }
      try {
        const [k,g,p,o,v,km,td,zi] = await Promise.all([
          fbLoadAll("klanten"), fbLoadAll("gewassen"), fbLoadAll("prijzen"),
          fbLoadAll("orders"),  fbLoadAll("verpakkingen"), fbLoadAll("kiemkracht"), fbLoadAll("teeltduur"), fbLoadAll("zaadinkoop")
        ]);
        if(k&&k.length>0) setKlanten(k);
        if(g&&g.length>0) setGewassen(g);
        if(p&&p.length>0) setPrijzen(p);
        if(o&&o.length>0) setOrders(o);
        if(v&&v.length>0) setVerpDef(zorgVerpDef(v));
        if(km&&km.length>0) setKiemkracht(km);
        if(td&&td.length>0) setTeeltduur(td);
        if(zi&&zi.length>0) setZaadinkoop(zi);
        setSyncStatus("💾 Lokaal opgeslagen");
      } catch(e) {
        setSyncStatus("💾 Lokaal opgeslagen");
      }
    }
    // Zet quota flag automatisch als Firebase errors geeft
    window.addEventListener('unhandledrejection', function(e) {
      if(e.reason&&(String(e.reason).includes('quota')||String(e.reason).includes('resource-exhausted'))) {
        localStorage.setItem('ta_quota_exceeded','1');
        e.preventDefault();
      }

    // Probeer Firebase op achtergrond (alleen als niet quota exceeded)

function WeekTransportPrint({ wk, orders, klanten, bedrijf, verpDef, onSluit }) {
  const tOrders = orders.filter(o=>weekLabel(o.leverdatum)===wk&&o.status!=="geleverd"&&!/^\d/.test(klanten.find(k=>k.id===o.klantId)?.naam||""));
  function print(){
    const doc = maakTransportDoc(wk, tOrders, klanten, verpDef, bedrijf);
    const w=window.open("","_blank");
    if(w){w.document.write(doc);w.document.close();setTimeout(()=>w.print(),400);}
  }
  React.useEffect(()=>{print();},[]);
  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:8,padding:24,textAlign:"center",boxShadow:"0 8px 40px rgba(0,0,0,0.3)"}}>
        <div style={{fontSize:16,marginBottom:12}}>🖨️ Transportlijst wordt geopend...</div>
        <div style={{display:"flex",gap:8,justifyContent:"center"}}>
          <button style={gs.knopPrimair} onClick={print}>Opnieuw afdrukken</button>
          <button style={gs.knopSecundair} onClick={onSluit}>✕ Sluiten</button>
        </div>
      </div>
    </div>
  );
}

function WeekPakbonPrint({ wk, orders, klanten, bedrijf, verpDef, onSluit }) {
  const wkOrders = orders.filter(o=>weekLabel(o.leverdatum)===wk&&o.status!=="geleverd");
  function print(){
    // Strip de html/head/body tags per pakbon en combineer in één document
    const gecombineerd = wkOrders.map((o,i)=>{
      const doc = maakPakbonDoc(o, klanten, bedrijf, verpDef);
      // Haal alleen de body inhoud op
      const bodyMatch = doc.match(/<body>([\s\S]*)<\/body>/);
      const inhoud = bodyMatch ? bodyMatch[1] : doc;
      return "<div style='page-break-after:"+(i<wkOrders.length-1?"always":"avoid")+"'>"+inhoud+"</div>";
    }).join("");
    const html = "<!DOCTYPE html><html><head><meta charset='UTF-8'>"
      +"<style>@page{size:A4 portrait;margin:15mm} body{font-family:Arial,sans-serif;font-size:11px;color:#222;margin:0} table{border-collapse:collapse;width:100%} @media print{button{display:none}}</style></head><body>"
      +gecombineerd+"</body></html>";
    const w = window.open("","_blank");
    if(w){w.document.write(html);w.document.close();setTimeout(()=>w.print(),400);}
  }
  React.useEffect(()=>{print();},[]);
  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:8,padding:24,textAlign:"center",boxShadow:"0 8px 40px rgba(0,0,0,0.3)"}}>
        <div style={{fontSize:16,marginBottom:4}}>🖨️ Pakbonnen worden geopend...</div>
        <div style={{fontSize:12,color:subtekst,marginBottom:12}}>{wkOrders.length} pakbonnen voor week {wk}</div>
        <div style={{display:"flex",gap:8,justifyContent:"center"}}>
          <button style={gs.knopPrimair} onClick={print}>Opnieuw afdrukken</button>
          <button style={gs.knopSecundair} onClick={onSluit}>✕ Sluiten</button>
        </div>
      </div>
    </div>
  );
}

function Weekoverzicht({ klanten, gewassen, orders, verpDef, bedrijf, teeltduur, kiemkracht }) {
  const WEKEN = [];
  const nu = new Date();
  let wk = getWeekNr(nu), jr = getJaar(nu);
  for(let i=0;i<40;i++){
    WEKEN.push(String(jr).slice(-2)+String(wk).padStart(2,"0"));
    wk++; if(wk>52){wk=1;jr++;}
  }

  const [selWk, setSelWk] = useState(WEKEN[0]);
  const [printComp, setPrintComp] = useState(null);

  // Hoeveel orders voor deze week
  const ordersWk = orders.filter(o=>weekLabel(o.leverdatum)===selWk&&o.status!=="geleverd");

  // Berekening: welke werklijst-weken vallen in selWk
  function getDuur(gewas, soort, fust, veld) {
    return (teeltduur||[]).find(t=>
      t.gewas?.toLowerCase()===gewas?.toLowerCase()&&
      t.soort?.toLowerCase()===soort?.toLowerCase()&&
      t.fust?.toLowerCase()===fust?.toLowerCase()
    )?.[veld]??null;
  }

  // Vind unieke traymaten voor wegzetlijst (inboetweek = selWk)
  const traymatenWeg = new Set();
  orders.filter(o=>o.status!=="geleverd").forEach(o=>{
    o.regels.forEach(r=>{
      const inb = getDuur(r.gewas,r.soort,r.verpakking,"inboet");
      if(inb===null) return;
      let wk2=getWeekNr(o.leverdatum)-inb, jr2=getJaar(o.leverdatum);
      if(wk2<=0){wk2+=52;jr2--;}
      const lbl=String(jr2).slice(-2)+String(wk2).padStart(2,"0");
      if(lbl===selWk) traymatenWeg.add(r.verpakking);
    });
  });

  const kaart = (titel, icon, kleur, beschrijving, aantallen, onClick) => (
    <div onClick={onClick} style={{background:"#fff",border:`2px solid ${kleur}`,borderRadius:10,padding:"16px 20px",cursor:"pointer",
      boxShadow:"0 2px 8px rgba(0,0,0,0.08)",transition:"transform 0.1s",flex:"1 1 200px",minWidth:180,maxWidth:260}}
      onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"}
      onMouseLeave={e=>e.currentTarget.style.transform="none"}>
      <div style={{fontSize:28,marginBottom:6}}>{icon}</div>
      <div style={{fontWeight:700,fontSize:14,color:kleur,marginBottom:4}}>{titel}</div>
      <div style={{fontSize:11,color:subtekst,marginBottom:8}}>{beschrijving}</div>
      {aantallen&&<div style={{fontSize:12,fontWeight:600,color:"#333"}}>{aantallen}</div>}
      <div style={{marginTop:10,background:kleur,color:"#fff",borderRadius:5,padding:"4px 10px",fontSize:11,fontWeight:700,textAlign:"center",display:"inline-block"}}>
        🖨️ Afdrukken
      </div>
    </div>
  );

  return (
    <div style={{padding:24,maxWidth:1100,margin:"0 auto"}}>
      {/* Week kiezer */}
      <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:28}}>
        <div style={{fontSize:20,fontWeight:700,color:groen}}>📋 Weekoverzicht</div>
        <select style={{...gs.input,width:"auto",fontSize:14,fontWeight:700,padding:"6px 14px"}}
          value={selWk} onChange={e=>setSelWk(e.target.value)}>
          {WEKEN.map(w=><option key={w} value={w}>Week {w}</option>)}
        </select>
        <span style={{fontSize:12,color:subtekst}}>{ordersWk.length} orders</span>
      </div>

      {/* Kaarten */}
      <div style={{display:"flex",flexWrap:"wrap",gap:16,marginBottom:32}}>
        {kaart("Transportlijst","🚛","#0891b2",
          `Leveringen week ${selWk}`,
          `${ordersWk.length} orders · ${ordersWk.reduce((s,o)=>s+(o.regels||[]).reduce((t,r)=>t+r.aantal,0),0)} trays`,
          ()=>setPrintComp({type:"transport",wk:selWk})
        )}

        {kaart("Werklijst Uitzaai","🌰","#1d4ed8",
          `Uitzaai voor week ${selWk}`,
          null,
          ()=>setPrintComp({type:"zaai",wk:selWk})
        )}

        {kaart("Werklijst Inboet","🪴","#0891b2",
          `Inboet voor week ${selWk}`,
          null,
          ()=>setPrintComp({type:"inboet",wk:selWk})
        )}

        {kaart("Wegzetlijst","📋","#2d6a4f",
          `Wegzetten inboetweek ${selWk}`,
          traymatenWeg.size>0?`${traymatenWeg.size} traymaat/maten`:null,
          ()=>setPrintComp({type:"wegzet",wk:selWk})
        )}

        {kaart("Pakbonnen","📦","#7c3aed",
          `Pakbonnen week ${selWk}`,
          `${ordersWk.length} klanten`,
          ()=>setPrintComp({type:"pakbon",wk:selWk})

      </div>

      {/* Print componenten */}
      {(printComp?.type==="zaai"||printComp?.type==="inboet")&&(()=>{

        return <WerklijstPrint data={{wk:printComp.wk,blok,type:printComp.type}} bedrijf={bedrijf} onSluit={()=>setPrintComp(null)} />;
      })()}
      {printComp?.type==="wegzet"&&(
        <WegzetlijstPrint data={{wk:printComp.wk,orders,klanten,gewassen,verpDef,teeltduur,kiemkracht}} bedrijf={bedrijf} onSluit={()=>setPrintComp(null)} />
      )}

        <WeekTransportPrint wk={printComp.wk} orders={orders} klanten={klanten} bedrijf={bedrijf} verpDef={verpDef} onSluit={()=>setPrintComp(null)} />

      )}
    </div>
  );
}

// PLANNING HELPER (globaal herbruikbaar)
// ════════════════════════════════════════════════════════
function maakPlanning(orders, teeltduur, kiemkracht) {
  const planning = {};
  function getDuur(gewas,soort,fust,veld){return (teeltduur||[]).find(t=>t.gewas?.toLowerCase()===gewas?.toLowerCase()&&t.soort?.toLowerCase()===soort?.toLowerCase()&&t.fust?.toLowerCase()===fust?.toLowerCase())?.[veld]??null;}
  function getKiem(gewas,soort){const k=(kiemkracht||[]).find(x=>x.gewas===gewas&&x.soort===soort);return k?Number(k.kiem)||1:1;}
  const relevanteOrders = orders.filter(o=>o.status==="bevestigd"||o.status==="reservering");
  relevanteOrders.forEach(o=>{
    const leverWk=getWeekNr(o.leverdatum), leverJaar=getJaar(o.leverdatum);
    o.regels.forEach(r=>{
      const trays=r.aantal;
      const uitzaaiWeken=getDuur(r.gewas,r.soort,r.verpakking,"uitzaai");
      const inboetWeken=getDuur(r.gewas,r.soort,r.verpakking,"inboet");
      const kiem=getKiem(r.gewas,r.soort);
      const rijKey=r.gewas+"||"+r.soort+"||"+r.verpakking;
      const leverLabel=String(leverJaar).slice(-2)+String(leverWk).padStart(2,"0");
      const fustL=r.verpakking?.toLowerCase()||"";
      let zaaiFust;
      if(fustL.includes("65")||fustL.includes("66")) zaaiFust="Zaaitray 264";
      else if(fustL.includes("179")||fustL.includes("180")) zaaiFust="Zaaitray 180";
      else if(fustL.includes("260")||fustL.includes("264")) zaaiFust="Zaaitray 264";
      else zaaiFust=r.verpakking;
      if(uitzaaiWeken!==null){
        let zaaiWk=leverWk-uitzaaiWeken, zaaiJaar=leverJaar;
        if(zaaiWk<=0){zaaiJaar--;zaaiWk+=52;}
        const zaaiLabel=String(zaaiJaar).slice(-2)+String(zaaiWk).padStart(2,"0");
        const is65=fustL.includes("65")||fustL.includes("66");
        const zaaiTrays=is65?Math.ceil(Math.ceil(trays/kiem)/4):(kiem>0?Math.ceil(trays/kiem):trays);
        const zaaiKey=r.gewas+"||"+r.soort+"||"+zaaiFust;
        if(!planning[zaaiLabel]) planning[zaaiLabel]={zaai:{},inboet:{}};
        if(!planning[zaaiLabel].zaai[zaaiKey]) planning[zaaiLabel].zaai[zaaiKey]={gewas:r.gewas,soort:r.soort,fust:zaaiFust,trays:0,zaaiTrays:0,kiem:Math.round(kiem*100),leverWeek:leverLabel};
        planning[zaaiLabel].zaai[zaaiKey].trays+=trays;
        planning[zaaiLabel].zaai[zaaiKey].zaaiTrays+=zaaiTrays;
      }
      if(inboetWeken!==null){
        let inboetWk=leverWk-inboetWeken, inboetJaar=leverJaar;
        if(inboetWk<=0){inboetJaar--;inboetWk+=52;}
        const inboetLabel=String(inboetJaar).slice(-2)+String(inboetWk).padStart(2,"0");
        if(!planning[inboetLabel]) planning[inboetLabel]={zaai:{},inboet:{}};
        if(!planning[inboetLabel].inboet[rijKey]) planning[inboetLabel].inboet[rijKey]={gewas:r.gewas,soort:r.soort,fust:r.verpakking,trays:0,inboetTrays:0,kiem:Math.round(kiem*100),leverWeek:leverLabel};
        planning[inboetLabel].inboet[rijKey].trays+=trays;
        planning[inboetLabel].inboet[rijKey].inboetTrays+=trays;
      }
    });
  });
  return planning;
}

function _berekenKarren(trays){
  if(!trays) return null;
  const afgerond=Math.ceil(trays/4)*4; const lagen=afgerond/4; let beste=null;
  for(let k=1;k<=Math.ceil(lagen/12);k++){
    for(let a=0;a<=k;a++){for(let b=0;b<=k-a;b++){
      const c=Math.min(k-a-b,4); if(k-a-b!==c) continue;
      const totL=a*12+b*14+c*15;
      if(totL===lagen){const sc=c*1000+b*10;if(!beste||k<beste.k||(k===beste.k&&sc<beste.score))beste={k,a,b,c,rest:0,score:sc};}
    }}
    if(k>=2){for(let a=0;a<=k-1;a++){for(let b=0;b<=k-1-a;b++){
      const maxC=Math.min(k-1-a-b,4);
      for(let c=0;c<=maxC;c++){
        const volL=a*12+b*14+c*15; const restL=lagen-volL;
        if(restL>=1&&restL<=11&&a+b+c===k-1){const sc=c*1000+b*10+1;if(!beste||k<beste.k||(k===beste.k&&sc<beste.score))beste={k,a,b,c,rest:restL,score:sc};}
      }
    }}}
    if(beste&&beste.k===k) break;
  }
  if(!beste&&lagen<=11) beste={k:1,a:0,b:0,c:0,rest:lagen,score:0};
  return beste;
}
function _karOmschrijving(v){
  if(!v) return "—";
  const d=[];
  if(v.a>0) d.push(v.a+"× 11pl");
  if(v.b>0) d.push(v.b+"× 13pl");
  if(v.c>0) d.push(v.c+"× 14pl");
  if(v.rest>0) d.push("1× "+(v.rest-1)+"pl");
  return d.join(" + ");
}

  const pSamenvatting=[ptot11>0?ptot11+"× 11pl":null,ptot13>0?ptot13+"× 13pl":null,ptot14>0?ptot14+"× 14pl":null,ptotRest>0?ptotRest+"× rest ("+ptotRestPl+" pl.)":null].filter(Boolean).join(" · ");

  return "<!DOCTYPE html><html><head><meta charset='UTF-8'>"

    +"</div>"
    +"<table><thead><tr>"

// TRANSPORT PAGINA
// ════════════════════════════════════════════════════════
function TransportPagina({ klanten, orders, bedrijf, verpDef }) {
  const [twk, setTwk] = useState(()=>{const n=new Date();return String(getJaar(n)).slice(-2)+String(getWeekNr(n)+1).padStart(2,"0");});

  const alleWk=[...new Set(orders.map(o=>weekLabel(o.leverdatum)))].sort();
  const tOrders=orders.filter(o=>weekLabel(o.leverdatum)===twk&&!/^\d/.test(klanten.find(k=>k.id===o.klantId)?.naam||""))
    .sort((a,b)=>(klanten.find(k=>k.id===a.klantId)?.naam||"").localeCompare(klanten.find(k=>k.id===b.klantId)?.naam||""));

  function berekenKarren(trays) {
    const afgerond=Math.ceil(trays/4)*4;
    const lagen=afgerond/4;
    let beste=null;
    for(let k=1;k<=Math.ceil(lagen/12);k++){
      for(let a=0;a<=k;a++){
        for(let b=0;b<=k-a;b++){
          const c=Math.min(k-a-b,4);
          if(k-a-b!==c) continue;
          const totLagen=a*12+b*14+c*15;
          if(totLagen===lagen){
            const score=c*1000+b*10;
            if(!beste||k<beste.k||(k===beste.k&&score<beste.score)) beste={k,a,b,c,rest:0,score};
          }
        }
      }
      if(k>=2){
        for(let a=0;a<=k-1;a++){
          for(let b=0;b<=k-1-a;b++){
            const maxC=Math.min(k-1-a-b,4);
            for(let c=0;c<=maxC;c++){
              const volLagen=a*12+b*14+c*15;
              const restLagen=lagen-volLagen;
              if(restLagen>=1&&restLagen<=11&&a+b+c===k-1){
                const score=c*1000+b*10+1;
                if(!beste||k<beste.k||(k===beste.k&&score<beste.score)) beste={k,a,b,c,rest:restLagen,score};
              }
            }
          }
        }
      }
      if(beste&&beste.k===k) break;
    }
    if(!beste&&lagen<=11) beste={k:1,a:0,b:0,c:0,rest:lagen,score:0};
    return beste;
  }

  function karOmschrijving(v) {
    if(!v) return "—";
    const d=[];
    if(v.a>0) d.push(v.a+"× 11pl");
    if(v.b>0) d.push(v.b+"× 13pl");
    if(v.c>0) d.push(v.c+"× 14pl");
    if(v.rest>0) d.push("1× "+(v.rest-1)+"pl");
    return d.join(" + ");
  }

  function printTransport(){
    const bd=bedrijf||{};
    const logo=bd.logo?"<img src='"+bd.logo+"' style='height:45px;max-width:120px;object-fit:contain'/>":"";
    const datum=new Date().toLocaleDateString("nl-NL");
    const totaalTrays=tOrders.reduce((s,o)=>s+o.regels.reduce((r,x)=>r+x.aantal,0),0);
    const ptot11=tOrders.reduce((s,o)=>{const t=o.regels.reduce((r,x)=>r+x.aantal,0);const v=berekenKarren(t);return s+(v?v.a:0);},0);
    const ptot13=tOrders.reduce((s,o)=>{const t=o.regels.reduce((r,x)=>r+x.aantal,0);const v=berekenKarren(t);return s+(v?v.b:0);},0);
    const ptot14=tOrders.reduce((s,o)=>{const t=o.regels.reduce((r,x)=>r+x.aantal,0);const v=berekenKarren(t);return s+(v?v.c:0);},0);
    const prestKarren=tOrders.filter(o=>{const t=o.regels.reduce((r,x)=>r+x.aantal,0);const v=berekenKarren(t);return v&&v.rest>0;});
    const ptotRest=prestKarren.length;
    const ptotRestPl=prestKarren.reduce((s,o)=>{const t=o.regels.reduce((r,x)=>r+x.aantal,0);const v=berekenKarren(t);return s+(v&&v.rest>0?v.rest-1:0);},0);
    const ptotKarren=tOrders.reduce((s,o)=>{const t=o.regels.reduce((r,x)=>r+x.aantal,0);const v=berekenKarren(t);return s+(v?v.k:0);},0);
    const pSamenvatting=[ptot11>0?ptot11+"× 11pl":null,ptot13>0?ptot13+"× 13pl":null,ptot14>0?ptot14+"× 14pl":null,ptotRest>0?ptotRest+"× rest ("+ptotRestPl+" pl.)":null].filter(Boolean).join(" · ");
    const rijen=tOrders.map((o,i)=>{
      const kl=klanten.find(k=>k.id===o.klantId)||{};
      const cp=(kl.contactpersonen||[])[0]||{};
      const trays=o.regels.reduce((s,r)=>s+r.aantal,0);
      const pl=o.regels.reduce((s,r)=>{const vd=verpDef.find(v=>v.naam===r.verpakking);return s+(vd?.aantal||0)*r.aantal;},0);
      const fusten=[...new Set(o.regels.map(r=>r.verpakking))].join(", ");
      const verd=berekenKarren(trays);
      const bg=i%2===0?"#fff":"#f9fcfb";
      return "<tr style='background:"+bg+"'>"
        +"<td style='padding:5px 8px;border:1px solid #eee;font-weight:700'>"+kl.naam+"</td>"
        
        +"<td style='padding:5px 8px;border:1px solid #eee'>"+(cp.naam||"—")+"<br/><small style='color:#666'>"+[cp.telefoon,cp.email].filter(Boolean).join(" · ")+"</small></td>"
        +"<td style='padding:5px 8px;border:1px solid #eee;font-size:11px'>"+fusten+"</td>"
        +"<td style='padding:5px 8px;border:1px solid #eee;text-align:right;font-weight:700'>"+trays+"</td>"
        +"<td style='padding:5px 8px;border:1px solid #eee;text-align:right;font-weight:700;color:#2d6a4f'>"+(verd?verd.k:"—")+"</td>"
        +"<td style='padding:5px 8px;border:1px solid #eee;font-size:10px'>"+karOmschrijving(verd)+"</td>"
        +"<td style='padding:5px 8px;border:1px solid #eee;text-align:right'>"+pl.toLocaleString("nl-NL")+"</td>"
        +"<td style='padding:5px 8px;border:1px solid #eee;width:40px'></td>"
        +"</tr>";
    }).join("");
    const doc="<!DOCTYPE html><html><head><meta charset='UTF-8'>"
      +"<style>@page{size:A4 portrait;margin:12mm} body{font-family:Arial,sans-serif;font-size:11px;color:#222;margin:0} table{border-collapse:collapse;width:100%} @media print{button{display:none}}</style></head><body>"
      +"<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #2d6a4f'>"
        +"<div>"+logo+"</div>"
        +"<div style='text-align:center'><div style='font-size:16px;font-weight:700'>TRANSPORTLIJST</div><div style='font-size:12px;color:#555'>Week "+twk+" &nbsp;·&nbsp; "+datum+"</div></div>"
        +"<div style='text-align:right;font-size:11px'><strong>"+tOrders.length+"</strong> orders &nbsp;·&nbsp; <strong>"+totaalTrays+"</strong> trays</div>"
      +"</div>"
      +"<table><thead><tr>"
        +"<th style='padding:5px 8px;background:#e8f5ee;color:#2d6a4f;border:1px solid #c8e6c9;text-align:left'>Klant</th>"
        
        +"<th style='padding:5px 8px;background:#e8f5ee;color:#2d6a4f;border:1px solid #c8e6c9;text-align:left'>Contact</th>"
        +"<th style='padding:5px 8px;background:#e8f5ee;color:#2d6a4f;border:1px solid #c8e6c9;text-align:left'>Fust</th>"
        +"<th style='padding:5px 8px;background:#e8f5ee;color:#2d6a4f;border:1px solid #c8e6c9;text-align:right'>Trays</th>"
        +"<th style='padding:5px 8px;background:#e8f5ee;color:#2d6a4f;border:1px solid #c8e6c9;text-align:right'>Karren</th>"
        +"<th style='padding:5px 8px;background:#e8f5ee;color:#2d6a4f;border:1px solid #c8e6c9'>Verdeling</th>"
        +"<th style='padding:5px 8px;background:#e8f5ee;color:#2d6a4f;border:1px solid #c8e6c9;text-align:right'>Planten</th>"
        +"<th style='padding:5px 8px;background:#e8f5ee;color:#2d6a4f;border:1px solid #c8e6c9'>Aftekenen</th>"
      +"</tr></thead><tbody>"+rijen+"</tbody>"
      +"<tfoot><tr style='background:#e8f5ee;font-weight:700'>"
        +"<td colspan='2' style='padding:5px 8px;border:1px solid #c8e6c9;color:#2d6a4f;border-top:2px solid #2d6a4f'>"+pSamenvatting+"</td>"
        +"<td style='padding:5px 8px;border:1px solid #c8e6c9;text-align:right;color:#2d6a4f;border-top:2px solid #2d6a4f'>"+totaalTrays+"</td>"
        +"<td style='padding:5px 8px;border:1px solid #c8e6c9;text-align:right;font-weight:700;color:#2d6a4f;border-top:2px solid #2d6a4f'>"+ptotKarren+"</td><td colspan='3' style='padding:5px 8px;border:1px solid #c8e6c9;border-top:2px solid #2d6a4f'></td>"
      +"</tr></tfoot></table></body></html>";
    const w=window.open("","_blank");
    if(w){w.document.open();w.document.write(doc);w.document.close();setTimeout(()=>w.print(),400);}
  }

  return (
    <div style={{padding:10,overflowY:"auto",height:"calc(100vh - 50px)"}}>
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12,flexWrap:"wrap"}}>
        <h2 style={{fontSize:15,fontWeight:700,color:groen}}>🚛 Transportlijst</h2>
        <select style={{...gs.input,fontSize:12,width:"auto"}} value={twk} onChange={e=>setTwk(e.target.value)}>
          {alleWk.map(w=><option key={w}>{w}</option>)}
        </select>
        <span style={{fontSize:12,color:subtekst}}>{tOrders.length} orders</span>
        <button style={{...gs.knopPrimair,marginLeft:"auto"}} onClick={printTransport}>🖨️ Afdrukken</button>
      </div>
      {tOrders.length===0
        ? <div style={{textAlign:"center",color:subtekst,padding:40}}>Geen orders voor week {twk}</div>
        : <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr>
              {[["Klant",false],["Contact",false],["Fust",false],["Trays",true],["Karren",true],["Verdeling",false],["Planten",true]].map(([h,r])=>(
                <th key={h} style={{...TH,textAlign:r?"right":"left"}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {tOrders.map((o,i)=>{
                const kl=klanten.find(k=>k.id===o.klantId)||{};
                const cp=(kl.contactpersonen||[])[0]||{};
                const trays=o.regels.reduce((s,r)=>s+r.aantal,0);
                const pl=o.regels.reduce((s,r)=>{const vd=verpDef.find(v=>v.naam===r.verpakking);return s+(vd?.aantal||0)*r.aantal;},0);
                const fusten=[...new Set(o.regels.map(r=>r.verpakking))].join(", ");
                const verd=berekenKarren(trays);
                return (

                    <td style={{...TD,textAlign:"right",fontWeight:700,color:groen}}>{verd?verd.k:"—"}</td>
                    <td style={{...TD,fontSize:11,color:subtekst}}>{karOmschrijving(verd)}</td>
                    <td style={{...TD,textAlign:"right",color:groen,fontWeight:600}}>{pl.toLocaleString("nl-NL")}</td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>{(()=>{
              const totTrays=tOrders.reduce((s,o)=>s+o.regels.reduce((r,x)=>r+x.aantal,0),0);
              const totPl=tOrders.reduce((s,o)=>s+o.regels.reduce((r,x)=>{const vd=verpDef.find(v=>v.naam===x.verpakking);return r+(vd?.aantal||0)*x.aantal;},0),0);
              const totKarren=tOrders.reduce((s,o)=>{const t=o.regels.reduce((r,x)=>r+x.aantal,0);const v=berekenKarren(t);return s+(v?v.k:0);},0);
              const tot11=tOrders.reduce((s,o)=>{const t=o.regels.reduce((r,x)=>r+x.aantal,0);const v=berekenKarren(t);return s+(v?v.a:0);},0);
              const tot13=tOrders.reduce((s,o)=>{const t=o.regels.reduce((r,x)=>r+x.aantal,0);const v=berekenKarren(t);return s+(v?v.b:0);},0);
              const tot14=tOrders.reduce((s,o)=>{const t=o.regels.reduce((r,x)=>r+x.aantal,0);const v=berekenKarren(t);return s+(v?v.c:0);},0);
              const restKarren=tOrders.filter(o=>{const t=o.regels.reduce((r,x)=>r+x.aantal,0);const v=berekenKarren(t);return v&&v.rest>0;});
              const totRest=restKarren.length;
              const totRestPl=restKarren.reduce((s,o)=>{const t=o.regels.reduce((r,x)=>r+x.aantal,0);const v=berekenKarren(t);return s+(v&&v.rest>0?v.rest-1:0);},0);
              const samenvatting=[
                tot11>0?tot11+"× 11pl":null,

                tot14>0?tot14+"× 14pl":null,
                totRest>0?totRest+"× rest ("+totRestPl+" pl.)":null,
              ].filter(Boolean).join(" · ");
              const bS={padding:"5px 6px",fontWeight:700,borderTop:"2px solid "+groen,background:"#e8f5ee"};
              return (
                <tr>
                  <td colSpan={3} style={{...bS,color:groen,fontSize:11}}>{samenvatting||"Totaal"}</td>
                  <td style={{...bS,textAlign:"right",color:groen}}>{totTrays}</td>
                  <td style={{...bS,textAlign:"right",color:groen}}>{totKarren}</td>
                  <td style={{...bS,fontSize:11,color:subtekst}}></td>
                  <td style={{...bS,textAlign:"right",color:groen}}>{totPl.toLocaleString("nl-NL")}</td>
                </tr>
              );
            })()}</tfoot>
          </table>
      }
    </div>
  );
}

// MAILING PAGINA
// ════════════════════════════════════════════════════════
function MailingPagina({ klanten, orders }) {
  const [mailLog, setMailLog] = useState(()=>{
    try{ return JSON.parse(localStorage.getItem('ta_maillog')||'[]'); }catch(e){ return []; }
  });
  const [zoek, setZoek] = useState("");
  const [zoekKlant, setZoekKlant] = useState("");

  useEffect(()=>{
    function onStorage(e) {
      if(e.key==='ta_maillog') {
        try{ setMailLog(JSON.parse(e.newValue||'[]')); }catch(x){}
      }
    }
    window.addEventListener('storage', onStorage);
    const interval = setInterval(()=>{
      try{ setMailLog(JSON.parse(localStorage.getItem('ta_maillog')||'[]')); }catch(x){}
    }, 2000);
    return ()=>{ window.removeEventListener('storage', onStorage); clearInterval(interval); };
  }, []);

  const uniekeKlanten = [...new Set(mailLog.map(m=>m.klant))].sort();

  const gefilterd = mailLog.filter(m=>{
    if(zoekKlant && m.klant!==zoekKlant) return false;
    if(zoek && !m.datum?.toLowerCase().includes(zoek.toLowerCase())
            && !m.klant?.toLowerCase().includes(zoek.toLowerCase())
            && !m.onderwerp?.toLowerCase().includes(zoek.toLowerCase())) return false;
    return true;
  });

  return (
    <div style={{padding:16,overflowY:"auto",height:"calc(100vh - 50px)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h2 style={{fontSize:15,fontWeight:700,color:groen}}>📧 Mailing — Verzonden berichten</h2>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{fontSize:12,color:subtekst}}>{gefilterd.length}/{mailLog.length} mail(s)</span>
          <button style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:5,padding:"4px 10px",cursor:"pointer",fontSize:12}}
            onClick={()=>{ if(window.confirm("Maillog wissen?")){ setMailLog([]); localStorage.removeItem('ta_maillog'); } }}>
            🗑️ Wis log
          </button>
        </div>
      </div>

      {/* Zoekbalk */}
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <input style={{...gs.input,flex:1,fontSize:12}} placeholder="🔍 Zoek op klant, datum of onderwerp..."
          value={zoek} onChange={e=>setZoek(e.target.value)} />
        <select style={{...gs.input,width:"auto",fontSize:12}} value={zoekKlant} onChange={e=>setZoekKlant(e.target.value)}>
          <option value="">— Alle klanten —</option>
          {uniekeKlanten.map(k=><option key={k} value={k}>{k}</option>)}
        </select>
        {(zoek||zoekKlant)&&<button style={{...gs.knopSecundair,fontSize:12}} onClick={()=>{setZoek("");setZoekKlant("");}}>✕ Wis filter</button>}
      </div>

      {gefilterd.length===0
        ? <div style={{textAlign:"center",color:subtekst,padding:60}}>
            <div style={{fontSize:40,marginBottom:10}}>📧</div>
            <div>{mailLog.length===0?"Nog geen mails verstuurd":"Geen resultaten"}</div>
          </div>
        : <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr>{[["Datum/tijd",180],["Klant",140],["E-mail",180],["Week",60],["Onderwerp",0]].map(([h,w])=>(
                <th key={h} style={{...TH,fontSize:11,minWidth:w||"auto"}}>{h.toUpperCase()}</th>
              ))}</tr>
            </thead>
            <tbody>
              {gefilterd.map((m,i)=>(
                <tr key={i} style={{background:i%2===0?wit:"#f9fcfb"}}>
                  <td style={{...TD,fontSize:12,whiteSpace:"nowrap"}}>{m.datum}</td>
                  <td style={{...TD,fontSize:12,fontWeight:600,color:groen}}>{m.klant}</td>
                  <td style={{...TD,fontSize:12}}>{m.email}</td>
                  <td style={{...TD,fontSize:12,textAlign:"center"}}><span style={{background:lichtGroen,color:groen,borderRadius:20,padding:"1px 8px",fontSize:11,fontWeight:600}}>{m.week}</span></td>
                  <td style={{...TD,fontSize:12,color:subtekst}}>{m.onderwerp}</td>
                </tr>
              ))}
            </tbody>
          </table>
      }
    </div>
  );
}

// KLANT MATRIX PRINT — seizoensoverzicht PDF
// ════════════════════════════════════════════════════════
function KlantMatrixPrint({ data, bedrijf, verpDef, onSluit }) {
  const { klant, orders } = data;
  const bd = bedrijf||{};
  const vandaag = new Date().toLocaleDateString("nl-NL");

  function plantenVast(r){
    const vd=verpDef.find(v=>v.naam===r.verpakking);
    return r.vastPlanten??((vd?.aantal||0)*r.aantal);
  }

  // Bouw matrix
  const alleWkn = [...new Set(orders.map(o=>weekLabel(o.leverdatum)))].sort();
  const rijMap = {};
  orders.forEach(o=>{
    const wk = weekLabel(o.leverdatum);
    o.regels.forEach(r=>{
      const key = r.gewas+"||"+r.soort+"||"+r.verpakking+"||"+(r.prijs||"");
      if(!rijMap[key]) rijMap[key]={gewas:r.gewas,soort:r.soort,verpakking:r.verpakking,prijs:r.prijs,weken:{}};
      rijMap[key].weken[wk]=(rijMap[key].weken[wk]||0)+plantenVast(r);
      if(r.prijs) rijMap[key].prijs=r.prijs;
    });
  });
  const rijen = Object.values(rijMap).sort((a,b)=>a.soort.localeCompare(b.soort));
  const totaalPerWeek = wk => rijen.reduce((s,r)=>s+(r.weken[wk]||0),0);
  const rijTotaal = r => alleWkn.reduce((s,wk)=>s+(r.weken[wk]||0),0);

function LeveranciersBeheer({ leveranciers, setLeveranciers, gewassen, setGewassen }) {
  const leeg = {id:null,naam:"",email:"",telefoon:"",contactpersoon:"",notitie:""};
  const [form,setForm] = useState(null);
  const [data,setData] = useState(leeg);
  const [delId,setDelId] = useState(null);

  function opslaan() {
    if(!data.naam) return;
    if(data.id) setLeveranciers(leveranciers.map(l=>l.id===data.id?data:l));
    else setLeveranciers([...leveranciers,{...data,id:Date.now()}]);
    setForm(null);
  }

  function verwijder(id) {
    setLeveranciers(leveranciers.filter(l=>l.id!==id));
    // Ontkoppel gewassen
    setGewassen(gewassen.map(g=>g.leverancierId===id?{...g,leverancierId:null}:g));
    setDelId(null);setForm(null);
  }

  const veld=(lbl,k,type="text")=>(
    <div style={gs.veldGroep}><label style={gs.label}>{lbl}</label>
    <input style={gs.input} type={type} value={data[k]||""} onChange={e=>setData({...data,[k]:e.target.value})} /></div>
  );

  // Welke gewassen zijn gekoppeld aan deze leverancier
  function gewassenVoor(levId) {
    return gewassen.filter(g=>g.leverancierId===levId).map(g=>g.naam).join(", ")||"—";
  }

  return (
    <div style={{display:"flex",height:"calc(100vh - 50px)"}}>
      {/* Lijst */}
      <div style={{width:260,borderRight:`1px solid ${rand}`,background:wit,padding:10,overflowY:"auto",flexShrink:0}}>
        <button style={{...gs.knopPrimair,width:"100%",marginBottom:8}} onClick={()=>{setData({...leeg});setForm("nieuw");}}>+ Nieuwe leverancier</button>
        <div style={{fontSize:10,color:subtekst,marginBottom:6}}>{leveranciers.length} leverancier(s)</div>
        {leveranciers.map(l=>(
          <div key={l.id} onClick={()=>{setData({...l});setForm("bewerk");}}
            style={{padding:"8px 10px",borderRadius:6,cursor:"pointer",marginBottom:3,
              background:form&&data.id===l.id?lichtGroen:"transparent",
              border:`1px solid ${form&&data.id===l.id?groen:"transparent"}`}}>
            <div style={{fontWeight:600}}>{l.naam}</div>
            <div style={{fontSize:11,color:subtekst}}>{l.email||"—"}</div>
            <div style={{fontSize:10,color:subtekst,marginTop:2}}>{gewassenVoor(l.id)}</div>
          </div>
        ))}
        {leveranciers.length===0&&<div style={{color:subtekst,fontSize:12,textAlign:"center",padding:20}}>Nog geen leveranciers</div>}
      </div>

      {/* Formulier */}
      <div style={{flex:1,padding:20,overflowY:"auto"}}>
        {form?(
          <div style={{maxWidth:460}}>
            <h2 style={{fontSize:15,fontWeight:700,marginBottom:16}}>{form==="nieuw"?"Nieuwe leverancier":"Leverancier bewerken"}</h2>
            <div style={gs.sectie}>
              <div style={gs.sectieLabel}>Gegevens</div>
              {veld("Naam","naam")}
              {veld("E-mailadres","email","email")}
              {veld("Telefoon","telefoon","tel")}
              {veld("Contactpersoon","contactpersoon")}
              <div style={gs.veldGroep}><label style={gs.label}>Notitie</label>
                <textarea style={{...gs.input,height:60,resize:"vertical"}} value={data.notitie||""} onChange={e=>setData({...data,notitie:e.target.value})} /></div>
            </div>

            {/* Gewassen koppelen */}
            {data.id&&(
              <div style={gs.sectie}>
                <div style={gs.sectieLabel}>Gekoppelde gewassen</div>
                <div style={{fontSize:11,color:subtekst,marginBottom:8}}>Selecteer welke gewassen van deze leverancier komen:</div>
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  {gewassen.map(g=>(
                    <label key={g.id} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"4px 0"}}>
                      <input type="checkbox"
                        checked={g.leverancierId===data.id}
                        onChange={e=>setGewassen(gewassen.map(x=>x.id===g.id?{...x,leverancierId:e.target.checked?data.id:null}:x))}
                        style={{cursor:"pointer",accentColor:groen}}
                      />
                      <span style={{fontWeight:600}}>{g.naam}</span>
                      {g.leverancierId&&g.leverancierId!==data.id&&(
                        <span style={{fontSize:10,color:"#f59e0b"}}>⚠️ al bij andere leverancier</span>
                      )}
                    </label>
                  ))}
                </div>
              </div>
            )}

            <div style={{display:"flex",gap:8,marginTop:8}}>
              <button style={gs.knopPrimair} onClick={opslaan}>💾 Opslaan</button>
              {data.id&&<button style={gs.knopVerwijder} onClick={()=>setDelId(data.id)}>🗑️ Verwijderen</button>}
              <button style={gs.knopSecundair} onClick={()=>setForm(null)}>Annuleren</button>
            </div>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:subtekst,gap:10}}>
            <div style={{fontSize:40}}>🚚</div>
            <div>Selecteer een leverancier of maak een nieuwe aan</div>
          </div>
        )}
      </div>
      {delId&&<BevestigModal tekst="Leverancier verwijderen?" onJa={()=>verwijder(delId)} onNee={()=>setDelId(null)} />}
    </div>
  );
}

function Inkoopprijzen({ gewassen, setGewassen }) {

    const b = gewassen.map(g=>g.id===gewasId?{...g,[veld]:waarde}:g);
    setGewassen(b);
  }

  function setInkoopPrijs(gewasId, soort, waarde) {
    const b = gewassen.map(g=>g.id===gewasId?{...g,inkoopPrijzen:{...(g.inkoopPrijzen||{}),[soort]:waarde===''?'':Number(waarde)}}:g);

      </div>

      {/* Matrix */}

        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
          <button style={{...gs.knopSecundair,fontSize:11,padding:"3px 10px"}} onClick={()=>{
            const alleOpen = gewassen.every(g=>openGewas["open_"+g.naam]===true);
            const nieuw={};
            gewassen.forEach(g=>nieuw["open_"+g.naam]=!alleOpen);

                                  onKeyDown={e=>{if(e.key==="Enter"||e.key==="Tab")e.target.blur();}}
                                />
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// FACTUUR OVERZICHT
// ════════════════════════════════════════════════════════
function FactuurOverzicht({ klanten, orders, verpDef, bedrijf, setOrders }) {
  const [filtKlant, setFiltKlant] = useState("");
  const vandaag = new Date();
  vandaag.setHours(0,0,0,0);

  // Bereken bedrag per order
  function berekenBedrag(order) {
    const bd = bedrijf||{};
    const btwPct = bd.btwPct??21;
    const sub = order.regels.reduce(function(s,r){
      const vd = verpDef.find(v=>v.naam===r.verpakking);
      const pl = r.vastPlanten??((vd?.aantal||0)*r.aantal);
      return s+(r.prijs?pl*Number(r.prijs):0);
    },0);
    return sub*(1+btwPct/100);
  }

  function vervalDatum(order) {
    const kl = klanten.find(k=>k.id===order.klantId)||{};
    const bd = bedrijf||{};
    const termijn = kl.betalingstermijn||bd.betalingstermijn||30;
    // Gebruik transportDatum als factuurdatum, anders vandaag
    const factDatum = order.transportDatum ? new Date(order.transportDatum) : new Date();
    const verval = new Date(factDatum);
    verval.setDate(verval.getDate()+termijn);
    verval.setHours(0,0,0,0);
    return verval;
  }

  function dagenOpen(order) {
    if(order.betaaldOp) {
      const betaald = new Date(order.betaaldOp);
      betaald.setHours(0,0,0,0);
      const factDatum = order.transportDatum ? new Date(order.transportDatum) : new Date();
      factDatum.setHours(0,0,0,0);
      return Math.round((betaald-factDatum)/(1000*60*60*24));
    }
    const factDatum = order.transportDatum ? new Date(order.transportDatum) : new Date();
    factDatum.setHours(0,0,0,0);
    return Math.round((vandaag-factDatum)/(1000*60*60*24));
  }

  function dagenTotVerval(order) {
    const verval = vervalDatum(order);
    return Math.round((verval-vandaag)/(1000*60*60*24));
  }

  function statusKleur(order) {
    if(order.betaaldOp) return {bg:"#dcfce7",kleur:groen,label:"✅ Betaald"};
    const dtv = dagenTotVerval(order);
    if(dtv < 0) return {bg:"#fee2e2",kleur:"#dc2626",label:"🔴 Verlopen ("+Math.abs(dtv)+" dgn)"};
    if(dtv <= 5) return {bg:"#fed7aa",kleur:"#c2410c",label:"🟠 Verloopt in "+dtv+" dgn"};
    return {bg:"#dbeafe",kleur:"#1d4ed8",label:"🔵 Open ("+dtv+" dgn)"};
  }

  const metFactuur = orders.filter(o=>o.factuurNr&&(!filtKlant||o.klantId===Number(filtKlant)))
    .sort((a,b)=>Number(b.factuurNr)-Number(a.factuurNr));
  const openstaand = metFactuur.filter(o=>!o.betaaldOp);
  const betaald = metFactuur.filter(o=>o.betaaldOp);
  const verlopen = openstaand.filter(o=>dagenTotVerval(o)<0);

  const totaalOpen = openstaand.reduce((s,o)=>s+berekenBedrag(o),0);
  const totaalVerlopen = verlopen.reduce((s,o)=>s+berekenBedrag(o),0);
  const gemBetaaltijd = betaald.length>0
    ? Math.round(betaald.reduce((s,o)=>s+dagenOpen(o),0)/betaald.length)
    : null;

  const TH2 = {...TH, fontSize:11, padding:"5px 8px", whiteSpace:"nowrap"};
  const TD2 = {padding:"6px 8px", fontSize:12, borderBottom:`1px solid ${rand}`, verticalAlign:"middle", whiteSpace:"nowrap"};
  // Kolom breedtes openstaand
  const colW = {nr:60, klant:140, week:60, datum:90, verval:90, bedrag:90, openst:90, status:160, actie:80};

  return (
    <div style={{padding:16,overflowY:"auto",height:"calc(100vh - 50px)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <h2 style={{fontSize:15,fontWeight:700,color:groen,margin:0}}>🧾 Facturen</h2>
        <select style={{...gs.input,width:"auto",fontSize:12,padding:"4px 8px"}}
