// MODULE — TEELTPLANNING
// ════════════════════════════════════════════════════════
function Teeltplanning({ klanten, gewassen, verpDef, orders, teeltduur, kiemkracht, bedrijf }) {
  const [filtStatus, setFiltStatus] = useState("alle");
  const [filtKlant,  setFiltKlant]  = useState(0);
  const [filtVan, setFiltVan] = useState("");
  const [filtTot, setFiltTot] = useState("");
  const [aantalWeken, setAantalWeken] = useState(5);
  const [matrixFust, setMatrixFust] = useState("");
  const [weergave,   setWeergave]   = useState("beide");
  const [printWerklijst, setPrintWerklijst] = useState(null);
  const [realisatie, setRealisatie] = useState(()=>laad("ta_realisatie", {}));
  useEffect(()=>bewaar("ta_realisatie",realisatie),[realisatie]);
  // Sla realisatie op in Firebase ook
  useEffect(()=>{
    if(Object.keys(realisatie).length>0)
      fbSaveAll("realisatie",[{id:"realisatie",data:realisatie}]);
  },[realisatie]);

  function setReal(wk, type, rijKey, waarde) {
    setRealisatie(prev=>({
      ...prev,
      [wk]: {...(prev[wk]||{}),
        [type]: {...(prev[wk]?.[type]||{}),
          [rijKey]: waarde===''||waarde===null ? undefined : Number(waarde)
        }
      }
    }));
  }
  function getReal(wk, type, rijKey) {
    return realisatie?.[wk]?.[type]?.[rijKey]??'';
  }

  function getKiem(gewas, soort) {
    const gl=gewas?.toLowerCase(), sl=soort?.toLowerCase();
    const k = kiemkracht.find(x=>x.gewas?.toLowerCase()===gl&&x.soort?.toLowerCase()===sl);
    return k ? k.waarde/100 : 1;
  }
  function getDuur(gewas, soort, fust, veld) {
    const gl=gewas?.toLowerCase().trim();
    const sl=soort?.toLowerCase().trim();
    const fl=fust?.toLowerCase().trim();
    // Zoek ook op legacy records zonder gecombineerde id
    const gevonden = teeltduur.find(t=>
      t.gewas?.toLowerCase().trim()===gl &&
      t.soort?.toLowerCase().trim()===sl &&
      t.fust?.toLowerCase().trim()===fl
    );
    if(!gevonden) {
      // Probeer ook op id
      const id='t_'+gewas+'_'+soort+'_'+fust;
      const opId = teeltduur.find(t=>t.id===id);
      if(opId) { const v2=opId[veld]; return (v2===null||v2===undefined||v2==='') ? null : Number(v2); }
    }
    const v = gevonden?.[veld];
    return (v===null||v===undefined||v==='') ? null : Number(v);
  }

  // Filter orders
  const relevanteOrders = orders.filter(o=>{
    if(filtStatus==="bevestigd" && o.status!=="bevestigd") return false;
    if(filtStatus==="reservering" && o.status!=="reservering") return false;
    if(filtStatus==="alle" && o.status==="geleverd") return false;
    if(filtKlant && o.klantId!==Number(filtKlant)) return false;
    return true;
  });

  // Bouw planning: aggregeer per gewas+soort+fust per zaai/inboetweek
  const planning = {};

  relevanteOrders.forEach(o => {
    const leverWk  = getWeekNr(o.leverdatum);
    const leverJaar = getJaar(o.leverdatum);

    o.regels.forEach(r => {
      const trays = r.aantal;
      const uitzaaiWeken = getDuur(r.gewas, r.soort, r.verpakking, "uitzaai");
      const inboetWeken  = getDuur(r.gewas, r.soort, r.verpakking, "inboet");
      const kiem = getKiem(r.gewas, r.soort);
      // Rijkey: soort + fust (ongeacht klant — alles samenvoegen)
      const rijKey = r.gewas+"||"+r.soort+"||"+r.verpakking;


      // Afleverweek: voeg toe aan leverweek planning (als referentie)
      const leverLabel = `${String(leverJaar).slice(-2)}${String(leverWk).padStart(2,"0")}`;

      // Bepaal zaai-fust op basis van aflever-fust
      const fustL = r.verpakking?.toLowerCase()||"";
      let zaaiFust;
      if(fustL.includes("65")||fustL.includes("66")) zaaiFust="Zaaitray 264";
      else if(fustL.includes("179")||fustL.includes("180")) zaaiFust="Zaaitray 180";
      else if(fustL.includes("260")||fustL.includes("264")) zaaiFust="Zaaitray 264";
      else zaaiFust=r.verpakking;

      // Uitzaai: leverweek - uitzaaiduur, aantallen = trays / kiem
      if(uitzaaiWeken!==null) {
        let zaaiWk = leverWk - uitzaaiWeken;
        let zaaiJaar = leverJaar;
        if(zaaiWk <= 0) { zaaiJaar--; zaaiWk += 52; }
        const zaaiLabel = String(zaaiJaar).slice(-2)+String(zaaiWk).padStart(2,"0");
        // Tray 65/66: zaai in Zaaitray 264, aantallen = ceil(trays/kiem/4)
        // Tray 179/260: zaai gewoon ceil(trays/kiem)
        const is65 = fustL.includes("65")||fustL.includes("66");
        const zaaiTrays = is65
          ? Math.ceil(Math.ceil(trays/kiem)/4)
          : (kiem>0 ? Math.ceil(trays/kiem) : trays);
        const zaaiKey = r.gewas+"||"+r.soort+"||"+zaaiFust;
        if(!planning[zaaiLabel]) planning[zaaiLabel]={zaai:{},inboet:{}};
        if(!planning[zaaiLabel].zaai[zaaiKey]) planning[zaaiLabel].zaai[zaaiKey]={gewas:r.gewas,soort:r.soort,fust:zaaiFust,trays:0,zaaiTrays:0,kiem:Math.round(kiem*100),leverWeek:leverLabel};
        planning[zaaiLabel].zaai[zaaiKey].trays += trays;
        planning[zaaiLabel].zaai[zaaiKey].zaaiTrays += zaaiTrays;
      }

      // Inboet: leverweek - inboetduur, aantallen = zelfde als besteld (de ordertrays)
      if(inboetWeken!==null) {
        let inboetWk = leverWk - inboetWeken;
        let inboetJaar = leverJaar;
        if(inboetWk <= 0) { inboetJaar--; inboetWk += 52; }
        const inboetLabel = `${String(inboetJaar).slice(-2)}${String(inboetWk).padStart(2,"0")}`;
        if(!planning[inboetLabel]) planning[inboetLabel]={zaai:{},inboet:{}};
        if(!planning[inboetLabel].inboet[rijKey]) planning[inboetLabel].inboet[rijKey]={gewas:r.gewas,soort:r.soort,fust:r.verpakking,trays:0,inboetTrays:0,kiem:Math.round(kiem*100),leverWeek:leverLabel};
        planning[inboetLabel].inboet[rijKey].trays += trays;
        planning[inboetLabel].inboet[rijKey].inboetTrays += trays; // = bestelde trays
      }
    });
  });

  // Filter op weekrange
  const gesorteerdeWeken = Object.keys(planning).sort().filter(wk=>{
    if(filtVan && wk<filtVan) return false;
    if(filtTot && wk>filtTot) return false;
    return true;
  });

  const alleWeken = [...new Set(orders.map(o=>weekLabel(o.leverdatum)))].sort();

  const sTH = {...TH, padding:"3px 8px", background:"#dff0e8", fontSize:10};
  const sTD = {padding:"3px 6px", fontSize:11, borderBottom:`1px solid ${rand}`, verticalAlign:"middle"};
  const sTDR = {...sTD, textAlign:"right"};

  return (
    <div style={{display:"flex", height:"calc(100vh - 50px)"}}>
      {/* Filters links */}
      <div style={{width:110, borderRight:`1px solid ${rand}`, background:wit, padding:6, flexShrink:0}}>
        <div style={{fontSize:11, fontWeight:700, color:groen, marginBottom:10, textTransform:"uppercase", letterSpacing:1}}>🌱 Teeltplanning</div>

        <div style={{fontSize:10, color:subtekst, marginBottom:3}}>Weergave</div>
        {[["beide","Zaai + Inboet"],["zaai","Alleen zaai"],["inboet","Alleen inboet"]].map(([v,l])=>(
          <button key={v} onClick={()=>setWeergave(v)}
            style={{width:"100%",textAlign:"left",padding:"4px 8px",marginBottom:2,border:"none",borderRadius:4,
              cursor:"pointer",fontSize:11,background:weergave===v?groen:"transparent",
              color:weergave===v?wit:subtekst,fontWeight:weergave===v?700:400}}>
            {l}
          </button>
        ))}

        <div style={{height:1,background:rand,margin:"10px 0"}}/>

        <div style={{fontSize:10, color:subtekst, marginBottom:3}}>Status</div>
        {[["alle","Alle (excl. geleverd)"],["bevestigd","Alleen bevestigd"],["reservering","Alleen reservering"]].map(([v,l])=>(
          <button key={v} onClick={()=>setFiltStatus(v)}
            style={{width:"100%",textAlign:"left",padding:"4px 8px",marginBottom:2,border:"none",borderRadius:4,
              cursor:"pointer",fontSize:11,background:filtStatus===v?"#e8f5ee":"transparent",
              color:filtStatus===v?groen:subtekst,fontWeight:filtStatus===v?700:400}}>
            {l}
          </button>
        ))}

        <div style={{height:1,background:rand,margin:"10px 0"}}/>

        <div style={{fontSize:10, color:subtekst, marginBottom:3}}>Van week</div>
        <select style={{...gs.input,fontSize:11,marginBottom:6}} value={filtVan} onChange={e=>setFiltVan(e.target.value)}>
          <option value="">Alle</option>
          {gesorteerdeWeken.map(w=><option key={w}>{w}</option>)}
        </select>
        <div style={{fontSize:10, color:subtekst, marginBottom:3}}>Tot week</div>
        <select style={{...gs.input,fontSize:11}} value={filtTot} onChange={e=>setFiltTot(e.target.value)}>
          <option value="">Alle</option>
          {Object.keys(planning).sort().map(w=><option key={w}>{w}</option>)}
        </select>

        <div style={{marginTop:12,fontSize:10,color:subtekst}}>{gesorteerdeWeken.length} weken in planning</div>
      </div>

      {/* Planning overzicht */}
      <div style={{flex:1, overflowY:"auto", padding:14}}>
  
  
  
      {gesorteerdeWeken.length===0 && (
          <div style={{textAlign:"center",color:subtekst,padding:60}}>
            <div style={{fontSize:40,marginBottom:10}}>🌱</div>
            <div>Geen teeltplanning gevonden.<br/>Stel eerst teeltduur in bij 🕐 Teeltduur.</div>
          </div>
        )}

        {gesorteerdeWeken.map(wk=>{
          const blok = planning[wk];
          const heeftZaai = Object.keys(blok.zaai||{}).length > 0;
          const heeftInboet = Object.keys(blok.inboet||{}).length > 0;

          return (
            <div key={wk} style={{marginBottom:14}}>

              {/* Week header */}
              <div style={{background:"#e8f5ee",borderRadius:"6px 6px 0 0",padding:"5px 10px",display:"flex",gap:10,alignItems:"center"}}>
                <span style={{fontWeight:700,fontSize:14,color:groen}}>
                  {heeftZaai?"🌰":""}{heeftInboet?"🪴":""} {wk}
                </span>
                <span style={{fontSize:11,color:subtekst}}>
                  {heeftZaai&&`${Object.keys(blok.zaai).length} zaai`}
                  {heeftZaai&&heeftInboet&&" · "}
                  {heeftInboet&&`${Object.keys(blok.inboet).length} inboet`}
                </span>
              </div>

              {/* Gecombineerde tabel: zaai links, inboet rechts */}
              {(()=>{
                const zaaiRijen = Object.values(blok.zaai||{});
                const inboetRijen = Object.values(blok.inboet||{});
                const toonZaai = (weergave==="zaai"||weergave==="beide") && zaaiRijen.length>0;
                const toonInboet = (weergave==="inboet"||weergave==="beide") && inboetRijen.length>0;
                if(!toonZaai && !toonInboet) return null;

                function renderTabel(rijen, isZaai, veld, label) {
                  const kleurBg = isZaai?"#dbeafe":"#cffafe";
                  const kleurTxt = isZaai?"#1d4ed8":"#0891b2";
                  const actieType = isZaai?"zaai":"inboet";
                  return (
                    <div style={{border:`1px solid ${rand}`,borderTop:"none",marginBottom:2}}>
                      <div style={{background:kleurBg,padding:"3px 10px",fontSize:11,fontWeight:700,color:kleurTxt,display:"flex",alignItems:"center",gap:8}}>
                        <span>{isZaai?"🌰 Uitzaai":"🪴 Inboet"}</span>
                        <button style={{background:isZaai?"#1d4ed8":"#0891b2",color:"#fff",border:"none",borderRadius:4,padding:"1px 8px",cursor:"pointer",fontSize:10,fontWeight:600}}
                          onClick={()=>setPrintWerklijst({wk,blok,type:isZaai?"zaai":"inboet"})}>🖨️ Werklijst</button>
                      </div>
                      <table style={{width:"auto"}}>
                        <thead>
                          <tr>
                            <th style={{...sTH,textAlign:"left",minWidth:100}}>Gewas</th>
                            <th style={{...sTH,textAlign:"left",minWidth:140}}>Soort</th>
                            <th style={{...sTH,textAlign:"left",minWidth:80}}>Fust</th>
                            <th style={{...sTH,background:kleurBg,color:kleurTxt,textAlign:"right",minWidth:55}}>Trays</th>
                            <th style={{...sTH,background:kleurBg,color:kleurTxt,textAlign:"right",minWidth:65,fontWeight:700}}>{label}</th>
                            <th style={{...sTH,background:"#fef9c3",color:"#854d0e",textAlign:"right",minWidth:65}}>Werkelijk</th>
                            <th style={{...sTH,background:"#f0fdf4",color:groen,textAlign:"right",minWidth:55}}>Verschil</th>
                          </tr>
                        </thead>
                        <tbody>
                          {rijen.map((r,i)=>{
                            const rijKey=r.gewas+"||"+r.soort+"||"+r.fust;
                            const gepland=r[veld]||0;
                            const opgeslagen=getReal(wk,actieType,rijKey);
                            const werk=opgeslagen===''?gepland:Number(opgeslagen);
                            const werkInput=opgeslagen===''?'':String(opgeslagen);
                            const verschil=werk-gepland;
                            return (
                              <tr key={i} style={{background:i%2===0?wit:"#f9fcfb"}}>
                                <td style={{...sTD,padding:"2px 6px"}}><strong>{r.gewas}</strong></td>
                                <td style={{...sTD,padding:"2px 6px"}}>{r.soort}</td>
                                <td style={{...sTD,padding:"2px 6px"}}><span style={gs.badge}>{r.fust}</span></td>
                                <td style={{...sTDR,padding:"2px 6px",color:groen}}>{r.trays||0}</td>
                                <td style={{...sTDR,padding:"2px 6px",fontWeight:700,color:kleurTxt}}>{gepland}</td>
                                <td style={{...sTDR,padding:"2px 4px"}}>
                                  <input type="number" min="0"
                                    style={{width:58,padding:"1px 4px",textAlign:"right",border:`1px solid ${opgeslagen===''?rand:"#f59e0b"}`,borderRadius:3,fontSize:12,background:opgeslagen!==''?"#fef9c3":"#fff"}}
                                    value={werkInput}
                                    placeholder={String(gepland)}
                                    onFocus={e=>e.target.select()}
                                    onChange={e=>setReal(wk,actieType,rijKey,e.target.value)}
                                  />
                                </td>
                                <td style={{...sTDR,padding:"2px 6px",fontWeight:700,
                                  color:verschil===0?"#16a34a":verschil>0?"#16a34a":"#dc2626"}}>
                                  {verschil===0?"✓":verschil>0?"+"+verschil:verschil}
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                        <tfoot>
                          <tr style={{background:kleurBg,fontWeight:700}}>
                            <td style={{...sTD,borderTop:`2px solid ${groen}`,color:groen,padding:"3px 6px"}} colSpan={3}>Totaal</td>
                            <td style={{...sTDR,borderTop:`2px solid ${groen}`,color:groen,padding:"3px 6px"}}>{rijen.reduce((s,r)=>s+(r.trays||0),0)}</td>
                            <td style={{...sTDR,borderTop:`2px solid ${groen}`,color:kleurTxt,padding:"3px 6px"}}>{rijen.reduce((s,r)=>s+(r[veld]||0),0)}</td>
                            <td style={{...sTDR,borderTop:`2px solid ${groen}`,color:"#854d0e",padding:"3px 6px"}}>{rijen.reduce((s,r)=>{const o=getReal(wk,actieType,r.gewas+"||"+r.soort+"||"+r.fust);return s+(o===''?r[veld]||0:Number(o));},0)}</td>
                            <td style={{...sTDR,borderTop:`2px solid ${groen}`,color:groen,padding:"3px 6px"}}>
                              {(()=>{const tot=rijen.reduce((s,r)=>{const o=getReal(wk,actieType,r.gewas+"||"+r.soort+"||"+r.fust);return s+(o===''?r[veld]||0:Number(o));},0)-rijen.reduce((s,r)=>s+(r[veld]||0),0);return tot===0?"✓":tot>0?"+"+tot:tot;})()}
                            </td>
                          </tr>
                        </tfoot>
                      </table>
                    </div>
                  );
                }
                return (<>
                  {toonZaai&&renderTabel(zaaiRijen,true,"zaaiTrays","Uitzaai")}
                  {toonInboet&&renderTabel(inboetRijen,false,"inboetTrays","Inboet")}
                </>);
              })()}
            </div>
          );
        })}
      </div>
      {/* Verschil matrix — onderaan */}
      {(()=>{
        // Bereken beschikbare weken met data
        const alleWkn = Object.keys(planning).sort();
        if(alleWkn.length===0) return null;

        // Kies weken: huidige + terug tot aantalWeken geleden
        const nu = new Date();
        const nuWk = String(getJaar(nu.toISOString().split("T")[0])).slice(-2)+String(getWeekNr(nu.toISOString().split("T")[0])).padStart(2,"0");
        // Alle unieke soort+fust combinaties
        const rijSet = {};
        alleWkn.forEach(wk=>{
          [...Object.values(planning[wk]?.zaai||{}),...Object.values(planning[wk]?.inboet||{})].forEach(r=>{
            const k=r.gewas+"||"+r.soort+"||"+r.fust;
            if(!rijSet[k]) rijSet[k]={gewas:r.gewas,soort:r.soort,fust:r.fust};
          });
        });
        const rijSleutels = Object.keys(rijSet).sort();
        if(rijSleutels.length===0) return null;

        // Bepaal verschil per soort per week per type
        function getVerschil(wk, rijKey, actieType) {
          const blokData = actieType==="zaai"?planning[wk]?.zaai:planning[wk]?.inboet;
          if(!blokData?.[rijKey]) return null;
          const gepland = actieType==="zaai"?(blokData[rijKey].zaaiTrays||0):(blokData[rijKey].inboetTrays||0);
          const opgeslagen = realisatie?.[wk]?.[actieType]?.[rijKey];
          if(opgeslagen===undefined||opgeslagen==='') return null; // niet ingevuld
          return Number(opgeslagen) - gepland;
        }

        const mTH2 = {padding:"3px 6px",background:"#e8f5ee",color:"#2d6a4f",fontSize:10,border:"1px solid #c8e6c9",textAlign:"center",whiteSpace:"nowrap"};
        const mTD2 = {padding:"2px 6px",fontSize:11,border:"1px solid #e0e0e0",verticalAlign:"middle"};

        return (
          <div style={{marginTop:24,background:wit,border:`1px solid ${rand}`,borderRadius:8,overflow:"hidden"}}>
            <div style={{background:"#f0f7f4",padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${rand}`}}>
              <span style={{fontWeight:700,fontSize:14,color:groen}}>📊 Verschil matrix</span>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:11,color:subtekst}}>Weken terug:</span>
                <select style={{padding:"2px 6px",border:`1px solid ${rand}`,borderRadius:4,fontSize:11,background:wit}}
                  value={aantalWeken} onChange={e=>setAantalWeken(Number(e.target.value))}>
                  {[4,6,8,10,12,16,20].map(n=><option key={n} value={n}>{n} weken</option>)}
                </select>
                <span style={{fontSize:11,color:subtekst}}>Fust:</span>
                <select style={{padding:"2px 6px",border:`1px solid ${rand}`,borderRadius:4,fontSize:11,background:wit}}
                  value={matrixFust} onChange={e=>setMatrixFust(e.target.value)}>
                  <option value="">Alle fusten</option>
                  {[...new Set([...Object.values(planning).flatMap(b=>[...Object.values(b.zaai||{}),...Object.values(b.inboet||{})].map(r=>r.fust))])].sort().map(f=><option key={f}>{f}</option>)}
                </select>
              </div>
            </div>
            <div style={{overflowX:"auto",padding:8}}>
              {["zaai","inboet"].map(actieType=>{
                const label = actieType==="zaai"?"🌰 Zaai":"🪴 Inboet";
                // Filter weken met data voor dit type
                const relevWkn = alleWkn.filter(wk=>Object.keys(planning[wk]?.[actieType]||{}).length>0).slice(-aantalWeken);
                if(relevWkn.length===0) return null;
                // Filter rijen met data voor dit type
                const relevRijen = rijSleutels.filter(k=>relevWkn.some(wk=>planning[wk]?.[actieType]?.[k])).filter(k=>!matrixFust||rijSet[k].fust===matrixFust);
                if(relevRijen.length===0) return null;
                return (
                  <div key={actieType} style={{marginBottom:12}}>
                    <div style={{fontSize:11,fontWeight:700,color:actieType==="zaai"?"#1d4ed8":"#0891b2",marginBottom:4}}>{label}</div>
                    <table style={{borderCollapse:"collapse",fontSize:11}}>
                      <thead>
                        <tr>
                          <th style={{...mTH2,textAlign:"left",minWidth:100}}>Gewas</th>
                          <th style={{...mTH2,textAlign:"left",minWidth:130}}>Soort</th>
                          <th style={{...mTH2,textAlign:"left",minWidth:80}}>Fust</th>
                          {relevWkn.map(wk=><th key={wk} style={mTH2}>{wk}</th>)}
                        </tr>
                      </thead>
                      <tbody>
                        {relevRijen.map((k,i)=>{
                          const r=rijSet[k];
                          return (
                            <tr key={k} style={{background:i%2===0?wit:"#f9fcfb"}}>
                              <td style={mTD2}><strong>{r.gewas}</strong></td>
                              <td style={mTD2}>{r.soort}</td>
                              <td style={mTD2}><span style={gs.badge}>{r.fust}</span></td>
                              {relevWkn.map(wk=>{
                                const v=getVerschil(wk,k,actieType);
                                return (
                                  <td key={wk} style={{...mTD2,textAlign:"center",fontWeight:700,
                                    background:v===null?"#f9f9f9":v===0?"#dcfce7":v>0?"#dcfce7":"#fee2e2",
                                    color:v===null?"#ccc":v===0?"#16a34a":v>0?"#16a34a":"#dc2626"}}>
                                    {v===null?"—":v===0?"✓":v>0?"+"+v:v}
                                  </td>
                                );
                              })}
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}
      {printWerklijst&&<WerklijstPrint data={printWerklijst} bedrijf={bedrijf} onSluit={()=>setPrintWerklijst(null)} />}
    </div>
  );
}

// MODULE — KIEMKRACHT
// ════════════════════════════════════════════════════════
function KiemInput({ waarde, onSave, style }) {
  const [val, setVal] = useState(waarde??'');
  useEffect(()=>setVal(waarde??''), [waarde]);
  return (
    <div style={{display:"flex",alignItems:"center",gap:2}}>
      <input
        style={{...style, background:val!==''&&val!==undefined?"#f0fff8":"#fff", textAlign:"right"}}
        type="number" min="0" max="100" step="1" placeholder="—"
        value={val}
        onFocus={e=>e.target.select()}
        onChange={e=>setVal(e.target.value)}
        onBlur={e=>onSave(e.target.value)}
        onKeyDown={e=>{if(e.key==="Enter"||e.key==="Tab")e.target.blur();}}
      />
      {val!==''&&<span style={{fontSize:10,color:subtekst}}>%</span>}
    </div>
  );
}

function Kiemkracht({ gewassen, kiemkracht, setKiemkracht }) {
  const [openGewas, setOpenGewas] = useState(()=>Object.fromEntries((gewassen||[]).map(g=>["open_"+g.naam,false])));
  const [vulAlles, setVulAlles] = useState({});

  function getKiem(gewas, soort){ return kiemkracht.find(k=>k.gewas===gewas&&k.soort===soort)?.waarde??''; }

  function setKiem(gewas, soort, waarde){
    const id='k_'+gewas+'_'+soort;
    setKiemkracht(huidig=>{
      const bestaand=huidig.find(k=>k.id===id);
      if(waarde===''||waarde===null) return bestaand?huidig.filter(k=>k.id!==id):huidig;
      const v=Number(waarde);
      if(bestaand) return huidig.map(k=>k.id===id?{...k,waarde:v}:k);
      return [...huidig,{id,gewas,soort,waarde:v}];
    });
  }

  function vulGewas(gewas, soorten, waarde){
    if(waarde==='') return;
    setKiemkracht(huidig=>{
      const nieuw=[...huidig];
      soorten.forEach(s=>{
        const id='k_'+gewas+'_'+s;
        const idx=nieuw.findIndex(k=>k.id===id);
        if(idx>=0) nieuw[idx]={...nieuw[idx],waarde:Number(waarde)};
        else nieuw.push({id,gewas,soort:s,waarde:Number(waarde)});
      });
      return nieuw;
    });
    setVulAlles(v=>({...v,[gewas]:''}));
  }

  const iS={padding:"2px 4px",border:`1px solid ${rand}`,borderRadius:3,fontSize:12,width:60};
  const mTH={...TH,padding:"4px 8px",background:"#dff0e8",color:groen,fontSize:11};
  const mTD={padding:"3px 8px",fontSize:12,borderBottom:`1px solid ${rand}`};

  return (
    <div style={{display:"flex",height:"calc(100vh - 50px)"}}>
      {/* Info paneel links */}
      <div style={{width:200,borderRight:`1px solid ${rand}`,background:wit,padding:14,flexShrink:0}}>
        <div style={{fontSize:11,fontWeight:700,color:groen,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Kiemkracht</div>
        <div style={{fontSize:12,color:subtekst,lineHeight:1.6}}>
          Voer per soort het kiemkrachtpercentage in.<br/><br/>
          Typ bijv. <strong>70</strong> voor 70%.<br/><br/>
          <span style={{color:groen}}>Groen</span> = ingevuld<br/>
          Leeg = niet ingesteld
        </div>
        <div style={{marginTop:12,fontSize:11,color:subtekst}}>
          {kiemkracht.length} soort(en) ingevuld
        </div>
      </div>

      {/* Matrix */}
      <div style={{flex:1,overflowY:"auto",padding:14}}>
        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
          <button style={{...gs.knopSecundair,fontSize:11,padding:"3px 10px"}} onClick={()=>{
            const alleOpenK=gewassen.every(g=>openGewas["open_"+g.naam]===true);
            const nieuw={};
            gewassen.forEach(g=>nieuw["open_"+g.naam]=!alleOpenK);
            setOpenGewas(nieuw);
          }}>
            {gewassen.every(g=>openGewas["open_"+g.naam]===true)?"▲ Inklappen":"▼ Uitklappen"}
          </button>
        </div>
        {gewassen.map(gw=>{
          const openKey="open_"+gw.naam;
          const isOpen=openGewas[openKey]===true;
          const ingevuld=kiemkracht.filter(k=>k.gewas===gw.naam).length;
          return (
            <div key={gw.naam} style={{background:wit,border:`1px solid ${rand}`,borderRadius:6,marginBottom:6,overflow:"hidden"}}>
              {/* Header */}
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"5px 10px",background:"#f0f7f4",borderBottom:isOpen?`1px solid ${rand}`:"none",cursor:"pointer"}}
                onClick={()=>setOpenGewas({...openGewas,[openKey]:!isOpen})}>
                <span style={{fontSize:12,color:groen}}>{isOpen?"▼":"▶"}</span>
                <span style={{fontWeight:700,fontSize:14,color:groen,flex:1}}>{gw.naam}</span>
                <span style={{fontSize:10,color:subtekst}}>{ingevuld}/{gw.soorten.length} ingevuld</span>

                <button style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:4,padding:"2px 6px",cursor:"pointer",fontSize:10}}
                  onClick={e=>{e.stopPropagation();if(window.confirm("Alle kiemkracht van "+gw.naam+" wissen?"))setKiemkracht(k=>k.filter(x=>x.gewas!==gw.naam));}}
                >🗑️</button>
              </div>
              {isOpen&&(
                <table style={{width:"auto",tableLayout:"fixed"}}>
                  <colgroup><col style={{width:200}}/><col style={{width:100}}/></colgroup>
                  <thead>
                    <tr>
                      <th style={{...mTH,textAlign:"left"}}>Soort</th>
                      <th style={{...mTH,textAlign:"right"}}>Kiemkracht %</th>
                    </tr>
                    <tr style={{background:"#e8f5ee"}}>
                      <td style={{...mTD,fontSize:10,color:subtekst,fontStyle:"italic"}}>Vul alle soorten:</td>
                      <td style={{...mTD,textAlign:"right"}}>
                        <div style={{display:"flex",alignItems:"center",gap:3,justifyContent:"flex-end"}}>
                          <input style={{...iS,width:56,textAlign:"right",background:"#d4edda"}} type="number" min="0" max="100" placeholder="—"
                            value={vulAlles[gw.naam]||''}
                            onChange={e=>setVulAlles({...vulAlles,[gw.naam]:e.target.value})}
                            onBlur={e=>{if(e.target.value) vulGewas(gw.naam,gw.soorten,e.target.value);}}
                            onKeyDown={e=>{if(e.key==="Enter")e.target.blur();}}
                          />
                          <span style={{fontSize:10,color:subtekst}}>%</span>
                        </div>
                      </td>
                    </tr>
                  </thead>
                  <tbody>
                    {gw.soorten.map((s,si)=>{
                      const k=getKiem(gw.naam,s);
                      return (
                        <tr key={s} style={{background:si%2===0?wit:"#f9fcfb"}}>
                          <td style={{...mTD}}>{s}</td>
                          <td style={{...mTD,textAlign:"right"}}>
                            <KiemInput waarde={k} style={iS} onSave={v=>setKiem(gw.naam,s,v)} />
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// MODULE 5 — BEVESTIGING
// ════════════════════════════════════════════════════════
function Bevestiging({ klanten, gewassen, orders, setOrders, verpDef, bedrijf }) {
  const [selKlant, setSelKlant] = useState(null);
  const [selWeken, setSelWeken] = useState([]);
  const [herdruk, setHerdruk] = useState(false);
  const [printMulti, setPrintMulti] = useState(null);
  const [printMatrix, setPrintMatrix] = useState(null);

  function plantenVast(r){const vd=vindVd(verpDef,r.verpakking);return r.vastPlanten??((vd?.aantal||0)*r.aantal);}
  function plantenTotaal(regels){return regels.reduce((s,r)=>s+plantenVast(r),0);}

  const klantenMetOpen = klanten.filter(k=>orders.some(o=>o.klantId===k.id&&!o.bevestigingNr&&o.status!=="geleverd"))
    .sort((a,b)=>a.naam.localeCompare(b.naam));

  function wekenVoorKlant(klantId) {
    return [...new Set(orders.filter(o=>o.klantId===klantId&&o.status!=="geleverd").map(o=>weekLabel(o.leverdatum)))].sort();
  }
  function onbevestigdWeken(klantId) {
    return new Set(orders.filter(o=>o.klantId===klantId&&!o.bevestigingNr&&o.status!=="geleverd").map(o=>weekLabel(o.leverdatum)));
  }

  function kiesKlant(k) {
    setSelKlant(k);
    setHerdruk(false);
    setSelWeken([...onbevestigdWeken(k.id)]);
  }

  function toggleWeek(wk) {
    setSelWeken(prev=>prev.includes(wk)?prev.filter(w=>w!==wk):[...prev,wk].sort());
  }

  const selOrders = selKlant && selWeken.length>0
    ? orders.filter(o=>o.klantId===selKlant.id&&selWeken.includes(weekLabel(o.leverdatum))&&o.status!=="geleverd")
        .sort((a,b)=>new Date(a.leverdatum)-new Date(b.leverdatum))
    : [];

  function bevestigenEnPrinten() {
    if(!selKlant||selWeken.length===0) return;
    let volgendNr = Math.max(0,...orders.filter(x=>x.bevestigingNr).map(x=>Number(x.bevestigingNr)||0))+1;
    const vandaag = new Date().toLocaleDateString("nl-NL");
    const bijgewerkt = orders.map(o=>{
      if(o.klantId===selKlant.id&&selWeken.includes(weekLabel(o.leverdatum))&&!o.bevestigingNr&&o.status!=="geleverd") {
        const regelsMetVast=o.regels.map(r=>{const vd=verpDef.find(v=>v.naam===r.verpakking);return {...r,vastPlanten:(vd?.aantal||0)*r.aantal};});
        return {...o,regels:regelsMetVast,bevestigingNr:String(volgendNr++).padStart(4,"0"),bevestigdOp:vandaag};
      }
      return o;
    });
    setOrders(bijgewerkt);
    const bevOrders=bijgewerkt.filter(o=>o.klantId===selKlant.id&&selWeken.includes(weekLabel(o.leverdatum))&&o.status!=="geleverd");
    setPrintMulti({klant:selKlant,weken:selWeken.sort(),orders:bevOrders});
    setSelWeken([]);
  }

  const th={padding:"3px 5px",background:"#e8f5ee",color:"#2d6a4f",border:"1px solid #c8e6c9",fontSize:10,textAlign:"right"};
  const td={padding:"3px 5px",border:"1px solid #eee",fontSize:10,textAlign:"right"};

  const matrixRijen = {};
  selOrders.forEach(o=>{
    const wk=weekLabel(o.leverdatum);
    o.regels.forEach(r=>{
      const key=r.soort+"||"+r.verpakking;
      if(!matrixRijen[key]) matrixRijen[key]={soort:r.soort,fust:r.verpakking,prijs:r.prijs,weken:{}};
      matrixRijen[key].weken[wk]=(matrixRijen[key].weken[wk]||0)+plantenVast(r);
      if(r.prijs) matrixRijen[key].prijs=r.prijs;
    });
  });
  const matrixArr=Object.values(matrixRijen).sort((a,b)=>a.soort.localeCompare(b.soort));
  const matrixWeken=selWeken;

  return (
    <div style={{display:"flex",height:"calc(100vh - 50px)"}}>
      {/* Links: klantenlijst */}
      <div style={{width:220,borderRight:`1px solid ${rand}`,background:wit,overflowY:"auto",flexShrink:0,display:"flex",flexDirection:"column"}}>
        <div style={{padding:"8px 10px",borderBottom:`1px solid ${rand}`}}>
          <div style={{fontSize:11,fontWeight:700,color:groen,textTransform:"uppercase",letterSpacing:1}}>Bevestiging</div>
          <div style={{fontSize:10,color:subtekst,marginTop:2}}>{klantenMetOpen.length} klant{klantenMetOpen.length!==1?"en":""} open</div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:6}}>
          {klantenMetOpen.length===0&&<div style={{textAlign:"center",color:subtekst,padding:20,fontSize:12}}>Geen openstaande reserveringen</div>}
          {klantenMetOpen.map(k=>{
            const wkn=[...onbevestigdWeken(k.id)];
            const tot=orders.filter(o=>o.klantId===k.id&&!o.bevestigingNr&&o.status!=="geleverd").reduce((s,o)=>s+plantenTotaal(o.regels),0);
            const actief=selKlant?.id===k.id&&!herdruk;
            return (
              <button key={k.id} onClick={()=>{setHerdruk(false);kiesKlant(k);}}
                style={{width:"100%",textAlign:"left",padding:"6px 8px",marginBottom:3,
                  border:`1px solid ${actief?groen:rand}`,borderRadius:6,cursor:"pointer",
                  background:actief?"#f0fff4":wit}}>
                <div style={{fontWeight:700,fontSize:12,color:actief?groen:"#222"}}>{k.naam}</div>
                <div style={{fontSize:10,color:subtekst}}>{wkn.length} wk · {tot.toLocaleString("nl-NL")} pl.</div>
                <div style={{fontSize:10,color:"#f59e0b",fontWeight:600}}>{wkn.join(", ")}</div>
              </button>
            );
          })}
          {/* Herdruk sectie */}
          <div style={{marginTop:10,paddingTop:8,borderTop:`1px solid ${rand}`}}>
            <div style={{fontSize:10,fontWeight:700,color:subtekst,marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>Herdruk</div>
            {klanten.filter(k=>orders.some(o=>o.klantId===k.id&&o.bevestigingNr&&o.status!=="geleverd"))
              .sort((a,b)=>a.naam.localeCompare(b.naam))
              .map(k=>{
                const actief=selKlant?.id===k.id&&herdruk;
                return (
                  <button key={k.id} onClick={()=>{setHerdruk(true);setSelKlant(k);setSelWeken(wekenVoorKlant(k.id));}}
                    style={{width:"100%",textAlign:"left",padding:"5px 8px",marginBottom:3,
                      border:`1px solid ${actief?"#1d4ed8":rand}`,borderRadius:6,cursor:"pointer",
                      background:actief?"#eff6ff":wit}}>
                    <div style={{fontWeight:700,fontSize:12,color:actief?"#1d4ed8":"#222"}}>{k.naam}</div>
                    <div style={{fontSize:10,color:subtekst}}>{wekenVoorKlant(k.id).length} wk bevestigd</div>
                  </button>
                );
              })}
          </div>
        </div>
        {selKlant&&(
          <div style={{padding:8,borderTop:`1px solid ${rand}`}}>
            <button style={{...gs.knopPrimair,background:"#1d4ed8",width:"100%",fontSize:11}} onClick={()=>{
              setPrintMatrix({klant:selKlant,orders:orders.filter(o=>o.klantId===selKlant.id&&o.status!=="geleverd")});
            }}>Seizoensmatrix</button>
          </div>
        )}
      </div>

      {/* Midden: weekkeuze */}
      {selKlant&&(
        <div style={{width:160,borderRight:`1px solid ${rand}`,background:"#f9fafb",overflowY:"auto",flexShrink:0,padding:8}}>
          <div style={{fontSize:11,fontWeight:700,color:groen,marginBottom:6}}>{selKlant.naam}</div>
          <div style={{display:"flex",gap:3,marginBottom:6}}>
            <button style={{...gs.knopKlein,fontSize:10,flex:1}} onClick={()=>setSelWeken(wekenVoorKlant(selKlant.id))}>Alle</button>
            <button style={{...gs.knopSecundair,fontSize:10,flex:1,padding:"2px 4px"}} onClick={()=>setSelWeken([])}>Geen</button>
          </div>
          {wekenVoorKlant(selKlant.id).map(wk=>{
            const isOnbev=onbevestigdWeken(selKlant.id).has(wk);
            const sel=selWeken.includes(wk);
            const wkPl=orders.filter(o=>o.klantId===selKlant.id&&weekLabel(o.leverdatum)===wk&&o.status!=="geleverd").reduce((s,o)=>s+plantenTotaal(o.regels),0);
            return (
              <button key={wk} onClick={()=>toggleWeek(wk)}
                style={{width:"100%",textAlign:"left",padding:"4px 6px",marginBottom:2,fontSize:11,
                  border:`1px solid ${sel?groen:isOnbev?"#f59e0b":rand}`,borderRadius:4,cursor:"pointer",
                  background:sel?groen:isOnbev?"#fffbeb":"#f0fff4",
                  color:sel?wit:isOnbev?"#92400e":"#166534",fontWeight:sel?700:400}}>
                <span style={{fontWeight:700}}>{wk}</span>
                {isOnbev&&!sel&&<span style={{marginLeft:4,fontSize:9,background:"#f59e0b",color:"#fff",borderRadius:3,padding:"0 3px"}}>!</span>}
                {!isOnbev&&<span style={{marginLeft:4,fontSize:9,background:"#dcfce7",color:"#166534",borderRadius:3,padding:"0 3px"}}>bev</span>}
                <span style={{float:"right",fontSize:9}}>{wkPl.toLocaleString("nl-NL")}</span>
              </button>
            );
          })}
          {selWeken.length>0&&(
            herdruk
              ? <button style={{...gs.knopPrimair,background:"#1d4ed8",width:"100%",marginTop:10,fontSize:12,fontWeight:700}}
                  onClick={()=>{
                    const herdrukOrders=orders.filter(o=>o.klantId===selKlant.id&&selWeken.includes(weekLabel(o.leverdatum))&&o.status!=="geleverd");
                    setPrintMulti({klant:selKlant,weken:selWeken.sort(),orders:herdrukOrders});
                  }}>
                  Herdruk
                </button>
              : <button style={{...gs.knopPrimair,background:"#16a34a",width:"100%",marginTop:10,fontSize:12,fontWeight:700}}
                  onClick={bevestigenEnPrinten}>
                  Bevestigen &amp; Printen
                </button>
          )}
        </div>
      )}

      {/* Rechts: matrix preview */}
      <div style={{flex:1,overflowY:"auto",padding:10}}>
        {!selKlant&&(
          <div style={{textAlign:"center",color:subtekst,padding:60}}>
            <div style={{fontSize:36,marginBottom:10}}>📄</div>
            <div style={{fontSize:14}}>Kies een klant links</div>
          </div>
        )}
        {selKlant&&selWeken.length===0&&(
          <div style={{textAlign:"center",color:subtekst,padding:40}}>
            <div style={{fontSize:24,marginBottom:8}}>👆</div>
            <div>Selecteer weken</div>
          </div>
        )}
        {selOrders.length>0&&(
          <>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <span style={{fontWeight:700,fontSize:14,color:groen}}>{selKlant.naam}</span>
              <span style={{fontSize:11,color:subtekst}}>weken {selWeken.join(", ")} · {selOrders.reduce((s,o)=>s+plantenTotaal(o.regels),0).toLocaleString("nl-NL")} pl.</span>
            </div>
            <table style={{borderCollapse:"collapse",width:"100%",fontSize:10}}>
              <thead>
                <tr>
                  <th style={{...th,textAlign:"left",minWidth:140}}>Soort</th>
                  <th style={{...th,textAlign:"left",width:70}}>Fust</th>
                  <th style={{...th,width:50}}>€/st</th>
                  {matrixWeken.map(wk=><th key={wk} style={{...th,width:65}}>{wk}</th>)}
                  <th style={{...th,width:65,background:"#c8e6c9"}}>Totaal</th>
                </tr>
              </thead>
              <tbody>
                {matrixArr.map((r,i)=>{
                  const tot=matrixWeken.reduce((s,wk)=>s+(r.weken[wk]||0),0);
                  return (
                    <tr key={i} style={{background:i%2===0?wit:"#f9fcfb"}}>
                      <td style={{...td,textAlign:"left"}}>{r.soort}</td>
                      <td style={{...td,textAlign:"left"}}><span style={{background:lichtGroen,color:groen,borderRadius:8,padding:"1px 5px",fontSize:9,fontWeight:600}}>{r.fust}</span></td>
                      <td style={{...td,color:groen}}>{r.prijs?"€"+Number(r.prijs).toFixed(3):"—"}</td>
                      {matrixWeken.map(wk=><td key={wk} style={{...td,fontWeight:r.weken[wk]?600:300,color:r.weken[wk]?"#222":"#ddd"}}>{r.weken[wk]?r.weken[wk].toLocaleString("nl-NL"):"—"}</td>)}
                      <td style={{...td,fontWeight:700,color:groen,background:"#f0fff4"}}>{tot.toLocaleString("nl-NL")}</td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr style={{background:"#e8f5ee",fontWeight:700}}>
                  <td colSpan={3} style={{...td,textAlign:"left",color:groen,borderTop:"2px solid #2d6a4f"}}>Totaal</td>
                  {matrixWeken.map(wk=>{
                    const t=selOrders.filter(o=>weekLabel(o.leverdatum)===wk).reduce((s,o)=>s+plantenTotaal(o.regels),0);
                    return <td key={wk} style={{...td,color:groen,fontWeight:700,borderTop:"2px solid #2d6a4f"}}>{t.toLocaleString("nl-NL")}</td>;
                  })}
                  <td style={{...td,color:groen,fontWeight:700,background:"#c8e6c9",borderTop:"2px solid #2d6a4f"}}>{selOrders.reduce((s,o)=>s+plantenTotaal(o.regels),0).toLocaleString("nl-NL")}</td>
                </tr>
              </tfoot>
            </table>
          </>
        )}
      </div>

      {printMulti&&<MultiBevestigingPrint data={printMulti} bedrijf={bedrijf||{naam:"",adres:"",postcode:"",plaats:"",telefoon:"",email:"",iban:""}} verpDef={verpDef} onSluit={()=>setPrintMulti(null)} onAkkoord={null} />}
      {printMatrix&&<KlantMatrixPrint data={printMatrix} bedrijf={bedrijf||{naam:"",adres:"",postcode:"",plaats:"",telefoon:"",email:"",iban:""}} verpDef={verpDef} onSluit={()=>setPrintMatrix(null)} />}
    </div>
  );
}

// BEVESTIGING PRINT COMPONENT
// ════════════════════════════════════════════════════════
function BevestigingPrint({ order, klant, bedrijf, verpDef, onSluit }) {
  const vandaag = new Date().toLocaleDateString("nl-NL");

  function plantenVast(r) {
    const vd = vindVd(verpDef, r.verpakking);
    return r.vastPlanten ?? ((vd?.aantal||0)*r.aantal);
  }
  function totaalBedrag() {
    return order.regels.reduce((s,r)=>s+Number(r.prijs||0)*r.aantal,0);
  }

  const stijl = {
    fontFamily:"Arial, sans-serif", fontSize:11, color:"#1a1a1a", lineHeight:1.4
  };

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.6)",zIndex:500,overflowY:"auto",padding:20}}>
      <div style={{maxWidth:760,margin:"0 auto",background:"#fff",borderRadius:8,overflow:"hidden",boxShadow:"0 8px 40px rgba(0,0,0,0.3)"}}>

        {/* Knoppen boven het document */}
        <div style={{display:"flex",gap:8,padding:"10px 16px",background:"#f0f7f4",borderBottom:`1px solid ${rand}`}}>
          <button style={gs.knopPrimair} onClick={()=>window.print()}>🖨️ Afdrukken / PDF</button>
          <button style={{...gs.knopPrimair,background:"#1d4ed8"}} onClick={()=>{
            const el=document.getElementById("bevestiging-print-inhoud");
            const w=window.open("","_blank");
            w.document.write("<html><head><title>Bevestiging "+order.orderNr+"</title><style>body{font-family:Arial,sans-serif;font-size:11px;color:#1a1a1a;padding:20px} table{border-collapse:collapse;width:100%} th,td{padding:5px 8px;border:1px solid #ddd} th{background:#e8f5ee;color:#2d6a4f} .groen{color:#2d6a4f} .roze{background:#fce4e4} @media print{button{display:none}}</style></head><body>"+el.innerHTML+"</body></html>");
            w.document.close();w.print();
          }}>📧 Openen voor mail</button>
          <button style={gs.knopSecundair} onClick={onSluit}>✕ Sluiten</button>
        </div>

        {/* Document inhoud */}
        <div id="bevestiging-print-inhoud" style={{padding:"24px 32px",...stijl}}>

          {/* Header: bedrijf links, klant rechts */}
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
            <div>
              <div style={{fontWeight:700,fontSize:15,color:"#2d6a4f",marginBottom:4}}>{bedrijf.naam}</div>
              <div>{bedrijf.adres}</div>
              <div>{bedrijf.postcode} {bedrijf.plaats}</div>
              <div style={{marginTop:4}}>Tel: {bedrijf.telefoon}</div>
              <div>E-mail: {bedrijf.email}</div>
              {bedrijf.iban&&<div style={{marginTop:4}}>IBAN: {bedrijf.iban}</div>}
              {bedrijf.kvk&&<div>KVK: {bedrijf.kvk}</div>}
              {bedrijf.btw&&<div>BTW: {bedrijf.btw}</div>}
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{klant?.naam}</div>
              <div>{klant?.adres}</div>
              <div>{klant?.postcode} {klant?.plaats}</div>
              {klant?.telefoon&&<div>Tel: {klant.telefoon}</div>}
              {klant?.email&&<div>{klant.email}</div>}
              <div style={{marginTop:8,fontSize:12,color:"#555"}}>Datum: {vandaag}</div>
            </div>
          </div>

          {/* Titel */}
          <div style={{background:"#e8f5ee",padding:"8px 14px",borderRadius:4,marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontWeight:700,fontSize:14,color:"#2d6a4f"}}>ORDERBEVESTIGING</div>
            <div style={{display:"flex",gap:20,fontSize:12}}>
              <span>Order: <strong>{order.orderNr}</strong></span>
              {order.bevestigingNr&&<span>Bev.nr: <strong>{order.bevestigingNr}</strong></span>}
              <span>Leverweek: <strong>{weekLabel(order.leverdatum)}</strong></span>
            </div>
          </div>

          {/* Notitie */}
          {order.notitie&&<div style={{background:"#fffbe6",border:"1px solid #f59e0b",borderRadius:4,padding:"5px 10px",marginBottom:12,fontSize:11}}>📝 {order.notitie}</div>}

          {/* Tabel */}
          <table style={{borderCollapse:"collapse",width:"100%",marginBottom:12}}>
            <thead>
              <tr style={{background:"#e8f5ee"}}>
                {["Gewas","Soort","Fust","Trays","Planten","Prijs/st","Bedrag"].map(h=>(
                  <th key={h} style={{padding:"6px 8px",textAlign:["Trays","Planten","Prijs/st","Bedrag"].includes(h)?"right":"left",border:"1px solid #c8e6c9",color:"#2d6a4f",fontSize:11,fontWeight:700}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {order.regels.map((r,i)=>{
                const vast = plantenVast(r);
                const bedrag = Number(r.prijs||0)*r.aantal;
                return (
                  <tr key={r.id} style={{background:i%2===0?"#fff":"#f9fcfb"}}>
                    <td style={{padding:"5px 8px",border:"1px solid #e0e0e0"}}>{r.gewas}</td>
                    <td style={{padding:"5px 8px",border:"1px solid #e0e0e0"}}>{r.soort}</td>
                    <td style={{padding:"5px 8px",border:"1px solid #e0e0e0"}}>{r.verpakking}</td>
                    <td style={{padding:"5px 8px",border:"1px solid #e0e0e0",textAlign:"right"}}>{r.aantal}</td>
                    <td style={{padding:"5px 8px",border:"1px solid #e0e0e0",textAlign:"right",fontWeight:600,color:"#2d6a4f"}}>{vast.toLocaleString("nl-NL")}</td>
                    <td style={{padding:"5px 8px",border:"1px solid #e0e0e0",textAlign:"right"}}>€ {Number(r.prijs||0).toFixed(3)}</td>
                    <td style={{padding:"5px 8px",border:"1px solid #e0e0e0",textAlign:"right"}}>€ {bedrag.toFixed(2)}</td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr style={{background:"#e8f5ee",fontWeight:700}}>
                <td colSpan={3} style={{padding:"6px 8px",border:"1px solid #c8e6c9",color:"#2d6a4f"}}>Totaal</td>
                <td style={{padding:"6px 8px",border:"1px solid #c8e6c9",textAlign:"right",color:"#2d6a4f"}}>{order.regels.reduce((s,r)=>s+r.aantal,0)}</td>
                <td style={{padding:"6px 8px",border:"1px solid #c8e6c9",textAlign:"right",color:"#2d6a4f"}}>{order.regels.reduce((s,r)=>s+plantenVast(r),0).toLocaleString("nl-NL")}</td>
                <td style={{padding:"6px 8px",border:"1px solid #c8e6c9"}}></td>
                <td style={{padding:"6px 8px",border:"1px solid #c8e6c9",textAlign:"right",color:"#2d6a4f"}}>€ {totaalBedrag().toFixed(2)}</td>
              </tr>
            </tfoot>
          </table>

          {/* Footer */}
          <div style={{borderTop:"1px solid #e0e0e0",paddingTop:10,fontSize:10,color:"#888",display:"flex",justifyContent:"space-between"}}>
            <span>{bedrijf.naam} · {bedrijf.adres}, {bedrijf.postcode} {bedrijf.plaats}</span>
            <span>IBAN: {bedrijf.iban}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// MULTI-WEEK MATRIX BEVESTIGING
// ════════════════════════════════════════════════════════
function MultiBevestigingPrint({ data, bedrijf, verpDef, onSluit }) {
  const { klant, weken, orders } = data;
  const vandaag = new Date().toLocaleDateString("nl-NL");

  function plantenVast(r){
    const vd=verpDef.find(v=>v.naam===r.verpakking);
    return r.vastPlanten??((vd?.aantal||0)*r.aantal);
  }

  // Bouw matrix: rijen = unieke gewas+soort+verpakking, kolommen = weken
  const rijMap = {};
  orders.forEach(o=>{
    const wk=weekLabel(o.leverdatum);
    o.regels.forEach(r=>{
      const key=r.gewas+"||"+r.soort+"||"+r.verpakking;
      if(!rijMap[key]) rijMap[key]={gewas:r.gewas,soort:r.soort,verpakking:r.verpakking,prijs:r.prijs,weken:{}};
      rijMap[key].weken[wk]=(rijMap[key].weken[wk]||0)+plantenVast(r);
      // update prijs als aanwezig
      if(r.prijs) rijMap[key].prijs=r.prijs;
    });
  });
  const rijen=Object.values(rijMap).sort((a,b)=>a.gewas.localeCompare(b.gewas)||a.soort.localeCompare(b.soort));

  // Totaal per week
  function weekTotaal(wk){return rijen.reduce((s,r)=>s+(r.weken[wk]||0),0);}
  function rijTotaal(r){return weken.reduce((s,wk)=>s+(r.weken[wk]||0),0);}
  const grootTotaal=weken.reduce((s,wk)=>s+weekTotaal(wk),0);

  const cH={padding:"6px 8px",background:"#e8f5ee",color:"#2d6a4f",fontWeight:700,fontSize:11,border:"1px solid #c8e6c9",textAlign:"center"};
  const cL={padding:"6px 8px",background:"#e8f5ee",color:"#2d6a4f",fontWeight:700,fontSize:11,border:"1px solid #c8e6c9",textAlign:"left"};
  const cD={padding:"5px 8px",fontSize:11,border:"1px solid #e0e0e0",textAlign:"center"};
  const cDL={padding:"5px 8px",fontSize:11,border:"1px solid #e0e0e0",textAlign:"left"};

  // Bevestigingsnummers verzamelen
  const bevNrs=[...new Set(orders.filter(o=>o.bevestigingNr).map(o=>o.bevestigingNr))].join(", ");

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.6)",zIndex:500,overflowY:"auto",padding:20}}>
      <div style={{maxWidth:820,margin:"0 auto",background:"#fff",borderRadius:8,overflow:"hidden",boxShadow:"0 8px 40px rgba(0,0,0,0.3)"}}>

        {/* Knoppen */}
        <div style={{display:"flex",gap:8,padding:"10px 16px",background:"#f0f7f4",borderBottom:"1px solid #e2e8e4"}}>
          <button style={{background:"#2d6a4f",color:"#fff",border:"none",borderRadius:6,padding:"5px 14px",cursor:"pointer",fontSize:14,fontWeight:600}} onClick={()=>window.print()}>🖨️ Afdrukken / PDF</button>
          <button style={{background:"#1d4ed8",color:"#fff",border:"none",borderRadius:6,padding:"5px 14px",cursor:"pointer",fontSize:14,fontWeight:600}} onClick={()=>{
            const el=document.getElementById("multi-print-inhoud");
            const w=window.open("","_blank");
            w.document.write("<html><head><title>Bevestiging "+klant?.naam+"</title><style>body{font-family:Arial,sans-serif;font-size:11px;padding:20px} table{border-collapse:collapse;width:100%} th,td{padding:5px 8px;border:1px solid #ddd} @media print{button{display:none}}</style></head><body>"+el.innerHTML+"</body></html>");
            w.document.close();w.print();
          }}>📧 Openen voor mail</button>

// ZAAD VOORRAAD COMPONENT
// ════════════════════════════════════════════════════════
function ZaadVoorraad({ zaadinkoop, orders, gewassen, kiemkracht, teeltduur, bedrijf }) {
  const [toonBestel, setToonBestel] = useState(false);
  const [selLev, setSelLev] = useState(null);

  const nu = new Date();
  const huidigWk = getWeekNr(nu);
  const huidigJaar = getJaar(nu);
  const eindeSeizoensWk = 40;
  const eindeSeizoensJaar = huidigWk < 40 ? huidigJaar : huidigJaar + 1;
  const eindeLabel = `${String(eindeSeizoensJaar).slice(-2)}${String(eindeSeizoensWk).padStart(2,"0")}`;

  function wkLabel(offset) {
    let wk = huidigWk + offset; let jaar = huidigJaar;
    while(wk > 52) { wk -= 52; jaar++; }
    return `${String(jaar).slice(-2)}${String(wk).padStart(2,"0")}`;
  }
  const nu3w = wkLabel(0);
  const grens3w = wkLabel(3);

  function getKiem(gewas, soort) {
    const k = (kiemkracht||[]).find(x=>x.gewas?.toLowerCase()===gewas?.toLowerCase()&&x.soort?.toLowerCase()===soort?.toLowerCase());
    return k ? k.waarde/100 : 1;
  }
  function getDuur(gewas, soort, fust, veld) {
    return (teeltduur||[]).find(t=>t.gewas?.toLowerCase()===gewas?.toLowerCase()&&t.soort?.toLowerCase()===soort?.toLowerCase()&&t.fust?.toLowerCase()===fust?.toLowerCase())?.[veld]??null;
  }

  const seizoenStartJaar = huidigWk >= 40 ? huidigJaar : huidigJaar - 1;
  const seizoenStartLabel = `${String(seizoenStartJaar).slice(-2)}40`;

  const inkoop = {};
  (zaadinkoop||[]).forEach(z=>{ const key = z.gewas+"||"+z.soort; inkoop[key] = (inkoop[key]||0) + z.aantal; });

  const verbVerbruikt = {}, verb3w = {}, verbSzn = {};
  (orders||[]).filter(o=>o.status==="bevestigd"||o.status==="reservering"||o.status==="geleverd").forEach(o=>{
    (o.regels||[]).forEach(r=>{
      const kiem = getKiem(r.gewas, r.soort);
      const uitzaaiWeken = getDuur(r.gewas, r.soort, r.verpakking, "uitzaai");
      if(uitzaaiWeken===null) return;
      let zaaiWk = getWeekNr(o.leverdatum) - uitzaaiWeken;
      let zaaiJaar = getJaar(o.leverdatum);
      if(zaaiWk<=0){zaaiWk+=52;zaaiJaar--;}
      const zaaiLbl = `${String(zaaiJaar).slice(-2)}${String(zaaiWk).padStart(2,"0")}`;
      const fustL = r.verpakking?.toLowerCase()||"";
      const is65 = fustL.includes("65")||fustL.includes("66");
      const zaaiTrays = is65?Math.ceil(Math.ceil(r.aantal/kiem)/4):(kiem>0?Math.ceil(r.aantal/kiem):r.aantal);
      const aantalPerTray = fustL.includes("179")||fustL.includes("180")?180:264;
      const zaad = zaaiTrays * aantalPerTray;
      const key = r.gewas+"||"+r.soort;
      if(zaaiLbl >= seizoenStartLabel && zaaiLbl <= eindeLabel) {
        verbSzn[key] = (verbSzn[key]||0) + zaad;
        if(zaaiLbl < nu3w) verbVerbruikt[key] = (verbVerbruikt[key]||0) + zaad;
        if(zaaiLbl >= nu3w && zaaiLbl <= grens3w) verb3w[key] = (verb3w[key]||0) + zaad;
      }
    });
  });

  const alleSleutels = [...new Set([...Object.keys(inkoop), ...Object.keys(verbSzn)])].sort();

  const perLeverancier = {};
  alleSleutels.forEach(key=>{
    const [gewas] = key.split("||");
    const gw = (gewassen||[]).find(g=>g.naam===gewas);
    const lev = gw?.leverancier||"Onbekend";
    const email = gw?.leverancierEmail||"";
    if(!perLeverancier[lev]) perLeverancier[lev]={email,items:[]};
  });

  function bestelAdvies(key) {
    const ing = inkoop[key]||0;
    const verbruikt = verbVerbruikt[key]||0;
    const drieWeken = verb3w[key]||0;
    const restSzn = Math.max(0, (verbSzn[key]||0) - verbruikt);
    const beschikbaar = ing - verbruikt;
    const tekort3w = drieWeken - beschikbaar;
    if(restSzn <= 0 || tekort3w <= 0) return null;
    let advies = [];
    if(restSzn >= 10000) { advies.push(`${Math.ceil(tekort3w/10000)}x 10k`); }
    else {
      let rest = Math.ceil(tekort3w/1000)*1000;
      const z5 = Math.floor(rest/5000); rest -= z5*5000;
      const z1 = Math.ceil(rest/1000);
      if(z5>0) advies.push(`${z5}x 5k`);
      if(z1>0) advies.push(`${z1}x 1k`);
    }
    return { tekort3w, advies: advies.join(" + ") };
  }

  const bestellingen = alleSleutels.map(key=>({key,adv:bestelAdvies(key)})).filter(x=>x.adv);

  return (
    <div style={{flex:1,overflowY:"auto",padding:16}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        {bestellingen.length===0
          ? <span style={{...gs.badge,background:"#e5e7eb",color:subtekst}}>Niets te bestellen</span>
          : <button style={{...gs.knopPrimair,background:"#dc2626"}} onClick={()=>setToonBestel(true)}>
              Besteladvies ({bestellingen.length} soorten)
            </button>
        }
        <span style={{fontSize:11,color:subtekst}}>Seizoen t/m week {eindeSeizoensWk} · 3-weken horizon</span>
      </div>

      <table style={{width:"100%"}}>
        <thead>
          <tr>{["Gewas","Soort","Ingekocht","Jaarprognose","Verbruikt","Rest seizoen","Verbruik 3w","Saldo 3w","Besteladvies"].map((h,i)=>(
            <th key={h} style={{...TH,textAlign:i>=2?"right":"left"}}>{h}</th>
          ))}</tr>
        </thead>
        <tbody>
          {alleSleutels.map((key,i)=>{
            const [gewas,soort] = key.split("||");
            const ing = inkoop[key]||0;
            const jaarprognose = verbSzn[key]||0;
            const verbruikt = verbVerbruikt[key]||0;
            const restSzn = Math.max(0, jaarprognose - verbruikt);
            const beschikbaar = ing - verbruikt;
            const drieW = verb3w[key]||0;
            const saldo3w = beschikbaar - drieW;
            const adv = bestelAdvies(key);
            const saldoKleur = saldo3w<0?"#dc2626":saldo3w<5000?"#f59e0b":groen;
            return (
              <tr key={key} style={{background:adv&&restSzn>0?"#fff5f5":i%2===0?wit:"#f9fcfb"}}>
                <td style={TD}><strong>{gewas}</strong></td>
                <td style={TD}>{soort}</td>
                <td style={{...TD,textAlign:"right",fontWeight:600}}>{(ing).toLocaleString("nl-NL")}</td>
                <td style={{...TD,textAlign:"right",color:subtekst}}>{jaarprognose>0?`${(jaarprognose).toLocaleString("nl-NL")}`:"—"}</td>
                <td style={{...TD,textAlign:"right",color:subtekst}}>{verbruikt>0?`${(verbruikt).toLocaleString("nl-NL")}`:"—"}</td>
                <td style={{...TD,textAlign:"right",color:subtekst}}>{restSzn>0?`${(restSzn).toLocaleString("nl-NL")}`:"—"}</td>
                <td style={{...TD,textAlign:"right",color:subtekst}}>{drieW>0&&restSzn>0?`${(drieW).toLocaleString("nl-NL")}`:"—"}</td>
                <td style={{...TD,textAlign:"right",fontWeight:700,color:restSzn<=0?"#ccc":saldoKleur}}>
                  {restSzn<=0?"—":saldo3w>=0?`${(saldo3w).toLocaleString("nl-NL")}`:`⚠️ −${Math.abs(saldo3w).toLocaleString("nl-NL")}`}
                </td>
                <td style={{...TD,textAlign:"right"}}>
                  {adv?<span style={{background:"#fee2e2",color:"#dc2626",borderRadius:4,padding:"2px 8px",fontWeight:700,fontSize:11}}>{adv.advies}</span>
                      :<span style={{color:"#ccc",fontSize:11}}>—</span>}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
      {alleSleutels.length===0&&<div style={{textAlign:"center",color:subtekst,padding:60}}><div style={{fontSize:40,marginBottom:10}}>📦</div><div>Geen data</div></div>}

      {toonBestel&&(
        <div style={gs.overlay}><div style={{...gs.modal,width:480}}>
          <div style={{...gs.modalTitel,color:"#dc2626"}}>Besteladvies zaad</div>
          <div style={{fontSize:11,color:subtekst,marginBottom:12}}>Tekort binnen 3 weken · seizoen t/m week {eindeSeizoensWk}</div>
          <table style={{width:"100%",marginBottom:16}}>
            <thead><tr>
              <th style={TH}>Gewas</th><th style={TH}>Soort</th>
              <th style={{...TH,textAlign:"right"}}>Tekort 3w</th>
              <th style={{...TH,textAlign:"right"}}>Bestellen</th>
            </tr></thead>
            <tbody>
              {bestellingen.map(({key,adv})=>{
                const [gewas,soort]=key.split("||");
                return (
                  <tr key={key} style={{borderBottom:`1px solid ${rand}`}}>
                    <td style={{...TD,fontWeight:600}}>{gewas}</td>
                    <td style={TD}>{soort}</td>
                    <td style={{...TD,textAlign:"right",color:"#dc2626"}}>−{(adv.tekort3w).toLocaleString("nl-NL")}</td>
                    <td style={{...TD,textAlign:"right",fontWeight:700,color:groen}}>{adv.advies}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          <button style={gs.knopSecundair} onClick={()=>setToonBestel(false)}>Sluiten</button>
        </div></div>
      )}
    </div>
  );
}

function Zaadinkoop({ gewassen, zaadinkoop, setZaadinkoop, orders, teeltduur, kiemkracht, verpDef, bedrijf }) {
  const [tab, setTab] = useState("inkoop");
  const [laasteGewas, setLaatsteGewas] = useState("");
  const [laastePrijs, setLaastePrijs] = useState("");
  const leeg = () => ({id:null, datum:new Date().toISOString().split("T")[0], gewas:laasteGewas, soort:laasteGewas?gewassen.find(g=>g.naam===laasteGewas)?.soorten[0]||"":"", leverancier:"", code:"", kiemkracht:90, aantal:"", prijs:laastePrijs});
  const [data, setData] = useState(leeg());
  const [aantalDisplay, setAantalDisplay] = useState("");
  const [delId, setDelId] = useState(null);
  const [filtGewas, setFiltGewas] = useState("");
  const [sorteer, setSorteer] = useState("datum");

  const soorten = gewassen.find(g=>g.naam===data.gewas)?.soorten||[];

  function setV(k,v) {
    if(k==="gewas") {
      const gw = gewassen.find(g=>g.naam===v);
      const soort = gw?.soorten[0]||"";
      const prijs = soort&&gw?.inkoopPrijzen?.[soort]||laastePrijs;
      setData({...data,gewas:v,soort,prijs});
    } else if(k==="soort") {
      const gw = gewassen.find(g=>g.naam===data.gewas);
      const prijs = gw?.inkoopPrijzen?.[v]||laastePrijs;
      setData({...data,soort:v,prijs});
    } else {
      setData({...data,[k]:v});
    }
  }

  function opslaan(enNieuw=false) {
    const aantalWerkelijk = Number(aantalDisplay) * 1000;
    if(!data.datum||!data.gewas||!aantalWerkelijk) return;
    const gw = gewassen.find(g=>g.naam===data.gewas);
    const r = {...data, aantal:aantalWerkelijk, prijs:data.prijs?Number(data.prijs):null, leverancier:gw?.leverancier||""};
    if(r.id) setZaadinkoop(zaadinkoop.map(x=>x.id===r.id?r:x));
    else setZaadinkoop(prev=>[...prev, {...r, id:Date.now()}]);
    setLaatsteGewas(data.gewas);
    if(enNieuw) { setData({...leeg(),gewas:data.gewas,soort:data.soort}); setAantalDisplay(""); }
    else setData(leeg()); setAantalDisplay(""); if(!enNieuw) setData(leeg());
  }

  function bewerken(z) { setData({...z}); setAantalDisplay(String(z.aantal/1000)); }
  function verwijder(id) { setZaadinkoop(zaadinkoop.filter(x=>x.id!==id)); setDelId(null); }

  const gefilterd = zaadinkoop
    .filter(z=>!filtGewas||z.gewas===filtGewas)
    .sort((a,b)=>sorteer==="datum"?b.datum.localeCompare(a.datum):a.gewas.localeCompare(b.gewas)||a.soort.localeCompare(b.soort));

  const totaalAantal = gefilterd.reduce((s,z)=>s+z.aantal,0);
  const totaalBedrag = gefilterd.reduce((s,z)=>s+(z.prijs&&z.aantal?(Number(z.prijs)*z.aantal/1000):0),0);

  const sTH = {...TH, padding:"4px 6px", fontSize:11};
  const sTD = {padding:"4px 6px", fontSize:12, borderBottom:`1px solid ${rand}`, verticalAlign:"middle"};

  return (
    <div style={{display:"flex", flexDirection:"column", height:"calc(100vh - 50px)"}}>
      {/* Tabs */}
      <div style={{display:"flex",gap:3,padding:"8px 12px",background:"rgba(0,0,0,0.06)",margin:"0"}}>
        {[["inkoop","📋 Inkoop"],["voorraad","📦 Zaadvoorraad"]].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)}
            style={{padding:"5px 16px",border:"none",borderRadius:6,cursor:"pointer",fontSize:14,
              fontWeight:tab===v?700:400, background:tab===v?groen:"transparent", color:tab===v?wit:subtekst}}>
            {l}
          </button>
        ))}
      </div>

      {tab==="voorraad" && (
        <ZaadVoorraad
          zaadinkoop={zaadinkoop||[]} orders={orders||[]} gewassen={gewassen||[]}
          kiemkracht={kiemkracht||[]} teeltduur={teeltduur||[]} bedrijf={bedrijf||{}}
        />
      )}

      {tab==="inkoop" && (
      <div style={{display:"flex", flex:1, overflow:"hidden"}}>
        {/* Links: filter + formulier */}
        <div style={{width:230, borderRight:`1px solid ${rand}`, background:wit, overflowY:"auto", flexShrink:0, display:"flex", flexDirection:"column"}}>
          <div style={{padding:10, borderBottom:`1px solid ${rand}`}}>
            <div style={{fontSize:11,fontWeight:700,color:groen,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Zaadinkoop</div>
            <div style={{fontSize:10,color:subtekst,marginBottom:3}}>Gewas</div>
            <select style={{...gs.input,fontSize:11,marginBottom:8}} value={filtGewas} onChange={e=>setFiltGewas(e.target.value)}>
              <option value="">Alle gewassen</option>
              {gewassen.map(g=><option key={g.naam}>{g.naam}</option>)}
            </select>
            <div style={{display:"flex",gap:4,marginBottom:8}}>
              {[["datum","Datum"],["gewas","Gewas"]].map(([v,l])=>(
                <button key={v} onClick={()=>setSorteer(v)}
                  style={{flex:1,padding:"3px 6px",border:"none",borderRadius:4,cursor:"pointer",fontSize:11,
                    background:sorteer===v?groen:"#f0f0f0",color:sorteer===v?wit:subtekst}}>
                  {l}
                </button>
              ))}
            </div>
            <div style={{display:"flex",gap:12}}>
              <div><div style={{fontSize:10,color:subtekst}}>Zaden</div><div style={{fontSize:14,fontWeight:700,color:groen}}>{(totaalAantal).toLocaleString("nl-NL")}</div></div>
              <div><div style={{fontSize:10,color:subtekst}}>Inkopen</div><div style={{fontSize:14,fontWeight:700,color:groen}}>{gefilterd.length}</div></div>
            </div>
          </div>

          <div style={{padding:10,flex:1,background:"#f0f7f3",borderTop:`2px solid ${groen}`}}>
            <div style={{fontSize:11,fontWeight:700,color:groen,marginBottom:8}}>{data.id?"Bewerken":"Nieuwe inkoop"}</div>
            <div style={gs.veldGroep}>
              <label style={gs.label}>Datum</label>
              <input style={gs.input} type="date" value={data.datum} onChange={e=>setV("datum",e.target.value)} />
            </div>
            <div style={gs.veldGroep}>
              <label style={gs.label}>Gewas</label>
              <select style={gs.input} value={data.gewas} onChange={e=>setV("gewas",e.target.value)}>
                <option value="">— Kies —</option>
                {gewassen.map(g=><option key={g.naam}>{g.naam}</option>)}
              </select>
            </div>
            <div style={gs.veldGroep}>
              <label style={gs.label}>Soort</label>
              <select style={gs.input} value={data.soort} onChange={e=>setV("soort",e.target.value)} disabled={!data.gewas}>
                <option value="">— Kies —</option>
                {soorten.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div style={{display:"flex",gap:6}}>
              <div style={{...gs.veldGroep,flex:1}}>
                <label style={gs.label}>Aantal <span style={{color:subtekst}}>(×1000)</span></label>
                <input style={gs.input} type="number" min="0" step="1" placeholder="0"
                  value={aantalDisplay} onChange={e=>setAantalDisplay(e.target.value)} onFocus={e=>e.target.select()} />
              </div>
              <div style={{...gs.veldGroep,flex:1}}>
                <label style={gs.label}>Kiem%</label>
                <input style={gs.input} type="number" min="0" max="100" step="1" value={data.kiemkracht}
                  onChange={e=>setV("kiemkracht",e.target.value)} onFocus={e=>e.target.select()} />
              </div>
            </div>
            <div style={gs.veldGroep}>
              <label style={gs.label}>Code</label>
              <input style={gs.input} type="text" placeholder="L2024-001" value={data.code} onChange={e=>setV("code",e.target.value)} />
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              <button style={{...gs.knopPrimair,width:"100%"}} onClick={()=>opslaan(true)}>+ Opslaan & Nieuw</button>
              <button style={{...gs.knopSecundair,width:"100%"}} onClick={()=>opslaan(false)}>Opslaan</button>
              {data.id&&<button style={{...gs.knopSecundair,width:"100%",fontSize:11}} onClick={()=>{setData(leeg());setAantalDisplay("");}}>Annuleren</button>}
            </div>
          </div>
        </div>

        {/* Rechts: overzicht */}
        <div style={{flex:1,overflowY:"auto",padding:10}}>
          {gefilterd.length===0 ? (
            <div style={{textAlign:"center",color:subtekst,padding:60}}>
              <div style={{fontSize:40,marginBottom:10}}>🌰</div>
              <div>Nog geen zaadinkoop ingevoerd</div>
            </div>
          ) : (
            <table style={{width:"auto",minWidth:"100%"}}>
              <thead>
                <tr>{["Datum","Gewas","Soort","Aantal","Kiem%","Code","Leverancier",""].map((h,i)=>(
                  <th key={h||i} style={{...sTH,textAlign:i>=3&&i<=4?"right":"left"}}>{h}</th>
                ))}</tr>
              </thead>
              <tbody>
                {gefilterd.map((z,i)=>(
                  <tr key={z.id} style={{background:i%2===0?wit:"#f9fcfb"}}>
                    <td style={sTD}>{z.datum}</td>
                    <td style={sTD}><strong>{z.gewas}</strong></td>
                    <td style={sTD}>{z.soort}</td>
                    <td style={{...sTD,textAlign:"right",fontWeight:700,color:groen}}>{(z.aantal).toLocaleString("nl-NL")}</td>
                    <td style={{...sTD,textAlign:"right"}}>{z.kiemkracht!=null?`${z.kiemkracht}%`:"—"}</td>
                    <td style={sTD}>{z.code||"—"}</td>
                    <td style={sTD}>{z.leverancier||"—"}</td>
                    <td style={{...sTD,textAlign:"right",whiteSpace:"nowrap"}}>
                      <button style={gs.knopKlein} onClick={()=>bewerken(z)}>✏️</button>
                      <button style={{...gs.knopVerwijder,marginLeft:4}} onClick={()=>setDelId(z.id)}>🗑️</button>
                    </td>
                  </tr>
                ))}
              </tbody>
              <tfoot>
                <tr style={{background:"#e8f5ee",fontWeight:700}}>
                  <td colSpan={3} style={{...sTD,color:groen}}>Totaal</td>
                  <td style={{...sTD,textAlign:"right",color:groen}}>{(totaalAantal).toLocaleString("nl-NL")}</td>
                  <td colSpan={4} style={sTD}></td>
                </tr>
              </tfoot>
            </table>
          )}
        </div>
      </div>
      )}
      {delId&&<BevestigModal tekst="Inkoop verwijderen?" onJa={()=>verwijder(delId)} onNee={()=>setDelId(null)} />}
    </div>
  );
}
