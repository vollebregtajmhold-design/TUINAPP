          </tbody>
          <tfoot>
            <tr style={{background:"#e8f5ee"}}>
              <td style={{padding:"4px 5px",fontSize:11,color:groen,fontWeight:700,borderTop:`2px solid ${groen}`}} colSpan={3}>Totaal</td>
              <td style={{padding:"4px 5px",fontSize:12,color:groen,fontWeight:700,textAlign:"right",borderTop:`2px solid ${groen}`}}>{ges.regels.reduce((s,x)=>s+x.aantal,0)}</td>
              <td style={{padding:"4px 5px",fontSize:12,color:groen,fontWeight:700,textAlign:"right",borderTop:`2px solid ${groen}`}}>{plantenTotaal(ges.regels).toLocaleString()}</td>
              <td colSpan={5} style={{borderTop:`2px solid ${groen}`}}></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  );
}

// ── WEEKGROEP COMPONENT ─────────────────────────────────
function WeekGroep({ wk, weekOrders, klanten, ges, verpDef, onOpen, onKopie, plantenTotaal, forceOpen }) {
  const [open, setOpen] = useState(false);
  useEffect(()=>{ if(forceOpen!==null&&forceOpen!==undefined) setOpen(forceOpen); },[forceOpen]);
  const totaalPlanten = weekOrders.reduce((s,o)=>s+plantenTotaal(o.regels),0);

  function handleWeekKlik() {
    if(weekOrders.length===1) {
      // Direct die ene order openen
      onOpen(weekOrders[0]);
    } else {
      // Meerdere orders: uitklappen
      setOpen(!open);
    }
  }

  return (
    <div style={{marginBottom:4}}>
      {/* Week header */}
      <div onClick={handleWeekKlik} tabIndex={0}
        onKeyDown={e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();handleWeekKlik();}}}
        style={{display:"flex",justifyContent:"space-between",alignItems:"center",
        padding:"5px 8px",background:"#d4e8dc",borderRadius:4,cursor:"pointer",marginBottom:2,outline:"none"}}
        onFocus={e=>e.currentTarget.style.outline="2px solid #2d6a4f"}
        onBlur={e=>e.currentTarget.style.outline="none"}>
        <span style={{fontWeight:700,fontSize:12,color:"#1e3a2f",letterSpacing:0.5}}>
          {weekOrders.length===1 ? "▸" : open ? "▾" : "▸"} {wk}
        </span>
        <span style={{fontSize:10,color:"#3a6b52"}}>{weekOrders.length} orders · {totaalPlanten.toLocaleString()} pl.</span>
      </div>
      {/* Orders — altijd tonen als open of als actieve order in deze week zit */}
      {(open || weekOrders.some(o=>o.id===ges?.id)) && weekOrders.map(o=>{
        const kl=klanten.find(k=>k.id===o.klantId);
        const actief = ges?.id===o.id;
        return (
          <div key={o.id} style={{padding:"5px 7px",borderRadius:4,cursor:"pointer",marginBottom:2,
            background:actief?O_GEEL_BG:"transparent",
            border:`2px solid ${actief?O_GEEL:"transparent"}`,
            borderLeft:actief?`4px solid ${O_ORANJE}`:"2px solid transparent"}}
            onClick={()=>onOpen(o)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14,color:actief?O_DONKER:tekst,lineHeight:1.2}}>{kl?.naam}</div>
                <div style={{fontSize:10,color:subtekst,marginTop:1}}>{o.orderNr} · {plantenTotaal(o.regels).toLocaleString()} pl.</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
                {o.bevestigingNr
                  ? <div style={{background:o.bevestigingGemaild?O_BLAUW:O_ORANJE,color:"#fff",borderRadius:4,padding:"2px 6px",fontSize:9,fontWeight:700,textAlign:"center"}}>
                      {o.bevestigingGemaild?"✅":"📄"} {o.bevestigdOp||(o.bevestigingGemaild?new Date(o.bevestigingGemaild).toLocaleDateString("nl-NL"):"—")}
                    </div>
                  : <span style={{fontSize:10,fontWeight:600,background:S_BG[o.status],color:S_KLEUR[o.status],borderRadius:20,padding:"1px 6px"}}>{S_LABEL[o.status]}</span>
                }
                {!o.bevestigingNr&&!o.seizoensGemaild&&(
                  <span style={{fontSize:9,color:"#9ca3af",fontStyle:"italic"}}>eerst mailen</span>
                )}
                
                {o.factuurNr&&!o.betaaldOp&&(
                  <span style={{fontSize:9,fontWeight:600,background:"#fef3c7",color:"#b45309",borderRadius:20,padding:"1px 6px"}}>🧾 open</span>
                )}
                {o.factuurNr&&o.betaaldOp&&(
                  <span style={{fontSize:9,fontWeight:600,background:"#dcfce7",color:"#16a34a",borderRadius:20,padding:"1px 6px"}}>💶 betaald</span>
                )}
                <div style={{display:"flex",gap:2}}>
                  <button title="Kopiëren" style={{background:"none",border:"none",cursor:"pointer",fontSize:10,padding:"0 2px",color:groen,lineHeight:1}}
                    onClick={e=>{e.stopPropagation();onKopie(o);}}>📋</button>
                </div>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

const STATUSSEN = ["reservering","bevestigd","geleverd"];
// Orders kleurpalet — stijl oud systeem
const O_GEEL       = "#f5c518";   // geel highlight actieve rij
const O_GEEL_BG    = "#fffbe6";   // licht geel achtergrond
const O_ORANJE     = "#e07b00";   // oranje accent
const O_DONKER     = "#1e3a2f";   // donkere header
const O_HEADER_BG  = "#2c4a3e";   // header achtergrond
const O_ROOD       = "#c0392b";   // reservering
const O_BLAUW      = "#1565c0";   // bevestigd
const S_KLEUR = {reservering:O_ROOD, bevestigd:O_BLAUW, geleverd:"#555"};
const S_BG    = {reservering:"#fdecea", bevestigd:"#e3f0ff", geleverd:"#f0f0f0"};
const S_LABEL = {reservering:"Reservering", bevestigd:"Bevestigd", geleverd:"Geleverd"};

// ── MATRIX FILTERPANEEL ─────────────────────────────────
function MatrixFilterPaneel({ klanten, gewassen, orders, verpDef, weken }) {
  const nu = new Date();
  const huidigeWeekLabel = `${String(getJaar(nu)).slice(-2)}${String(getWeekNr(nu)).padStart(2,"0")}`;
  const beginIdx = Math.max(0, weken.findIndex(w=>w.label===huidigeWeekLabel));
  const eindIdx  = Math.min(weken.length-1, beginIdx+7);

  const [filtKlant,   setFiltKlant]    = useState("TOTAAL");
  const [filtGewas,   setFiltGewas]    = useState("TOTAAL");
  const [filtSoort,   setFiltSoort]    = useState("TOTAAL");
  const [filtStatus,  setFiltStatus]   = useState("ORDER");
  const [filtBegin,   setFiltBegin]    = useState(weken[beginIdx]?.label || "");
  const [filtEind,    setFiltEind]     = useState(weken[eindIdx]?.label  || "");
  const [filtWaarde,  setFiltWaarde]   = useState("planten");
  const [filtVerp,    setFiltVerp]     = useState("TOTAAL");
  const [weergaveModus, setWeergaveModus] = useState("week"); // "week" | "periode" | "totaal"
  const [matrixSort,  setMatrixSort]   = useState(null); // {kolom:"Klant"|"Teelt"|"Soort"|"Totaal", dir:1|-1}
  function klikMatrixKolom(k) {
    setMatrixSort(prev=>prev?.kolom===k?(prev.dir===1?{kolom:k,dir:-1}:null):{kolom:k,dir:1});
  }

  const soorten = filtGewas==="TOTAAL"
    ? []
    : (gewassen.find(g=>g.naam===filtGewas)?.soorten||[]);

  function plantenPerRegel(r){
    const v=verpDef.find(x=>x.naam===r.verpakking);
    return (v?.aantal||0)*r.aantal;
  }

  // Filter orders op basis van instellingen
  const gefilterdOrders = orders.filter(o=>{
    if(filtKlant!=="TOTAAL" && filtKlant!=="GESPECIFICEERD" && o.klantId!==Number(filtKlant)) return false;
    if(filtStatus==="ORDER" && o.status==="geleverd") return false;
    if(filtStatus!=="ORDER" && filtStatus!=="TOTAAL" && o.status!==filtStatus) return false;
    const wk=weekLabel(o.leverdatum);
    if(filtBegin && wk<filtBegin) return false;
    if(filtEind  && wk>filtEind)  return false;
    return true;
  });

  // Alle weken in range
  const wekenInRange = weken.filter(w=>{
    if(filtBegin && w.label<filtBegin) return false;
    if(filtEind  && w.label>filtEind)  return false;
    return true;
  });
  // Periodes van 4 weken
  const periodes = [];
  for(let i=0; i<wekenInRange.length; i+=4) {
    const blok = wekenInRange.slice(i, i+4);
    periodes.push({ label: blok[0].label+"–"+blok[blok.length-1].label, weken: blok.map(w=>w.label) });
  }
  const toonWeken = weergaveModus==="week";
  const toonPeriode = weergaveModus==="periode";

  // Bouw matrixdata
  // Rijen: klant → gewas - soort (verpakking)
  const matrixData = {}; // { rijKey: { klantId, klantNaam, regelKey, weekLabel: waarde } }

  gefilterdOrders.forEach(o=>{
    const kl = klanten.find(k=>k.id===o.klantId);
    const klantNaam = kl?.naam||"?";
    const wk = weekLabel(o.leverdatum);

    o.regels.forEach(r=>{
      if(filtGewas!=="TOTAAL" && filtGewas!=="GESPECIFICEERD" && r.gewas!==filtGewas) return;
      if(filtSoort!=="TOTAAL" && filtSoort!=="GESPECIFICEERD" && r.soort!==filtSoort) return;
      if(filtVerp!=="TOTAAL" && filtVerp!=="GESPECIFICEERD" && r.verpakking!==filtVerp) return;

      const rijKlant = filtKlant==="TOTAAL" ? "TOTAAL" : o.klantId;
      const rijGewas = (filtGewas==="TOTAAL") ? "TOTAAL" : r.gewas;
      const rijSoort = (filtSoort==="TOTAAL") ? "TOTAAL" : r.soort;
      const rijVerp  = (filtVerp==="TOTAAL") ? "TOTAAL" : r.verpakking;
      const rijKey = `${rijKlant}||${rijGewas}||${rijSoort}||${rijVerp}`;
      if(!matrixData[rijKey]) matrixData[rijKey]={klantId:rijKlant,klantNaam:filtKlant==="TOTAAL"?"Alle klanten":klantNaam,gewas:filtGewas==="TOTAAL"?"Alle teelten":r.gewas,soort:filtSoort==="TOTAAL"?"Alle soorten":r.soort,verpakking:filtVerp==="TOTAAL"?"Alle verpakkingen":r.verpakking,weken:{}};

      let waarde=0;
      const planten=r.vastPlanten??plantenPerRegel(r);
      if(filtWaarde==="planten"||filtWaarde==="duizend") waarde=planten;
      else if(filtWaarde==="trays") waarde=r.aantal;
      else if(filtWaarde==="bedrag") waarde=Number(r.prijs||0)*planten;

      matrixData[rijKey].weken[wk]=(matrixData[rijKey].weken[wk]||0)+waarde;
    });
  });

  const rijen = Object.values(matrixData);

  // Groepeer rijen per klant — met optionele sortering
  const perKlant = {};
  rijen.forEach(r=>{
    if(!perKlant[r.klantId]) perKlant[r.klantId]={naam:r.klantNaam,rijen:[]};
    perKlant[r.klantId].rijen.push(r);
  });
  // Standaard: gewas alfabetisch, soort alfabetisch binnen gewas
  Object.values(perKlant).forEach(kdata=>{
    if(!matrixSort) kdata.rijen.sort((a,b)=>{
      const g=a.gewas.localeCompare(b.gewas,"nl"); return g!==0?g:a.soort.localeCompare(b.soort,"nl");
    });
  });
  // Sorteer rijen binnen elke klant
  Object.values(perKlant).forEach(kdata=>{
    if(matrixSort?.kolom==="Teelt") kdata.rijen.sort((a,b)=>a.gewas.localeCompare(b.gewas)*matrixSort.dir);
    else if(matrixSort?.kolom==="Soort") kdata.rijen.sort((a,b)=>a.soort.localeCompare(b.soort)*matrixSort.dir);
    else if(matrixSort?.kolom==="Totaal") kdata.rijen.sort((a,b)=>(rijTotaal(a)-rijTotaal(b))*matrixSort.dir);
  });
  // Sorteer klanten zelf
  const gesorteerdeKlanten = Object.entries(perKlant).sort(([,a],[,b])=>{
    if(matrixSort?.kolom==="Klant") return a.naam.localeCompare(b.naam)*matrixSort.dir;
    if(matrixSort?.kolom==="Totaal") {
      const totA = a.rijen.reduce((s,r)=>s+rijTotaal(r),0);
      const totB = b.rijen.reduce((s,r)=>s+rijTotaal(r),0);
      return (totA-totB)*matrixSort.dir;
    }
    return a.naam.localeCompare(b.naam); // standaard alfabetisch
  });

  // Totaal per week (onderste rij)
  function weekTotaal(wk){
    return rijen.reduce((s,r)=>s+(r.weken[wk]||0),0);
  }
  function rijTotaal(r){
    return Object.values(r.weken).reduce((s,v)=>s+v,0);
  }
  function grootTotaal(){
    return rijen.reduce((s,r)=>s+rijTotaal(r),0);
  }

  const selectStijl = {
    padding:"5px 8px",
    border:"1px solid #b7c0bb",
    borderRadius:4,
    background:"#f5f9f7",
    fontSize:12,
    minWidth:140,
    color:tekst,
    cursor:"pointer"
  };
  const labelStijl = {
    fontSize:11,
    fontWeight:600,
    color:subtekst,
    marginBottom:3,
    display:"block"
  };
  const filterRij = {display:"flex",gap:16,alignItems:"flex-end",flexWrap:"wrap"};

  const mTH={...TH,background:"#dff0e8",color:groen,padding:"4px 6px",fontSize:11};
  const mTD={...TD,padding:"4px 6px",textAlign:"right",fontSize:12};
  const mTDL={...TD,padding:"4px 6px",textAlign:"left",fontSize:12};

  const eenheid = filtWaarde==="bedrag" ? "€" : filtWaarde==="duizend" ? "x1000" : filtWaarde==="planten" ? "pl." : "trays";
  const formatWaarde = (v)=>{
    if(v===0||!v) return <span style={{color:"#ccc"}}>—</span>;
    if(filtWaarde==="bedrag") return `€ ${Math.round(v).toLocaleString("nl-NL")}`;
    if(filtWaarde==="duizend") return (v/1000).toFixed(1);
    return v.toLocaleString();
  };

  return (
    <div>
      {/* Filterpaneel */}
      <div style={{background:"#f0f7f4",border:`1px solid ${rand}`,borderRadius:8,padding:14,marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:12,color:groen,marginBottom:10,textTransform:"uppercase",letterSpacing:0.5}}>
          📊 Matrix filters
        </div>
        <div style={filterRij}>
          <div>
            <label style={labelStijl}>Klant</label>
            <select style={selectStijl} value={filtKlant} onChange={e=>setFiltKlant(e.target.value)}>
              <option value="TOTAAL">TOTAAL</option>
              <option value="GESPECIFICEERD">GESPECIFICEERD</option>
              {klanten.map(k=><option key={k.id} value={k.id}>{k.naam}</option>)}
            </select>
          </div>
          <div>
            <label style={labelStijl}>Teelt</label>
            <select style={selectStijl} value={filtGewas} onChange={e=>{setFiltGewas(e.target.value);setFiltSoort("TOTAAL");}}>
              <option value="TOTAAL">TOTAAL</option>
              <option value="GESPECIFICEERD">GESPECIFICEERD</option>
              {gewassen.map(g=><option key={g.naam}>{g.naam}</option>)}
            </select>
          </div>
          <div>
            <label style={labelStijl}>Soort</label>
            <select style={selectStijl} value={filtSoort} onChange={e=>setFiltSoort(e.target.value)} disabled={filtGewas==="TOTAAL"}>
              <option value="TOTAAL">TOTAAL</option>
              <option value="GESPECIFICEERD">GESPECIFICEERD</option>
              {soorten.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div>
            <label style={labelStijl}>Fust</label>
            <select style={selectStijl} value={filtVerp} onChange={e=>setFiltVerp(e.target.value)}>
              <option value="TOTAAL">TOTAAL</option>
              <option value="GESPECIFICEERD">GESPECIFICEERD</option>
              {verpDef.map(v=><option key={v.naam} value={v.naam}>{v.naam}</option>)}
            </select>
          </div>
          <div>
            <label style={labelStijl}>Orderstatus</label>
            <select style={selectStijl} value={filtStatus} onChange={e=>setFiltStatus(e.target.value)}>
              <option value="ORDER">ORDER (excl. geleverd)</option>
              <option value="TOTAAL">TOTAAL</option>
              {STATUSSEN.map(s=><option key={s} value={s}>{S_LABEL[s]}</option>)}
            </select>
          </div>
          <div>
            <label style={labelStijl}>Begindatum (week)</label>
            <select style={selectStijl} value={filtBegin} onChange={e=>setFiltBegin(e.target.value)}>
              <option value="">Alle weken</option>
              {weken.map(w=><option key={w.label} value={w.label}>{w.label}</option>)}
            </select>
          </div>
          <div>
            <label style={labelStijl}>Einddatum (week)</label>
            <select style={selectStijl} value={filtEind} onChange={e=>setFiltEind(e.target.value)}>
              <option value="">Alle weken</option>
              {weken.map(w=><option key={w.label} value={w.label}>{w.label}</option>)}
            </select>
          </div>
          <div>
            <label style={labelStijl}>Weergave</label>
            <select style={selectStijl} value={filtWaarde} onChange={e=>setFiltWaarde(e.target.value)}>
              <option value="planten">Aantal planten</option>
              <option value="duizend">Aantal / 1000</option>
              <option value="trays">Aantal trays</option>
              <option value="bedrag">Bedrag (€)</option>
            </select>
          </div>
        </div>
      </div>

      {/* Matrix tabel */}
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
        <div style={{display:"flex",gap:2,background:"#f0f0f0",borderRadius:6,padding:2}}>
          {[["week","Per week"],["periode","Per periode"],["totaal","Totaal"]].map(([v,l])=>(
            <button key={v} onClick={()=>setWeergaveModus(v)}
              style={{padding:"3px 12px",border:"none",borderRadius:4,cursor:"pointer",fontSize:12,
                background:weergaveModus===v?groen:"transparent",
                color:weergaveModus===v?wit:subtekst,fontWeight:weergaveModus===v?700:400}}>
              {l}
            </button>
          ))}
        </div>
      </div>

      {wekenInRange.length===0||rijen.length===0 ? (
        <div style={{textAlign:"center",color:subtekst,padding:40}}>
          <div style={{fontSize:32,marginBottom:8}}>📊</div>
          <div>Geen orders gevonden voor deze selectie</div>
        </div>
      ):(
        <div style={{overflowX:"auto"}}>
          <table style={{minWidth:500}}>
            <thead>
              <tr>
                {[["Klant","left",100],["Teelt","left",80],["Soort","left",100],["Fust","left",70]].map(([h,ta,mw])=>{
                  const sorteerbaar = h!=="Fust";
                  const actief = matrixSort?.kolom===h;
                  return <th key={h} onClick={sorteerbaar?()=>klikMatrixKolom(h):undefined}
                    style={{...mTH,textAlign:ta,minWidth:mw,cursor:sorteerbaar?"pointer":"default",userSelect:"none"}}>
                    {h}{sorteerbaar&&<span style={{marginLeft:3,color:actief?"#1a4731":"#6aaa88",fontWeight:actief?700:400}}>{actief?(matrixSort.dir===1?"↑":"↓"):"⇅"}</span>}
                  </th>;
                })}
                {toonWeken && wekenInRange.map(w=><th key={w.label} style={{...mTH,textAlign:"right",minWidth:70}}>{w.label}</th>)}
                {toonPeriode && periodes.map(p=><th key={p.label} style={{...mTH,textAlign:"right",minWidth:90,fontSize:10}}>{p.label}</th>)}
                <th onClick={()=>klikMatrixKolom("Totaal")} style={{...mTH,textAlign:"right",minWidth:70,color:"#1b1b1b",cursor:"pointer",userSelect:"none"}}>
                  Totaal ({eenheid}){matrixSort?.kolom==="Totaal"&&<span style={{marginLeft:3,color:"#1a4731",fontWeight:700}}>{matrixSort.dir===1?"↑":"↓"}</span>}
                  {matrixSort?.kolom!=="Totaal"&&<span style={{marginLeft:3,color:"#6aaa88"}}>⇅</span>}
                </th>
              </tr>
            </thead>
            <tbody>
              {gesorteerdeKlanten.map(([kid,kdata])=>(
                kdata.rijen.map((r,ri)=>(
                  <tr key={kid+r.gewas+r.soort+r.verpakking} style={{background:ri%2===0?wit:"#f0f7f4"}}>
                    {ri===0
                      ? <td style={{...mTDL,fontWeight:700,verticalAlign:"top",paddingTop:8,borderRight:`2px solid ${lichtGroen}`}} rowSpan={kdata.rijen.length}>
                          {kdata.naam}
                        </td>
                      : null
                    }
                    <td style={{...mTDL,fontWeight:600,fontSize:12}}>{r.gewas}</td>
                    <td style={{...mTDL,fontSize:12,color:subtekst}}>{r.soort}</td>
                    <td style={{...mTDL,fontSize:11}}><span style={gs.badge}>{r.verpakking}</span></td>
                    {toonWeken && wekenInRange.map(w=>(
                      <td key={w.label} style={mTD}>{formatWaarde(r.weken[w.label]||0)}</td>
                    ))}
                    {toonPeriode && periodes.map(p=>(
                      <td key={p.label} style={mTD}>{formatWaarde(p.weken.reduce((s,wk)=>s+(r.weken[wk]||0),0))}</td>
                    ))}
                    <td style={{...mTD,fontWeight:700,color:groen}}>{formatWaarde(rijTotaal(r))}</td>
                  </tr>
                ))
              ))}
              {/* Totaalrij */}
              <tr style={{background:"#dff0e8",fontWeight:700}}>
                <td style={{...mTDL,fontWeight:700}} colSpan={4}>Totaal per week</td>
                {toonWeken && wekenInRange.map(w=>(
                  <td key={w.label} style={{...mTD,fontWeight:700,color:groen}}>{formatWaarde(weekTotaal(w.label))}</td>
                ))}
                {toonPeriode && periodes.map(p=>(
                  <td key={p.label} style={{...mTD,fontWeight:700,color:groen}}>{formatWaarde(p.weken.reduce((s,wk)=>s+weekTotaal(wk),0))}</td>
                ))}
                <td style={{...mTD,fontWeight:700,color:groen}}>{formatWaarde(grootTotaal())}</td>
              </tr>
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}


</script>
<script type="text/babel" data-presets="react">


function Orders({ klanten, gewassen, setGewassen, prijzen, orders, setOrders, verpDef, bedrijf }) {
  const WEKEN = weekOpties();
  const verpNamen = verpDef.map(v=>v.naam);
  const afleverFusten = verpDef.filter(v=>!v.naam.toLowerCase().includes("zaai"));
  const afleverNamen = afleverFusten.map(v=>v.naam);
  const defWeek = WEKEN.find(w=>w.label===`${String(getJaar(new Date())).slice(-2)}${String(getWeekNr(new Date())+10).padStart(2,"0")}`)||WEKEN[10]||WEKEN[4];

  const maakLeeg=()=>({id:null,klantId:klanten[0]?.id||0,leverdatum:defWeek.datum,status:"reservering",notitie:"",regels:[],aanmaakdatum:new Date().toISOString().split("T")[0]});
  function maakLegeRegel(klantId) {
    const kl = klanten.find(k=>k.id===Number(klantId));
    const gwas = kl?.voorkeurTeelt || gewassen[0]?.naam || "";
    const gw = gewassen.find(g=>g.naam===gwas);
    const soort = gw?.soorten[0]||"";
    // Gebruik altijd Tray 65 als standaard (eerste afleverFust)
    const voorkeur = kl?.voorkeurVerpakking;
    // Gebruik voorkeur alleen als het een afleverFust is (geen zaaitray, geen 264/180)
    const isAfleverfust = voorkeur && !voorkeur.toLowerCase().includes("zaai") && voorkeur!=="Tray 264" && voorkeur!=="Tray 180";
    const verpakking = (isAfleverfust ? voorkeur : null) || "Tray 65";
    return {gewas:gwas,soort,verpakking,aantal:0,prijs:""};
  }
  const legeRegel = maakLegeRegel(klanten[0]?.id||0);

  const [form,setForm]=useState(false); const [data,setData]=useState(maakLeeg());
  const [gewijzigd,setGewijzigd]=useState(false);
  const [wijzigingPopup,setWijzigingPopup]=useState(null); // {wijzigingen, doorgaan}

  // Bijwerken van data/ges als seizoensGemaild gezet wordt
  useEffect(()=>{
    function handler(e){
      const {klantId, nu} = e.detail;
      setData(prev=>{
        if(prev&&String(prev.klantId)===String(klantId)&&prev.status!=="geleverd")
          return {...prev, seizoensGemaild: nu};
        return prev;
      });
      setGes(prev=>{
        if(prev&&String(prev.klantId)===String(klantId)&&prev.status!=="geleverd")
          return {...prev, seizoensGemaild: nu};
        return prev;
      });
    }
    window.addEventListener("seizoensGemaild", handler);
    return ()=>window.removeEventListener("seizoensGemaild", handler);
  },[]);
  const [regel,setRegel]=useState({...legeRegel}); const [ges,setGes]=useState(null);
  const [delId,setDelId]=useState(null); const [filtS,setFiltS]=useState(""); const [filtK,setFiltK]=useState(0);
  const [klantZoek,setKlantZoek]=useState(""); const [klantZoekOpen,setKlantZoekOpen]=useState(false); const refKlantZoek=React.useRef(); const refKlantLijst=React.useRef();
  const letterCycleRef=React.useRef({letter:"",idx:0});
  const [kopO,setKopO]=useState(null); const [kopODat,setKopODat]=useState(defWeek.datum);
  const [kopR,setKopR]=useState(null); const [kopRDoel,setKopRDoel]=useState("");
  const [kopRKlant,setKopRKlant]=useState(""); const [kopRWk,setKopRWk]=useState("");
  const [tab,setTab]=useState("lijst");
  const [twk,setTwk]=useState(()=>{const n=new Date();return `${String(getJaar(n)).slice(-2)}${String(getWeekNr(n)+1).padStart(2,"0")}`;});
  const [zoek,setZoek]=useState("");
  const [showMatrix,setShowMatrix]=useState(false);
  const [mailStatus,setMailStatus]=useState("");
  const [mailLog,setMailLog]=useState(()=>{ try{ return JSON.parse(localStorage.getItem('ta_maillog')||'[]'); }catch(e){ return []; } });

  const [alleWkenOpen,setAlleWkenOpen]=useState(null); // null=default, true=alle open, false=alle dicht
  const [regelSort,setRegelSort]=useState(null); // {kolom, dir}
  function klikKolom(h) {
    setRegelSort(prev=>prev?.kolom===h ? (prev.dir===1 ? {kolom:h,dir:-1} : null) : {kolom:h,dir:1});
  }
  const [importModal,setImportModal]=useState(false);
  const [importVoorbeeld,setImportVoorbeeld]=useState(null); // {rijen, fouten, dubbel}
  const [importBezig,setImportBezig]=useState(false);
  const [importStap,setImportStap]=useState("voorvertoning"); // "koppeling" | "voorvertoning"
  const [importKoppelingen,setImportKoppelingen]=useState({}); // {"Teelt||Kleur": "gematchte soort of __nieuw__"}
  const [importRuweRijen,setImportRuweRijen]=useState([]); // ruwe excel rijen voor her-verwerking

  // ── EXCEL IMPORT ──────────────────────────────────────────
  function vindKol(rij, ...zoekTerms) {
    const sleutels = Object.keys(rij);
    for(const term of zoekTerms) {
      const gevonden = sleutels.find(k => k.toLowerCase().includes(term.toLowerCase()));
      if(gevonden) return gevonden;
    }
    return null;
  }

  function normaliseerNaam(s) {
    return String(s||"").toLowerCase()
      .replace(/b\.v\.|bv\b|n\.v\.|nv\b|v\.o\.f\.|vof\b|ltd\b|gmbh\b/g, "")
      .replace(/[.,\-]/g, " ").replace(/\s+/g, " ").trim();
  }

  function vindKlant(klantnaam) {
    const zoekNorm = normaliseerNaam(klantnaam);
    let k = klanten.find(k => k.naam.toLowerCase() === klantnaam.toLowerCase());
    if(!k) k = klanten.find(k => normaliseerNaam(k.naam) === zoekNorm);
    if(!k) k = klanten.find(k => zoekNorm.includes(normaliseerNaam(k.naam)) || normaliseerNaam(k.naam).includes(zoekNorm));
    if(!k) {
      const woorden = zoekNorm.split(" ").filter(w => w.length > 3);
      k = klanten.find(kl => {
        const kNorm = normaliseerNaam(kl.naam);
        return woorden.filter(w => kNorm.includes(w)).length >= Math.max(1, Math.floor(woorden.length * 0.6));
      });
    }
    return k || null;
  }

  function vindFust(fust, aantalFust) {
    const f = fust.toLowerCase();
    if(f.includes("zaail") || f.includes("extra")) {
      return verpDef.find(v => v.aantal===260 || v.naam.includes("260"))?.naam || verpDef[0]?.naam || "";
    }
    // Eerst: zoek op specifiek getal (bijv. "179", "65", "260")
    const getalMatch = f.match(/\d+/);
    if(getalMatch) {
      const getal = parseInt(getalMatch[0]);
      const exactMatch = verpDef.find(v => v.aantal===getal);
      if(exactMatch) return exactMatch.naam;
    }
    // Dan: naam-match
    const naamMatch = verpDef.find(v => v.naam.toLowerCase().includes(f) || f.includes(v.naam.toLowerCase()));
    if(naamMatch) return naamMatch.naam;
    // Fallback: 180
    return verpDef.find(v => v.aantal===180)?.naam || verpDef[0]?.naam || "";
  }

  function verwerkExcel(file) {
    if(!file) return;
    setImportBezig(true);
    setImportStap("koppeling");
    setImportKoppelingen({});
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, {type:"array"});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rijen = XLSX.utils.sheet_to_json(ws, {defval:""});
        if(rijen.length === 0) { alert("Geen rijen gevonden."); setImportBezig(false); return; }

        const eersteRij = rijen[0];
        const kolWeek  = vindKol(eersteRij, "week");
        const kolKlant = vindKol(eersteRij, "klant");
        const kolTeelt = vindKol(eersteRij, "teelt", "gewas");
        const kolKleur = vindKol(eersteRij, "kleur", "soort");
        const kolFust  = vindKol(eersteRij, "eindstadium", "fust", "verpakking", "tray");
        const kolAantal= vindKol(eersteRij, "aantal best", "aantal", "bestelling");
        const kolFusten= vindKol(eersteRij, "aantal fust", "fusten");
        const kolPrijs = vindKol(eersteRij, "prijs");

        // Sla ruwe rijen + kolomnamen op voor later
        setImportRuweRijen(rijen.map(r => ({
          weekRaw:  String(r[kolWeek]||"").trim(),
          klantnaam:String(r[kolKlant]||"").trim(),
          teelt:    String(r[kolTeelt]||"").trim(),
          kleur:    String(r[kolKleur]||"").trim(),
          fust:     String(r[kolFust]||"").trim(),
          aantal:   Number(r[kolAantal]||0),
          aantalFust: Number(r[kolFusten]||0),
          prijs:    Number(r[kolPrijs]||0),
        })));

        // Verzamel unieke teelt+kleur combinaties die NIET matchen in de app
        const onbekend = {};
        rijen.forEach(rij => {
          const teelt = String(rij[kolTeelt]||"").trim();
          const kleur = String(rij[kolKleur]||"").trim();
          if(!teelt || !kleur) return;
          const key = teelt + "||" + kleur;
          if(onbekend[key]) return;
          // Kijk of gewas+soort exact bestaat
          const gw = gewassen.find(g => g.naam.toLowerCase() === teelt.toLowerCase());
          const soortBestaat = gw && gw.soorten.some(s => s.toLowerCase() === kleur.toLowerCase());
          if(!soortBestaat) {
            onbekend[key] = { teelt, kleur, gewas: gw || null };
          }
        });

        // Bouw initiële koppelingen: probeer automatisch te matchen op gelijkenis
        const initKoppelingen = {};
        Object.entries(onbekend).forEach(([key, {teelt, kleur, gewas}]) => {
          // Zoek beste soort op basis van gedeelde woorden
          let besteMatch = "";
          if(gewas) {
            const kleurLow = kleur.toLowerCase();
            let besteScore = 0;
            gewas.soorten.forEach(s => {
              const sLow = s.toLowerCase();
              // Tel overeenkomende woorden/substrings
              const woorden = kleurLow.split(/\s+/);
              const score = woorden.filter(w => w.length > 2 && sLow.includes(w)).length;
              if(score > besteScore) { besteScore = score; besteMatch = s; }
            });
          }
          initKoppelingen[key] = besteMatch || "__nieuw__";
        });

        setImportKoppelingen(initKoppelingen);
        setImportBezig(false);

        // Als alles al matched → direct naar voorvertoning
        if(Object.keys(onbekend).length === 0) {
          verwerkMetKoppelingen({}, rijen.map(r => ({
            weekRaw:  String(r[kolWeek]||"").trim(),
            klantnaam:String(r[kolKlant]||"").trim(),
            teelt:    String(r[kolTeelt]||"").trim(),
            kleur:    String(r[kolKleur]||"").trim(),
            fust:     String(r[kolFust]||"").trim(),
            aantal:   Number(r[kolAantal]||0),
            aantalFust: Number(r[kolFusten]||0),
            prijs:    Number(r[kolPrijs]||0),
          })));
          setImportStap("voorvertoning");
        }

      } catch(err) { alert("Fout bij lezen Excel: " + err.message); setImportBezig(false); }
    };
    reader.readAsArrayBuffer(file);
  }

  function verwerkMetKoppelingen(koppelingen, ruweRijen) {
    const orderMap = {};
    const regelFouten = [];
    const dubbel = [];
    // Verzamel nieuwe soorten die toegevoegd moeten worden aan gewassen
    const teVoegen = {}; // {gewasNaam: [soortNaam,...]}

    (ruweRijen || importRuweRijen).forEach((rij, i) => {
      const {weekRaw, klantnaam, teelt, kleur, fust, aantal, aantalFust, prijs} = rij;
      if(!klantnaam || !teelt || !kleur || aantal <= 0) return;

      const klant = vindKlant(klantnaam);
      if(!klant) { regelFouten.push(`Klant '${klantnaam}' niet gevonden`); return; }

      const key = teelt + "||" + kleur;
      const gewasKey = "__gewas__" + key;
      const gebruiktGewas = (koppelingen[gewasKey] || teelt).trim();
      let soortNaam = kleur;
      if(koppelingen[key] !== undefined) {
        if(koppelingen[key] === "__nieuw__") {
          const nieuweNaamKey = "__naam__" + key;
          soortNaam = (koppelingen[nieuweNaamKey] || kleur).trim() || kleur;
          if(!teVoegen[gebruiktGewas]) teVoegen[gebruiktGewas] = [];
          if(!teVoegen[gebruiktGewas].includes(soortNaam)) teVoegen[gebruiktGewas].push(soortNaam);
        } else if(koppelingen[key] === "__overslaan__") {
          return;
        } else {
          soortNaam = koppelingen[key];
        }
      }

      let leverdatum = huidigZaterdag();
      if(weekRaw) {
        const weekNr = parseInt(weekRaw);
        if(weekNr >= 1 && weekNr <= 53) leverdatum = zaterdagVanWeek(new Date().getFullYear(), weekNr);
      }

      const fustNaam = vindFust(fust, aantalFust);
      let regelPrijs = prijs;
      if(!regelPrijs) {
        const p = prijzen.find(x => x.klantId===klant.id && x.gewas===gebruiktGewas && x.soort===soortNaam && x.verpakking===fustNaam);
        if(p) regelPrijs = p.prijs;
      }

      const orderKey = `${klant.id}__${leverdatum}`;
      if(!orderMap[orderKey]) {
        orderMap[orderKey] = { id: Date.now()+Math.random(), klantId:klant.id, leverdatum,
          status:"reservering", notitie:"", regels:[], aanmaakdatum:new Date().toISOString().split("T")[0] };
      }

      const bestaatAl = orders.some(o => o.klantId===klant.id && o.leverdatum===leverdatum &&
        o.regels.some(r => r.gewas===gebruiktGewas && r.soort===soortNaam && r.verpakking===fustNaam));
      if(bestaatAl) dubbel.push(`${klantnaam} wk${weekRaw}: ${soortNaam}`);

      orderMap[orderKey].regels.push({
        id: Date.now()+Math.random(), gewas:gebruiktGewas, soort:soortNaam, verpakking:fustNaam,
        aantal: Math.round(aantal / (verpDef.find(v=>v.naam===fustNaam)?.aantal||1)),
        vastPlanten: Math.round(aantal), prijs:regelPrijs||"",
        datumInvoer: new Date().toISOString().split("T")[0],
      });
    });

    setImportVoorbeeld({ rijen:Object.values(orderMap), fouten:regelFouten, dubbel, teVoegen });
    setImportStap("voorvertoning");
  }

  function bevestigImport(voorbeeld) {
    const vb = voorbeeld || importVoorbeeld;
    if(!vb || !vb.rijen || vb.rijen.length === 0) {
      alert("Geen orders om te importeren. Zie console voor details.");
      return;
    }
    // Voeg eventuele nieuwe soorten toe aan gewassen
    if(vb.teVoegen) {
      setGewassen(prev => prev.map(g => {
        const nieuweSoorten = vb.teVoegen[g.naam] || [];
        const toevoegen = nieuweSoorten.filter(s => !g.soorten.includes(s));
        return toevoegen.length > 0 ? {...g, soorten:[...g.soorten, ...toevoegen]} : g;
      }));
    }
    // Maak unieke ordernummers — bouw lopende lijst op
    const alleOrders = [...orders];
    const nieuw = vb.rijen.map(o => {
      const nr = maakOrderNr(o.klantId, o.leverdatum, alleOrders, null);
      const order = {
        ...o,
        id: Date.now() + Math.random(),
        orderNr: nr,
        regels: o.regels.map(r => ({...r, id: Date.now() + Math.random()})),
      };
      alleOrders.push(order); // zodat volgende order een ander nr krijgt
      return order;
    });
    setOrders(prev => [...prev, ...nieuw]);
    setImportModal(false);
    setImportVoorbeeld(null);
    setImportKoppelingen({});
    setImportRuweRijen([]);
    setTimeout(() => alert(`✅ ${nieuw.length} order(s) geïmporteerd met ${nieuw.reduce((s,o)=>s+o.regels.length,0)} regels.`), 100);
  }
  const nuWkLabel = `${String(getJaar(new Date())).slice(-2)}${String(getWeekNr(new Date())).padStart(2,"0")}`;
  const tot42Label = `${String(getJaar(new Date())).slice(-2)}42`;
  const [filtVanWeek,setFiltVanWeek]=useState(()=>laad("ta_filtVanWeek", nuWkLabel));
  const [filtTotWeek,setFiltTotWeek]=useState(()=>laad("ta_filtTotWeek", tot42Label));
  useEffect(()=>bewaar("ta_filtVanWeek",filtVanWeek),[filtVanWeek]);
  useEffect(()=>bewaar("ta_filtTotWeek",filtTotWeek),[filtTotWeek]);

  function regelSoorten(){return gewassen.find(g=>g.naam===regel.gewas)?.soorten||[];}
  function setRegelV(k,v){
    let r={...regel,[k]:v};
    if(k==="gewas"){const s=gewassen.find(g=>g.naam===v)?.soorten||[];r.soort=s[0]||"";r.verpakking=regel.verpakking||"Tray 65";}
    const p=prijzen.find(x=>x.klantId===Number(data.klantId)&&x.gewas===(k==="gewas"?v:r.gewas)&&x.soort===(k==="soort"?v:r.soort)&&x.verpakking===(k==="verpakking"?v:r.verpakking));
    if(p)r.prijs=p.prijs; setRegel(r);
  }
  function regelAdd(){if(!regel.gewas||!regel.aantal)return;const vandaag=new Date().toISOString().split('T')[0];const nieuweRegels=sorteerRegels([...data.regels,{...regel,id:Date.now(),datumInvoer:regel.datumInvoer||vandaag}]);setData({...data,regels:nieuweRegels});setRegel(maakLegeRegel(data.klantId));setGewijzigd(true);
    if(data.bevestigingNr) setTimeout(()=>alert("⚠️ Let op: deze order is al bevestigd. Vergeet niet de klant opnieuw te informeren na het opslaan."),100);
  }
  function maakOrderNr(klantId, leverdatum, bestaandeOrders, huidigId) {
    const kl = klanten.find(k=>k.id===Number(klantId));
    const code = (kl?.klantcode || kl?.naam?.substring(0,3) || "ORD").toUpperCase();
    const jaar = String(getJaar(leverdatum)).slice(-2);
    const week = String(getWeekNr(leverdatum)).padStart(2,"0");
    const basis = `${code}${jaar}${week}`;
    // Tel hoeveel orders met dezelfde basis al bestaan (excl. huidige)
    const bestaand = bestaandeOrders.filter(o=>o.id!==huidigId&&(o.orderNr===basis||o.orderNr?.startsWith(basis+"_")));
    if(bestaand.length===0) return basis;
    return `${basis}_${bestaand.length+1}`;
  }
  function voerOpslaanUit(opteSlaan, vanPopup){
    const d = opteSlaan || data;
    if(!d.klantId||!d.leverdatum) return;
    if(d.regels.length===0) {
      if(d.id) {
        // Als dit al vanuit de bevestigingspopup komt, direct verwijderen zonder nog een vraag
        if(vanPopup || window.confirm("De order heeft geen regels meer. Order verwijderen?")) {
          verwijder(d.id);
          setForm(false); setGewijzigd(false);
        }
      }
      return;
    }
    if(d.id){setOrders(prev=>prev.map(o=>o.id===d.id?d:o));setGes(d);}
    else{const nr=d.eigenOrderNr?.trim()||maakOrderNr(d.klantId,d.leverdatum,orders,null);const n={...d,id:Date.now(),orderNr:nr};setOrders(prev=>[...prev,n]);setGes(n);}
    setForm(false); setGewijzigd(false);
  }

  function opslaan(){
    if(!data.klantId||!data.leverdatum) return;
    // Vergelijk met originele order als die bestaat
    if(data.id && gewijzigd) {
      const origineel = orders.find(o=>o.id===data.id);
      if(origineel) {
        const wijzigingen = [];
        // Vergelijk regels
        data.regels.forEach(nr=>{
          const or = origineel.regels.find(r=>r.id===nr.id);
          if(!or) {
            wijzigingen.push({type:"nieuw", omschrijving:`Nieuw: ${nr.gewas} — ${nr.soort} (${nr.verpakking}, ${nr.aantal} trays)`});
          } else {
            if(or.gewas!==nr.gewas)      wijzigingen.push({type:"gewijzigd", veld:"Gewas",    oud:or.gewas,    nieuw:nr.gewas,    soort:or.soort});
            if(or.soort!==nr.soort)      wijzigingen.push({type:"gewijzigd", veld:"Soort",    oud:or.soort,    nieuw:nr.soort,    soort:or.soort});
            if(or.verpakking!==nr.verpakking) wijzigingen.push({type:"gewijzigd", veld:"Fust", oud:or.verpakking, nieuw:nr.verpakking, soort:or.soort});
            if(String(or.aantal)!==String(nr.aantal)) wijzigingen.push({type:"gewijzigd", veld:"Trays", oud:or.aantal, nieuw:nr.aantal, soort:or.soort});
            if(String(or.prijs)!==String(nr.prijs))   wijzigingen.push({type:"gewijzigd", veld:"Prijs", oud:or.prijs,  nieuw:nr.prijs,  soort:or.soort});
          }
        });
        origineel.regels.forEach(or=>{
          if(!data.regels.find(nr=>nr.id===or.id)) {
            wijzigingen.push({type:"verwijderd", omschrijving:`Verwijderd: ${or.gewas} — ${or.soort}`});
          }
        });
        if(wijzigingen.length > 0) {
          const dataSnapshot = {...data, regels:[...data.regels]};
          setWijzigingPopup({wijzigingen, doorgaan: ()=>voerOpslaanUit(dataSnapshot, true)});
          return;
        }
      }
    }
    voerOpslaanUit();
  }

        document.body.appendChild(div);

        document.body.removeChild(div);

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({orientation:'landscape', unit:'mm', format:'a4'});
        const imgData = canvas.toDataURL('image/jpeg', 0.85);
        const pdfW = pdf.internal.pageSize.getWidth();
        const pdfH = (canvas.height * pdfW) / canvas.width;

        // Splits over meerdere pagina's als nodig
        const pageH = pdf.internal.pageSize.getHeight();
        let y = 0;

                    {fouten.length>0&&(
                      <div style={{background:"#fee2e2",border:"1px solid #fca5a5",borderRadius:8,padding:"8px 14px",minWidth:100}}>
                        <div style={{fontSize:11,color:"#dc2626"}}>Niet gevonden</div>
                        <div style={{fontSize:20,fontWeight:700,color:"#dc2626"}}>{fouten.length}</div>
                      </div>
                    )}
                  </div>

                  {/* Nieuwe soorten */}
                  {nieuwesoorten.length>0&&(
                    <div style={{background:"#f0fff4",border:`1px solid ${lichtGroen}`,borderRadius:6,padding:10,marginBottom:10}}>
                      <div style={{fontWeight:700,fontSize:12,color:groen,marginBottom:4}}>➕ Nieuwe soorten worden toegevoegd</div>
                      {nieuwesoorten.map((s,i)=><div key={i} style={{fontSize:11,color:groen}}>• {s}</div>)}
                    </div>
                  )}

                  {fouten.length>0&&(
                    <div style={{background:"#fff8f8",border:"1px solid #fca5a5",borderRadius:6,padding:10,marginBottom:10}}>
                      <div style={{fontWeight:700,fontSize:12,color:"#dc2626",marginBottom:4}}>⚠️ Niet geïmporteerd</div>
                      {fouten.map((f,i)=><div key={i} style={{fontSize:11,color:"#dc2626"}}>• {f}</div>)}

                  {dubbel.length>0&&(

                  {/* Tabel */}
                  {rijen.length>0&&(
                    <div style={{maxHeight:260,overflowY:"auto",border:`1px solid ${rand}`,borderRadius:6,marginBottom:14}}>

  );
}

// MODULE — TEELTDUUR (instelbaar per gewas+soort+fust)
// ════════════════════════════════════════════════════════
function TeeltduurInput({ waarde, onSave, stijl }) {
  const [val, setVal] = useState(waarde??'');
  useEffect(()=>setVal(waarde??''), [waarde]);
  return (
    <input style={{...stijl, background:val!==''?"#f0fff8":"#fff", textAlign:"right"}}
      type="number" min="0" max="52" step="1" placeholder="—"
      value={val}
      onFocus={e=>e.target.select()}
      onChange={e=>setVal(e.target.value)}
      onBlur={e=>onSave(e.target.value)}
      onKeyDown={e=>{if(e.key==="Enter"||e.key==="Tab") e.target.blur();}}
    />
  );
}

function Teeltduur({ gewassen, verpDef, teeltduur, setTeeltduur }) {
  const [ontgrendeld, setOntgrendeld] = React.useState(false);
  const [openGewas, setOpenGewas] = useState(()=>
    Object.fromEntries((gewassen||[]).map(g=>["open_"+g.naam, false]))
  );

  function getDuur(gewas, soort, fust, veld) {
    return teeltduur.find(t=>t.gewas===gewas&&t.soort===soort&&t.fust===fust)?.[veld]??'';
  }

  function setDuur(gewas, soort, fust, veld, waarde) {
    const id = ('t_'+gewas+'_'+soort+'_'+fust).replace(/[\/]/g,'_').trim();
    setTeeltduur(huidig => {
      const v = waarde===''||waarde===null ? null : Number(waarde);
      // Zoek op id OF op gewas+soort+fust combinatie (legacy records)
      const idx = huidig.findIndex(t=>t.id===id||
        (t.gewas===gewas&&t.soort===soort&&t.fust===fust));
      if(idx>=0) {
        const bijgewerkt = {...huidig[idx], id, [veld]:v};
        if(bijgewerkt.uitzaai===null&&bijgewerkt.inboet===null)
          return huidig.filter((_,i)=>i!==idx);
        return huidig.map((t,i)=>i===idx?bijgewerkt:t);
      }
      if(v===null) return huidig;
      return [...huidig, {id, gewas, soort, fust, uitzaai:veld==="uitzaai"?v:null, inboet:veld==="inboet"?v:null}];
    });
  }

  function vulGewas(gewas, soorten, veld, waarde) {
    if(waarde==='') return;
    setTeeltduur(huidig => {
      const nieuw = [...huidig];
      soorten.forEach(s => {
        verpDef.forEach(v => {
          const id = ('t_'+gewas+'_'+s+'_'+v.naam).replace(/[\/]/g,'_').trim();
          const idx = nieuw.findIndex(t=>t.id===id||(t.gewas===gewas&&t.soort===s&&t.fust===v.naam));
          if(idx>=0) nieuw[idx] = {...nieuw[idx], id, [veld]:Number(waarde)};
          else nieuw.push({id, gewas, soort:s, fust:v.naam, uitzaai:veld==="uitzaai"?Number(waarde):null, inboet:veld==="inboet"?Number(waarde):null});
        });
      });
      return nieuw;
    });
  }

  const iS = {padding:"2px 4px", border:`1px solid ${rand}`, borderRadius:3, fontSize:12, width:45};
  const mTH = {...TH, padding:"4px 8px", background:"#dff0e8", color:groen, fontSize:11};
  const mTD = {padding:"3px 6px", fontSize:12, borderBottom:`1px solid ${rand}`};

  return (
    <div style={{display:"flex", height:"calc(100vh - 50px)", position:"relative"}}>
      {!ontgrendeld&&<BeveiligingsOverlay onOntgrendel={()=>setOntgrendeld(true)} label="Teeltduur" />}
      {/* Info */}
      <div style={{width:180, borderRight:`1px solid ${rand}`, background:wit, padding:14, flexShrink:0}}>
        <div style={{fontSize:11, fontWeight:700, color:groen, marginBottom:8, textTransform:"uppercase", letterSpacing:1}}>Teeltduur</div>
        <div style={{fontSize:11, color:subtekst, lineHeight:1.7}}>
          Weken vóór levering:<br/>
          <strong style={{color:"#1d4ed8"}}>Uitzaai</strong> = start teelt<br/>
          <strong style={{color:"#0891b2"}}>Inboet</strong> = aanvullen<br/><br/>
          Bijv. levering week 25:<br/>
          Uitzaai 9 → week 16<br/>
          Inboet 2 → week 23
        </div>
        <div style={{marginTop:12, fontSize:11, color:subtekst}}>
          {teeltduur.length} combinaties ingesteld
        </div>
      </div>

      {/* Matrix */}
      <div style={{flex:1, overflowY:"auto", padding:14}}>
        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
          <button style={{...gs.knopSecundair,fontSize:11,padding:"3px 10px"}} onClick={()=>{
            const alleOpenT = gewassen.every(g=>openGewas["open_"+g.naam]===true);
            const nieuw={};
            gewassen.forEach(g=>nieuw["open_"+g.naam]=!alleOpenT);
            setOpenGewas(nieuw);
          }}>
            {gewassen.every(g=>openGewas["open_"+g.naam]===true)?"▲ Inklappen":"▼ Uitklappen"}
          </button>
        </div>
        {gewassen.map(gw => {
          const openKey = "open_"+gw.naam;
          const isOpen = openGewas[openKey] === true;
          const ingevuld = teeltduur.filter(t=>t.gewas===gw.naam).length;
          const totCombi = gw.soorten.length * verpDef.length;

          return (
            <div key={gw.naam} style={{background:wit, border:`1px solid ${rand}`, borderRadius:6, marginBottom:6, overflow:"hidden"}}>
              {/* Header */}
              <div style={{display:"flex", alignItems:"center", gap:8, padding:"5px 10px",
                background:"#f0f7f4", borderBottom:isOpen?`1px solid ${rand}`:"none", cursor:"pointer"}}
                onClick={()=>setOpenGewas({...openGewas, [openKey]:!isOpen})}>
                <span style={{fontSize:12, color:groen}}>{isOpen?"▼":"▶"}</span>
                <span style={{fontWeight:700, fontSize:14, color:groen, flex:1}}>{gw.naam}</span>
                <span style={{fontSize:10, color:subtekst}}>{ingevuld}/{totCombi} ingesteld</span>
                <button style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:4,padding:"2px 6px",cursor:"pointer",fontSize:10}}
                  onClick={e=>{e.stopPropagation();if(window.confirm("Alle teeltduur van "+gw.naam+" wissen?"))
                    setTeeltduur(t=>t.filter(x=>x.gewas!==gw.naam));}}>🗑️</button>
              </div>

              {isOpen && (
                <table style={{width:"auto", tableLayout:"fixed"}}>
                  <colgroup>
                    <col style={{width:180}}/>
                    {verpDef.map(v=><col key={v.naam} style={{width:55}}/>)}
                    {verpDef.map(v=><col key={v.naam+"i"} style={{width:55}}/>)}
                  </colgroup>
                  <thead>
                    <tr>
                      <th style={{...mTH, textAlign:"left"}} rowSpan={2}>Soort</th>
                      <th style={{...mTH, textAlign:"center", color:"#1d4ed8", background:"#dbeafe"}} colSpan={verpDef.length}>Uitzaai (weken vóór)</th>
                      <th style={{...mTH, textAlign:"center", color:"#0891b2", background:"#cffafe"}} colSpan={verpDef.length}>Inboet (weken vóór)</th>
                    </tr>
                    <tr>
                      {verpDef.map(v=><th key={v.naam} style={{...mTH, textAlign:"right", fontSize:10, background:"#dbeafe", color:"#1d4ed8"}}>{v.naam}</th>)}
                      {verpDef.map(v=><th key={v.naam+"i"} style={{...mTH, textAlign:"right", fontSize:10, background:"#cffafe", color:"#0891b2"}}>{v.naam}</th>)}
                    </tr>
                    {/* Bulk invulrij — per kolom */}
                    <tr style={{background:"#f0f9ff"}}>
                      <td style={{...mTD,fontSize:10,color:subtekst,fontStyle:"italic",padding:"2px 6px"}}>Alle soorten:</td>
                      {verpDef.map(v=>(
                        <td key={v.naam} style={{...mTD,padding:"2px 3px",background:"#dbeafe"}}>
                          <input style={{...iS,width:42,textAlign:"right",background:"#bfdbfe"}} type="number" min="0" max="52" placeholder="—"
                            onBlur={e=>{if(e.target.value){
                              setTeeltduur(huidig=>{
                                const nieuw=[...huidig];
                                gw.soorten.forEach(s=>{
                                  const id=('t_'+gw.naam+'_'+s+'_'+v.naam).replace(/[\/]/g,'_').trim();
                                  const idx=nieuw.findIndex(t=>t.id===id);
                                  if(idx>=0) nieuw[idx]={...nieuw[idx],uitzaai:Number(e.target.value)};
                                  else nieuw.push({id,gewas:gw.naam,soort:s,fust:v.naam,uitzaai:Number(e.target.value),inboet:null});
                                });
                                return nieuw;
                              });
                              e.target.value='';
                            }}}
                          />
                        </td>
                      ))}
                      {verpDef.map(v=>(
                        <td key={v.naam+"i"} style={{...mTD,padding:"2px 3px",background:"#cffafe"}}>
                          <input style={{...iS,width:42,textAlign:"right",background:"#a5f3fc"}} type="number" min="0" max="52" placeholder="—"
                            onBlur={e=>{if(e.target.value){
                              setTeeltduur(huidig=>{
                                const nieuw=[...huidig];
                                gw.soorten.forEach(s=>{
                                  const id=('t_'+gw.naam+'_'+s+'_'+v.naam).replace(/[\/]/g,'_').trim();
                                  const idx=nieuw.findIndex(t=>t.id===id);
                                  if(idx>=0) nieuw[idx]={...nieuw[idx],inboet:Number(e.target.value)};
                                  else nieuw.push({id,gewas:gw.naam,soort:s,fust:v.naam,uitzaai:null,inboet:Number(e.target.value)});
                                });
                                return nieuw;
                              });
                              e.target.value='';
                            }}}
                          />
                        </td>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {gw.soorten.map((s, si) => (
                      <tr key={s} style={{background:si%2===0?wit:"#f0f7f4"}}>
                        <td style={{...mTD}}>{s}</td>
                        {verpDef.map(v => (
                          <td key={v.naam} style={{...mTD, textAlign:"right", padding:"2px 4px"}}>
                            <TeeltduurInput waarde={getDuur(gw.naam,s,v.naam,"uitzaai")} style={iS}
                              onSave={val=>setDuur(gw.naam,s,v.naam,"uitzaai",val)} />
                          </td>
                        ))}
                        {verpDef.map(v => (
                          <td key={v.naam+"i"} style={{...mTD, textAlign:"right", padding:"2px 4px"}}>
                            <TeeltduurInput waarde={getDuur(gw.naam,s,v.naam,"inboet")} style={iS}
                              onSave={val=>setDuur(gw.naam,s,v.naam,"inboet",val)} />
                          </td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}
