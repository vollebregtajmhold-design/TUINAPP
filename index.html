function getWeekNr(datum) {
  const d = new Date(datum);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - (d.getDay()+6)%7);
  const week1 = new Date(d.getFullYear(),0,4);
  return 1 + Math.round(((d-week1)/86400000 - 3 + (week1.getDay()+6)%7)/7);
}
function getJaar(datum) { return new Date(datum).getFullYear(); }
function weekLabel(datum) {
  return `${String(getJaar(datum)).slice(-2)}${String(getWeekNr(datum)).padStart(2,"0")}`;
}
function zaterdagVanWeek(jaar, week) {
  const jan4 = new Date(jaar, 0, 4);
  const startWeek1 = new Date(jan4);
  startWeek1.setDate(jan4.getDate() - (jan4.getDay()+6)%7);
  const maandag = new Date(startWeek1);
  maandag.setDate(startWeek1.getDate() + (week-1)*7);
  const zaterdag = new Date(maandag);
  zaterdag.setDate(maandag.getDate() + 5);
  return zaterdag.toISOString().split("T")[0];
}
function huidigZaterdag() {
  const nu = new Date();
  return zaterdagVanWeek(getJaar(nu), getWeekNr(nu));
}
function weekOpties() {
  const opties = [];
  const nu = new Date();
  for (let i = -4; i <= 26; i++) {
    const d = new Date(nu);
    d.setDate(d.getDate() + i*7);
    const jaar = getJaar(d);
    const week = getWeekNr(d);
    const zat = zaterdagVanWeek(jaar, week);
    opties.push({ label:`${String(jaar).slice(-2)}${String(week).padStart(2,"0")}`, datum:zat });
  }
  const seen = new Set();
  return opties.filter(o => { if(seen.has(o.label)) return false; seen.add(o.label); return true; });
}

// ─── FIREBASE SYNC ──────────────────────────────────────
async function fbSaveAll(col, items) {
  if(!window._db || !window._firebase) return;
  const { collection: fbCol, doc, setDoc, getDocs, deleteDoc } = window._firebase;
  const db = window._db;
  try {
    const snap = await getDocs(fbCol(db, col));
    for(const d of snap.docs) await deleteDoc(doc(db, col, d.id));
    for(const item of items) {
      const id = String(item.id || item.naam || Date.now());
      await setDoc(doc(db, col, id), { json: JSON.stringify(item) });
    }
  } catch(e) { console.error("Firebase save fout:", e); }
}
async function fbLoadAll(col) {
  if(!window._db || !window._firebase) return null;
  try {
    const { collection: fbCol, getDocs } = window._firebase;
    const snap = await getDocs(fbCol(window._db, col));
    if(snap.empty) return null;
    return snap.docs.map(d => JSON.parse(d.data().json));
  } catch(e) { console.error("Firebase load fout:", e); return null; }
}

                  <div key={i} style={{display:"flex",alignItems:"center",gap:5,background:lichtGroen,color:groen,borderRadius:20,padding:"4px 10px",fontSize:12,fontWeight:600}}>
                    {s}<button style={{background:"none",border:"none",cursor:"pointer",color:groen,fontSize:11,padding:0}} onClick={()=>setDelS({id:ges.id,soort:s})}>✕</button>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:8}}>
                <input style={{...gs.input,flex:1}} placeholder="Nieuwe soort..." value={si} onChange={e=>setSi(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sAdd(ges.id)} />
                <button style={gs.knopPrimair} onClick={()=>sAdd(ges.id)}>+ Toevoegen</button>
              </div>
            </div>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:subtekst,gap:10}}>
            <div style={{fontSize:40}}>🌿</div><div>Selecteer een gewas of maak een nieuwe aan</div>
          </div>
        )}
      </div>
      {gwF&&(<div style={gs.overlay}><div style={{...gs.modal,width:300,textAlign:"center"}}>
        <div style={{fontSize:24,marginBottom:10}}>🌱</div>
        <div style={gs.modalTitel}>{bew?"Gewas bewerken":"Nieuw gewas"}</div>
        <input style={{...gs.input,marginBottom:12}} placeholder="Naam gewas" value={gwN} autoFocus onChange={e=>setGwN(e.target.value)} onKeyDown={e=>e.key==="Enter"&&gwSave()} />
        <div style={{display:"flex",gap:8,justifyContent:"center"}}>
          <button style={gs.knopPrimair} onClick={gwSave}>💾 Opslaan</button>
          <button style={gs.knopSecundair} onClick={()=>{setGwF(false);setBew(null);setGwN("");}}>Annuleren</button>
        </div>
      </div></div>)}
      {delGw&&<BevestigModal tekst="Gewas verwijderen?" onJa={()=>gwDel(delGw)} onNee={()=>setDelGw(null)} />}
      {delS&&<BevestigModal tekst={`Soort "${delS.soort}" verwijderen?`} onJa={()=>sDel(delS.id,delS.soort)} onNee={()=>setDelS(null)} />}
    </div>
  );
}

// ════════════════════════════════════════════════════════
// MODULE 3 — PRIJZEN
// ════════════════════════════════════════════════════════
function Prijzen({ klanten, gewassen, prijzen, setPrijzen, verpDef }) {
  const verpNamen = verpDef.map(v=>v.naam);
  const maakLeeg = ()=>({id:null,klantId:klanten[0]?.id||0,gewas:gewassen[0]?.naam||"",soort:gewassen[0]?.soorten[0]||"",verpakking:verpNamen[0],prijs:""});
  const [form,setForm]=useState(false); const [data,setData]=useState(maakLeeg());
  const [delId,setDelId]=useState(null); const [kop,setKop]=useState(null);
  const [kKlant,setKKlant]=useState(0); const [kGewas,setKGewas]=useState(""); const [kSoort,setKSoort]=useState("");
  const [filtK,setFiltK]=useState(0); const [filtG,setFiltG]=useState("");

  const soorten=gewassen.find(g=>g.naam===data.gewas)?.soorten||[];
  const kSoorten=gewassen.find(g=>g.naam===kGewas)?.soorten||[];

  function setV(k,v){if(k==="gewas"){const s=gewassen.find(g=>g.naam===v)?.soorten||[];setData({...data,gewas:v,soort:s[0]||""});}else setData({...data,[k]:v});}
  function opslaan(){if(!data.klantId||!data.gewas||data.prijs==="")return;const r={...data,klantId:Number(data.klantId),prijs:parseFloat(data.prijs)};if(r.id)setPrijzen(prijzen.map(p=>p.id===r.id?r:p));else setPrijzen([...prijzen,{...r,id:Date.now()}]);setForm(false);}
  function verwijder(id){setPrijzen(prijzen.filter(p=>p.id!==id));setDelId(null);}
  function kopUitvoer(){setPrijzen([...prijzen,{...kop,id:Date.now(),klantId:Number(kKlant),gewas:kGewas,soort:kSoort}]);setKop(null);}

  const gefilterd=prijzen.filter(p=>(filtK?p.klantId===Number(filtK):true)&&(filtG?p.gewas===filtG:true));
  const perKlant={};gefilterd.forEach(p=>{if(!perKlant[p.klantId])perKlant[p.klantId]=[];perKlant[p.klantId].push(p);});

  return (
    <div style={{padding:16,overflowY:"auto",height:"calc(100vh - 50px)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <select style={{padding:"5px 8px",border:`1px solid ${rand}`,borderRadius:6,background:wit}} value={filtK} onChange={e=>setFiltK(e.target.value)}>
            <option value={0}>Alle klanten</option>{klanten.map(k=><option key={k.id} value={k.id}>{k.naam}</option>)}
          </select>
          <select style={{padding:"5px 8px",border:`1px solid ${rand}`,borderRadius:6,background:wit}} value={filtG} onChange={e=>setFiltG(e.target.value)}>
            <option value="">Alle gewassen</option>{gewassen.map(g=><option key={g.naam}>{g.naam}</option>)}
          </select>
          <span style={{color:subtekst,fontSize:12}}>{gefilterd.length} regel(s)</span>
        </div>
        <button style={gs.knopPrimair} onClick={()=>{setData(maakLeeg());setForm(true);}}>+ Nieuwe prijs</button>
      </div>
      {Object.keys(perKlant).length===0&&<div style={{textAlign:"center",color:subtekst,padding:40}}>Geen prijzen gevonden</div>}
      {Object.entries(perKlant).map(([klantId,regels])=>{
        const kl=klanten.find(k=>k.id===Number(klantId));
        return (
          <div key={klantId} style={{background:wit,border:`1px solid ${rand}`,borderRadius:8,marginBottom:12,overflow:"hidden"}}>
            <div style={{padding:"7px 12px",fontWeight:700,borderBottom:`1px solid ${rand}`,background:achtergrond}}>👤 {kl?.naam||"?"}</div>
            <table>
              <thead><tr>{["Gewas","Soort","Verpakking","Prijs/stuk",""].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
              <tbody>{regels.map(p=>(
                <tr key={p.id}>
                  <td style={TD}><strong>{p.gewas}</strong></td>
                  <td style={TD}>{p.soort}</td>
                  <td style={TD}><span style={gs.badge}>{p.verpakking}</span></td>
                  <td style={TD}>€ {Number(p.prijs).toFixed(2)}</td>
                  <td style={{...TD,textAlign:"right",whiteSpace:"nowrap"}}>
                    <button style={gs.knopKlein} onClick={()=>{setData({...p});setForm(true);}}>✏️</button>
                    <button style={{...gs.knopKlein,marginLeft:4}} onClick={()=>{setKop(p);setKKlant(klanten[0]?.id||0);setKGewas(p.gewas);setKSoort(p.soort);}}>📋</button>
                    <button style={{...gs.knopVerwijder,marginLeft:4}} onClick={()=>setDelId(p.id)}>🗑️</button>
                  </td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        );
      })}
      {form&&(<div style={gs.overlay}><div style={gs.modal}>
        <div style={gs.modalTitel}>{data.id?"Prijs bewerken":"Nieuwe prijs"}</div>
        <div style={gs.veldGroep}><label style={gs.label}>Klant</label>
          <select style={gs.input} value={data.klantId} onChange={e=>setV("klantId",Number(e.target.value))}>
            {klanten.map(k=><option key={k.id} value={k.id}>{k.naam}</option>)}
          </select></div>
        <div style={{display:"flex",gap:10}}>
          <div style={{...gs.veldGroep,flex:1}}><label style={gs.label}>Gewas</label>
            <select style={gs.input} value={data.gewas} onChange={e=>setV("gewas",e.target.value)}>
              {gewassen.map(g=><option key={g.naam}>{g.naam}</option>)}
            </select></div>
          <div style={{...gs.veldGroep,flex:1}}><label style={gs.label}>Soort</label>
            <select style={gs.input} value={data.soort} onChange={e=>setV("soort",e.target.value)}>
              {soorten.map(s=><option key={s}>{s}</option>)}
            </select></div>
        </div>
        <div style={{display:"flex",gap:10}}>
          <div style={{...gs.veldGroep,flex:1}}><label style={gs.label}>Verpakking</label>
            <select style={gs.input} value={data.verpakking} onChange={e=>setV("verpakking",e.target.value)}>
              {verpNamen.map(v=><option key={v}>{v}</option>)}
            </select></div>
          <div style={{...gs.veldGroep,flex:1}}><label style={gs.label}>Prijs per stuk (€)</label>
            <input style={gs.input} type="number" step="0.01" min="0" placeholder="0.00" value={data.prijs} onChange={e=>setV("prijs",e.target.value)} /></div>
        </div>
        <div style={{display:"flex",gap:8}}><button style={gs.knopPrimair} onClick={opslaan}>💾 Opslaan</button><button style={gs.knopSecundair} onClick={()=>setForm(false)}>Annuleren</button></div>
      </div></div>)}
      {kop&&(<div style={gs.overlay}><div style={gs.modal}>
        <div style={gs.modalTitel}>📋 Prijs kopiëren</div>
        <div style={{color:subtekst,fontSize:12,marginBottom:12}}>Van: <strong>{kop.gewas} {kop.soort} ({kop.verpakking})</strong> — € {Number(kop.prijs).toFixed(2)}</div>
        <div style={gs.veldGroep}><label style={gs.label}>Naar klant</label>
          <select style={gs.input} value={kKlant} onChange={e=>setKKlant(Number(e.target.value))}>
            {klanten.map(k=><option key={k.id} value={k.id}>{k.naam}</option>)}
          </select></div>
        <div style={{display:"flex",gap:10}}>
          <div style={{...gs.veldGroep,flex:1}}><label style={gs.label}>Naar gewas</label>
            <select style={gs.input} value={kGewas} onChange={e=>{const s=gewassen.find(g=>g.naam===e.target.value)?.soorten||[];setKGewas(e.target.value);setKSoort(s[0]||"");}}>
              {gewassen.map(g=><option key={g.naam}>{g.naam}</option>)}
            </select></div>
          <div style={{...gs.veldGroep,flex:1}}><label style={gs.label}>Naar soort</label>
            <select style={gs.input} value={kSoort} onChange={e=>setKSoort(e.target.value)}>
              {kSoorten.map(s=><option key={s}>{s}</option>)}
            </select></div>
        </div>
        <div style={{display:"flex",gap:8}}><button style={gs.knopPrimair} onClick={kopUitvoer}>📋 Kopiëren</button><button style={gs.knopSecundair} onClick={()=>setKop(null)}>Annuleren</button></div>
      </div></div>)}
      {delId&&<BevestigModal tekst="Prijs verwijderen?" onJa={()=>verwijder(delId)} onNee={()=>setDelId(null)} />}
    </div>
  );
}

// MODULE 4 — ORDERS
// ════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════
// ORDER DETAIL + BEWERKEN — gedeelde compacte layout
// ════════════════════════════════════════════════════════
function RegelRij({ r, verpDef, gewassen, bewerkbaar, status, onVerwijder, onKopie, onUpdate }) {
  const [waarschuwing, setWaarschuwing] = useState(null); // {veld, oud, nieuw, bevestig}
  function updMet(k,v){
    if(onUpdate && (status==="bevestigd"||status==="geleverd")) {
      const oud = r[k];
      if(String(oud)!==String(v)) {
        setWaarschuwing({veld:k,oud,nieuw:v});
        return;
      }
    }
    if(onUpdate) {
      onUpdate({...r,[k]:v});
    }
  }
  const vd = verpDef.find(v=>v.naam===r.verpakking);
  const planten = ((vd?.aantal||0)*r.aantal).toLocaleString();
  function upd(k,v){ if(onUpdate) onUpdate({...r,[k]:v}); }
  // kernvelden krijgen waarschuwing, vrije velden (nummers/datum) altijd direct
  const kernVelden = ["gewas","soort","verpakking","aantal","prijs"];
  const cel  = {padding:"3px 5px",fontSize:12,borderBottom:`1px solid ${rand}`,verticalAlign:"middle"};
  const celR = {...cel,textAlign:"right"};
  // Inline input stijl — past in de cel, geen border als niet-bewerkbaar
  const inp  = (w)=>({padding:"2px 4px",border:`1px solid ${rand}`,borderRadius:3,fontSize:12,width:w,background:"#fafffe"});
  const soorten = gewassen?.find(g=>g.naam===r.gewas)?.soorten||[];
  const veldLabel = {"gewas":"Gewas","soort":"Soort","verpakking":"Verpakking","aantal":"Trays","prijs":"Prijs"};
  return (
    <>
    {waarschuwing&&(
      <tr><td colSpan={10} style={{padding:0}}>
        <div style={{background:"#fff8e1",border:"1px solid #f59e0b",borderRadius:4,padding:"6px 10px",margin:"2px 0",fontSize:11,display:"flex",gap:10,alignItems:"center"}}>
          <span>{waarschuwing.veld==="__verwijder__" ? <>⚠️ <strong>Regel verwijderen?</strong> <em>{waarschuwing.oud}</em></> : <>⚠️ <strong>Let op:</strong> order is al <em>{status}</em>. Wijzig <strong>{veldLabel[waarschuwing.veld]||waarschuwing.veld}</strong> van <strong>{String(waarschuwing.oud)||"—"}</strong> naar <strong>{String(waarschuwing.nieuw)}</strong>?</>}</span>
          <button style={{background:groen,color:"#fff",border:"none",borderRadius:3,padding:"2px 8px",cursor:"pointer",fontSize:11}} onClick={()=>{if(waarschuwing.veld==="__verwijder__")onVerwijder();else onUpdate({...r,[waarschuwing.veld]:waarschuwing.nieuw,...(waarschuwing.extraUpdate||{})});setWaarschuwing(null);}}>{waarschuwing.veld==="__verwijder__"?"Ja, verwijderen":"Ja, wijzigen"}</button>
          <button style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:3,padding:"2px 8px",cursor:"pointer",fontSize:11}} onClick={()=>setWaarschuwing(null)}>Annuleren</button>
        </div>
      </td></tr>
    )}
    <tr style={{lineHeight:1.3}} onMouseEnter={e=>e.currentTarget.style.background="#f5fdf8"} onMouseLeave={e=>e.currentTarget.style.background=""}>
      {/* Gewas */}
      <td style={cel}>{bewerkbaar
        ? <select style={inp(90)} value={r.gewas} onChange={e=>{
              const nieuweGewas=e.target.value;
              const g=gewassen?.find(x=>x.naam===nieuweGewas);
              const nieuweSoort=g?.soorten[0]||"";
              if(onUpdate&&(status==="bevestigd"||status==="geleverd")){
                setWaarschuwing({veld:"gewas",oud:r.gewas,nieuw:nieuweGewas,extraUpdate:{soort:nieuweSoort}});
              } else {
                if(onUpdate) onUpdate({...r,gewas:nieuweGewas,soort:nieuweSoort});
              }
            }}>
            {gewassen?.map(g=><option key={g.naam}>{g.naam}</option>)}
          </select>
        : r.gewas}
      </td>
      {/* Soort */}
      <td style={cel}>{bewerkbaar
        ? <select style={inp(110)} value={r.soort} onChange={e=>updMet("soort",e.target.value)}>
            {soorten.map(s=><option key={s}>{s}</option>)}
          </select>
        : r.soort}
      </td>
      {/* Verpakking */}
      <td style={cel}>{bewerkbaar
        ? <select style={inp(65)} value={r.verpakking} onChange={e=>updMet("verpakking",e.target.value)}>
            {verpDef.map(v=><option key={v.naam}>{v.naam}</option>)}
          </select>
        : <span style={{background:lichtGroen,color:groen,borderRadius:20,padding:"1px 6px",fontSize:11,fontWeight:600}}>{r.verpakking}</span>}
      </td>
      {/* Trays */}
      <td style={celR}>{bewerkbaar
        ? <input style={{...inp(50),textAlign:"right"}} type="number" min="1" value={r.aantal} onChange={e=>updMet("aantal",Number(e.target.value))} />
        : r.aantal}
      </td>
      {/* Planten — berekend */}
      <td style={{...celR,fontWeight:600,color:groen}}>{planten}</td>
      {/* €/st */}
      <td style={celR}>{bewerkbaar
        ? <input style={{...inp(55),textAlign:"right",borderColor:r.prijs===""?"#f59e0b":rand}} type="number" step="0.001" min="0" placeholder="—" value={r.prijs} onChange={e=>updMet("prijs",e.target.value)} />
        : (r.prijs!==""?"€"+Number(r.prijs).toFixed(3):<span style={{color:"#f59e0b"}}>—</span>)}
      </td>

      {/* Vast — bevestigd plantenaantal */}
      <td style={{...celR,fontWeight:600}}>
        {bewerkbaar
          ? <input style={{...inp(70),textAlign:"right",background:status==="reservering"?"#f3f4f6":"#fff9e6",borderColor:status==="reservering"?rand:"#f59e0b"}}
              type="number" min="0"
              value={status==="reservering" ? "" : (r.vastPlanten??"")}
              readOnly={status==="reservering"}
              placeholder={status==="reservering" ? ((vd?.aantal||0)*r.aantal).toLocaleString() : "Invullen"}
              title={status==="reservering"?"Wordt pas vast na bevestiging":"Handmatig aan te passen"}
              onChange={e=>status!=="reservering"&&upd("vastPlanten",Number(e.target.value))} />
          : <span style={{color:status==="reservering"?subtekst:tekst}}>
              {status==="reservering" ? <em style={{color:"#bbb"}}>—</em> : (r.vastPlanten??<em style={{color:"#bbb"}}>—</em>)}
            </span>
        }
      </td>

      {/* Factuur */}
      <td style={cel}>{bewerkbaar
        ? <input style={inp(75)} placeholder="Factuur" value={r.factuurNr||""} onChange={e=>upd("factuurNr",e.target.value)} />
        : <span style={{color:r.factuurNr?tekst:"#bbb",fontSize:12}}>{r.factuurNr||"—"}</span>}
      </td>
      {/* Datum */}
      <td style={cel}>{bewerkbaar
        ? <input style={inp(100)} type="date" value={r.datumInvoer||""} onChange={e=>upd("datumInvoer",e.target.value)} />
        : <span style={{color:r.datumInvoer?tekst:"#bbb",fontSize:12}}>{r.datumInvoer||"—"}</span>}
      </td>
      {/* Acties */}
      <td style={{...cel,textAlign:"center",whiteSpace:"nowrap"}}>
        {bewerkbaar
          ? <><button style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:3,padding:"1px 5px",cursor:"pointer",fontSize:11,marginRight:2}} onClick={()=>setWaarschuwing({veld:"__verwijder__",oud:r.gewas+" "+r.soort,nieuw:null})}>✕</button>
             <button style={{background:lichtGroen,color:groen,border:"none",borderRadius:3,padding:"1px 5px",cursor:"pointer",fontSize:11}} onClick={onKopie}>📋</button></>
          : <button style={{background:lichtGroen,color:groen,border:"none",borderRadius:3,padding:"1px 6px",cursor:"pointer",fontSize:11}} onClick={onKopie}>📋</button>
        }
      </td>
    </tr>
    </>
  );
}

        <button title="Bewerken" style={{background:lichtGroen,color:groen,border:"none",borderRadius:4,padding:"2px 7px",cursor:"pointer",fontSize:11,fontWeight:600}} onClick={()=>{setData({...ges});setRegel(legeRegel);setForm(true);setTab("lijst");}}>✏️</button>
        <button title="Kopiëren" style={{background:lichtGroen,color:groen,border:"none",borderRadius:4,padding:"2px 7px",cursor:"pointer",fontSize:11,fontWeight:600}} onClick={()=>{setKopO(ges);}}>📋</button>
        <span style={{fontWeight:700,fontSize:13}}>{ges.orderNr}</span>
        <span style={{color:subtekst,fontSize:11}}>· {kl?.naam} · {weekLabel(ges.leverdatum)} · {ges.aanmaakdatum}{ges.bevestigingNr&&<> · <strong>Bev: {ges.bevestigingNr}</strong></>}{ges.afleverNr&&<> · <strong>Afl: {ges.afleverNr}</strong></>}</span>
        {ges.notitie&&<span style={{color:subtekst,fontSize:11}}>· {ges.notitie}</span>}
        <div style={{marginLeft:"auto",display:"flex",gap:4,alignItems:"center"}}>
          <span style={{fontSize:11,color:subtekst}}>Status:</span>
          {STATUSSEN.map(st=>(
            <button key={st} onClick={()=>setSt(ges,st)}

          <button style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:4,padding:"2px 7px",cursor:"pointer",fontSize:11}} onClick={()=>setDelId(ges.id)}>🗑️</button>
        </div>
      </div>
      {/* REGELSTABEL */}
      <div style={{background:"#fff",border:`1px solid ${rand}`,borderRadius:6,overflow:"hidden"}}>
        <table style={{fontSize:12,width:"100%"}}>
          <thead>
            <tr>
{["Gewas","Soort","Verpakking","Trays","Planten","€/st","Vast","Factuur","Datum",""].map((h,i)=>(
                <th key={h} style={{...TH,padding:"3px 5px",fontSize:11,textAlign:(i>=3&&i<=5)||i===7?"right":"left"}}>{h}</th>
              ))}

              />
            ))}
          </tbody>
          <tfoot>
            <tr style={{background:"#e8f5ee"}}>
              <td style={{padding:"4px 5px",fontSize:11,color:groen,fontWeight:700,borderTop:`2px solid ${groen}`}} colSpan={3}>Totaal</td>
              <td style={{padding:"4px 5px",fontSize:12,color:groen,fontWeight:700,textAlign:"right",borderTop:`2px solid ${groen}`}}>{ges.regels.reduce((s,x)=>s+x.aantal,0)}</td>
              <td style={{padding:"4px 5px",fontSize:12,color:groen,fontWeight:700,textAlign:"right",borderTop:`2px solid ${groen}`}}>{plantenTotaal(ges.regels).toLocaleString()}</td>
              <td colSpan={5} style={{borderTop:`2px solid ${groen}`}}></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  );
}

const STATUSSEN = ["reservering","bevestigd","geleverd"];
const S_KLEUR = {reservering:"#7c3aed",bevestigd:groen,geleverd:subtekst};
const S_BG    = {reservering:"#ede9fe",bevestigd:lichtGroen,geleverd:"#f3f4f6"};
const S_LABEL = {reservering:"Reservering",bevestigd:"Bevestigd",geleverd:"Geleverd"};

// ── MATRIX FILTERPANEEL ─────────────────────────────────
function MatrixFilterPaneel({ klanten, gewassen, orders, verpDef, weken }) {
  const nu = new Date();
  const huidigeWeekLabel = `${String(getJaar(nu)).slice(-2)}${String(getWeekNr(nu)).padStart(2,"0")}`;
  const beginIdx = Math.max(0, weken.findIndex(w=>w.label===huidigeWeekLabel));
  const eindIdx  = Math.min(weken.length-1, beginIdx+7);

  const [filtKlant,   setFiltKlant]    = useState("TOTAAL");
  const [filtGewas,   setFiltGewas]    = useState("TOTAAL");
  const [filtSoort,   setFiltSoort]    = useState("TOTAAL");
  const [filtStatus,  setFiltStatus]   = useState("ORDER");
  const [filtBegin,   setFiltBegin]    = useState(weken[beginIdx]?.label || "");
  const [filtEind,    setFiltEind]     = useState(weken[eindIdx]?.label  || "");
  const [filtWaarde,  setFiltWaarde]   = useState("planten");

  const soorten = filtGewas==="TOTAAL"
    ? []
    : (gewassen.find(g=>g.naam===filtGewas)?.soorten||[]);

  function plantenPerRegel(r){
    const v=verpDef.find(x=>x.naam===r.verpakking);
    return (v?.aantal||0)*r.aantal;
  }

  // Filter orders op basis van instellingen
  const gefilterdOrders = orders.filter(o=>{
    if(filtKlant!=="TOTAAL" && o.klantId!==Number(filtKlant)) return false;
    if(filtStatus==="ORDER" && o.status==="geleverd") return false;
    if(filtStatus!=="ORDER" && filtStatus!=="TOTAAL" && o.status!==filtStatus) return false;
    const wk=weekLabel(o.leverdatum);
    if(filtBegin && wk<filtBegin) return false;
    if(filtEind  && wk>filtEind)  return false;
    return true;
  });

  // Alle weken in range
  const wekenInRange = weken.filter(w=>{
    if(filtBegin && w.label<filtBegin) return false;
    if(filtEind  && w.label>filtEind)  return false;
    return true;
  });

  // Bouw matrixdata
  // Rijen: klant → gewas - soort (verpakking)
  const matrixData = {}; // { rijKey: { klantId, klantNaam, regelKey, weekLabel: waarde } }

  gefilterdOrders.forEach(o=>{
    const kl = klanten.find(k=>k.id===o.klantId);
    const klantNaam = kl?.naam||"?";
    const wk = weekLabel(o.leverdatum);

    o.regels.forEach(r=>{
      if(filtGewas!=="TOTAAL" && r.gewas!==filtGewas) return;
      if(filtSoort!=="TOTAAL" && r.soort!==filtSoort) return;

      const rijKey = `${o.klantId}||${r.gewas}||${r.soort}||${r.verpakking}`;
      if(!matrixData[rijKey]) matrixData[rijKey]={klantId:o.klantId,klantNaam,gewas:r.gewas,soort:r.soort,verpakking:r.verpakking,weken:{}};

      let waarde=0;
      if(filtWaarde==="planten") waarde=plantenPerRegel(r);
      else if(filtWaarde==="trays") waarde=r.aantal;
      else if(filtWaarde==="bedrag") waarde=Number(r.prijs||0)*r.aantal;

      matrixData[rijKey].weken[wk]=(matrixData[rijKey].weken[wk]||0)+waarde;
    });
  });

  const rijen = Object.values(matrixData);

  // Groepeer rijen per klant
  const perKlant = {};
  rijen.forEach(r=>{
    if(!perKlant[r.klantId]) perKlant[r.klantId]={naam:r.klantNaam,rijen:[]};
    perKlant[r.klantId].rijen.push(r);
  });

  // Totaal per week (onderste rij)
  function weekTotaal(wk){
    return rijen.reduce((s,r)=>s+(r.weken[wk]||0),0);
  }
  function rijTotaal(r){
    return Object.values(r.weken).reduce((s,v)=>s+v,0);
  }
  function grootTotaal(){
    return rijen.reduce((s,r)=>s+rijTotaal(r),0);
  }

  const selectStijl = {
    padding:"5px 8px",
    border:"1px solid #b7c0bb",
    borderRadius:4,
    background:"#f5f9f7",
    fontSize:12,
    minWidth:140,
    color:tekst,
    cursor:"pointer"
  };
  const labelStijl = {
    fontSize:11,
    fontWeight:600,
    color:subtekst,
    marginBottom:3,
    display:"block"
  };
  const filterRij = {display:"flex",gap:16,alignItems:"flex-end",flexWrap:"wrap"};

  const mTH={...TH,background:"#dff0e8",color:groen,padding:"4px 6px",fontSize:11};
  const mTD={...TD,padding:"4px 6px",textAlign:"right",fontSize:12};
  const mTDL={...TD,padding:"4px 6px",textAlign:"left",fontSize:12};

  const eenheid = filtWaarde==="bedrag" ? "€" : filtWaarde==="duizend" ? "x1000" : filtWaarde==="planten" ? "pl." : "trays";
  const formatWaarde = (v)=>{
    if(v===0||!v) return <span style={{color:"#ccc"}}>—</span>;
    if(filtWaarde==="bedrag") return `€ ${v.toFixed(2)}`;
    if(filtWaarde==="duizend") return (v/1000).toFixed(1);
    return v.toLocaleString();
  };

  return (
    <div>
      {/* Filterpaneel */}
      <div style={{background:"#f0f7f4",border:`1px solid ${rand}`,borderRadius:8,padding:14,marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:12,color:groen,marginBottom:10,textTransform:"uppercase",letterSpacing:0.5}}>
          📊 Matrix filters
        </div>
        <div style={filterRij}>
          <div>
            <label style={labelStijl}>Klant</label>
            <select style={selectStijl} value={filtKlant} onChange={e=>setFiltKlant(e.target.value)}>
              <option value="TOTAAL">TOTAAL</option>
              {klanten.map(k=><option key={k.id} value={k.id}>{k.naam}</option>)}
            </select>
          </div>
          <div>
            <label style={labelStijl}>Teelt</label>
            <select style={selectStijl} value={filtGewas} onChange={e=>{setFiltGewas(e.target.value);setFiltSoort("TOTAAL");}}>
              <option value="TOTAAL">TOTAAL</option>
              {gewassen.map(g=><option key={g.naam}>{g.naam}</option>)}
            </select>
          </div>
          <div>
            <label style={labelStijl}>Soort</label>
            <select style={selectStijl} value={filtSoort} onChange={e=>setFiltSoort(e.target.value)} disabled={filtGewas==="TOTAAL"}>
              <option value="TOTAAL">TOTAAL</option>
              {soorten.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div>
            <label style={labelStijl}>Orderstatus</label>
            <select style={selectStijl} value={filtStatus} onChange={e=>setFiltStatus(e.target.value)}>
              <option value="ORDER">ORDER (excl. geleverd)</option>
              <option value="TOTAAL">TOTAAL</option>
              {STATUSSEN.map(s=><option key={s} value={s}>{S_LABEL[s]}</option>)}
            </select>
          </div>
          <div>
            <label style={labelStijl}>Begindatum (week)</label>
            <select style={selectStijl} value={filtBegin} onChange={e=>setFiltBegin(e.target.value)}>
              <option value="">Alle weken</option>
              {weken.map(w=><option key={w.label} value={w.label}>{w.label}</option>)}
            </select>
          </div>
          <div>
            <label style={labelStijl}>Einddatum (week)</label>
            <select style={selectStijl} value={filtEind} onChange={e=>setFiltEind(e.target.value)}>
              <option value="">Alle weken</option>
              {weken.map(w=><option key={w.label} value={w.label}>{w.label}</option>)}
            </select>
          </div>
          <div>
            <label style={labelStijl}>Weergave</label>
            <select style={selectStijl} value={filtWaarde} onChange={e=>setFiltWaarde(e.target.value)}>
              <option value="planten">Aantal planten</option>
              <option value="duizend">Aantal / 1000</option>
              <option value="trays">Aantal trays</option>
              <option value="bedrag">Bedrag (€)</option>
            </select>
          </div>
        </div>
      </div>

      {/* Matrix tabel */}
      {wekenInRange.length===0||rijen.length===0 ? (
        <div style={{textAlign:"center",color:subtekst,padding:40}}>
          <div style={{fontSize:32,marginBottom:8}}>📊</div>
          <div>Geen orders gevonden voor deze selectie</div>
        </div>
      ):(
        <div style={{overflowX:"auto"}}>
          <table style={{minWidth:500}}>
            <thead>
              <tr>
                <th style={{...mTH,textAlign:"left",minWidth:100}}>Klant</th>
                <th style={{...mTH,textAlign:"left",minWidth:80}}>Teelt</th>
                <th style={{...mTH,textAlign:"left",minWidth:100}}>Soort</th>
                <th style={{...mTH,textAlign:"left",minWidth:70}}>Verpakking</th>
                {wekenInRange.map(w=><th key={w.label} style={{...mTH,textAlign:"right",minWidth:70}}>{w.label}</th>)}
                <th style={{...mTH,textAlign:"right",minWidth:70,color:"#1b1b1b"}}>Totaal ({eenheid})</th>
              </tr>
            </thead>
            <tbody>
              {Object.entries(perKlant).map(([kid,kdata])=>(
                kdata.rijen.map((r,ri)=>(
                  <tr key={kid+r.gewas+r.soort+r.verpakking} style={{background:ri%2===0?wit:"#f9fcfb"}}>
                    {ri===0
                      ? <td style={{...mTDL,fontWeight:700,verticalAlign:"top",paddingTop:8,borderRight:`2px solid ${lichtGroen}`}} rowSpan={kdata.rijen.length}>
                          {kdata.naam}
                        </td>
                      : null
                    }
                    <td style={{...mTDL,fontWeight:600,fontSize:12}}>{r.gewas}</td>
                    <td style={{...mTDL,fontSize:12,color:subtekst}}>{r.soort}</td>
                    <td style={{...mTDL,fontSize:11}}><span style={gs.badge}>{r.verpakking}</span></td>
                    {wekenInRange.map(w=>(
                      <td key={w.label} style={mTD}>{formatWaarde(r.weken[w.label]||0)}</td>
                    ))}
                    <td style={{...mTD,fontWeight:700,color:groen}}>{formatWaarde(rijTotaal(r))}</td>
                  </tr>
                ))
              ))}
              {/* Totaalrij */}
              <tr style={{background:"#dff0e8",fontWeight:700}}>
                <td style={{...mTDL,fontWeight:700}} colSpan={4}>Totaal per week</td>
                {wekenInRange.map(w=>(
                  <td key={w.label} style={{...mTD,fontWeight:700,color:groen}}>{formatWaarde(weekTotaal(w.label))}</td>
                ))}
                <td style={{...mTD,fontWeight:700,color:groen}}>{formatWaarde(grootTotaal())}</td>
              </tr>
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function Orders({ klanten, gewassen, prijzen, orders, setOrders, verpDef }) {
  const WEKEN = weekOpties();
  const verpNamen = verpDef.map(v=>v.naam);
  const defWeek = WEKEN.find(w=>w.datum===huidigZaterdag())||WEKEN[4];

  const maakLeeg=()=>({id:null,klantId:klanten[0]?.id||0,leverdatum:defWeek.datum,status:"reservering",notitie:"",regels:[],aanmaakdatum:new Date().toISOString().split("T")[0]});
  function maakLegeRegel(klantId) {
    const kl = klanten.find(k=>k.id===Number(klantId));
    const gwas = kl?.voorkeurTeelt || gewassen[0]?.naam || "";
    const gw = gewassen.find(g=>g.naam===gwas);
    const soort = gw?.soorten[0]||"";
    const verpakking = kl?.voorkeurVerpakking || verpNamen[0];
    return {gewas:gwas,soort,verpakking,aantal:1,prijs:""};
  }
  const legeRegel = maakLegeRegel(klanten[0]?.id||0);

  const [form,setForm]=useState(false); const [data,setData]=useState(maakLeeg());
  const [regel,setRegel]=useState({...legeRegel}); const [ges,setGes]=useState(null);
  const [delId,setDelId]=useState(null); const [filtS,setFiltS]=useState(""); const [filtK,setFiltK]=useState(0);
  const [kopO,setKopO]=useState(null); const [kopODat,setKopODat]=useState(defWeek.datum);
  const [kopR,setKopR]=useState(null); const [kopRDoel,setKopRDoel]=useState("");
  const [tab,setTab]=useState("lijst");

  function regelSoorten(){return gewassen.find(g=>g.naam===regel.gewas)?.soorten||[];}
  function setRegelV(k,v){
    let r={...regel,[k]:v};
    if(k==="gewas"){const s=gewassen.find(g=>g.naam===v)?.soorten||[];r.soort=s[0]||"";r.verpakking=verpNamen[0];}
    const p=prijzen.find(x=>x.klantId===Number(data.klantId)&&x.gewas===(k==="gewas"?v:r.gewas)&&x.soort===(k==="soort"?v:r.soort)&&x.verpakking===(k==="verpakking"?v:r.verpakking));
    if(p)r.prijs=p.prijs; setRegel(r);
  }
  function regelAdd(){if(!regel.gewas||!regel.aantal)return;const vandaag=new Date().toISOString().split('T')[0];setData({...data,regels:[...data.regels,{...regel,id:Date.now(),datumInvoer:regel.datumInvoer||vandaag}]});setRegel({...legeRegel});}
  function maakOrderNr(klantId, leverdatum, bestaandeOrders, huidigId) {
    const kl = klanten.find(k=>k.id===Number(klantId));
    const code = (kl?.klantcode || kl?.naam?.substring(0,3) || "ORD").toUpperCase();
    const jaar = String(getJaar(leverdatum)).slice(-2);
    const week = String(getWeekNr(leverdatum)).padStart(2,"0");
    const basis = `${code}${jaar}${week}`;
    const bestaand = bestaandeOrders.filter(o=>o.id!==huidigId&&(o.orderNr===basis||o.orderNr?.startsWith(basis+"-")));
    if(bestaand.length===0) return basis;
    return `${basis}-${bestaand.length+1}`;
  }
  function opslaan(){
    if(!data.klantId||!data.leverdatum||data.regels.length===0)return;
    if(data.id){setOrders(orders.map(o=>o.id===data.id?data:o));setGes(data);}
    else{const nr=data.eigenOrderNr?.trim()||maakOrderNr(data.klantId,data.leverdatum,orders,null);const n={...data,id:Date.now(),orderNr:nr};setOrders([...orders,n]);setGes(n);}
    setForm(false);
  }
  function verwijder(id){setOrders(orders.filter(o=>o.id!==id));setGes(null);setDelId(null);}
  function setSt(o,st){const b=orders.map(x=>x.id===o.id?{...x,status:st}:x);setOrders(b);setGes({...o,status:st});}
  function kopOUit(){if(!kopODat)return;const nr=maakOrderNr(kopO.klantId,kopODat,orders,null);setOrders([...orders,{...kopO,id:Date.now(),orderNr:nr,leverdatum:kopODat,status:"reservering",aanmaakdatum:new Date().toISOString().split("T")[0]}]);setKopO(null);}
  function kopRUit(doelId){
    // "HUIDIG" = plak in huidige open order (form)
    if(doelId==="HUIDIG"){
      setData({...data,regels:[...data.regels,{...kopR.regel,id:Date.now()}]});
      setKopR(null); return;
    }
    if(!doelId) return;
    const doel=orders.find(o=>o.id===Number(doelId));
    if(!doel) return;
    const b=orders.map(o=>o.id===doel.id?{...o,regels:[...o.regels,{...kopR.regel,id:Date.now()}]}:o);
    setOrders(b);
    if(ges?.id===doel.id) setGes(b.find(o=>o.id===doel.id));
    setKopR(null);
  }
  function totaal(r){return r.reduce((s,x)=>s+Number(x.prijs||0)*x.aantal,0);}
  function plantenPerRegel(r){const v=verpDef.find(x=>x.naam===r.verpakking);return(v?.aantal||0)*r.aantal;}
  function plantenTotaal(r){return r.reduce((s,x)=>s+plantenPerRegel(x),0);}

  const gefilterd=orders.filter(o=>(filtS?o.status===filtS:true)&&(filtK?o.klantId===Number(filtK):true))
    .sort((a,b)=>new Date(a.leverdatum)-new Date(b.leverdatum));

  return (
    <div style={{display:"flex",height:"calc(100vh - 50px)"}}>
      <div style={{width:280,borderRight:`1px solid ${rand}`,background:wit,overflowY:"auto",padding:10}}>
        <div style={{display:"flex",gap:5,marginBottom:8}}>
          <select style={{flex:1,padding:"5px 6px",border:`1px solid ${rand}`,borderRadius:6,background:wit,fontSize:12}} value={filtS} onChange={e=>setFiltS(e.target.value)}>
            <option value="">Alle statussen</option>
            {STATUSSEN.map(s=><option key={s} value={s}>{S_LABEL[s]}</option>)}
          </select>
          <select style={{flex:1,padding:"5px 6px",border:`1px solid ${rand}`,borderRadius:6,background:wit,fontSize:12}} value={filtK} onChange={e=>setFiltK(e.target.value)}>
            <option value={0}>Alle klanten</option>
            {klanten.map(k=><option key={k.id} value={k.id}>{k.naam}</option>)}
          </select>
        </div>
        <button style={{...gs.knopPrimair,width:"100%",marginBottom:8}} onClick={()=>{setData(maakLeeg());setRegel(maakLegeRegel(klanten[0]?.id||0));setForm(true);setGes(null);setTab("lijst");}}>+ Nieuwe order</button>
        <div style={{fontSize:10,color:subtekst,marginBottom:6}}>{gefilterd.length} order(s)</div>
        {gefilterd.map(o=>{
          const kl=klanten.find(k=>k.id===o.klantId);
          return (
            <div key={o.id}
              style={{padding:"6px 8px",borderRadius:6,cursor:"pointer",marginBottom:3,
                background:ges?.id===o.id?lichtGroen:"transparent",border:`1px solid ${ges?.id===o.id?groen:"transparent"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                <div style={{display:"flex",gap:4,alignItems:"center"}}>
                  <button title="Bewerken" style={{background:"none",border:"none",cursor:"pointer",fontSize:12,padding:"0 2px",color:groen,lineHeight:1}}
                    onClick={e=>{e.stopPropagation();setData({...o});setRegel(maakLegeRegel(o.klantId));setForm(true);setGes(o);setTab("lijst");}}>✏️</button>
                  <button title="Kopiëren" style={{background:"none",border:"none",cursor:"pointer",fontSize:12,padding:"0 2px",color:groen,lineHeight:1}}
                    onClick={e=>{e.stopPropagation();setKopO(o);setKopODat(defWeek.datum);}}>📋</button>
                  <span style={{fontWeight:700,fontSize:12}} onClick={()=>{setData({...o});setRegel(maakLegeRegel(o.klantId));setForm(true);setGes(o);setTab("lijst");}}>{o.orderNr}</span>
                </div>
                <span style={{fontSize:10,fontWeight:600,background:S_BG[o.status],color:S_KLEUR[o.status],borderRadius:20,padding:"2px 7px"}}>{S_LABEL[o.status]}</span>
              </div>
              <div style={{fontSize:11,color:subtekst}} onClick={()=>{setData({...o});setRegel(maakLegeRegel(o.klantId));setForm(true);setGes(o);setTab("lijst");}}>{kl?.naam} · 📅 {weekLabel(o.leverdatum)} · {plantenTotaal(o.regels).toLocaleString()} pl.</div>
            </div>
          );
        })}
      </div>

      <div style={{flex:1,overflowY:"auto",padding:16}}>
        <div style={{display:"flex",gap:6,marginBottom:14,borderBottom:`1px solid ${rand}`,paddingBottom:8}}>
          {[["lijst","📋 Orders"],["matrix","📊 Matrix"]].map(([id,lbl])=>(
            <button key={id} onClick={()=>setTab(id)}
              style={{padding:"5px 14px",borderRadius:6,border:"none",cursor:"pointer",fontSize:13,fontWeight:tab===id?700:400,
                background:tab===id?groen:"transparent",color:tab===id?wit:subtekst}}>
              {lbl}
            </button>
          ))}
        </div>

        {tab==="matrix" && (
          <MatrixFilterPaneel
            klanten={klanten}
            gewassen={gewassen}
            orders={orders}
            verpDef={verpDef}
            weken={WEKEN}
          />
        )}

        {tab==="lijst" && (form ? (
          <div style={{fontSize:12}}>
            {/* TOPBALK: ordergegevens + knoppen op 1 regel */}
            <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6,flexWrap:"wrap",background:wit,border:`1px solid ${rand}`,borderRadius:6,padding:"6px 8px"}}>
              <select style={{...gs.input,width:130,padding:"3px 5px"}} value={data.klantId} onChange={e=>{setData({...data,klantId:Number(e.target.value)});setRegel(maakLegeRegel(e.target.value));}}>
                {klanten.map(k=><option key={k.id} value={k.id}>{k.naam}</option>)}
              </select>
              <select style={{...gs.input,width:58,padding:"3px 5px"}} value={data.leverdatum} onChange={e=>setData({...data,leverdatum:e.target.value})}>
                {WEKEN.map(w=><option key={w.datum} value={w.datum}>{w.label}</option>)}
              </select>
              <input style={{...gs.input,width:90,padding:"3px 5px"}} placeholder="Ordernr" value={data.eigenOrderNr||""} onChange={e=>setData({...data,eigenOrderNr:e.target.value})} />
              <input style={{...gs.input,width:160,padding:"3px 5px"}} placeholder="Notitie" value={data.notitie} onChange={e=>setData({...data,notitie:e.target.value})} />
              <button style={{...gs.knopPrimair,padding:"3px 10px",fontSize:12,whiteSpace:"nowrap"}} onClick={opslaan}>💾 Opslaan</button>
              <button style={{...gs.knopSecundair,padding:"3px 10px",fontSize:12,whiteSpace:"nowrap"}} onClick={()=>setForm(false)}>Annuleren</button>
{data.bevestigingNr&&<span style={{background:"#ede9fe",color:"#7c3aed",borderRadius:5,padding:"3px 8px",fontSize:12,fontWeight:600}}>Bev. {data.bevestigingNr}</span>}
              {data.afleverNr&&<span style={{background:"#dbeafe",color:"#1d4ed8",borderRadius:5,padding:"3px 8px",fontSize:12,fontWeight:600}}>Afl. {data.afleverNr}</span>}
              <button style={{background:"#1d4ed8",color:"#fff",border:"none",borderRadius:6,padding:"3px 10px",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}
                onClick={()=>{
                  if(!data.id&&!data.klantId) return;
                  const bestaandeNrs=orders.filter(o=>o.afleverNr).map(o=>Number(o.afleverNr)||0);
                  const volgendNr=bestaandeNrs.length>0?Math.max(...bestaandeNrs)+1:1;
                  const nieuwNr=String(volgendNr).padStart(4,"0");
                  const bijgewerkt={...data,afleverNr:nieuwNr,status:"geleverd"};
                  if(data.id){setOrders(orders.map(o=>o.id===data.id?bijgewerkt:o));setData(bijgewerkt);}
                }}>🚚 Afleverbon</button>
              <button style={{background:"#7c3aed",color:"#fff",border:"none",borderRadius:6,padding:"3px 10px",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}
                onClick={()=>{
                  if(!data.klantId||!data.leverdatum||data.regels.length===0) return;
                  // Genereer oplopend bevestigingsnummer
                  const bestaandeNrs=orders.filter(o=>o.bevestigingNr).map(o=>Number(o.bevestigingNr)||0);
                  const volgendNr=bestaandeNrs.length>0?Math.max(...bestaandeNrs)+1:1;
                  // Zet vastPlanten = berekende planten op moment van bevestigen
                  const regelsMetVast=data.regels.map(r=>{
                    const vd2=verpDef.find(v=>v.naam===r.verpakking);
                    return {...r,vastPlanten:(vd2?.aantal||0)*r.aantal};
                  });
                  const bevestigd={...data,status:"bevestigd",regels:regelsMetVast,bevestigingNr:String(volgendNr).padStart(4,"0")};
                  if(data.id){setOrders(orders.map(o=>o.id===data.id?bevestigd:o));setGes(bevestigd);}
                  else{const nr=data.eigenOrderNr?.trim()||maakOrderNr(data.klantId,data.leverdatum,orders,null);const n={...bevestigd,id:Date.now(),orderNr:nr};setOrders([...orders,n]);setGes(n);}
                  setForm(false);
                }}>✅ Bevestigen</button>
            </div>

            {/* HOOFDBLOK: invoer links, tabel rechts */}
            <div style={{display:"flex",gap:6,alignItems:"flex-start"}}>

              {/* LINKS: Regel invoer — smal paneel, duidelijk anders */}
              <div style={{width:175,flexShrink:0,background:"#e8f5ee",border:`2px solid ${groen}`,borderRadius:6,padding:"6px 8px"}}>
                <div style={{fontSize:11,fontWeight:700,color:groen,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>+ Nieuwe regel</div>
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  <select style={{...gs.input,padding:"3px 6px",fontSize:12}} value={regel.gewas} onChange={e=>setRegelV("gewas",e.target.value)}>
                    {gewassen.map(g=><option key={g.naam}>{g.naam}</option>)}
                  </select>
                  <select style={{...gs.input,padding:"3px 6px",fontSize:12}} value={regel.soort} onChange={e=>setRegelV("soort",e.target.value)}>
                    {regelSoorten().map(s=><option key={s}>{s}</option>)}
                  </select>
                  <select style={{...gs.input,padding:"3px 6px",fontSize:12}} value={regel.verpakking} onChange={e=>setRegelV("verpakking",e.target.value)}>
                    {verpNamen.map(v=><option key={v}>{v}</option>)}
                  </select>
                  {(()=>{
                    const vd = verpDef.find(v=>v.naam===regel.verpakking);
                    const perTray = vd?.aantal||0;
                    const berekendePlanten = perTray * regel.aantal;
                    function vanPlanten(p) {
                      if(!perTray||!p) return;
                      const trays = Math.ceil(Number(p)/perTray);
                      setRegelV("aantal", trays);
                    }
                    return (
                      <>
                        <div style={{display:"flex",gap:4,alignItems:"center"}}>
                          <div style={{flex:1}}>
                            <div style={{fontSize:9,color:subtekst,marginBottom:1}}>Trays</div>
                            <input style={{...gs.input,padding:"3px 6px",fontSize:12,width:"100%"}} type="number" min="1" value={regel.aantal} onChange={e=>setRegelV("aantal",Number(e.target.value))} />
                          </div>
                          <div style={{color:subtekst,fontSize:12,paddingTop:14}}>↔</div>
                          <div style={{flex:1}}>
                            <div style={{fontSize:9,color:subtekst,marginBottom:1}}>Planten</div>
                            <input style={{...gs.input,padding:"3px 6px",fontSize:12,width:"100%"}} 
                              type="text" inputMode="numeric"
                              value={berekendePlanten||""}
                              placeholder={perTray?"÷"+perTray:""}
                              autoFocus
                              onFocus={e=>e.target.select()}
                              onChange={e=>vanPlanten(e.target.value.replace(/[^0-9]/g,""))} />
                          </div>
                        </div>
                        <div style={{display:"flex",gap:4}}>
                          <input style={{...gs.input,flex:1,padding:"3px 6px",fontSize:12,borderColor:regel.prijs===""?"#f59e0b":rand}} type="number" step="0.001" min="0" placeholder="€/st" value={regel.prijs} onChange={e=>setRegel({...regel,prijs:e.target.value})} />
                        </div>
                        {regel.prijs!==""
                          ? <div style={{fontSize:10,color:groen}}>✓ {berekendePlanten.toLocaleString()} pl. · {regel.aantal} trays</div>
                          : <div style={{fontSize:10,color:"#f59e0b"}}>⚠️ Geen prijs</div>
                        }
                      </>
                    );
                  })()}
                  <button style={{...gs.knopPrimair,width:"100%",padding:"4px",fontSize:12,marginTop:2}} onClick={regelAdd}>+ Toevoegen</button>
                </div>
              </div>

              {/* RECHTS: Orderregels tabel — zo compact mogelijk */}
              <div style={{flex:1,background:wit,border:`1px solid ${rand}`,borderRadius:6,overflow:"hidden"}}>
                {data.regels.length===0
                  ? <div style={{color:subtekst,fontSize:12,padding:16,textAlign:"center"}}>Nog geen regels</div>
                  : <>
                    <table style={{fontSize:12,width:"100%"}}>
                      <thead>
            {["Gewas","Soort","Verpakking","Trays","Planten","€/st","Vast","Factuur","Datum",""].map((h,i)=>(
                <th key={h} style={{...TH,padding:"3px 5px",fontSize:11,textAlign:(i>=3&&i<=5)||i===7?"right":"left"}}>{h}</th>
              ))}
                      </thead>
                      <tbody>{data.regels.map(r=>(
                        <RegelRij key={r.id} r={r} verpDef={verpDef} gewassen={gewassen} bewerkbaar={true} status={data.status||"reservering"}
                          onVerwijder={()=>setData({...data,regels:data.regels.filter(x=>x.id!==r.id)})}
                          onUpdate={bijgewerkt=>setData({...data,regels:data.regels.map(x=>x.id===bijgewerkt.id?bijgewerkt:x)})}
                        />
                      ))}</tbody>
                      <tfoot>
                        <tr style={{background:"#e8f5ee"}}>
                          <td style={{padding:"4px 5px",fontSize:11,color:groen,fontWeight:700,borderTop:`2px solid ${groen}`}} colSpan={3}>Totaal</td>
                          <td style={{padding:"4px 5px",fontSize:12,color:groen,fontWeight:700,textAlign:"right",borderTop:`2px solid ${groen}`}}>{data.regels.reduce((s,x)=>s+x.aantal,0)}</td>
                          <td style={{padding:"4px 5px",fontSize:12,color:groen,fontWeight:700,textAlign:"right",borderTop:`2px solid ${groen}`}}>{plantenTotaal(data.regels).toLocaleString()}</td>
                          <td colSpan={5} style={{borderTop:`2px solid ${groen}`}}></td>
                        </tr>
                      </tfoot>
                    </table>
                  </>
                }
              </div>
            </div>
          </div>
        ) : ges ? (()=>{
          const kl=klanten.find(k=>k.id===ges.klantId);
          return (
            <OrderDetail
              ges={ges} kl={kl} klanten={klanten} verpDef={verpDef} gewassen={gewassen}
              setSt={setSt} setData={setData} setRegel={setRegel} legeRegel={legeRegel}
              setForm={setForm} setKopO={setKopO} setKopR={setKopR} setKopRDoel={setKopRDoel}
              setDelId={setDelId} defWeek={defWeek} WEKEN={WEKEN} orders={orders} setOrders={setOrders}
              plantenTotaal={plantenTotaal} totaal={totaal}
            />
          );
        })() : (
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"60%",color:subtekst,gap:10}}>
            <div style={{fontSize:40}}>📦</div><div>Selecteer een order of maak een nieuwe aan</div>
          </div>
        ))}
      </div>

      {kopO&&(<div style={gs.overlay}><div style={{...gs.modal,width:340}}>
        <div style={gs.modalTitel}>📋 Order kopiëren</div>
        <div style={{color:subtekst,fontSize:12,marginBottom:12}}>Kopie van <strong>{kopO.orderNr}</strong> · {kopO.regels.length} regel(s) · status wordt Reservering</div>
        <div style={gs.veldGroep}><label style={gs.label}>Nieuwe leverweek</label>
          <select style={gs.input} value={kopODat} onChange={e=>setKopODat(e.target.value)}>
            {WEKEN.map(w=><option key={w.datum} value={w.datum}>{w.label}</option>)}
          </select></div>
        <div style={{display:"flex",gap:8}}><button style={gs.knopPrimair} onClick={kopOUit}>📋 Kopiëren</button><button style={gs.knopSecundair} onClick={()=>setKopO(null)}>Annuleren</button></div>
      </div></div>)}

      {kopR&&(<div style={gs.overlay}><div style={{...gs.modal,width:380}}>
        <div style={gs.modalTitel}>📋 Regel kopiëren</div>
        <div style={{background:achtergrond,borderRadius:6,padding:8,marginBottom:12,fontSize:12}}>
          <strong>{kopR.regel.gewas}</strong> {kopR.regel.soort} · {kopR.regel.verpakking} · {kopR.regel.aantal}x
        </div>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {(form||ges)&&<button style={{...gs.knopPrimair,flex:1}} onClick={()=>{
            if(form){kopRUit("HUIDIG");}
            else if(ges){
              const b=orders.map(o=>o.id===ges.id?{...o,regels:[...o.regels,{...kopR.regel,id:Date.now()}]}:o);
              setOrders(b);setGes(b.find(o=>o.id===ges.id));setKopR(null);
            }
          }}>
            📋 Toevoegen aan {form?"huidige order":ges?.orderNr}
          </button>}
        </div>
        <div style={gs.veldGroep}><label style={gs.label}>Of kopieer naar andere order</label>
          <select style={gs.input} value={kopRDoel} onChange={e=>setKopRDoel(e.target.value)}>
            <option value="">— Kies order —</option>
            {orders.map(o=>{
              const kl=klanten.find(k=>k.id===o.klantId);
              const isHuidig = data?.id && o.id===data.id;
              return <option key={o.id} value={o.id}>{isHuidig?"★ ":""}{o.orderNr} · {kl?.naam} · {weekLabel(o.leverdatum)}</option>;
            })}
          </select></div>
        <div style={{display:"flex",gap:8}}>
          <button style={gs.knopPrimair} onClick={()=>kopRUit(kopRDoel)} disabled={!kopRDoel}>📋 Kopiëren</button>
          <button style={gs.knopSecundair} onClick={()=>setKopR(null)}>Annuleren</button>
        </div>
      </div></div>)}

      {delId&&<BevestigModal tekst="Order verwijderen?" onJa={()=>verwijder(delId)} onNee={()=>setDelId(null)} />}
    </div>
  );
}

// MODULE 5 — BEVESTIGING
// ════════════════════════════════════════════════════════
function Bevestiging({ klanten, gewassen, orders, setOrders, verpDef }) {
  const [filtKlant, setFiltKlant] = useState(0);
  const [filtWeek,  setFiltWeek]  = useState("");
  const [filtStatus,setFiltStatus]= useState("bevestigd");
  const [zoek,      setZoek]      = useState("");

  function plantenPerRegel(r){const v=verpDef.find(x=>x.naam===r.verpakking);return(v?.aantal||0)*r.aantal;}
  function plantenTotaal(r){return r.reduce((s,x)=>s+plantenPerRegel(x),0);}

  const gefilterd = orders.filter(o=>{
    if(filtKlant && o.klantId!==Number(filtKlant)) return false;
    if(filtStatus && o.status!==filtStatus) return false;
    if(filtWeek && weekLabel(o.leverdatum)!==filtWeek) return false;
    if(zoek && !o.orderNr.toLowerCase().includes(zoek.toLowerCase())) return false;
    return true;
  }).sort((a,b)=>new Date(a.leverdatum)-new Date(b.leverdatum));

  const uniekWeken=[...new Set(orders.map(o=>weekLabel(o.leverdatum)))].sort();

  const sTH={...TH,padding:"3px 6px",fontSize:10,background:"#dff0e8"};
  const sTD={padding:"3px 6px",fontSize:12,borderBottom:`1px solid ${rand}`,verticalAlign:"middle"};
  const sTDR={...sTD,textAlign:"right"};

  function setOrderStatus(id,st){
    setOrders(orders.map(o=>o.id===id?{...o,status:st}:o));
  }

  function drukBevestiging(o){
    const kl=klanten.find(k=>k.id===o.klantId);
    const regelsText=o.regels.map(r=>"  "+r.gewas+" "+r.soort+" - "+r.verpakking+" - "+r.aantal+" trays - "+plantenPerRegel(r).toLocaleString()+" pl.").join("\n");
    const tekst="ORDERBEVESTIGING\n\nOrdernummer: "+o.orderNr+"\nKlant: "+(kl?.naam||"")+"\nLeverweek: "+weekLabel(o.leverdatum)+"\nDatum: "+o.aanmaakdatum+"\n\nREGELS:\n"+regelsText+"\n\nTotaal: "+plantenTotaal(o.regels).toLocaleString()+" planten";
    const blob=new Blob([tekst],{type:"text/plain"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download=o.orderNr+"-bevestiging.txt";a.click();
  }

  return (
    <div style={{padding:14,overflowY:"auto",height:"calc(100vh - 50px)"}}>
      {/* Filters */}
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
        <input style={{...gs.input,width:140}} placeholder="🔍 Ordernummer..." value={zoek} onChange={e=>setZoek(e.target.value)} />
        <select style={{padding:"5px 8px",border:`1px solid ${rand}`,borderRadius:6,background:wit,fontSize:12}} value={filtKlant} onChange={e=>setFiltKlant(e.target.value)}>
          <option value={0}>Alle klanten</option>
          {klanten.map(k=><option key={k.id} value={k.id}>{k.naam}</option>)}
        </select>
        <select style={{padding:"5px 8px",border:`1px solid ${rand}`,borderRadius:6,background:wit,fontSize:12}} value={filtWeek} onChange={e=>setFiltWeek(e.target.value)}>
          <option value="">Alle weken</option>
          {uniekWeken.map(w=><option key={w}>{w}</option>)}
        </select>
        <select style={{padding:"5px 8px",border:`1px solid ${rand}`,borderRadius:6,background:wit,fontSize:12}} value={filtStatus} onChange={e=>setFiltStatus(e.target.value)}>
          <option value="">Alle statussen</option>
          <option value="reservering">Reservering</option>
          <option value="bevestigd">Bevestigd</option>
          <option value="geleverd">Geleverd</option>
        </select>
        <span style={{color:subtekst,fontSize:12}}>{gefilterd.length} order(s)</span>
      </div>

      {gefilterd.length===0&&<div style={{textAlign:"center",color:subtekst,padding:40}}>Geen orders gevonden</div>}

      {gefilterd.map(o=>{
        const kl=klanten.find(k=>k.id===o.klantId);
        return (
          <div key={o.id} style={{background:wit,border:`1px solid ${rand}`,borderRadius:8,marginBottom:10,overflow:"hidden"}}>
            {/* Order header */}
            <div style={{display:"flex",gap:8,alignItems:"center",padding:"6px 10px",background:"#f0f7f4",borderBottom:`1px solid ${rand}`,flexWrap:"wrap"}}>
              <span style={{fontWeight:700,fontSize:13}}>{o.orderNr}</span>
              <span style={{fontSize:12,color:subtekst}}>· {kl?.naam} · {weekLabel(o.leverdatum)}</span>
              {o.notitie&&<span style={{fontSize:11,color:subtekst}}>· {o.notitie}</span>}
              <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}}>
                {/* Status knoppen */}
                {["reservering","bevestigd","geleverd"].map(st=>(
                  <button key={st} onClick={()=>setOrderStatus(o.id,st)}
                    style={{padding:"2px 8px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,
                      background:o.status===st?S_KLEUR[st]:"#f3f4f6",color:o.status===st?"#fff":subtekst}}>
                    {S_LABEL[st]}
                  </button>
                ))}
                <button style={{...gs.knopKlein,fontSize:11}} onClick={()=>drukBevestiging(o)}>📄 Download</button>
              </div>
            </div>
            {/* Regelstabel */}
            <table style={{width:"100%"}}>
              <thead>
                <tr>{["Gewas","Soort","Verpakking","Trays","Planten","Vast","€/st","Bevestiging nr","Aflever nr","Factuur nr","Datum"].map((h,i)=>(
                  <th key={h} style={{...sTH,textAlign:i>=3&&i<=6?"right":"left"}}>{h}</th>
                ))}</tr>
              </thead>
              <tbody>{o.regels.map(r=>{
                const vd=verpDef.find(v=>v.naam===r.verpakking);
                const pl=((vd?.aantal||0)*r.aantal).toLocaleString();
                const vast=(o.status==="reservering"?(vd?.aantal||0)*r.aantal:(r.vastPlanten??((vd?.aantal||0)*r.aantal))).toLocaleString();
                return (
                  <tr key={r.id} style={{lineHeight:1.3}}>
                    <td style={sTD}>{r.gewas}</td>
                    <td style={sTD}>{r.soort}</td>
                    <td style={sTD}><span style={{background:lichtGroen,color:groen,borderRadius:20,padding:"1px 5px",fontSize:10,fontWeight:600}}>{r.verpakking}</span></td>
                    <td style={sTDR}>{r.aantal}</td>
                    <td style={{...sTDR,color:groen,fontWeight:600}}>{pl}</td>
                    <td style={{...sTDR,fontWeight:600}}>{vast}</td>
                    <td style={sTDR}>{r.prijs!==""?"€"+Number(r.prijs).toFixed(3):"—"}</td>
                    <td style={sTD}>{r.bevestigingNr||<span style={{color:"#ccc"}}>—</span>}</td>
                    <td style={sTD}>{r.afleverNr||<span style={{color:"#ccc"}}>—</span>}</td>
                    <td style={sTD}>{r.factuurNr||<span style={{color:"#ccc"}}>—</span>}</td>
                    <td style={sTD}>{r.datumInvoer||<span style={{color:"#ccc"}}>—</span>}</td>
                  </tr>
                );
              })}</tbody>
              <tfoot>
                <tr style={{background:"#e8f5ee"}}>
                  <td style={{...sTD,fontWeight:700,color:groen}} colSpan={3}>Totaal</td>
                  <td style={{...sTDR,fontWeight:700,color:groen}}>{o.regels.reduce((s,x)=>s+x.aantal,0)}</td>
                  <td style={{...sTDR,fontWeight:700,color:groen}}>{plantenTotaal(o.regels).toLocaleString()}</td>
                  <td colSpan={6}></td>
                </tr>
              </tfoot>
            </table>
          </div>
        );
      })}
    </div>
  );
}

// ════════════════════════════════════════════════════════
// MODULE 5 — VERPAKKINGEN BEHEER
// ════════════════════════════════════════════════════════
function Verpakkingen({ verpDef, setVerpDef }) {
  const [naam,setNaam]=useState(""); const [aantal,setAantal]=useState("");
  const [bewerk,setBewerk]=useState(null); const [delNaam,setDelNaam]=useState(null);

  function opslaan(){
    if(!naam.trim()||!aantal)return;
    if(bewerk){setVerpDef(verpDef.map(v=>v.naam===bewerk?{naam,aantal:Number(aantal)}:v));}
    else if(!verpDef.find(v=>v.naam===naam)){setVerpDef([...verpDef,{naam,aantal:Number(aantal)}]);}
    setNaam("");setAantal("");setBewerk(null);
  }
  function verwijder(n){setVerpDef(verpDef.filter(v=>v.naam!==n));setDelNaam(null);}

  return (
    <div style={{padding:20,maxWidth:500}}>
      <h2 style={{fontSize:15,fontWeight:700,marginBottom:14}}>Verpakkingen & aantallen</h2>
      <div style={{background:wit,border:`1px solid ${rand}`,borderRadius:8,overflow:"hidden",marginBottom:16}}>
        <table>
          <thead><tr>{["Verpakking","Planten per tray",""].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
          <tbody>{verpDef.map(v=>(
            <tr key={v.naam}>
              <td style={TD}><strong>{v.naam}</strong></td>
              <td style={{...TD,fontWeight:600,color:groen}}>{v.aantal}</td>
              <td style={{...TD,textAlign:"right"}}>
                <button style={gs.knopKlein} onClick={()=>{setBewerk(v.naam);setNaam(v.naam);setAantal(v.aantal);}}>✏️</button>
                <button style={{...gs.knopVerwijder,marginLeft:4}} onClick={()=>setDelNaam(v.naam)}>🗑️</button>
              </td>
            </tr>
          ))}</tbody>
        </table>
      </div>
      <div style={gs.sectie}><div style={gs.sectieLabel}>{bewerk?"Bewerken":"Nieuwe verpakking"}</div>
        <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
          <div style={{...gs.veldGroep,flex:2,marginBottom:0}}><label style={gs.label}>Naam</label>
            <input style={gs.input} placeholder="bijv. Tray 400" value={naam} onChange={e=>setNaam(e.target.value)} /></div>
          <div style={{...gs.veldGroep,flex:1,marginBottom:0}}><label style={gs.label}>Planten</label>
            <input style={gs.input} type="number" min="1" placeholder="400" value={aantal} onChange={e=>setAantal(e.target.value)} /></div>
          <button style={{...gs.knopPrimair,marginBottom:0}} onClick={opslaan}>💾</button>
          {bewerk&&<button style={{...gs.knopSecundair,marginBottom:0}} onClick={()=>{setBewerk(null);setNaam("");setAantal("");}}>✕</button>}
        </div>
      </div>
      {delNaam&&<BevestigModal tekst={`"${delNaam}" verwijderen?`} onJa={()=>verwijder(delNaam)} onNee={()=>setDelNaam(null)} />}
    </div>
  );
}

// ════════════════════════════════════════════════════════
// HOOFD APP
// ════════════════════════════════════════════════════════
function App() {
  const { useEffect: ue } = React;
  const [pagina,setPagina]     = useState("orders");
  const [klanten,setKlanten]   = useState(()=>laad("ta_klanten",  SK));
  const [gewassen,setGewassen] = useState(()=>laad("ta_gewassen", SG));
  const [prijzen,setPrijzen]   = useState(()=>laad("ta_prijzen",  SP));
  const [orders,setOrders]     = useState(()=>laad("ta_orders",   SO));
  const [verpDef,setVerpDef]   = useState(()=>laad("ta_verp",     VERPAKKINGEN_DEF));
  const [syncStatus,setSyncStatus] = useState("⏳ Verbinden met Firebase...");
  const [geladen,setGeladen]   = useState(false);

  // Laad data uit Firebase bij opstarten
  useEffect(()=>{
    async function laadVanFirebase() {
      setSyncStatus("⏳ Data laden...");
      try {
        const [k,g,p,o,v] = await Promise.all([
          fbLoadAll("klanten"), fbLoadAll("gewassen"), fbLoadAll("prijzen"),
          fbLoadAll("orders"),  fbLoadAll("verpakkingen")
        ]);
        if(k) setKlanten(k);
        if(g) setGewassen(g);
        if(p) setPrijzen(p);
        if(o) setOrders(o);
        if(v) setVerpDef(v);
        setSyncStatus("✅ Firebase verbonden");
      } catch(e) {
        setSyncStatus("⚠️ Offline — lokale data");
      }
      setGeladen(true);
    }
    if(window._firebaseReady) laadVanFirebase();
    else window.addEventListener("firebaseReady", laadVanFirebase, {once:true});
  }, []);

  // Sla op naar Firebase + localStorage bij elke wijziging (alleen na init)
  useEffect(()=>{ if(!geladen) return; bewaar("ta_klanten",klanten); fbSaveAll("klanten",klanten).then(()=>setSyncStatus("☁️ Opgeslagen")); },[klanten]);
  useEffect(()=>{ if(!geladen) return; bewaar("ta_gewassen",gewassen); fbSaveAll("gewassen",gewassen).then(()=>setSyncStatus("☁️ Opgeslagen")); },[gewassen]);
  useEffect(()=>{ if(!geladen) return; bewaar("ta_prijzen",prijzen); fbSaveAll("prijzen",prijzen).then(()=>setSyncStatus("☁️ Opgeslagen")); },[prijzen]);
  useEffect(()=>{ if(!geladen) return; bewaar("ta_orders",orders); fbSaveAll("orders",orders).then(()=>setSyncStatus("☁️ Opgeslagen")); },[orders]);
  useEffect(()=>{ if(!geladen) return; bewaar("ta_verp",verpDef); fbSaveAll("verpakkingen",verpDef).then(()=>setSyncStatus("☁️ Opgeslagen")); },[verpDef]);

  function reset(){
    if(!window.confirm("Alle data wissen? Dit verwijdert ook de Firebase data!"))return;
    ["ta_klanten","ta_gewassen","ta_prijzen","ta_orders","ta_verp"].forEach(k=>localStorage.removeItem(k));
    setKlanten(SK);setGewassen(SG);setPrijzen(SP);setOrders(SO);setVerpDef(VERPAKKINGEN_DEF);
  }

  const menu=[
    {id:"orders",      label:"📦 Orders"},
    {id:"klanten",     label:"👤 Klanten"},
    {id:"teelten",     label:"🌱 Teelten"},
    {id:"prijzen",     label:"💰 Prijzen"},
    {id:"bevestiging", label:"✅ Bevestiging"},
    {id:"verpakkingen",label:"📐 Verpakkingen"},
  ];

  return (
    <div style={{minHeight:"100vh",background:achtergrond}}>
      <div style={{background:groen,display:"flex",alignItems:"center",height:50,padding:"0 14px",gap:3}}>
        <div style={{color:wit,fontWeight:700,fontSize:15,marginRight:16}}>🌱 TuinApp</div>
        {menu.map(m=>(
          <button key={m.id} onClick={()=>setPagina(m.id)}
            style={{background:pagina===m.id?"rgba(255,255,255,0.2)":"transparent",color:wit,border:"none",
              borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:13,fontWeight:pagina===m.id?700:400}}>
            {m.label}
          </button>
        ))}
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:10}}>
          <span style={{color:"rgba(255,255,255,0.65)",fontSize:11}}>{syncStatus}</span>
          <button onClick={reset} style={{background:"rgba(255,255,255,0.15)",color:wit,border:"1px solid rgba(255,255,255,0.3)",borderRadius:5,padding:"3px 9px",cursor:"pointer",fontSize:11}}>🔄 Reset</button>
        </div>
      </div>
      {pagina==="orders"       && <Orders      klanten={klanten} gewassen={gewassen} prijzen={prijzen} orders={orders} setOrders={setOrders} verpDef={verpDef} />}
      {pagina==="klanten"      && <Klantenbeheer klanten={klanten} setKlanten={setKlanten} gewassen={gewassen} verpDef={verpDef} />}
      {pagina==="teelten"      && <Teelten     gewassen={gewassen} setGewassen={setGewassen} />}
      {pagina==="prijzen"      && <Prijzen     klanten={klanten} gewassen={gewassen} prijzen={prijzen} setPrijzen={setPrijzen} verpDef={verpDef} />}
      {pagina==="bevestiging"  && <Bevestiging klanten={klanten} gewassen={gewassen} orders={orders} setOrders={setOrders} verpDef={verpDef} />}
      {pagina==="verpakkingen" && <Verpakkingen verpDef={verpDef} setVerpDef={setVerpDef} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
