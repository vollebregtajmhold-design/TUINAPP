                        <div style={{fontSize:12,fontWeight:aan?700:500,color:"#1d4ed8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{g.naam}</div>
                        <div style={{fontSize:9,color:subtekst}}>
                          {[g.p264&&"264:€"+Number(g.p264).toFixed(3),g.p180&&"180:€"+Number(g.p180).toFixed(3),g.p66&&"66:€"+Number(g.p66).toFixed(3)].filter(Boolean).join(" · ")||"geen prijzen"}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
            {regels.length === 0 ? (
              <div style={{color:subtekst,fontSize:11,textAlign:"center",padding:10}}>Geen prijzen</div>
            ) : (
              <div>
                <div style={{fontWeight:700,fontSize:11,color:groen,marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>Soorten</div>
                {Object.entries(perGewas).map(([gewas,rijen])=>{
                  const alleAan=rijen.every(r=>geselecteerd[r.gewas+"||"+r.soort+"||"+r.verpakking]);
                  const somAan=rijen.some(r=>geselecteerd[r.gewas+"||"+r.soort+"||"+r.verpakking]);
                  return (
                    <div key={gewas} style={{marginBottom:6}}>
                      <div style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",padding:"2px 0"}}
                        onClick={()=>toggleGewas(gewas)}>
                        <input type="checkbox" readOnly checked={alleAan}
                          ref={el=>{if(el)el.indeterminate=somAan&&!alleAan;}}
                          style={{cursor:"pointer",accentColor:groen,flexShrink:0}}
                          onClick={e=>{e.stopPropagation();toggleGewas(gewas);}} />
                        <span style={{fontWeight:700,fontSize:12,color:groen}}>{gewas}</span>
                        <span style={{fontSize:9,color:subtekst}}>{rijen.filter(r=>geselecteerd[r.gewas+"||"+r.soort+"||"+r.verpakking]).length}/{rijen.length}</span>
                      </div>
                      {rijen.map(r=>{
                        const key=r.gewas+"||"+r.soort+"||"+r.verpakking;
                        const aan=!!geselecteerd[key];
                        return (
                          <div key={key} onClick={()=>toggleRegel(key)}
                            style={{display:"flex",alignItems:"center",gap:5,padding:"2px 6px",borderRadius:4,
                              cursor:"pointer",marginBottom:1,
                              background:aan?"#f0fff4":"transparent",
                              border:`1px solid ${aan?lichtGroen:"transparent"}`}}>
                            <input type="checkbox" readOnly checked={aan} style={{cursor:"pointer",accentColor:groen,flexShrink:0}} />
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:11,fontWeight:aan?600:400,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.soort}</div>
                            </div>
                            <div style={{fontSize:11,fontWeight:700,color:groen,flexShrink:0}}>{r.prijs?"€"+Number(r.prijs).toFixed(3):""}</div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </>)}
      </div>

      {/* RECHTS: instellingen + preview + historie */}
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column"}}>
        {selKlant && (
          <div style={{padding:16,display:"flex",flexDirection:"column",gap:12}}>
            {/* Instellingen */}
            <div style={{background:wit,border:`1px solid ${rand}`,borderRadius:8,padding:"12px 16px"}}>
              <div style={{fontSize:11,fontWeight:700,color:groen,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Offerte instellingen</div>
              <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
                <div><label style={gs.label}>Offertenr</label>
                  <input style={{...gs.input,width:100,fontSize:13,fontWeight:700}} value={offerteNr} onChange={e=>setOfferteNr(e.target.value)} /></div>
                <div><label style={gs.label}>Datum</label>
                  <input style={{...gs.input,width:140}} type="date" value={datum} onChange={e=>setDatum(e.target.value)} /></div>
                <div style={{flex:1,minWidth:200}}><label style={gs.label}>Notitie</label>
                  <input style={gs.input} placeholder="Optioneel..." value={notitie} onChange={e=>setNotitie(e.target.value)} /></div>
              </div>
            </div>

            {/* Preview */}
            <div style={{background:wit,border:`1px solid ${rand}`,borderRadius:8,padding:"12px 16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div>
                  <div style={{fontWeight:700,fontSize:14,color:groen}}>Offerte #{offerteNr} — {selKlant.naam}</div>
                  <div style={{fontSize:11,color:subtekst}}>{geselecteerdeRegels.length} soort(en) · {geselecteerdeGroepen.length} groep(en)</div>
                </div>
                <button style={{...gs.knopPrimair,background:heeftInhoud?groen:"#9ca3af",
                  cursor:heeftInhoud?"pointer":"not-allowed",fontSize:13,padding:"8px 20px"}}
                  onClick={downloadPDF} disabled={!heeftInhoud}>
                  📥 PDF downloaden
                </button>
              </div>
              {heeftInhoud && <PreviewTabel />}
            </div>

            {/* Offertehistorie */}
            {historie.length > 0 && (
              <div style={{background:wit,border:`1px solid ${rand}`,borderRadius:8,overflow:"hidden"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 14px",cursor:"pointer",background:histOpen?"#f0f7f4":wit}}
                  onClick={()=>setHistOpen(v=>!v)}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontWeight:700,fontSize:13,color:groen}}>📋 Offertehistorie</span>
                    <span style={{fontSize:11,color:subtekst}}>{historie.length} offerte(s)</span>
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <button style={{...gs.knopVerwijder,fontSize:10,padding:"1px 6px"}}
                      onClick={e=>{e.stopPropagation();if(window.confirm("Offertehistorie wissen?")){ setHistorie([]); localStorage.removeItem("ta_offerte_historie"); }}}>
                      🗑️
                    </button>
                    <span style={{color:groen,fontSize:12}}>{histOpen?"▲":"▼"}</span>
                  </div>
                </div>
                {histOpen && (
                  <div style={{maxHeight:220,overflowY:"auto"}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                      <thead><tr>
                        {["Nr","Datum","Klant","Inhoud",""].map(h=>(
                          <th key={h} style={{padding:"3px 6px",background:"#f0f7f4",color:groen,fontWeight:700,fontSize:10,
                            border:`1px solid ${rand}`,textAlign:h===""?"center":"left"}}>{h}</th>
                        ))}
                      </tr></thead>
                      <tbody>
                        {historie.map((h,i)=>(
                          <tr key={i} style={{background:i%2===0?wit:"#f0f7f4"}}>
                            <td style={{padding:"3px 6px",border:`1px solid ${rand}`,fontWeight:700,color:"#1d4ed8",whiteSpace:"nowrap"}}>#{h.nr}</td>
                            <td style={{padding:"3px 6px",border:`1px solid ${rand}`,color:subtekst,whiteSpace:"nowrap"}}>{new Date(h.datum).toLocaleDateString("nl-NL")}</td>
                            <td style={{padding:"3px 6px",border:`1px solid ${rand}`,fontWeight:600}}>{h.klantNaam}</td>
                            <td style={{padding:"3px 6px",border:`1px solid ${rand}`,color:subtekst,fontSize:10}}>
                              {[h.groepen?.length>0&&h.groepen.length+" groep(en)",h.soorten?.length>0&&h.soorten.length+" soort(en)"].filter(Boolean).join(" · ")}
                              {h.notitie&&<span style={{display:"block",color:"#f59e0b",fontStyle:"italic"}}>{h.notitie}</span>}
                            </td>
                            <td style={{padding:"3px 6px",border:`1px solid ${rand}`,textAlign:"center"}}>
                              <button title="Herdrukken"
                                style={{background:groen,color:"#fff",border:"none",borderRadius:4,padding:"2px 8px",cursor:"pointer",fontSize:11,fontWeight:600}}
                                onClick={()=>{
                                  if(!h.doc) return;
                                  const w=window.open("","_blank");
                                  if(w){w.document.open();w.document.write(h.doc);w.document.close();setTimeout(()=>w.print(),400);}
                                }}>🖨️</button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

</script>
<script type="text/babel" data-presets="react">

function App() {
  const { useEffect: ue } = React;

  // ── PINCODE BEVEILIGING ──
  const OPGESLAGEN_PIN = localStorage.getItem("ta_pincode")||"";
  const [ingelogd, setIngelogd] = useState(()=>{
    // Als geen pincode ingesteld, direct ingelogd
    if(!OPGESLAGEN_PIN) return true;
    // Check sessie (blijft ingelogd tot tab gesloten wordt)
    return sessionStorage.getItem("ta_sessie")==="ok";
  });
  const [pinInvoer, setPinInvoer] = useState("");
  const [pinFout, setPinFout] = useState(false);

  function checkPin() {
    const pin = localStorage.getItem("ta_pincode")||"";
    if(pinInvoer===pin) {
      sessionStorage.setItem("ta_sessie","ok");
      setIngelogd(true);
      setPinFout(false);
    } else {
      setPinFout(true);
      setPinInvoer("");
    }
  }

  const [pagina,setPagina]     = useState("orders");
  const [matrixDirect, setMatrixDirect] = useState(null);
  useEffect(()=>{
    function handler(e){ setPagina("bevestiging"); }
    function handlerMatrix(e){ setPagina("bevestiging"); setMatrixDirect(e.detail); }
    function handlerGemaild(e){
      const {klantId, nu} = e.detail;
      setOrders(prev=>prev.map(o=>
        String(o.klantId)===String(klantId)&&o.status!=="geleverd"
          ? {...o, seizoensGemaild: nu}
          : o
      ));
    }
    window.addEventListener("naarBevestiging", handler);
    window.addEventListener("drukMatrix", handlerMatrix);
    window.addEventListener("seizoensGemaild", handlerGemaild);
    return ()=>{
      window.removeEventListener("naarBevestiging", handler);
      window.removeEventListener("drukMatrix", handlerMatrix);
      window.removeEventListener("seizoensGemaild", handlerGemaild);
    };
  },[]);
  const [kiemkracht,setKiemkracht] = useState(()=>laad("ta_kiemkracht", []));
  const [teeltduur,setTeeltduur]   = useState(()=>laad("ta_teeltduur", []));
  const [zaadinkoop,setZaadinkoop] = useState(()=>laad("ta_zaadinkoop", []));
  const [uitval, setUitval] = useState(()=>laad("ta_uitval",[]));
  const [traykosten,setTraykosten] = useState(()=>laad("ta_traykosten", {}));
  const [leveranciers,setLeveranciers] = useState(()=>laad("ta_leveranciers", []));
  const [bedrijf,setBedrijf]   = useState(()=>laad("ta_bedrijf", {
    naam:"Uw Bedrijfsnaam BV", adres:"Straatnaam 1", postcode:"1234 AB", plaats:"Plaats",
    telefoon:"010-1234567", email:"info@uwbedrijf.nl", website:"", iban:"NL00 BANK 0000 0000 00",
    kvk:"", btw:""
  }));
  const [klanten,setKlanten]   = useState(()=>laad("ta_klanten",  SK));
  const [gewassen,setGewassen] = useState(()=>laad("ta_gewassen", SG));
  const [prijzen,setPrijzen]   = useState(()=>laad("ta_prijzen",  SP));
  const [orders,setOrders]     = useState(()=>laad("ta_orders",   SO));
  const [verpDef,setVerpDef]   = useState(()=>zorgVerpDef(laad("ta_verp", VERPAKKINGEN_DEF)));
  const [syncStatus,setSyncStatus] = useState("💾 Lokaal");
  const [fontSize, setFontSize] = useState(()=>{ try{ return Number(localStorage.getItem("ta_fontSize"))||14; }catch(e){ return 14; } });


  // ── LOKAAL LADEN ─────────────────────────────────────────
  useEffect(() => {
    const lk=laad("ta_klanten",SK); if(lk.length) setKlanten(lk);
    const lg=laad("ta_gewassen",SG); if(lg.length) setGewassen(lg);
    const lp=laad("ta_prijzen",SP); if(lp.length) setPrijzen(lp);
    const lo=laad("ta_orders",SO); if(lo.length) setOrders(lo);
    setVerpDef(zorgVerpDef(laad("ta_verp",VERPAKKINGEN_DEF)));
    setKiemkracht(laad("ta_kiemkracht",[]));
    setTeeltduur(laad("ta_teeltduur",[]));
    setZaadinkoop(laad("ta_zaadinkoop",[]));
    setBedrijf(laad("ta_bedrijf",{naam:"",adres:"",postcode:"",plaats:"",telefoon:"",email:"",iban:""}));
    setTraykosten(laad("ta_traykosten",{}));
    setLeveranciers(laad("ta_leveranciers",[]));
    setGeladen(true);
    setSyncStatus("💾 Lokaal opgeslagen");
  }, []);

  // ── OPSLAAN IN LOCALSTORAGE ──────────────────────────────
  useEffect(()=>{if(!geladen)return;bewaar("ta_klanten",klanten);},[klanten]);
  useEffect(()=>{if(!geladen)return;bewaar("ta_gewassen",gewassen);},[gewassen]);
  useEffect(()=>{if(!geladen)return;bewaar("ta_prijzen",prijzen);},[prijzen]);
  useEffect(()=>{if(!geladen)return;bewaar("ta_orders",orders);},[orders]);
  useEffect(()=>{if(!geladen)return;bewaar("ta_verp",verpDef);},[verpDef]);
  useEffect(()=>{if(!geladen)return;bewaar("ta_kiemkracht",kiemkracht);},[kiemkracht]);
  useEffect(()=>{if(!geladen)return;bewaar("ta_teeltduur",teeltduur);},[teeltduur]);
  useEffect(()=>{if(!geladen)return;bewaar("ta_zaadinkoop",zaadinkoop);},[zaadinkoop]);
  useEffect(()=>{if(!geladen)return;bewaar("ta_uitval",uitval);},[uitval]);
  useEffect(()=>{if(!geladen)return;bewaar("ta_bedrijf",bedrijf);},[bedrijf]);
  useEffect(()=>{if(!geladen)return;bewaar("ta_traykosten",traykosten);},[traykosten]);
  useEffect(()=>{if(!geladen)return;bewaar("ta_leveranciers",leveranciers);},[leveranciers]);

  const [geladen,setGeladen]   = useState(false);
  const [backupHerinnering,setBackupHerinnering] = useState(false);
  const [scriptHerinnering,setScriptHerinnering] = useState(false);

  // ── BACKUP FUNCTIE ──
  function maakBackup() {
    const data = {
      versie: "TuinApp-backup-v1",
      datum: new Date().toISOString(),
      ta_klanten:    laad("ta_klanten", []),
      ta_gewassen:   laad("ta_gewassen", []),
      ta_prijzen:    laad("ta_prijzen", []),
      ta_orders:     laad("ta_orders", []),
      ta_verp:       laad("ta_verp", []),
      ta_kiemkracht: laad("ta_kiemkracht", []),
      ta_teeltduur:  laad("ta_teeltduur", []),
      ta_zaadinkoop: laad("ta_zaadinkoop", []),
      ta_bedrijf:    laad("ta_bedrijf", {}),
      ta_realisatie: laad("ta_realisatie", {}),
      ta_traykosten: laad("ta_traykosten", {}),
      ta_leveranciers: laad("ta_leveranciers", []),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const datumStr = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = "TuinApp_backup_" + datumStr + ".json";
    a.click();
    URL.revokeObjectURL(url);
    // Sla tijdstip op
    localStorage.setItem("ta_backup_laats", new Date().toISOString());
    setBackupHerinnering(false);
  }

  // ── BACKUP HERINNERING TIMER ──
  useEffect(()=>{
    function checkBackup() {
      const intervalUur = Number(laad("ta_backup_interval", 24));
      if(intervalUur) {
        const laats = localStorage.getItem("ta_backup_laats");
        if(!laats) { setBackupHerinnering(true); }
        else {
          const verschilUur = (new Date() - new Date(laats)) / (1000*60*60);
          if(verschilUur >= intervalUur) setBackupHerinnering(true);
        }
      }
      const scriptIntervalUur = Number(laad("ta_script_interval", 24));
      if(scriptIntervalUur) {
        const scriptLaats = localStorage.getItem("ta_script_laats");
        if(!scriptLaats) { setScriptHerinnering(true); }
        else {
          const verschilUur = (new Date() - new Date(scriptLaats)) / (1000*60*60);
          if(verschilUur >= scriptIntervalUur) setScriptHerinnering(true);
        }
      }
    }
    checkBackup();
    const timer = setInterval(checkBackup, 60*60*1000);
    return ()=>clearInterval(timer);
  }, [geladen]);

  function reset(){
    if(!window.confirm("Alle data wissen? Dit kan niet ongedaan worden gemaakt!"))return;
    ["ta_klanten","ta_gewassen","ta_prijzen","ta_orders","ta_verp"].forEach(k=>localStorage.removeItem(k));
    setKlanten(SK);setGewassen(SG);setPrijzen(SP);setOrders(SO);setVerpDef(VERPAKKINGEN_DEF);
  }

  const menu=[
    {id:"orders",      label:"📦 Orders"},
    {id:"zaadinkoop",  label:"🌰 Zaadinkoop"},
    {id:"planning",    label:"📅 Werklijsten"},
    {id:"transport",   label:"🚛 Transport"},
    {id:"offertes",    label:"📝 Offertes"},
  ];
  const margeMenu = {id:"margeoverzicht", label:"💹 Marge"};

  const bonnen=[
    {id:"bevestiging", label:"✅ Bevestigingen"},
    {id:"mailing",     label:"📧 Mailing"},
    {id:"factuuroverzicht", label:"🧾 Facturen"},
    {id:"afleveroverzicht", label:"🚚 Afleverbonnen"},
  ];
  const stamdata=[
    {id:"klanten",        label:"👤 Klanten"},
    {id:"voorkeurenmatrix",label:"⚡ Voorkeuren"},
    {id:"teelten",     label:"🌱 Teelten"},
    {id:"soortenbeheer",label:"📋 Soortenbeheer"},
    {id:"teeltduur",   label:"🕐 Teeltduur"},
    {id:"prijzen",     label:"💰 Verkoopprijzen"},
    {id:"kiemkracht",  label:"🌱 Kiemkracht"},
    {id:"inkoop",      label:"🌾 Inkoopprijzen zaad"},
    {id:"leveranciers",label:"🚚 Leveranciers"},
    {id:"instellingen",label:"⚙️ Instellingen"},
  ];
  const stamdataOpen = stamdata.some(m=>m.id===pagina);
  const bonnenOpen = bonnen.some(m=>m.id===pagina);
  const [stamdataDropdown, setStamdataDropdown] = useState(false);
  const [bonnenDropdown, setBonnenDropdown] = useState(false);
  const [statDropdown, setStatDropdown] = useState(false);

  // Login scherm
  if(!ingelogd) return (
    <div style={{minHeight:"100vh",background:"#f0f7f4",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:12,padding:40,boxShadow:"0 8px 32px rgba(0,0,0,0.12)",minWidth:320,textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:8}}>🌱</div>
        <div style={{fontSize:22,fontWeight:700,color:groen,marginBottom:4}}>TuinApp</div>
        <div style={{fontSize:13,color:subtekst,marginBottom:24}}>Vollebregt Cyclamen</div>
        <div style={{fontSize:13,color:tekst,marginBottom:12,fontWeight:600}}>Voer pincode in</div>
        <input
          style={{width:"100%",padding:"10px 14px",borderRadius:8,border:`2px solid ${pinFout?"#dc2626":rand}`,
            fontSize:20,textAlign:"center",letterSpacing:6,outline:"none",boxSizing:"border-box"}}
          type="password" maxLength={8} value={pinInvoer} autoFocus
          onChange={e=>{ setPinInvoer(e.target.value); setPinFout(false); }}
          onKeyDown={e=>e.key==="Enter"&&checkPin()}
          placeholder="••••"
        />
        {pinFout&&<div style={{color:"#dc2626",fontSize:12,marginTop:6}}>Pincode onjuist</div>}
        <button style={{...gs.knopPrimair,width:"100%",marginTop:14,padding:"10px",fontSize:14}}
          onClick={checkPin}>
          Inloggen
        </button>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:achtergrond,fontSize:fontSize+"px"}}>
      <div style={{background:groen,display:"flex",alignItems:"center",height:50,padding:"0 14px",gap:3}}>
        <div style={{color:wit,fontWeight:700,fontSize:15,marginRight:16}}>🌱 TuinApp</div>
        {menu.map(m=>(
          <button key={m.id} onClick={()=>{setPagina(m.id);setBonnenDropdown(false);setStamdataDropdown(false);setStatDropdown(false);}}
            style={{background:pagina===m.id?"rgba(255,255,255,0.2)":"transparent",color:wit,border:"none",
              borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:14,fontWeight:pagina===m.id?700:400}}>
            {m.label}
          </button>
        ))}
        {/* Statistieken dropdown */}
        {(()=>{
          const statOpen = ["overzichten","margeoverzicht","dashboard"].includes(pagina);
          return (
            <div style={{position:"relative"}}>
              <button onClick={()=>{setStatDropdown(!statDropdown);setBonnenDropdown(false);setStamdataDropdown(false);}}
                style={{background:statOpen||statDropdown?"rgba(255,255,255,0.2)":"transparent",color:wit,border:"none",
                  borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:14,
                  fontWeight:statOpen?700:400,display:"flex",alignItems:"center",gap:4}}>
                📊 Statistieken {statDropdown?"▲":"▼"}
              </button>
              {statDropdown&&(
                <div style={{position:"absolute",top:42,left:0,background:wit,border:`1px solid ${rand}`,
                  borderRadius:8,padding:4,zIndex:300,minWidth:200,boxShadow:"0 4px 16px rgba(0,0,0,0.15)"}}>
                  {[
                    {id:"dashboard",  label:"🏠 Dashboard"},
                    {id:"uitval",     label:"🍂 Uitval"},
                    {id:"overzichten",label:"📊 Overzichten"},
                    {id:"margeoverzicht",label:"💹 Marge"},
                  ].map(m=>(
                    <button key={m.id} onClick={()=>{setPagina(m.id);setStatDropdown(false);}}
                      style={{display:"block",width:"100%",textAlign:"left",padding:"7px 12px",
                        border:"none",borderRadius:6,cursor:"pointer",fontSize:13,
                        background:pagina===m.id?lichtGroen:"transparent",
                        color:pagina===m.id?groen:tekst,fontWeight:pagina===m.id?700:400}}
                      onMouseEnter={e=>{if(pagina!==m.id)e.currentTarget.style.background="#f0f7f4"}}
                      onMouseLeave={e=>{if(pagina!==m.id)e.currentTarget.style.background="transparent"}}>
                      {m.label}
                    </button>
                  ))}
                </div>
              )}
            </div>
          );
        })()}

        {/* Bonnen dropdown */}
        <div style={{position:"relative"}}>
          <button

function WeekTransportPrint({ wk, orders, klanten, bedrijf, verpDef, onSluit }) {

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center"}}>

}

function maakPakbonDoc(o, klanten, bedrijf, verpDef) {

        +(bd.iban?"<div style='font-size:10px;color:#555'>IBAN: "+bd.iban+"</div>":"")

      +"<div style='text-align:right'>"
        +"<div style='font-size:22px;font-weight:700;color:#2d6a4f'>PAKBON <span style='font-size:14px'>#"+(o.pakbonNr||"—")+"</span></div>"
        +"<div style='font-size:11px;color:#555;margin-top:4px'>Datum: "+vandaag+"</div>"
        +"<div style='font-size:18px;font-weight:700;color:#1d4ed8;margin-top:6px'>"+karTekst+"</div>"
        +"<div style='font-size:12px;color:#1d4ed8'>"+karDetail+"</div>"

      +"<div><span style='color:#555;font-size:11px'>Klant</span><br/><strong style='font-size:14px'>"+kl.naam+"</strong></div>"
      +"<div style='text-align:center'><span style='color:#555;font-size:11px'>Pakbon</span><br/><strong style='font-size:14px'>#"+(o.pakbonNr||"—")+"</strong></div>"

      +"<td style='padding:6px 8px;border:1px solid #c8e6c9;border-top:3px solid #0f3320'></td>"

function WeekPakbonPrint({ wk, orders, klanten, bedrijf, verpDef, onSluit }) {
  const wkOrders = orders.filter(o=>weekLabel(o.leverdatum)===wk&&o.status!=="geleverd");
  function print(){
    // Strip de html/head/body tags per pakbon en combineer in één document
    const gecombineerd = wkOrders.map((o,i)=>{
      const doc = maakPakbonDoc(o, klanten, bedrijf, verpDef);
      // Haal alleen de body inhoud op
      const bodyMatch = doc.match(/<body>([\s\S]*)<\/body>/);
      const inhoud = bodyMatch ? bodyMatch[1] : doc;
      return "<div style='page-break-after:"+(i<wkOrders.length-1?"always":"avoid")+"'>"+inhoud+"</div>";
    }).join("");
    const html = "<!DOCTYPE html><html><head><meta charset='UTF-8'>"
      +"<style>@page{size:A4 portrait;margin:15mm} body{font-family:Arial,sans-serif;font-size:11px;color:#222;margin:0} table{border-collapse:collapse;width:100%} @media print{button{display:none}}</style></head><body>"
      +gecombineerd+"</body></html>";
    const w = window.open("","_blank");
    if(w){w.document.write(html);w.document.close();setTimeout(()=>w.print(),400);}
  }
  React.useEffect(()=>{print();},[]);
  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:8,padding:24,textAlign:"center",boxShadow:"0 8px 40px rgba(0,0,0,0.3)"}}>
        <div style={{fontSize:16,marginBottom:4}}>🖨️ Pakbonnen worden geopend...</div>
        <div style={{fontSize:12,color:subtekst,marginBottom:12}}>{wkOrders.length} pakbonnen voor week {wk}</div>
        <div style={{display:"flex",gap:8,justifyContent:"center"}}>
          <button style={gs.knopPrimair} onClick={print}>Opnieuw afdrukken</button>
          <button style={gs.knopSecundair} onClick={onSluit}>✕ Sluiten</button>
        </div>
      </div>
    </div>
  );
}

// WEEKOVERZICHT
// ════════════════════════════════════════════════════════
function Weekoverzicht({ klanten, gewassen, orders, verpDef, bedrijf, teeltduur, kiemkracht }) {
  const WEKEN = [];
  const nu = new Date();
  let wk = getWeekNr(nu), jr = getJaar(nu);
  for(let i=0;i<40;i++){
    WEKEN.push(String(jr).slice(-2)+String(wk).padStart(2,"0"));
    wk++; if(wk>52){wk=1;jr++;}
  }

  const [selWk, setSelWk] = useState(WEKEN[0]);
  const [printComp, setPrintComp] = useState(null);

  // Hoeveel orders voor deze week
  const ordersWk = orders.filter(o=>weekLabel(o.leverdatum)===selWk&&o.status!=="geleverd");

  // Berekening: welke werklijst-weken vallen in selWk
  function getDuur(gewas, soort, fust, veld) {
    return (teeltduur||[]).find(t=>
      t.gewas?.toLowerCase()===gewas?.toLowerCase()&&
      t.soort?.toLowerCase()===soort?.toLowerCase()&&
      t.fust?.toLowerCase()===fust?.toLowerCase()
    )?.[veld]??null;
  }

  // Vind unieke traymaten voor wegzetlijst (inboetweek = selWk)
  const traymatenWeg = new Set();
  orders.filter(o=>o.status!=="geleverd").forEach(o=>{
    o.regels.forEach(r=>{
      const inb = getDuur(r.gewas,r.soort,r.verpakking,"inboet");
      if(inb===null) return;
      let wk2=getWeekNr(o.leverdatum)-inb, jr2=getJaar(o.leverdatum);
      if(wk2<=0){wk2+=52;jr2--;}
      const lbl=String(jr2).slice(-2)+String(wk2).padStart(2,"0");
      if(lbl===selWk) traymatenWeg.add(r.verpakking);
    });
  });

  const kaart = (titel, icon, kleur, beschrijving, aantallen, onClick) => (
    <div onClick={onClick} style={{background:"#fff",border:`2px solid ${kleur}`,borderRadius:10,padding:"16px 20px",cursor:"pointer",

// PLANNING HELPER (globaal herbruikbaar)
// ════════════════════════════════════════════════════════
function maakPlanning(orders, teeltduur, kiemkracht) {
  const planning = {};
  function getDuur(gewas,soort,fust,veld){return (teeltduur||[]).find(t=>t.gewas?.toLowerCase()===gewas?.toLowerCase()&&t.soort?.toLowerCase()===soort?.toLowerCase()&&t.fust?.toLowerCase()===fust?.toLowerCase())?.[veld]??null;}
  function getKiem(gewas,soort){const k=(kiemkracht||[]).find(x=>x.gewas===gewas&&x.soort===soort);return k?Number(k.kiem)||1:1;}
  const relevanteOrders = orders.filter(o=>o.status==="bevestigd"||o.status==="reservering");
  relevanteOrders.forEach(o=>{
    const leverWk=getWeekNr(o.leverdatum), leverJaar=getJaar(o.leverdatum);
    o.regels.forEach(r=>{
      const trays=r.aantal;
      const uitzaaiWeken=getDuur(r.gewas,r.soort,r.verpakking,"uitzaai");
      const inboetWeken=getDuur(r.gewas,r.soort,r.verpakking,"inboet");
      const kiem=getKiem(r.gewas,r.soort);
      const rijKey=r.gewas+"||"+r.soort+"||"+r.verpakking;
      const leverLabel=String(leverJaar).slice(-2)+String(leverWk).padStart(2,"0");
      const fustL=r.verpakking?.toLowerCase()||"";
      let zaaiFust;
      if(fustL.includes("65")||fustL.includes("66")) zaaiFust="Zaaitray 264";
      else if(fustL.includes("179")||fustL.includes("180")) zaaiFust="Zaaitray 180";
      else if(fustL.includes("260")||fustL.includes("264")) zaaiFust="Zaaitray 264";
      else zaaiFust=r.verpakking;
      if(uitzaaiWeken!==null){
        let zaaiWk=leverWk-uitzaaiWeken, zaaiJaar=leverJaar;
        if(zaaiWk<=0){zaaiJaar--;zaaiWk+=52;}
        const zaaiLabel=String(zaaiJaar).slice(-2)+String(zaaiWk).padStart(2,"0");
        const is65=fustL.includes("65")||fustL.includes("66");
        const zaaiTrays=is65?Math.ceil(Math.ceil(trays/kiem)/4):(kiem>0?Math.ceil(trays/kiem):trays);
        const zaaiKey=r.gewas+"||"+r.soort+"||"+zaaiFust;
        if(!planning[zaaiLabel]) planning[zaaiLabel]={zaai:{},inboet:{}};
        if(!planning[zaaiLabel].zaai[zaaiKey]) planning[zaaiLabel].zaai[zaaiKey]={gewas:r.gewas,soort:r.soort,fust:zaaiFust,trays:0,zaaiTrays:0,kiem:Math.round(kiem*100),leverWeek:leverLabel,internNr:r.internNr||"",volgorde:r.volgorde||""};
        planning[zaaiLabel].zaai[zaaiKey].trays+=trays;
        planning[zaaiLabel].zaai[zaaiKey].zaaiTrays+=zaaiTrays;
      }
      if(inboetWeken!==null){
        let inboetWk=leverWk-inboetWeken, inboetJaar=leverJaar;
        if(inboetWk<=0){inboetJaar--;inboetWk+=52;}
        const inboetLabel=String(inboetJaar).slice(-2)+String(inboetWk).padStart(2,"0");
        if(!planning[inboetLabel]) planning[inboetLabel]={zaai:{},inboet:{}};
        if(!planning[inboetLabel].inboet[rijKey]) planning[inboetLabel].inboet[rijKey]={gewas:r.gewas,soort:r.soort,fust:r.verpakking,trays:0,inboetTrays:0,kiem:Math.round(kiem*100),leverWeek:leverLabel,internNr:r.internNr||"",volgorde:r.volgorde||""};
        planning[inboetLabel].inboet[rijKey].trays+=trays;
        planning[inboetLabel].inboet[rijKey].inboetTrays+=trays;
      }
    });
  });
  return planning;
}

function _berekenKarren(trays){
  if(!trays) return null;
  const afgerond=Math.ceil(trays/4)*4; const lagen=afgerond/4; let beste=null;
  for(let k=1;k<=Math.ceil(lagen/12);k++){
    for(let a=0;a<=k;a++){for(let b=0;b<=k-a;b++){
      const c=Math.min(k-a-b,4); if(k-a-b!==c) continue;
      const totL=a*12+b*14+c*15;
      if(totL===lagen){const sc=c*1000+b*10;if(!beste||k<beste.k||(k===beste.k&&sc<beste.score))beste={k,a,b,c,rest:0,score:sc};}
    }}
    if(k>=2){for(let a=0;a<=k-1;a++){for(let b=0;b<=k-1-a;b++){
      const maxC=Math.min(k-1-a-b,4);
      for(let c=0;c<=maxC;c++){
        const volL=a*12+b*14+c*15; const restL=lagen-volL;
        if(restL>=1&&restL<=11&&a+b+c===k-1){const sc=c*1000+b*10+1;if(!beste||k<beste.k||(k===beste.k&&sc<beste.score))beste={k,a,b,c,rest:restL,score:sc};}
      }
    }}}
    if(beste&&beste.k===k) break;
  }
  if(!beste&&lagen<=11) beste={k:1,a:0,b:0,c:0,rest:lagen,score:0};
  return beste;
}
function _karOmschrijving(v){
  if(!v) return "—";
  const d=[];
  if(v.a>0) d.push(v.a+"× 11pl");
  if(v.b>0) d.push(v.b+"× 13pl");
  if(v.c>0) d.push(v.c+"× 14pl");
  if(v.rest>0) d.push("1× "+(v.rest-1)+"pl");
  return d.join(" + ");
}

function TransportPagina({ klanten, orders, bedrijf, verpDef }) {

          }

      }
      if(beste&&beste.k===k) break;
    }

      const bg=i%2===0?wit:"#f0f7f4";
      const TD="padding:5px 8px;border:2px solid #b0cfc0";
      const dagen=["ZO","MA","DI","WO","DO","VR","ZA"];
      const td=o.transportDatum?new Date(o.transportDatum):null;
      const dagWk=td?"wk"+String(getWeekNr(o.transportDatum)).padStart(2,"0")+" "+dagen[td.getDay()]:"";
      const gedruktOp = o.pakbonGedrukt||"";
      const klaartijdTonen = gedruktOp ? (o.klaartijd||kl.klaartijd||"") : "";
      return "<tr style='background:"+bg+"'>"
        +"<td style='"+TD+";font-weight:700'>"+kl.naam+"</td>"
        +"<td style='"+TD+";vertical-align:middle;text-align:left'>"+(cp.mobiel||cp.telefoon||"")+"</td>"
        +"<td style='"+TD+";font-size:11px'>"+fusten+"</td>"
        +"<td style='"+TD+";text-align:right;font-weight:700'>"+trays+"</td>"
        +"<td style='"+TD+";text-align:right;font-weight:700;color:#2d6a4f'>"+(verd?verd.k:"—")+"</td>"
        +"<td style='"+TD+";font-size:10px'>"+karOmschrijving(verd)+"</td>"
        +"<td style='"+TD+";text-align:center;font-weight:700;color:#0891b2;font-size:12px;min-width:120px;white-space:nowrap'>"+dagWk+(dagWk&&klaartijdTonen?" ":"")+(klaartijdTonen?"<span style='font-weight:400;color:#333'>"+klaartijdTonen+"</span>":"")+"</td>"
        +"<td style='"+TD+";text-align:center;font-size:10px;color:"+(gedruktOp?"#166534":"#aaa")+"'>"+(gedruktOp?"🖨️ "+gedruktOp:"—")+"</td>"
        +"</tr>";
    }).join("");
    const doc="<!DOCTYPE html><html><head><meta charset='UTF-8'>"
      +"<style>@page{size:A4 portrait;margin:12mm} body{font-family:Arial,sans-serif;font-size:11px;color:#222;margin:0} table{border-collapse:collapse;width:100%} @media print{button{display:none}}</style></head><body>"
      +"<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #2d6a4f'>"
        +"<div>"+logo+"</div>"
        +"<div style='text-align:center'><div style='font-size:16px;font-weight:700'>TRANSPORTLIJST</div><div style='font-size:12px;color:#555'>Week "+twk+" &nbsp;·&nbsp; "+datum+"</div></div>"
        +"<div style='text-align:right;font-size:11px'><strong>"+tOrders.length+"</strong> orders &nbsp;·&nbsp; <strong>"+totaalTrays+"</strong> trays</div>"
      +"</div>"
      +"<table><thead><tr>"
        +"<th style='padding:5px 8px;background:#b8ddc8;color:#0f3320;border:2px solid #8cbfac;text-align:left'>Klant</th>"
        
        +"<th style='padding:5px 8px;background:#b8ddc8;color:#0f3320;border:2px solid #8cbfac;text-align:left'>Contact</th>"
        +"<th style='padding:5px 8px;background:#b8ddc8;color:#0f3320;border:2px solid #8cbfac;text-align:left'>Fust</th>"
        +"<th style='padding:5px 8px;background:#b8ddc8;color:#0f3320;border:2px solid #8cbfac;text-align:right'>Trays</th>"
        +"<th style='padding:5px 8px;background:#b8ddc8;color:#0f3320;border:2px solid #8cbfac;text-align:right'>Karren</th>"
        +"<th style='padding:5px 8px;background:#b8ddc8;color:#0f3320;border:2px solid #8cbfac'>Verdeling</th>"
        +"<th style='padding:5px 8px;background:#b8ddc8;color:#0f3320;border:2px solid #8cbfac;text-align:center;min-width:90px'>Dag &amp; Tijd</th>"
      +"</tr></thead><tbody>"+rijen+"</tbody>"
      +"<tfoot>"
      +"<tr style='background:#a8d5b5;font-weight:700;border-top:3px solid #0f3320'>"
        +"<td style='padding:5px 8px;border:2px solid #8cbfac;color:#0f3320'>Totaal</td>"
        +"<td style='padding:5px 8px;border:2px solid #8cbfac'></td>"
        +"<td style='padding:5px 8px;border:2px solid #8cbfac'></td>"
        +"<td style='padding:5px 8px;border:2px solid #8cbfac;text-align:right;color:#0f3320;font-weight:700'>"+totaalTrays+"</td>"
        +"<td style='padding:5px 8px;border:2px solid #8cbfac;text-align:right;color:#0f3320;font-weight:700'>"+ptotKarrenZonderRest+"</td>"
        +"<td style='padding:5px 8px;border:2px solid #8cbfac;color:#0f3320;font-size:10px'>"
          +[ptot11>0?ptot11+"× 11pl":null,ptot13>0?ptot13+"× 13pl":null,ptot14>0?ptot14+"× 14pl":null].filter(Boolean).join(" · ")
          +(prestKarren.length>0?"<br/>rest: "+prestKarren.length+"× "+prestDetails:"")
        +"</td>"
        +"<td style='padding:5px 8px;border:2px solid #8cbfac'></td>"
        +"<td style='padding:5px 8px;border:2px solid #8cbfac'></td>"
      +"</tr>"
      +"</tfoot></table></body></html>";
    const w=window.open("","_blank");
    if(w){w.document.open();w.document.write(doc);w.document.close();setTimeout(()=>w.print(),400);}
  }

  return (
    <div style={{padding:10,overflowY:"auto",height:"calc(100vh - 50px)"}}>
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12,flexWrap:"wrap"}}>
        <h2 style={{fontSize:15,fontWeight:700,color:groen}}>🚛 Transportlijst</h2>
        <select style={{...gs.input,fontSize:12,width:"auto"}} value={twk} onChange={e=>setTwk(e.target.value)}>
          {alleWk.map(w=><option key={w}>{w}</option>)}
        </select>
        <span style={{fontSize:12,color:subtekst}}>{tOrders.length} orders</span>
        <button style={{...gs.knopPrimair,marginLeft:"auto"}} onClick={printTransport}>🖨️ Afdrukken</button>
      </div>
      {tOrders.length===0
        ? <div style={{textAlign:"center",color:subtekst,padding:40}}>Geen orders voor week {twk}</div>
        : <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr>
              {[["Klant",false],["Contact",false],["Fust",false],["Trays",true],["Karren",true],["Verdeling",false],["Planten",true]].map(([h,r])=>(
                <th key={h} style={{...TH,textAlign:r?"right":"left"}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {tOrders.map((o,i)=>{
                const kl=klanten.find(k=>k.id===o.klantId)||{};
                const cp=(kl.contactpersonen||[])[0]||{};
                const trays=o.regels.reduce((s,r)=>s+r.aantal,0);
                const pl=o.regels.reduce((s,r)=>{const vd=verpDef.find(v=>v.naam===r.verpakking);return s+(vd?.aantal||0)*r.aantal;},0);
                const fusten=[...new Set(o.regels.map(r=>r.verpakking))].join(", ");
                const verd=berekenKarren(trays);
                return (
                  <tr key={o.id} style={{background:i%2===0?wit:"#f0f7f4"}}>
                    <td style={{...TD,fontWeight:700,color:groen}}>{kl.naam}</td>
                    <td style={{...TD,fontSize:11,lineHeight:1.4}}>{cp.naam||"—"}<br/><span style={{color:subtekst,fontSize:10}}>{[cp.telefoon,cp.email].filter(Boolean).join(" · ")||""}</span></td>
                    <td style={{...TD,fontSize:11}}>{fusten}</td>
                    <td style={{...TD,textAlign:"right",fontWeight:700}}>{trays}</td>
                    <td style={{...TD,textAlign:"right",fontWeight:700,color:groen}}>{verd?verd.k:"—"}</td>
                    <td style={{...TD,fontSize:11,color:subtekst}}>{karOmschrijving(verd)}</td>
                    <td style={{...TD,textAlign:"right",color:groen,fontWeight:600}}>{pl.toLocaleString("nl-NL")}</td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>{(()=>{
              const totTrays=tOrders.reduce((s,o)=>s+o.regels.reduce((r,x)=>r+x.aantal,0),0);
              const totPl=tOrders.reduce((s,o)=>s+o.regels.reduce((r,x)=>{const vd=verpDef.find(v=>v.naam===x.verpakking);return r+(vd?.aantal||0)*x.aantal;},0),0);
              const restKarren=tOrders.filter(o=>{const t=o.regels.reduce((r,x)=>r+x.aantal,0);const v=berekenKarren(t);return v&&v.rest>0;});
              // Restkarren NIET meetellen in totaal
              const totKarren=tOrders.reduce((s,o)=>{const t=o.regels.reduce((r,x)=>r+x.aantal,0);const v=berekenKarren(t);return s+(v?v.k-(v.rest>0?1:0):0);},0);
              const tot11=tOrders.reduce((s,o)=>{const t=o.regels.reduce((r,x)=>r+x.aantal,0);const v=berekenKarren(t);return s+(v?v.a:0);},0);
              const tot13=tOrders.reduce((s,o)=>{const t=o.regels.reduce((r,x)=>r+x.aantal,0);const v=berekenKarren(t);return s+(v?v.b:0);},0);
              const tot14=tOrders.reduce((s,o)=>{const t=o.regels.reduce((r,x)=>r+x.aantal,0);const v=berekenKarren(t);return s+(v?v.c:0);},0);
              const restDetails=restKarren.map(o=>{const t=o.regels.reduce((r,x)=>r+x.aantal,0);const v=berekenKarren(t);return "("+( v.rest-1)+")";}).join(" ");
              const samenvatting=[
                tot11>0?tot11+"× 11pl":null,
                tot13>0?tot13+"× 13pl":null,
                tot14>0?tot14+"× 14pl":null,
                restKarren.length>0?"rest: "+restKarren.length+"× "+restDetails:null,
              ].filter(Boolean).join(" · ");
              const bS={padding:"5px 6px",fontWeight:700,borderTop:"2px solid "+groen,background:"#e8f5ee"};
              return (
                <tr>
                  <td colSpan={3} style={{...bS,color:groen,fontSize:11}}>{samenvatting||"Totaal"}</td>
                  <td style={{...bS,textAlign:"right",color:groen}}>{totTrays}</td>
                  <td style={{...bS,textAlign:"right",color:groen}}>{totKarren}</td>
                  <td style={{...bS,fontSize:11,color:subtekst}}></td>
                  <td style={{...bS,textAlign:"right",color:groen}}>{totPl.toLocaleString("nl-NL")}</td>
                </tr>
              );
            })()}</tfoot>
          </table>
      }
    </div>
  );
}

// MAILING PAGINA
// ════════════════════════════════════════════════════════
function MailingPagina({ klanten, orders }) {
  const [mailLog, setMailLog] = useState(()=>{
    try{ return JSON.parse(localStorage.getItem('ta_maillog')||'[]'); }catch(e){ return []; }
  });
  const [zoek, setZoek] = useState("");
  const [zoekKlant, setZoekKlant] = useState("");

  useEffect(()=>{
    function onStorage(e) {
      if(e.key==='ta_maillog') {
        try{ setMailLog(JSON.parse(e.newValue||'[]')); }catch(x){}
      }
    }
    window.addEventListener('storage', onStorage);
    const interval = setInterval(()=>{
      try{ setMailLog(JSON.parse(localStorage.getItem('ta_maillog')||'[]')); }catch(x){}
    }, 2000);
    return ()=>{ window.removeEventListener('storage', onStorage); clearInterval(interval); };
  }, []);

  const uniekeKlanten = [...new Set(mailLog.map(m=>m.klant))].sort();

  const gefilterd = mailLog.filter(m=>{
    if(zoekKlant && m.klant!==zoekKlant) return false;
    if(zoek && !m.datum?.toLowerCase().includes(zoek.toLowerCase())
            && !m.klant?.toLowerCase().includes(zoek.toLowerCase())
            && !m.onderwerp?.toLowerCase().includes(zoek.toLowerCase())) return false;
    return true;
  });

  return (
    <div style={{padding:16,overflowY:"auto",height:"calc(100vh - 50px)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <h2 style={{fontSize:15,fontWeight:700,color:groen}}>📧 Mailing — Verzonden berichten</h2>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{fontSize:12,color:subtekst}}>{gefilterd.length}/{mailLog.length} mail(s)</span>
          <button style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:5,padding:"4px 10px",cursor:"pointer",fontSize:12}}
            onClick={()=>{ if(window.confirm("Maillog wissen?")){ setMailLog([]); localStorage.removeItem('ta_maillog'); } }}>
            🗑️ Wis log
          </button>
        </div>
      </div>

      {/* Zoekbalk */}
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <input style={{...gs.input,flex:1,fontSize:12}} placeholder="🔍 Zoek op klant, datum of onderwerp..."
          value={zoek} onChange={e=>setZoek(e.target.value)} />
        <select style={{...gs.input,width:"auto",fontSize:12}} value={zoekKlant} onChange={e=>setZoekKlant(e.target.value)}>
          <option value="">— Alle klanten —</option>
          {uniekeKlanten.map(k=><option key={k} value={k}>{k}</option>)}
        </select>
        {(zoek||zoekKlant)&&<button style={{...gs.knopSecundair,fontSize:12}} onClick={()=>{setZoek("");setZoekKlant("");}}>✕ Wis filter</button>}
      </div>

      {gefilterd.length===0
        ? <div style={{textAlign:"center",color:subtekst,padding:60}}>
            <div style={{fontSize:40,marginBottom:10}}>📧</div>
            <div>{mailLog.length===0?"Nog geen mails verstuurd":"Geen resultaten"}</div>
          </div>
        : <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr>{[["Datum/tijd",180],["Klant",140],["E-mail",180],["Week",60],["Onderwerp",0]].map(([h,w])=>(
                <th key={h} style={{...TH,fontSize:11,minWidth:w||"auto"}}>{h.toUpperCase()}</th>
              ))}</tr>
            </thead>
            <tbody>
              {gefilterd.map((m,i)=>(
                <tr key={i} style={{background:i%2===0?wit:"#f0f7f4"}}>
                  <td style={{...TD,fontSize:12,whiteSpace:"nowrap"}}>{m.datum}</td>
                  <td style={{...TD,fontSize:12,fontWeight:600,color:groen}}>{m.klant}</td>
                  <td style={{...TD,fontSize:12}}>{m.email}</td>
                  <td style={{...TD,fontSize:12,textAlign:"center"}}><span style={{background:lichtGroen,color:groen,borderRadius:20,padding:"1px 8px",fontSize:11,fontWeight:600}}>{m.week}</span></td>
                  <td style={{...TD,fontSize:12,color:subtekst}}>{m.onderwerp}</td>
                </tr>
              ))}
            </tbody>
          </table>
      }
    </div>
  );
}

// KLANT MATRIX PRINT — seizoensoverzicht PDF
// ════════════════════════════════════════════════════════
function KlantMatrixPrint({ data, bedrijf, verpDef, onSluit }) {
  const { klant, orders } = data;
  const bd = bedrijf||{};
  const vandaag = new Date().toLocaleDateString("nl-NL");

  function plantenVast(r){
    const vd=verpDef.find(v=>v.naam===r.verpakking);
    return r.vastPlanten??((vd?.aantal||0)*r.aantal);
  }

  // Bouw matrix
  const alleWkn = [...new Set(orders.map(o=>weekLabel(o.leverdatum)))].sort();
  const rijMap = {};
  orders.forEach(o=>{
    const wk = weekLabel(o.leverdatum);
    o.regels.forEach(r=>{
      const key = r.gewas+"||"+r.soort+"||"+r.verpakking+"||"+(r.prijs||"");
      if(!rijMap[key]) rijMap[key]={gewas:r.gewas,soort:r.soort,verpakking:r.verpakking,prijs:r.prijs,weken:{}};
      rijMap[key].weken[wk]=(rijMap[key].weken[wk]||0)+plantenVast(r);
      if(r.prijs) rijMap[key].prijs=r.prijs;
    });
  });
  const rijen = Object.values(rijMap).sort((a,b)=>a.soort.localeCompare(b.soort));
  const totaalPerWeek = wk => rijen.reduce((s,r)=>s+(r.weken[wk]||0),0);
  const rijTotaal = r => alleWkn.reduce((s,wk)=>s+(r.weken[wk]||0),0);
  const grootTotaal = alleWkn.reduce((s,wk)=>s+totaalPerWeek(wk),0);

  function printDoc() {
    const el = document.getElementById("klantmatrix-print-inhoud");
    const w = window.open("","_blank");
    w.document.write(`<html><head><title>Seizoensoverzicht ${klant?.naam}</title><style>
      @page{size:A4 landscape;margin:10mm}
      body{font-family:Arial,sans-serif;font-size:10px;color:#222;margin:0;padding:0}
      table{border-collapse:collapse;width:100%}
      th{background:#e8f5ee;color:#2d6a4f;padding:4px 6px;border:1px solid #c8e6c9;font-size:9px;text-align:right}
      th.l{text-align:left}
      td{padding:4px 6px;border:1px solid #eee;font-size:9px;text-align:right}
      td.l{text-align:left}
      .weekblok{display:inline-block;background:#e8f5ee;border-radius:6px;padding:6px 10px;margin:3px;min-width:80px;border:1px solid #c8e6c9}
      .weekblok .wk{font-weight:700;color:#2d6a4f;font-size:10px}
      .weekblok .pl{font-size:13px;font-weight:700;color:#2d6a4f}
      .weekblok .lbl{font-size:8px;color:#888}
      @media print{button{display:none}}
    </style></head><body>${el.innerHTML}</body></html>`);
    w.document.close();
    setTimeout(()=>w.print(),400);
  }

  const cH={padding:"3px 6px",background:"#e8f5ee",color:groen,fontWeight:700,fontSize:9,border:"1px solid #c8e6c9",textAlign:"right",whiteSpace:"nowrap"};
  const cL={...cH,textAlign:"left"};
  const cD={padding:"3px 6px",fontSize:10,border:"1px solid #eee",textAlign:"right"};
  const cDL={...cD,textAlign:"left"};

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.6)",zIndex:500,overflowY:"auto",padding:20}}>
      <div style={{maxWidth:1100,margin:"0 auto",background:"#fff",borderRadius:8,overflow:"hidden",boxShadow:"0 8px 40px rgba(0,0,0,0.3)"}}>
        <div style={{display:"flex",gap:8,padding:"10px 16px",background:"#f0f7f4",borderBottom:`1px solid ${rand}`}}>
          <button style={gs.knopPrimair} onClick={printDoc}>🖨️ Afdrukken / PDF</button>
          <button style={gs.knopSecundair} onClick={onSluit}>✕ Sluiten</button>
        </div>
        <div id="klantmatrix-print-inhoud" style={{padding:"20px 24px",fontFamily:"Arial,sans-serif",fontSize:10}}>
          {/* Header */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14,borderBottom:`2px solid ${groen}`,paddingBottom:10}}>
            <div>
              <div style={{fontSize:18,fontWeight:700,color:groen}}>ORDERBEVESTIGING <span style={{color:tekst}}>{klant?.naam}</span></div>
              <div style={{fontSize:11,color:subtekst,marginTop:2}}>{bd.naam} · {bd.adres}, {bd.postcode} {bd.plaats}</div>
            </div>
            <div style={{textAlign:"right",fontSize:11,color:subtekst}}>Datum: {vandaag}</div>
          </div>

          {/* Totaal per week blokken */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,fontWeight:700,color:groen,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Totaal per week</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {alleWkn.map(wk=>(
                <div key={wk} style={{background:"#e8f5ee",borderRadius:6,padding:"5px 10px",minWidth:75,border:`1px solid ${lichtGroen}`}}>
                  <div style={{fontSize:9,fontWeight:700,color:groen}}>Week {wk}</div>
                  <div style={{fontSize:14,fontWeight:700,color:groen}}>{totaalPerWeek(wk).toLocaleString("nl-NL")}</div>
                  <div style={{fontSize:8,color:subtekst}}>planten</div>
                </div>
              ))}
            </div>
          </div>

          {/* Matrix tabel */}
          <div style={{overflowX:"auto"}}>
            <table style={{borderCollapse:"collapse",fontSize:10}}>
              <thead>
                <tr>
                  <th style={{...cL,minWidth:100}}>Soort</th>
                  <th style={{...cL,minWidth:65}}>Fust</th>
                  <th style={{...cH,minWidth:50}}>€/st.</th>
                  {alleWkn.map(wk=><th key={wk} style={{...cH,minWidth:50}}>{wk}</th>)}
                  <th style={{...cH,minWidth:55,background:"#c8e6c9"}}>Totaal</th>
                </tr>
              </thead>
              <tbody>
                {rijen.map((r,i)=>(
                  <tr key={i} style={{background:i%2===0?wit:"#f0f7f4"}}>
                    <td style={cDL}>{r.soort}</td>
                    <td style={cDL}><span style={{background:lichtGroen,color:groen,borderRadius:20,padding:"1px 6px",fontSize:9,fontWeight:600}}>{r.verpakking}</span></td>
                    <td style={{...cD,color:groen}}>{r.prijs?"€"+Number(r.prijs).toFixed(3):"—"}</td>
                    {alleWkn.map(wk=>(
                      <td key={wk} style={{...cD,fontWeight:r.weken[wk]?600:300,color:r.weken[wk]?"#222":"#ccc"}}>
                        {r.weken[wk]?r.weken[wk].toLocaleString("nl-NL"):""}
                      </td>
                    ))}
                    <td style={{...cD,fontWeight:700,color:groen,background:"#f0fff4"}}>{rijTotaal(r).toLocaleString("nl-NL")}</td>
                  </tr>
                ))}
              </tbody>
              <tfoot>
                <tr style={{background:"#e8f5ee",fontWeight:700}}>
                  <td colSpan={3} style={{...cL,borderTop:`2px solid ${groen}`,color:groen}}>Totaal</td>
                  {alleWkn.map(wk=><td key={wk} style={{...cH,borderTop:`2px solid ${groen}`}}>{totaalPerWeek(wk).toLocaleString("nl-NL")}</td>)}
                  <td style={{...cH,borderTop:`2px solid ${groen}`,background:"#c8e6c9"}}>{grootTotaal.toLocaleString("nl-NL")}</td>
                </tr>
              </tfoot>
            </table>
          </div>

          {/* Footer */}
          <div style={{marginTop:14,paddingTop:8,borderTop:`1px solid ${rand}`,fontSize:9,color:subtekst,display:"flex",justifyContent:"space-between"}}>
            <span>{bd.naam} · {bd.adres}, {bd.postcode} {bd.plaats}</span>
            {bd.iban&&<span>IBAN: {bd.iban}</span>}
          </div>
        </div>
      </div>
    </div>
  );
}

// LEVERANCIERSBEHEER
// ════════════════════════════════════════════════════════
function LeveranciersBeheer({ leveranciers, setLeveranciers, gewassen, setGewassen }) {
  const leeg = {id:null,naam:"",email:"",telefoon:"",contactpersoon:"",notitie:""};
  const [form,setForm] = useState(null);
  const [data,setData] = useState(leeg);
  const [delId,setDelId] = useState(null);

  function opslaan() {
    if(!data.naam) return;
    if(data.id) setLeveranciers(leveranciers.map(l=>l.id===data.id?data:l));
    else setLeveranciers([...leveranciers,{...data,id:Date.now()}]);
    setForm(null);
  }

  function verwijder(id) {
    setLeveranciers(leveranciers.filter(l=>l.id!==id));
    // Ontkoppel gewassen
    setGewassen(gewassen.map(g=>g.leverancierId===id?{...g,leverancierId:null}:g));
    setDelId(null);setForm(null);
  }

  const veld=(lbl,k,type="text")=>(
    <div style={gs.veldGroep}><label style={gs.label}>{lbl}</label>
    <input style={gs.input} type={type} value={data[k]||""} onChange={e=>setData({...data,[k]:e.target.value})} /></div>
  );

  // Welke gewassen zijn gekoppeld aan deze leverancier
  function gewassenVoor(levId) {
    return gewassen.filter(g=>g.leverancierId===levId).map(g=>g.naam).join(", ")||"—";
  }

  return (
    <div style={{display:"flex",height:"calc(100vh - 50px)"}}>
      {/* Lijst */}
      <div style={{width:260,borderRight:`1px solid ${rand}`,background:wit,padding:10,overflowY:"auto",flexShrink:0}}>
        <button style={{...gs.knopPrimair,width:"100%",marginBottom:8}} onClick={()=>{setData({...leeg});setForm("nieuw");}}>+ Nieuwe leverancier</button>
        <div style={{fontSize:10,color:subtekst,marginBottom:6}}>{leveranciers.length} leverancier(s)</div>
        {leveranciers.map(l=>(
          <div key={l.id} onClick={()=>{setData({...l});setForm("bewerk");}}
            style={{padding:"8px 10px",borderRadius:6,cursor:"pointer",marginBottom:3,
              background:form&&data.id===l.id?lichtGroen:"transparent",
              border:`1px solid ${form&&data.id===l.id?groen:"transparent"}`}}>
            <div style={{fontWeight:600}}>{l.naam}</div>
            <div style={{fontSize:11,color:subtekst}}>{l.email||"—"}</div>
            <div style={{fontSize:10,color:subtekst,marginTop:2}}>{gewassenVoor(l.id)}</div>
          </div>
        ))}
        {leveranciers.length===0&&<div style={{color:subtekst,fontSize:12,textAlign:"center",padding:20}}>Nog geen leveranciers</div>}
      </div>

      {/* Formulier */}
      <div style={{flex:1,padding:20,overflowY:"auto"}}>
        {form?(
          <div style={{maxWidth:460}}>
            <h2 style={{fontSize:15,fontWeight:700,marginBottom:16}}>{form==="nieuw"?"Nieuwe leverancier":"Leverancier bewerken"}</h2>
            <div style={gs.sectie}>
              <div style={gs.sectieLabel}>Gegevens</div>
              {veld("Naam","naam")}
              {veld("E-mailadres","email","email")}
              {veld("Telefoon","telefoon","tel")}
              {veld("Contactpersoon","contactpersoon")}
              <div style={gs.veldGroep}><label style={gs.label}>Notitie</label>
                <textarea style={{...gs.input,height:60,resize:"vertical"}} value={data.notitie||""} onChange={e=>setData({...data,notitie:e.target.value})} /></div>
            </div>

            {/* Gewassen koppelen */}
            {data.id&&(
              <div style={gs.sectie}>
                <div style={gs.sectieLabel}>Gekoppelde gewassen</div>
                <div style={{fontSize:11,color:subtekst,marginBottom:8}}>Selecteer welke gewassen van deze leverancier komen:</div>
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  {gewassen.map(g=>(
                    <label key={g.id} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"4px 0"}}>
                      <input type="checkbox"
                        checked={g.leverancierId===data.id}
                        onChange={e=>setGewassen(gewassen.map(x=>x.id===g.id?{...x,leverancierId:e.target.checked?data.id:null}:x))}
                        style={{cursor:"pointer",accentColor:groen}}
                      />
                      <span style={{fontWeight:600}}>{g.naam}</span>
                      {g.leverancierId&&g.leverancierId!==data.id&&(
                        <span style={{fontSize:10,color:"#f59e0b"}}>⚠️ al bij andere leverancier</span>
                      )}
                    </label>
                  ))}
                </div>
              </div>
            )}

            <div style={{display:"flex",gap:8,marginTop:8}}>
              <button style={gs.knopPrimair} onClick={opslaan}>💾 Opslaan</button>
              {data.id&&<button style={gs.knopVerwijder} onClick={()=>setDelId(data.id)}>🗑️ Verwijderen</button>}
              <button style={gs.knopSecundair} onClick={()=>setForm(null)}>Annuleren</button>
            </div>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:subtekst,gap:10}}>
            <div style={{fontSize:40}}>🚚</div>
            <div>Selecteer een leverancier of maak een nieuwe aan</div>
          </div>
        )}
      </div>
      {delId&&<BevestigModal tekst="Leverancier verwijderen?" onJa={()=>verwijder(delId)} onNee={()=>setDelId(null)} />}
    </div>
  );
}

function Inkoopprijzen({ gewassen, setGewassen }) {
  const [ontgrendeld, setOntgrendeld] = React.useState(false);
  const [openGewas, setOpenGewas] = useState(()=>
    Object.fromEntries((gewassen||[]).map(g=>["open_"+g.naam, false]))
  );

  function setLeverancier(gewasId, veld, waarde) {
    const b = gewassen.map(g=>g.id===gewasId?{...g,[veld]:waarde}:g);
    setGewassen(b);
  }

  function setInkoopPrijs(gewasId, soort, waarde) {
    const b = gewassen.map(g=>g.id===gewasId?{...g,inkoopPrijzen:{...(g.inkoopPrijzen||{}),[soort]:waarde===''?'':Number(waarde)}}:g);
    setGewassen(b);
  }

  const iS = {padding:"3px 6px",border:`1px solid ${rand}`,borderRadius:3,fontSize:12,width:80,textAlign:"right",background:"#fafffe"};
  const mTH = {...TH,padding:"4px 8px",background:"#dff0e8",color:groen,fontSize:11};
  const mTD = {padding:"4px 8px",fontSize:12,borderBottom:`1px solid ${rand}`};

  return (
    <div style={{display:"flex",height:"calc(100vh - 50px)",position:"relative"}}>
      {!ontgrendeld&&<BeveiligingsOverlay onOntgrendel={()=>setOntgrendeld(true)} label="Inkoopprijzen zaad" />}
      {/* Info */}
      <div style={{width:200,borderRight:`1px solid ${rand}`,background:wit,padding:14,flexShrink:0}}>
        <div style={{fontSize:11,fontWeight:700,color:groen,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Inkoopprijzen</div>
        <div style={{fontSize:12,color:subtekst,lineHeight:1.6}}>
          Stel per gewas de inkoopprijs per 1000 zaden in per soort.<br/><br/>
          Deze prijs wordt automatisch ingevuld bij een nieuwe zaadinkoop.<br/><br/>
          Leveranciers instellen via ⚙️ Stamdata → 🚚 Leveranciers.
        </div>
        <div style={{marginTop:12,fontSize:11,color:subtekst}}>
          {gewassen.filter(g=>g.leverancier).length} gewassen met leverancier
        </div>
      </div>

      {/* Matrix */}
      <div style={{flex:1,overflowY:"auto",padding:14}}>
        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
          <button style={{...gs.knopSecundair,fontSize:11,padding:"3px 10px"}} onClick={()=>{
            const alleOpen = gewassen.every(g=>openGewas["open_"+g.naam]===true);
            const nieuw={};
            gewassen.forEach(g=>nieuw["open_"+g.naam]=!alleOpen);
            setOpenGewas(nieuw);
          }}>
            {gewassen.every(g=>openGewas["open_"+g.naam]===true)?"▲ Inklappen":"▼ Uitklappen"}
          </button>
        </div>

        {gewassen.map(gw=>{
          const openKey = "open_"+gw.naam;
          const isOpen = openGewas[openKey]===true;
          const heeftPrijzen = Object.keys(gw.inkoopPrijzen||{}).filter(s=>(gw.inkoopPrijzen||{})[s]!=='').length;

          return (
            <div key={gw.naam} style={{background:wit,border:`1px solid ${rand}`,borderRadius:6,marginBottom:6,overflow:"hidden"}}>
              {/* Header */}
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"5px 10px",
                background:"#f0f7f4",borderBottom:isOpen?`1px solid ${rand}`:"none",cursor:"pointer"}}
                onClick={()=>setOpenGewas({...openGewas,[openKey]:!isOpen})}>
                <span style={{fontSize:12,color:groen}}>{isOpen?"▼":"▶"}</span>
                <span style={{fontWeight:700,fontSize:14,color:groen,flex:1}}>{gw.naam}</span>
                {gw.leverancier&&<span style={{fontSize:11,color:subtekst}}>{gw.leverancier}</span>}
                <span style={{fontSize:10,color:subtekst}}>{heeftPrijzen}/{gw.soorten.length} prijzen</span>
              </div>

              {isOpen&&(
                <div style={{padding:"10px 12px"}}>
                  {/* Prijzen tabel */}
                  <table style={{width:"auto",tableLayout:"fixed"}}>
                    <colgroup>
                      <col style={{width:200}}/>
                      <col style={{width:100}}/>
                    </colgroup>
                    <thead>
                      <tr>
                        <th style={{...mTH,textAlign:"left"}}>Soort</th>
                        <th style={{...mTH,textAlign:"right"}}>€ / 1000 zaden</th>
                      </tr>
                    </thead>
                    <tbody>
                      {/* Allen rij */}
                      <tr style={{background:"#f0f7f4"}}>
                        <td style={{...mTD,color:subtekst,fontStyle:"italic"}}>Vul alle soorten:</td>
                        <td style={{...mTD,textAlign:"right"}}>
                          <div style={{display:"flex",alignItems:"center",gap:3,justifyContent:"flex-end"}}>
                            <span style={{fontSize:11,color:subtekst}}>€</span>
                            <input
                              style={{...iS,background:"#f0f7f4",fontStyle:"italic"}}
                              type="number" step="0.01" min="0" placeholder="Allen"
                              onFocus={e=>e.target.select()}
                              onChange={e=>{
                                if(e.target.value==="") return;
                                const val = Number(e.target.value);
                                const b = gewassen.map(g=>g.id===gw.id?{...g,inkoopPrijzen:{...(g.inkoopPrijzen||{}),...Object.fromEntries(gw.soorten.map(s=>[s,val]))}}:g);
                                setGewassen(b);
                              }}
                            />
                          </div>
                        </td>
                      </tr>
                      {gw.soorten.map((s,si)=>{
                        const prijs = (gw.inkoopPrijzen||{})[s];
                        return (
                          <tr key={s} style={{background:si%2===0?wit:"#f0f7f4"}}>
                            <td style={mTD}>{s}</td>
                            <td style={{...mTD,textAlign:"right"}}>
                              <div style={{display:"flex",alignItems:"center",gap:3,justifyContent:"flex-end"}}>
                                <span style={{fontSize:11,color:subtekst}}>€</span>
                                <input
                                  style={{...iS,background:prijs!==''&&prijs!==undefined?"#f0fff8":"#fff"}}
                                  type="number" step="0.01" min="0" placeholder="—"
                                  value={prijs??''}
                                  onFocus={e=>e.target.select()}
                                  onChange={e=>setInkoopPrijs(gw.id,s,e.target.value)}
                                  onKeyDown={e=>{if(e.key==="Enter"||e.key==="Tab")e.target.blur();}}
                                />
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// FACTUUR OVERZICHT
// ════════════════════════════════════════════════════════
function FactuurOverzicht({ klanten, orders, verpDef, bedrijf, setOrders }) {
  const [filtKlant, setFiltKlant] = useState("");
  const vandaag = new Date();
  vandaag.setHours(0,0,0,0);

  // Bereken bedrag per order
  function berekenBedrag(order) {
    const bd = bedrijf||{};
    const btwPct = bd.btwPct??21;
    const sub = order.regels.reduce(function(s,r){
      const vd = verpDef.find(v=>v.naam===r.verpakking);
      const pl = r.vastPlanten??((vd?.aantal||0)*r.aantal);
      return s+(r.prijs?pl*Number(r.prijs):0);
    },0);
    return sub*(1+btwPct/100);
  }

  function vervalDatum(order) {
    const kl = klanten.find(k=>k.id===order.klantId)||{};
    const bd = bedrijf||{};
    const termijn = kl.betalingstermijn||bd.betalingstermijn||30;
    // Gebruik transportDatum als factuurdatum, anders vandaag
    const factDatum = order.transportDatum ? new Date(order.transportDatum) : new Date();
    const verval = new Date(factDatum);
    verval.setDate(verval.getDate()+termijn);
    verval.setHours(0,0,0,0);
    return verval;
  }

  function dagenOpen(order) {
    if(order.betaaldOp) {
      const betaald = new Date(order.betaaldOp);
      betaald.setHours(0,0,0,0);
      const factDatum = order.transportDatum ? new Date(order.transportDatum) : new Date();
      factDatum.setHours(0,0,0,0);
      return Math.round((betaald-factDatum)/(1000*60*60*24));
    }
    const factDatum = order.transportDatum ? new Date(order.transportDatum) : new Date();
    factDatum.setHours(0,0,0,0);
    return Math.round((vandaag-factDatum)/(1000*60*60*24));
  }

  function dagenTotVerval(order) {
    const verval = vervalDatum(order);
    return Math.round((verval-vandaag)/(1000*60*60*24));
  }

  function statusKleur(order) {
    if(order.betaaldOp) return {bg:"#dcfce7",kleur:groen,label:"✅ Betaald"};
    const dtv = dagenTotVerval(order);
    if(dtv < 0) return {bg:"#fee2e2",kleur:"#dc2626",label:"🔴 Verlopen ("+Math.abs(dtv)+" dgn)"};
    if(dtv <= 5) return {bg:"#fed7aa",kleur:"#c2410c",label:"🟠 Verloopt in "+dtv+" dgn"};
    return {bg:"#dbeafe",kleur:"#1d4ed8",label:"🔵 Open ("+dtv+" dgn)"};
  }

  const metFactuur = orders.filter(o=>o.factuurNr&&(!filtKlant||o.klantId===Number(filtKlant)))
    .sort((a,b)=>Number(b.factuurNr)-Number(a.factuurNr));
  const openstaand = metFactuur.filter(o=>!o.betaaldOp);
  const betaald = metFactuur.filter(o=>o.betaaldOp);
  const verlopen = openstaand.filter(o=>dagenTotVerval(o)<0);

  const totaalOpen = openstaand.reduce((s,o)=>s+berekenBedrag(o),0);
  const totaalVerlopen = verlopen.reduce((s,o)=>s+berekenBedrag(o),0);
  const gemBetaaltijd = betaald.length>0
    ? Math.round(betaald.reduce((s,o)=>s+dagenOpen(o),0)/betaald.length)
    : null;

  const TH2 = {...TH, fontSize:11, padding:"5px 8px", whiteSpace:"nowrap"};
  const TD2 = {padding:"6px 8px", fontSize:12, borderBottom:`1px solid ${rand}`, verticalAlign:"middle", whiteSpace:"nowrap"};
  // Kolom breedtes openstaand
  const colW = {nr:60, klant:140, week:60, datum:90, verval:90, bedrag:90, openst:90, status:160, actie:80};

  return (
    <div style={{padding:16,overflowY:"auto",height:"calc(100vh - 50px)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <h2 style={{fontSize:15,fontWeight:700,color:groen,margin:0}}>🧾 Facturen</h2>
        <select style={{...gs.input,width:"auto",fontSize:12,padding:"4px 8px"}}
          value={filtKlant} onChange={e=>setFiltKlant(e.target.value)}>
          <option value="">Alle klanten</option>
          {[...new Set(orders.filter(o=>o.factuurNr).map(o=>o.klantId))]
            .map(kid=>klanten.find(k=>k.id===kid)).filter(Boolean)
            .sort((a,b)=>a.naam.localeCompare(b.naam))
            .map(k=><option key={k.id} value={k.id}>{k.naam}</option>)
          }
        </select>
        {filtKlant&&<button style={{...gs.knopSecundair,fontSize:11,padding:"3px 8px"}} onClick={()=>setFiltKlant("")}>✕ Alle klanten</button>}
      </div>

      {/* Samenvatting balk */}
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <div style={{background:"#dbeafe",border:"1px solid #bfdbfe",borderRadius:8,padding:"10px 16px",minWidth:150}}>
          <div style={{fontSize:11,color:"#1d4ed8",marginBottom:2}}>Openstaand</div>
          <div style={{fontSize:20,fontWeight:700,color:"#1d4ed8"}}>€{totaalOpen.toLocaleString("nl-NL",{minimumFractionDigits:2})}</div>
          <div style={{fontSize:11,color:"#1d4ed8"}}>{openstaand.length} factuur/facturen</div>
        </div>
        {verlopen.length>0&&(
          <div style={{background:"#fee2e2",border:"1px solid #fca5a5",borderRadius:8,padding:"10px 16px",minWidth:150}}>
            <div style={{fontSize:11,color:"#dc2626",marginBottom:2}}>Verlopen</div>
            <div style={{fontSize:20,fontWeight:700,color:"#dc2626"}}>€{totaalVerlopen.toLocaleString("nl-NL",{minimumFractionDigits:2})}</div>
            <div style={{fontSize:11,color:"#dc2626"}}>{verlopen.length} factuur/facturen</div>
          </div>
        )}
        <div style={{background:"#dcfce7",border:"1px solid #c8e6c9",borderRadius:8,padding:"10px 16px",minWidth:150}}>
          <div style={{fontSize:11,color:groen,marginBottom:2}}>Betaald</div>
          <div style={{fontSize:20,fontWeight:700,color:groen}}>{betaald.length} factuur/facturen</div>
          {gemBetaaltijd!==null&&<div style={{fontSize:11,color:groen}}>Gem. {gemBetaaltijd} dagen</div>}
        </div>
      </div>

      {/* Openstaande facturen */}
      {openstaand.length>0&&(
        <>
          <h3 style={{fontSize:12,fontWeight:700,color:"#1d4ed8",marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>Openstaand</h3>
          <table style={{width:"100%",borderCollapse:"collapse",marginBottom:20,tableLayout:"fixed"}}>
            <colgroup>
              <col style={{width:60}}/><col style={{width:140}}/><col style={{width:65}}/>
              <col style={{width:92}}/><col style={{width:92}}/><col style={{width:88}}/><col style={{width:88}}/><col/><col style={{width:80}}/>
            </colgroup>
            <thead><tr style={{background:"#dbeafe"}}>
              {[["#","left"],["Klant","left"],["Week","left"],["Aangemaakt","left"],["Vervaldatum","left"],["Bedrag","right"],["Openstaand","right"],["Status / dagen open","left"],["","left"]].map(([h,a])=>(
                <th key={h} style={{...TH2,color:"#1d4ed8",background:"#dbeafe",textAlign:a}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {openstaand.map((o,i)=>{
                const kl = klanten.find(k=>k.id===o.klantId)||{};
                const verval = vervalDatum(o);
                const bedrag = berekenBedrag(o);
                const dOpen = dagenOpen(o);
                const sk = statusKleur(o);
                return (
                  <tr key={o.id} style={{background:i%2===0?wit:"#f0f7ff"}}>
                    <td style={{...TD2,fontWeight:700,color:"#1d4ed8",textAlign:"left"}}>#{o.factuurNr}</td>
                    <td style={{...TD2,fontWeight:600}}>{kl.naam}</td>
                    <td style={TD2}>{weekLabel(o.leverdatum)}</td>
                    <td style={{...TD2,color:subtekst,fontSize:11,textAlign:"left"}}>{o.transportDatum?new Date(o.transportDatum).toLocaleDateString("nl-NL"):"—"}</td>
                    <td style={{...TD2,color:dagenTotVerval(o)<0?"#dc2626":"#555",textAlign:"left"}}>{verval.toLocaleDateString("nl-NL")}</td>
                    <td style={{...TD2,fontWeight:700,textAlign:"right"}}>€{bedrag.toLocaleString("nl-NL",{minimumFractionDigits:2})}</td>
                    <td style={{...TD2,fontWeight:700,textAlign:"right",color:"#dc2626"}}>€{bedrag.toLocaleString("nl-NL",{minimumFractionDigits:2})}</td>
                    <td style={TD2}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{background:sk.bg,color:sk.kleur,borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:600,whiteSpace:"nowrap"}}>{sk.label}</span>
                        <span style={{fontSize:10,color:dOpen>30?"#dc2626":subtekst}}>{dOpen} dgn open</span>
                      </div>
                    </td>
                    <td style={TD2}>
                      <button style={{background:groen,color:wit,border:"none",borderRadius:4,padding:"3px 8px",fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}
                        onClick={()=>{
                          const datum = window.prompt("Betaaldatum (jjjj-mm-dd):", new Date().toISOString().slice(0,10));
                          if(!datum) return;
                          const bijgewerkt = {...o, betaaldOp: datum};
                          setOrders(prev=>prev.map(x=>x.id===o.id?bijgewerkt:x));
                        }}>
                        ✅ Betaald
                      </button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr style={{background:"#dbeafe",fontWeight:700}}>
                <td colSpan={5} style={{...TD2,color:"#1d4ed8",fontWeight:700,borderTop:`2px solid #bfdbfe`}}>Totaal openstaand</td>
                <td style={{...TD2,fontWeight:700,textAlign:"right",color:"#1d4ed8",borderTop:`2px solid #bfdbfe`}}>€{totaalOpen.toLocaleString("nl-NL",{minimumFractionDigits:2})}</td>
                <td style={{...TD2,fontWeight:700,textAlign:"right",color:"#dc2626",borderTop:`2px solid #bfdbfe`}}>€{totaalOpen.toLocaleString("nl-NL",{minimumFractionDigits:2})}</td>
                <td colSpan={2} style={{...TD2,borderTop:`2px solid #bfdbfe`}}></td>
              </tr>
            </tfoot>
          </table>
        </>
      )}

      {/* Betaalde facturen */}
      {betaald.length>0&&(
        <>

          <table style={{width:"100%",borderCollapse:"collapse",tableLayout:"fixed"}}>
            <colgroup>

                <th key={h} style={{...TH2,textAlign:a}}>{h}</th>

            </tr></thead>
            <tbody>
              {betaald.map((o,i)=>{
                const kl = klanten.find(k=>k.id===o.klantId)||{};
                const bedrag = berekenBedrag(o);
                const dOpen = dagenOpen(o);
                return (

                    <td style={{...TD2,fontWeight:600}}>{kl.naam}</td>

                    <td style={{...TD2,color:groen,fontWeight:600,textAlign:"left"}}>{new Date(o.betaaldOp).toLocaleDateString("nl-NL")}</td>
                    <td style={{...TD2,textAlign:"right",fontWeight:700,color:dOpen<=14?groen:dOpen<=30?"#f59e0b":"#dc2626"}}>{dOpen} dgn</td>
                    <td style={{...TD2,textAlign:"right",fontWeight:600}}>€{bedrag.toLocaleString("nl-NL",{minimumFractionDigits:2})}</td>
                    <td style={TD2}>
                      <button style={{background:"transparent",color:subtekst,border:`1px solid ${rand}`,borderRadius:4,padding:"2px 6px",fontSize:10,cursor:"pointer"}}
                        onClick={()=>{
                          if(!window.confirm("Betaalstatus ongedaan maken?")) return;
                          const bijgewerkt = {...o, betaaldOp: null};
                          setOrders(prev=>prev.map(x=>x.id===o.id?bijgewerkt:x));
                        }}>✕</button>
                    </td>
                  </tr>
                );
              })}

          </table>
        </>
      )}

      {metFactuur.length===0&&(
        <div style={{textAlign:"center",color:subtekst,padding:60}}>
          <div style={{fontSize:40,marginBottom:10}}>🧾</div>
          <div>Nog geen facturen aangemaakt</div>
        </div>
      )}
    </div>
  );
}
