// MODULE — TEELTPLANNING
// ════════════════════════════════════════════════════════
function Teeltplanning({ klanten, gewassen, verpDef, orders, teeltduur, kiemkracht, bedrijf }) {
  const nu2 = new Date();
  let volWk = getWeekNr(nu2)+1, volJr = getJaar(nu2);
  if(volWk>52){volWk=1;volJr++;}
  const volgendeWkLabel = String(volJr).slice(-2)+String(volWk).padStart(2,"0");
  const [filtStatus, setFiltStatus] = useState("alle");
  const [filtKlant,  setFiltKlant]  = useState(0);
  const [filtVan, setFiltVan] = useState(volgendeWkLabel);
  const [filtTot, setFiltTot] = useState(volgendeWkLabel);
  const [aantalWeken, setAantalWeken] = useState(5);
  const [matrixFust, setMatrixFust] = useState("");
  const [weergave,   setWeergave]   = useState("beide");
  const [openWeken, setOpenWeken] = useState(new Set([volgendeWkLabel]));
  const toggleWk = wk => setOpenWeken(prev=>{ const s=new Set(prev); s.has(wk)?s.delete(wk):s.add(wk); return s; });
  const [printWerklijst, setPrintWerklijst] = useState(null);
  const [printWegzetlijst, setPrintWegzetlijst] = useState(null);
  const [printNieuweWegzetlijst, setPrintNieuweWegzetlijst] = useState(null);
  const [realisatie, setRealisatie] = useState(()=>laad("ta_realisatie", {}));
  useEffect(()=>bewaar("ta_realisatie",realisatie),[realisatie]);

  function setReal(wk, type, rijKey, waarde) {
    setRealisatie(prev=>({
      ...prev,
      [wk]: {...(prev[wk]||{}),
        [type]: {...(prev[wk]?.[type]||{}),
          [rijKey]: waarde===''||waarde===null ? undefined : Number(waarde)
        }
      }
    }));
  }
  function getReal(wk, type, rijKey) {
    return realisatie?.[wk]?.[type]?.[rijKey]??'';
  }

  function getKiem(gewas, soort) {
    const gl=gewas?.toLowerCase(), sl=soort?.toLowerCase();
    const k = kiemkracht.find(x=>x.gewas?.toLowerCase()===gl&&x.soort?.toLowerCase()===sl);
    return k ? k.waarde/100 : 1;
  }
  function getDuur(gewas, soort, fust, veld) {
    const gl=gewas?.toLowerCase().trim();
    const sl=soort?.toLowerCase().trim();
    const fl=fust?.toLowerCase().trim();
    // Zoek ook op legacy records zonder gecombineerde id
    const gevonden = teeltduur.find(t=>
      t.gewas?.toLowerCase().trim()===gl &&
      t.soort?.toLowerCase().trim()===sl &&
      t.fust?.toLowerCase().trim()===fl
    );
    if(!gevonden) {
      // Probeer ook op id
      const id=('t_'+gewas+'_'+soort+'_'+fust).replace(/[\/]/g,'_').trim();
      const opId = teeltduur.find(t=>t.id===id);
      if(opId) { const v2=opId[veld]; return (v2===null||v2===undefined||v2==='') ? null : Number(v2); }
    }
    const v = gevonden?.[veld];
    return (v===null||v===undefined||v==='') ? null : Number(v);
  }

  // Filter orders
  const relevanteOrders = orders.filter(o=>{
    if(filtStatus==="bevestigd" && o.status!=="bevestigd") return false;
    if(filtStatus==="reservering" && o.status!=="reservering") return false;
    if(filtStatus==="alle" && o.status==="geleverd") return false;
    if(filtKlant && o.klantId!==Number(filtKlant)) return false;
    return true;
  });

  // Bouw planning: aggregeer per gewas+soort+fust per zaai/inboetweek
  const planning = {};

  relevanteOrders.forEach(o => {
    const leverWk  = getWeekNr(o.leverdatum);
    const leverJaar = getJaar(o.leverdatum);

    o.regels.forEach(r => {
      const gw_ = gewassen.find(g=>g.naam===r.gewas);
      r = {...r, internNr:(gw_?.internNrs||{})[r.soort]||"", volgorde:gw_?.volgorde||""};
      const trays = r.aantal;
      const uitzaaiWeken = getDuur(r.gewas, r.soort, r.verpakking, "uitzaai");
      const inboetWeken  = getDuur(r.gewas, r.soort, r.verpakking, "inboet");
      const kiem = getKiem(r.gewas, r.soort);
      // Rijkey: soort + fust (ongeacht klant — alles samenvoegen)
      const rijKey = r.gewas+"||"+r.soort+"||"+r.verpakking;


      // Afleverweek: voeg toe aan leverweek planning (als referentie)
      const leverLabel = `${String(leverJaar).slice(-2)}${String(leverWk).padStart(2,"0")}`;

      // Bepaal zaai-fust op basis van aflever-fust
      const fustL = r.verpakking?.toLowerCase()||"";
      let zaaiFust;
      if(fustL.includes("65")||fustL.includes("66")) zaaiFust="Zaaitray 264";
      else if(fustL.includes("179")||fustL.includes("180")) zaaiFust="Zaaitray 180";
      else if(fustL.includes("260")||fustL.includes("264")) zaaiFust="Zaaitray 264";
      else zaaiFust=r.verpakking;

      // Uitzaai: leverweek - uitzaaiduur, aantallen = trays / kiem
      if(uitzaaiWeken!==null) {
        let zaaiWk = leverWk - uitzaaiWeken;
        let zaaiJaar = leverJaar;
        if(zaaiWk <= 0) { zaaiJaar--; zaaiWk += 52; }
        const zaaiLabel = String(zaaiJaar).slice(-2)+String(zaaiWk).padStart(2,"0");
        // Tray 65/66: zaai in Zaaitray 264, aantallen = ceil(trays/kiem/4)
        // Tray 179/260: zaai gewoon ceil(trays/kiem)
        const is65 = fustL.includes("65")||fustL.includes("66");
        const zaaiTrays = is65
          ? Math.ceil(Math.ceil(trays/kiem)/4)
          : (kiem>0 ? Math.ceil(trays/kiem) : trays);
        const zaaiKey = r.gewas+"||"+r.soort+"||"+zaaiFust;
        if(!planning[zaaiLabel]) planning[zaaiLabel]={zaai:{},inboet:{}};
        if(!planning[zaaiLabel].zaai[zaaiKey]) planning[zaaiLabel].zaai[zaaiKey]={gewas:r.gewas,soort:r.soort,fust:zaaiFust,trays:0,zaaiTrays:0,kiem:Math.round(kiem*100),leverWeek:leverLabel,internNr:r.internNr||"",volgorde:r.volgorde||""};
        planning[zaaiLabel].zaai[zaaiKey].trays += trays;
        planning[zaaiLabel].zaai[zaaiKey].zaaiTrays += zaaiTrays;
      }

      // Inboet: leverweek - inboetduur, aantallen = zelfde als besteld (de ordertrays)
      if(inboetWeken!==null) {
        let inboetWk = leverWk - inboetWeken;
        let inboetJaar = leverJaar;
        if(inboetWk <= 0) { inboetJaar--; inboetWk += 52; }
        const inboetLabel = `${String(inboetJaar).slice(-2)}${String(inboetWk).padStart(2,"0")}`;
        if(!planning[inboetLabel]) planning[inboetLabel]={zaai:{},inboet:{}};
        if(!planning[inboetLabel].inboet[rijKey]) planning[inboetLabel].inboet[rijKey]={gewas:r.gewas,soort:r.soort,fust:r.verpakking,trays:0,inboetTrays:0,kiem:Math.round(kiem*100),leverWeek:leverLabel,internNr:r.internNr||"",volgorde:r.volgorde||""};
        planning[inboetLabel].inboet[rijKey].trays += trays;
        planning[inboetLabel].inboet[rijKey].inboetTrays += trays; // = bestelde trays
      }
    });
  });

  // Filter op weekrange
  const gesorteerdeWeken = Object.keys(planning).sort().filter(wk=>{
    if(filtVan && wk<filtVan) return false;
    if(filtTot && wk>filtTot) return false;
    return true;
  });

  const alleWeken = [...new Set(orders.map(o=>weekLabel(o.leverdatum)))].sort();

  const sTH = {...TH, padding:"3px 8px", background:"#dff0e8", fontSize:10};
  const sTD = {padding:"3px 6px", fontSize:11, borderBottom:`1px solid ${rand}`, verticalAlign:"middle"};
  const sTDR = {...sTD, textAlign:"right"};

  return (
    <div style={{display:"flex", height:"calc(100vh - 50px)"}}>
      {/* Filters links */}
      <div style={{width:110, borderRight:`1px solid ${rand}`, background:wit, padding:6, flexShrink:0}}>
        <div style={{fontSize:11, fontWeight:700, color:groen, marginBottom:10, textTransform:"uppercase", letterSpacing:1}}>🌱 Teeltplanning</div>

        <div style={{fontSize:10, color:subtekst, marginBottom:3}}>Weergave</div>
        {[["beide","Zaai + Inboet"],["zaai","Alleen zaai"],["inboet","Alleen inboet"]].map(([v,l])=>(
          <button key={v} onClick={()=>setWeergave(v)}
            style={{width:"100%",textAlign:"left",padding:"4px 8px",marginBottom:2,border:"none",borderRadius:4,
              cursor:"pointer",fontSize:11,background:weergave===v?groen:"transparent",
              color:weergave===v?wit:subtekst,fontWeight:weergave===v?700:400}}>
            {l}
          </button>
        ))}

        <div style={{height:1,background:rand,margin:"10px 0"}}/>

        <div style={{fontSize:10, color:subtekst, marginBottom:3}}>Status</div>
        {[["alle","Alle (excl. geleverd)"],["bevestigd","Alleen bevestigd"],["reservering","Alleen reservering"]].map(([v,l])=>(
          <button key={v} onClick={()=>setFiltStatus(v)}
            style={{width:"100%",textAlign:"left",padding:"4px 8px",marginBottom:2,border:"none",borderRadius:4,
              cursor:"pointer",fontSize:11,background:filtStatus===v?"#e8f5ee":"transparent",
              color:filtStatus===v?groen:subtekst,fontWeight:filtStatus===v?700:400}}>
            {l}
          </button>
        ))}

        <div style={{height:1,background:rand,margin:"10px 0"}}/>

        <div style={{fontSize:10, color:subtekst, marginBottom:3}}>Van week</div>
        <select style={{...gs.input,fontSize:11,marginBottom:6}} value={filtVan} onChange={e=>setFiltVan(e.target.value)}>
          <option value="">Alle</option>
          {gesorteerdeWeken.map(w=><option key={w}>{w}</option>)}
        </select>
        <div style={{fontSize:10, color:subtekst, marginBottom:3}}>Tot week</div>
        <select style={{...gs.input,fontSize:11}} value={filtTot} onChange={e=>setFiltTot(e.target.value)}>
          <option value="">Alle</option>
          {Object.keys(planning).sort().map(w=><option key={w}>{w}</option>)}
        </select>

        <div style={{marginTop:12,fontSize:10,color:subtekst}}>{gesorteerdeWeken.length} weken in planning</div>
      </div>

      {/* Planning overzicht */}
      <div style={{flex:1, overflowY:"auto", padding:14}}>
  
  
  
      {gesorteerdeWeken.length===0 && (
          <div style={{textAlign:"center",color:subtekst,padding:60}}>
            <div style={{fontSize:40,marginBottom:10}}>🌱</div>
            <div>Geen teeltplanning gevonden.<br/>Stel eerst teeltduur in bij 🕐 Teeltduur.</div>
          </div>
        )}

        {gesorteerdeWeken.map(wk=>{
          const blok = planning[wk];
          const heeftZaai = Object.keys(blok.zaai||{}).length > 0;
          const heeftInboet = Object.keys(blok.inboet||{}).length > 0;

          return (
            <div key={wk} style={{marginBottom:14}}>

              {/* Week header — klikbaar voor in/uitklappen */}
              <div onClick={()=>toggleWk(wk)}
                style={{background:"#e8f5ee",borderRadius:openWeken.has(wk)?"6px 6px 0 0":"6px",
                  padding:"6px 12px",display:"flex",gap:10,alignItems:"center",cursor:"pointer"}}>
                <span style={{fontWeight:700,fontSize:14,color:groen}}>
                  {heeftZaai?"🌰":""}{heeftInboet?"🪴":""} {wk}
                </span>
                <span style={{fontSize:11,color:subtekst}}>
                  {heeftZaai&&`${Object.keys(blok.zaai).length} zaai`}
                  {heeftZaai&&heeftInboet&&" · "}
                  {heeftInboet&&`${Object.keys(blok.inboet).length} inboet`}
                </span>
                <span style={{marginLeft:"auto",fontSize:12,color:groen}}>{openWeken.has(wk)?"▲":"▼"}</span>
              </div>

              {/* Inhoud — alleen zichtbaar als uitgeklapt */}
              {openWeken.has(wk)&&(()=>{
                const zaaiRijen = Object.values(blok.zaai||{});
                const inboetRijen = Object.values(blok.inboet||{});
                const toonZaai = (weergave==="zaai"||weergave==="beide") && zaaiRijen.length>0;
                const toonInboet = (weergave==="inboet"||weergave==="beide") && inboetRijen.length>0;
                if(!toonZaai && !toonInboet) return null;

                function renderTabel(rijen, isZaai, veld, label) {
                  const kleurBg = isZaai?"#dbeafe":"#cffafe";
                  const kleurTxt = isZaai?"#1d4ed8":"#0891b2";
                  const actieType = isZaai?"zaai":"inboet";
                  return (
                    <div style={{border:`1px solid ${rand}`,borderTop:"none",marginBottom:2}}>
                      <div style={{background:kleurBg,padding:"4px 10px",fontSize:11,fontWeight:700,color:kleurTxt,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        <span>{isZaai?"🌰 Uitzaai":"🪴 Inboet"}</span>
                        <button style={{background:isZaai?"#1d4ed8":"#0891b2",color:"#fff",border:"none",borderRadius:5,padding:"4px 12px",cursor:"pointer",fontSize:12,fontWeight:700}}
                          onClick={()=>setPrintWerklijst({wk,blok,type:isZaai?"zaai":"inboet"})}>🖨️ Werklijst</button>
                        {!isZaai&&<>
                          <button style={{background:"#2d6a4f",color:"#fff",border:"none",borderRadius:5,padding:"4px 12px",cursor:"pointer",fontSize:12,fontWeight:700}}
                            onClick={()=>setPrintWegzetlijst({wk,orders,klanten,gewassen,verpDef,teeltduur,kiemkracht})}>📋 Controlelijst</button>
                          <button style={{background:"#065f46",color:"#fff",border:"none",borderRadius:5,padding:"4px 12px",cursor:"pointer",fontSize:12,fontWeight:700}}
                            onClick={()=>setPrintNieuweWegzetlijst({wk,orders,klanten,gewassen,verpDef,teeltduur,kiemkracht})}>🗂️ Wegzetlijst</button>
                        </>}
                      </div>
                      <table style={{width:"auto"}}>
                        <thead>
                          <tr>
                            <th style={{...sTH,textAlign:"left",minWidth:100}}>Gewas</th>
                            <th style={{...sTH,textAlign:"left",minWidth:140}}>Soort</th>
                            <th style={{...sTH,textAlign:"left",minWidth:80}}>Fust</th>
                            <th style={{...sTH,background:kleurBg,color:kleurTxt,textAlign:"right",minWidth:55}}>Trays</th>
                            <th style={{...sTH,background:kleurBg,color:kleurTxt,textAlign:"right",minWidth:65,fontWeight:700}}>{label}</th>
                            <th style={{...sTH,background:"#fef9c3",color:"#854d0e",textAlign:"right",minWidth:65}}>Werkelijk</th>
                            <th style={{...sTH,background:"#f0fdf4",color:groen,textAlign:"right",minWidth:55}}>Verschil</th>
                          </tr>
                        </thead>
                        <tbody>
                          {rijen.map((r,i)=>{
                            const rijKey=r.gewas+"||"+r.soort+"||"+r.fust;
                            const gepland=r[veld]||0;
                            const opgeslagen=getReal(wk,actieType,rijKey);
                            const werk=opgeslagen===''?gepland:Number(opgeslagen);
                            const werkInput=opgeslagen===''?'':String(opgeslagen);
                            const verschil=werk-gepland;
                            return (
                              <tr key={i} style={{background:i%2===0?wit:"#f0f7f4"}}>
                                <td style={{...sTD,padding:"2px 6px"}}><strong>{r.gewas}</strong></td>
                                <td style={{...sTD,padding:"2px 6px"}}>{r.soort}</td>
                                <td style={{...sTD,padding:"2px 6px"}}><span style={gs.badge}>{r.fust}</span></td>
                                <td style={{...sTDR,padding:"2px 6px",color:groen}}>{r.trays||0}</td>
                                <td style={{...sTDR,padding:"2px 6px",fontWeight:700,color:kleurTxt}}>{gepland}</td>
                                <td style={{...sTDR,padding:"2px 4px"}}>
                                  <input type="number" min="0"
                                    style={{width:58,padding:"1px 4px",textAlign:"right",border:`1px solid ${opgeslagen===''?rand:"#f59e0b"}`,borderRadius:3,fontSize:12,background:opgeslagen!==''?"#fef9c3":"#fff"}}
                                    value={werkInput}
                                    placeholder={String(gepland)}
                                    onFocus={e=>e.target.select()}
                                    onChange={e=>setReal(wk,actieType,rijKey,e.target.value)}
                                    onKeyDown={e=>{
                                      if((e.key==="ArrowUp"||e.key==="ArrowDown")&&werkInput==="") {
                                        e.preventDefault();
                                        const basis = Number(gepland)||0;
                                        setReal(wk,actieType,rijKey,String(e.key==="ArrowUp"?basis+1:Math.max(0,basis-1)));
                                      }
                                    }}
                                  />
                                </td>
                                <td style={{...sTDR,padding:"2px 6px",fontWeight:700,
                                  color:verschil===0?"#16a34a":verschil>0?"#16a34a":"#dc2626"}}>
                                  {verschil===0?"✓":verschil>0?"+"+verschil:verschil}
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                        <tfoot>
                          <tr style={{background:kleurBg,fontWeight:700}}>
                            <td style={{...sTD,borderTop:`2px solid ${groen}`,color:groen,padding:"3px 6px"}} colSpan={3}>Totaal</td>
                            <td style={{...sTDR,borderTop:`2px solid ${groen}`,color:groen,padding:"3px 6px"}}>{rijen.reduce((s,r)=>s+(r.trays||0),0)}</td>
                            <td style={{...sTDR,borderTop:`2px solid ${groen}`,color:kleurTxt,padding:"3px 6px"}}>{rijen.reduce((s,r)=>s+(r[veld]||0),0)}</td>
                            <td style={{...sTDR,borderTop:`2px solid ${groen}`,color:"#854d0e",padding:"3px 6px"}}>{rijen.reduce((s,r)=>{const o=getReal(wk,actieType,r.gewas+"||"+r.soort+"||"+r.fust);return s+(o===''?r[veld]||0:Number(o));},0)}</td>
                            <td style={{...sTDR,borderTop:`2px solid ${groen}`,color:groen,padding:"3px 6px"}}>
                              {(()=>{const tot=rijen.reduce((s,r)=>{const o=getReal(wk,actieType,r.gewas+"||"+r.soort+"||"+r.fust);return s+(o===''?r[veld]||0:Number(o));},0)-rijen.reduce((s,r)=>s+(r[veld]||0),0);return tot===0?"✓":tot>0?"+"+tot:tot;})()}
                            </td>
                          </tr>
                        </tfoot>
                      </table>
                    </div>
                  );
                }
                return (<>
                  {toonZaai&&renderTabel(zaaiRijen,true,"zaaiTrays","Uitzaai")}
                  {toonInboet&&renderTabel(inboetRijen,false,"inboetTrays","Inboet")}
                </>);
              })()}
            </div>
          );
        })}
      </div>
      {/* Verschil matrix — onderaan */}
      {(()=>{
        // Bereken beschikbare weken met data
        const alleWkn = Object.keys(planning).sort();
        if(alleWkn.length===0) return null;

        // Kies weken: huidige + terug tot aantalWeken geleden
        const nu = new Date();
        const nuWk = String(getJaar(nu.toISOString().split("T")[0])).slice(-2)+String(getWeekNr(nu.toISOString().split("T")[0])).padStart(2,"0");
        // Alle unieke soort+fust combinaties
        const rijSet = {};
        alleWkn.forEach(wk=>{
          [...Object.values(planning[wk]?.zaai||{}),...Object.values(planning[wk]?.inboet||{})].forEach(r=>{
            const k=r.gewas+"||"+r.soort+"||"+r.fust;
            if(!rijSet[k]) rijSet[k]={gewas:r.gewas,soort:r.soort,fust:r.fust};
          });
        });
        const rijSleutels = Object.keys(rijSet).sort();
        if(rijSleutels.length===0) return null;

        // Bepaal verschil per soort per week per type
        function getVerschil(wk, rijKey, actieType) {
          const blokData = actieType==="zaai"?planning[wk]?.zaai:planning[wk]?.inboet;
          if(!blokData?.[rijKey]) return null;
          const gepland = actieType==="zaai"?(blokData[rijKey].zaaiTrays||0):(blokData[rijKey].inboetTrays||0);
          const opgeslagen = realisatie?.[wk]?.[actieType]?.[rijKey];
          if(opgeslagen===undefined||opgeslagen==='') return null; // niet ingevuld
          return Number(opgeslagen) - gepland;
        }

        const mTH2 = {padding:"3px 6px",background:"#e8f5ee",color:"#2d6a4f",fontSize:10,border:"1px solid #c8e6c9",textAlign:"center",whiteSpace:"nowrap"};
        const mTD2 = {padding:"2px 6px",fontSize:11,border:"1px solid #e0e0e0",verticalAlign:"middle"};

        return (
          <div style={{marginTop:24,background:wit,border:`1px solid ${rand}`,borderRadius:8,overflow:"hidden"}}>
            <div style={{background:"#f0f7f4",padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${rand}`}}>
              <span style={{fontWeight:700,fontSize:14,color:groen}}>📊 Verschil matrix</span>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:11,color:subtekst}}>Weken terug:</span>
                <select style={{padding:"2px 6px",border:`1px solid ${rand}`,borderRadius:4,fontSize:11,background:wit}}
                  value={aantalWeken} onChange={e=>setAantalWeken(Number(e.target.value))}>
                  {[4,6,8,10,12,16,20].map(n=><option key={n} value={n}>{n} weken</option>)}
                </select>
                <span style={{fontSize:11,color:subtekst}}>Fust:</span>
                <select style={{padding:"2px 6px",border:`1px solid ${rand}`,borderRadius:4,fontSize:11,background:wit}}
                  value={matrixFust} onChange={e=>setMatrixFust(e.target.value)}>
                  <option value="">Alle fusten</option>
                  {[...new Set([...Object.values(planning).flatMap(b=>[...Object.values(b.zaai||{}),...Object.values(b.inboet||{})].map(r=>r.fust))])].sort().map(f=><option key={f}>{f}</option>)}
                </select>
              </div>
            </div>
            <div style={{overflowX:"auto",padding:8}}>
              {["zaai","inboet"].map(actieType=>{
                const label = actieType==="zaai"?"🌰 Zaai":"🪴 Inboet";
                // Filter weken met data voor dit type
                const relevWkn = alleWkn.filter(wk=>Object.keys(planning[wk]?.[actieType]||{}).length>0).slice(-aantalWeken);
                if(relevWkn.length===0) return null;
                // Filter rijen met data voor dit type
                const relevRijen = rijSleutels.filter(k=>relevWkn.some(wk=>planning[wk]?.[actieType]?.[k])).filter(k=>!matrixFust||rijSet[k].fust===matrixFust);
                if(relevRijen.length===0) return null;
                return (
                  <div key={actieType} style={{marginBottom:12}}>
                    <div style={{fontSize:11,fontWeight:700,color:actieType==="zaai"?"#1d4ed8":"#0891b2",marginBottom:4}}>{label}</div>
                    <table style={{borderCollapse:"collapse",fontSize:11}}>
                      <thead>
                        <tr>
                          <th style={{...mTH2,textAlign:"left",minWidth:100}}>Gewas</th>
                          <th style={{...mTH2,textAlign:"left",minWidth:130}}>Soort</th>
                          <th style={{...mTH2,textAlign:"left",minWidth:80}}>Fust</th>
                          {relevWkn.map(wk=><th key={wk} style={mTH2}>{wk}</th>)}
                        </tr>
                      </thead>
                      <tbody>
                        {relevRijen.map((k,i)=>{
                          const r=rijSet[k];
                          return (
                            <tr key={k} style={{background:i%2===0?wit:"#f0f7f4"}}>
                              <td style={mTD2}><strong>{r.gewas}</strong></td>
                              <td style={mTD2}>{r.soort}</td>
                              <td style={mTD2}><span style={gs.badge}>{r.fust}</span></td>
                              {relevWkn.map(wk=>{
                                const v=getVerschil(wk,k,actieType);
                                return (
                                  <td key={wk} style={{...mTD2,textAlign:"center",fontWeight:700,
                                    background:v===null?"#f9f9f9":v===0?"#dcfce7":v>0?"#dcfce7":"#fee2e2",
                                    color:v===null?"#ccc":v===0?"#16a34a":v>0?"#16a34a":"#dc2626"}}>
                                    {v===null?"—":v===0?"✓":v>0?"+"+v:v}
                                  </td>
                                );
                              })}
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}
      {printWerklijst&&<WerklijstPrint data={printWerklijst} bedrijf={bedrijf} onSluit={()=>setPrintWerklijst(null)} />}
      {printWegzetlijst&&<ControlelijstPrint data={printWegzetlijst} bedrijf={bedrijf} onSluit={()=>setPrintWegzetlijst(null)} />}
      {printNieuweWegzetlijst&&<WegzetlijstMatrixPrint data={printNieuweWegzetlijst} bedrijf={bedrijf} onSluit={()=>setPrintNieuweWegzetlijst(null)} />}
    </div>
  );
}

// MODULE — KIEMKRACHT
// ════════════════════════════════════════════════════════
function KiemInput({ waarde, onSave, style }) {
  const [val, setVal] = useState(waarde??'');
  useEffect(()=>setVal(waarde??''), [waarde]);
  return (
    <div style={{display:"flex",alignItems:"center",gap:2}}>
      <input
        style={{...style, background:val!==''&&val!==undefined?"#f0fff8":"#fff", textAlign:"right"}}
        type="number" min="0" max="100" step="1" placeholder="—"
        value={val}
        onFocus={e=>e.target.select()}
        onChange={e=>setVal(e.target.value)}
        onBlur={e=>onSave(e.target.value)}
        onKeyDown={e=>{if(e.key==="Enter"||e.key==="Tab")e.target.blur();}}
      />
      {val!==''&&<span style={{fontSize:10,color:subtekst}}>%</span>}
    </div>
  );
}

function Kiemkracht({ gewassen, kiemkracht, setKiemkracht }) {
  const [ontgrendeld, setOntgrendeld] = React.useState(false);
  const [openGewas, setOpenGewas] = useState(()=>Object.fromEntries((gewassen||[]).map(g=>["open_"+g.naam,false])));
  const [vulAlles, setVulAlles] = useState({});

  function getKiem(gewas, soort){ return kiemkracht.find(k=>k.gewas===gewas&&k.soort===soort)?.waarde??''; }

  function setKiem(gewas, soort, waarde){
    const id=('k_'+gewas+'_'+soort).replace(/[\/]/g,'_').replace(/\s+/g,' ').trim();
    setKiemkracht(huidig=>{
      const bestaand=huidig.find(k=>k.id===id);
      if(waarde===''||waarde===null) return bestaand?huidig.filter(k=>k.id!==id):huidig;
      const v=Number(waarde);
      if(bestaand) return huidig.map(k=>k.id===id?{...k,waarde:v}:k);
      return [...huidig,{id,gewas,soort,waarde:v}];
    });
  }

  function vulGewas(gewas, soorten, waarde){
    if(waarde==='') return;
    setKiemkracht(huidig=>{
      const nieuw=[...huidig];
      soorten.forEach(s=>{
        const id=('k_'+gewas+'_'+s).replace(/[\/]/g,'_').trim();
        const idx=nieuw.findIndex(k=>k.id===id);
        if(idx>=0) nieuw[idx]={...nieuw[idx],waarde:Number(waarde)};
        else nieuw.push({id,gewas,soort:s,waarde:Number(waarde)});
      });
      return nieuw;
    });
    setVulAlles(v=>({...v,[gewas]:''}));
  }

  const iS={padding:"2px 4px",border:`1px solid ${rand}`,borderRadius:3,fontSize:12,width:60};
  const mTH={...TH,padding:"4px 8px",background:"#dff0e8",color:groen,fontSize:11};
  const mTD={padding:"3px 8px",fontSize:12,borderBottom:`1px solid ${rand}`};

  return (
    <div style={{display:"flex",height:"calc(100vh - 50px)",position:"relative"}}>
      {!ontgrendeld&&<BeveiligingsOverlay onOntgrendel={()=>setOntgrendeld(true)} label="Kiemkracht" />}
      {/* Info paneel links */}
      <div style={{width:200,borderRight:`1px solid ${rand}`,background:wit,padding:14,flexShrink:0}}>
        <div style={{fontSize:11,fontWeight:700,color:groen,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Kiemkracht</div>
        <div style={{fontSize:12,color:subtekst,lineHeight:1.6}}>
          Voer per soort het kiemkrachtpercentage in.<br/><br/>
          Typ bijv. <strong>70</strong> voor 70%.<br/><br/>
          <span style={{color:groen}}>Groen</span> = ingevuld<br/>
          Leeg = niet ingesteld
        </div>
        <div style={{marginTop:12,fontSize:11,color:subtekst}}>
          {kiemkracht.length} soort(en) ingevuld
        </div>
      </div>

      {/* Matrix */}
      <div style={{flex:1,overflowY:"auto",padding:14}}>
        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
          <button style={{...gs.knopSecundair,fontSize:11,padding:"3px 10px"}} onClick={()=>{
            const alleOpenK=gewassen.every(g=>openGewas["open_"+g.naam]===true);
            const nieuw={};
            gewassen.forEach(g=>nieuw["open_"+g.naam]=!alleOpenK);
            setOpenGewas(nieuw);
          }}>
            {gewassen.every(g=>openGewas["open_"+g.naam]===true)?"▲ Inklappen":"▼ Uitklappen"}
          </button>
        </div>
        {gewassen.map(gw=>{
          const openKey="open_"+gw.naam;
          const isOpen=openGewas[openKey]===true;
          const ingevuld=kiemkracht.filter(k=>k.gewas===gw.naam).length;
          return (
            <div key={gw.naam} style={{background:wit,border:`1px solid ${rand}`,borderRadius:6,marginBottom:6,overflow:"hidden"}}>
              {/* Header */}
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"5px 10px",background:"#f0f7f4",borderBottom:isOpen?`1px solid ${rand}`:"none",cursor:"pointer"}}
                onClick={()=>setOpenGewas({...openGewas,[openKey]:!isOpen})}>
                <span style={{fontSize:12,color:groen}}>{isOpen?"▼":"▶"}</span>
                <span style={{fontWeight:700,fontSize:14,color:groen,flex:1}}>{gw.naam}</span>
                <span style={{fontSize:10,color:subtekst}}>{ingevuld}/{gw.soorten.length} ingevuld</span>

                <button style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:4,padding:"2px 6px",cursor:"pointer",fontSize:10}}
                  onClick={e=>{e.stopPropagation();if(window.confirm("Alle kiemkracht van "+gw.naam+" wissen?"))setKiemkracht(k=>k.filter(x=>x.gewas!==gw.naam));}}
                >🗑️</button>
              </div>
              {isOpen&&(
                <table style={{width:"auto",tableLayout:"fixed"}}>
                  <colgroup><col style={{width:200}}/><col style={{width:100}}/></colgroup>
                  <thead>
                    <tr>
                      <th style={{...mTH,textAlign:"left"}}>Soort</th>
                      <th style={{...mTH,textAlign:"right"}}>Kiemkracht %</th>
                    </tr>
                    <tr style={{background:"#e8f5ee"}}>
                      <td style={{...mTD,fontSize:10,color:subtekst,fontStyle:"italic"}}>Vul alle soorten:</td>
                      <td style={{...mTD,textAlign:"right"}}>
                        <div style={{display:"flex",alignItems:"center",gap:3,justifyContent:"flex-end"}}>
                          <input style={{...iS,width:56,textAlign:"right",background:"#d4edda"}} type="number" min="0" max="100" placeholder="—"
                            value={vulAlles[gw.naam]||''}
                            onChange={e=>setVulAlles({...vulAlles,[gw.naam]:e.target.value})}
                            onBlur={e=>{if(e.target.value) vulGewas(gw.naam,gw.soorten,e.target.value);}}
                            onKeyDown={e=>{if(e.key==="Enter")e.target.blur();}}
                          />
                          <span style={{fontSize:10,color:subtekst}}>%</span>
                        </div>
                      </td>
                    </tr>
                  </thead>
                  <tbody>
                    {gw.soorten.map((s,si)=>{
                      const k=getKiem(gw.naam,s);
                      return (
                        <tr key={s} style={{background:si%2===0?wit:"#f0f7f4"}}>
                          <td style={{...mTD}}>{s}</td>
                          <td style={{...mTD,textAlign:"right"}}>
                            <KiemInput waarde={k} style={iS} onSave={v=>setKiem(gw.naam,s,v)} />
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

</script>
<script type="text/babel" data-presets="react">

function Bevestiging({ klanten, gewassen, orders, setOrders, verpDef, bedrijf, matrixDirect, onMatrixDirectUsed }) {
  const [selKlant, setSelKlant] = useState(null);
  const [selWeken, setSelWeken] = useState([]);
  const [herdruk, setHerdruk] = useState(false);
  const [printMulti, setPrintMulti] = useState(null);
  const [printMatrix, setPrintMatrix] = useState(null);
  const [mailMatrixStatus, setMailMatrixStatus] = useState("");

  useEffect(()=>{
    if(matrixDirect) {
      const weken = [...new Set(matrixDirect.orders.map(o=>weekLabel(o.leverdatum)))].sort();
      setPrintMulti({klant:matrixDirect.klant, weken, orders:matrixDirect.orders});
      if(onMatrixDirectUsed) onMatrixDirectUsed();
    }
  },[matrixDirect]);

  function plantenVast(r){const vd=vindVd(verpDef,r.verpakking);return r.vastPlanten??((vd?.aantal||0)*r.aantal);}
  function plantenTotaal(regels){return regels.reduce((s,r)=>s+plantenVast(r),0);}

  function mailSeizoensmatrix(klant, klantOrders) {
    const mailUrl = localStorage.getItem('ta_mailUrl')||'';
    if(!klant?.email) { alert('Geen e-mailadres bekend voor '+klant?.naam); return; }
    if(!mailUrl) { alert('Geen mail URL ingesteld. Ga naar ⚙️ Instellingen.'); return; }

    // Bouw matrix
    const alleWkn = [...new Set(klantOrders.map(o=>weekLabel(o.leverdatum)))].sort();
    const rijMap = {};
    klantOrders.forEach(o=>{
      const wk = weekLabel(o.leverdatum);
      o.regels.forEach(r=>{
        const key = r.gewas+"||"+r.soort+"||"+r.verpakking+"||"+(r.prijs||"");
        if(!rijMap[key]) rijMap[key]={gewas:r.gewas,soort:r.soort,verpakking:r.verpakking,prijs:r.prijs,weken:{}};
        rijMap[key].weken[wk]=(rijMap[key].weken[wk]||0)+plantenVast(r);
        if(r.prijs) rijMap[key].prijs=r.prijs;
      });
    });
    const rijen = Object.values(rijMap).sort((a,b)=>a.gewas.localeCompare(b.gewas)||a.soort.localeCompare(b.soort));
    const totaalPerWeek = wk => rijen.reduce((s,r)=>s+(r.weken[wk]||0),0);
    const rijTotaal = r => alleWkn.reduce((s,wk)=>s+(r.weken[wk]||0),0);
    const grootTotaal = alleWkn.reduce((s,wk)=>s+totaalPerWeek(wk),0);

    // Bouw HTML
    // Splits weken in groepen van 10
    const COLS = 10;
    const weekGroepen = [];
    for(let i=0; i<alleWkn.length; i+=COLS) weekGroepen.push(alleWkn.slice(i,i+COLS));

    // Stijlen voor staand A4, kleine letters
    const th = "padding:3px 4px;background:#b8ddc8;color:#0f3320;border:2px solid #8cbfac;text-align:right;font-size:8px;font-weight:700;white-space:nowrap;";
    const thL = "padding:3px 4px;background:#b8ddc8;color:#0f3320;border:2px solid #8cbfac;text-align:left;font-size:8px;font-weight:700;";
    const td = "padding:2px 4px;border:1px solid #eee;text-align:right;font-size:8px;";
    const tdL = "padding:2px 4px;border:1px solid #eee;text-align:left;font-size:8px;";

    function maakTabel(wkGroep) {
      // Alleen rijen die data hebben in deze weekgroep
      const actieveRijen = rijen.filter(r=>wkGroep.some(wk=>r.weken[wk]>0));
      const headerCellen = wkGroep.map(wk=>"<th style='"+th+"'>"+wk+"</th>").join("");
      const totaalCellen = wkGroep.map(wk=>"<td style='"+th+"font-weight:700'>"+
        (totaalPerWeek(wk)>0?totaalPerWeek(wk).toLocaleString("nl-NL"):"")+"</td>").join("");
      const dataRijen2 = actieveRijen.map((r,i)=>{
        const bg = i%2===0?wit:"#f0f7f4";
        const cellen = wkGroep.map(wk=>"<td style='"+td+(r.weken[wk]?"font-weight:600;color:#222":"color:#ccc")+"'>"+
          (r.weken[wk]?r.weken[wk].toLocaleString("nl-NL"):"")+"</td>").join("");
        return "<tr style='background:"+bg+"'>"
          +"<td style='"+tdL+"font-weight:600'>"+r.soort+"</td>"
          +"<td style='"+tdL+"'><span style='background:#b7e4c7;color:#2d6a4f;border-radius:10px;padding:0 5px;font-size:7px;font-weight:600'>"+r.verpakking+"</span></td>"
          +"<td style='"+td+"color:#2d6a4f'>"+(r.prijs?"€"+Number(r.prijs).toFixed(3):"—")+"</td>"
          +cellen
          +"<td style='"+td+"font-weight:700;color:#2d6a4f;background:#f0fff4'>"+rijTotaal(r).toLocaleString("nl-NL")+"</td>"
          +"</tr>";
      }).join("");
      return "<table style='border-collapse:collapse;width:100%;margin-bottom:14px;'>"
        +"<thead><tr>"
          +"<th style='"+thL+"min-width:110px'>Soort</th>"
          +"<th style='"+thL+"min-width:55px'>Fust</th>"
          +"<th style='"+th+"min-width:40px'>€/st</th>"
          +headerCellen
          +"<th style='"+th+"background:#c8e6c9;min-width:45px'>Totaal</th>"
        +"</tr></thead>"
        +"<tbody>"+dataRijen2+"</tbody>"
        +"<tfoot><tr style='background:#e8f5ee;'>"
          +"<td colspan='3' style='"+thL+"border-top:3px solid #0f3320'>Totaal</td>"
          +totaalCellen
          +"<td style='"+th+"border-top:2px solid #2d6a4f;background:#c8e6c9'>"+grootTotaal.toLocaleString("nl-NL")+"</td>"
        +"</tr></tfoot>"
        +"</table>";
    }

    const tabellenHtml = weekGroepen.map(g=>maakTabel(g)).join("<div style='height:14px'></div>");

    const bd2 = bedrijf||{};
    const brieftekst = (bd2.brieftekst||"Geachte "+klant.naam+",\n\nHierbij bevestigen wij uw bestelling voor het komende seizoen. In onderstaand overzicht vindt u de details per leverweek.\n\nWij verzoeken u dit overzicht te controleren en eventuele wijzigingen tijdig door te geven.").replace(/\n/g,"<br/>");
    const logo = bd2.logo?"<img src='"+bd2.logo+"' style='max-height:45px;max-width:130px;object-fit:contain'/><br/>":"";

    const berichtHtml = "<!DOCTYPE html><html><head><meta charset=\'UTF-8\'>"
      +"<style>"
        +"@page{size:A4 portrait;margin:0}"
        +"body{font-family:Arial,sans-serif;font-size:9px;color:#222;margin:0;padding:0}"
        +"table{border-collapse:collapse;width:100%}"
      +"</style></head><body>"

      // ── BRIEFHOOFD ──
      +"<div style=\'background:#2d6a4f;color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;\'>"
        +"<div>"
          +"<div style=\'font-size:16px;font-weight:700;letter-spacing:1px\'>VOLLEBREGT CYCLAMEN</div>"
          +"<div style=\'font-size:8px;opacity:0.85;margin-top:2px\'>"+(bd2.adres||"")+" &nbsp;&middot;&nbsp; "+(bd2.postcode||"")+" "+(bd2.plaats||"")+"</div>"
        +"</div>"
        +"<div style=\'text-align:right;font-size:8px;opacity:0.85;\'>"
          +"<div>"+(bd2.telefoon||"")+"</div>"
          +"<div>"+(bd2.email||"")+"</div>"
          +(bd2.kvk?"<div>KVK: "+bd2.kvk+"</div>":"")
          +(bd2.btw?"<div>BTW: "+bd2.btw+"</div>":"")
        +"</div>"
      +"</div>"

      // ── INHOUD ──
      +"<div style=\'padding:16px 20px;\'>"

        // Klant + datum blok
        +"<div style=\'display:flex;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #e2e8e4;\'>"
          +"<div>"
            +"<div style=\'font-size:8px;color:#888;margin-bottom:3px\'>Aan:</div>"
            +"<div style=\'font-size:11px;font-weight:700\'>"+(klant.naam||"")+"</div>"
            +(klant.adres?"<div style=\'font-size:8px;color:#555\'>"+klant.adres+"</div>":"")
            +((klant.postcode||klant.plaats)?"<div style=\'font-size:8px;color:#555\'>"+(klant.postcode||"")+" "+(klant.plaats||"")+"</div>":"")
          +"</div>"
          +"<div style=\'text-align:right;\'>"
            +"<div style=\'font-size:14px;font-weight:700;color:#2d6a4f\'>ORDERBEVESTIGING</div>"
            +"<div style=\'font-size:8px;color:#555;margin-top:3px\'>Datum: "+new Date().toLocaleDateString("nl-NL",{day:"2-digit",month:"long",year:"numeric"})+"</div>"
            +"<div style=\'font-size:8px;color:#555\'>Weken: "+alleWkn.join(", ")+"</div>"
            +"<div style=\'font-size:8px;color:#555\'>Totaal: "+grootTotaal.toLocaleString("nl-NL")+" planten</div>"
          +"</div>"
        +"</div>"

        // Standaard tekst
        +"<div style=\'font-size:8.5px;color:#444;line-height:1.6;margin-bottom:12px;padding:8px 10px;background:#f0f7f4;border-left:3px solid #2d6a4f;\'>"
          +"Geachte "+(bd2.naam||klant.naam||"heer/mevrouw")+",<br/><br/>"
          +"Hierbij bevestigen wij uw order voor het seizoen "+new Date().getFullYear()+" zoals hieronder gespecificeerd. "
          +"Wij verzoeken u dit overzicht te controleren en eventuele afwijkingen binnen 5 werkdagen aan ons door te geven.<br/><br/>"
          +"De levering vindt plaats conform de onderstaande weekplanning. "
          +"Wij stellen het op prijs indien u bij ontvangst de goederen direct controleert op volledigheid en kwaliteit."
        +"</div>"

        // Matrix tabellen
        +tabellenHtml

        // Handtekening
        +"<div style=\'margin-top:16px;padding-top:10px;border-top:1px solid #e2e8e4;font-size:8px;color:#555;\'>"
          +"<div>Met vriendelijke groet,</div>"
          +"<div style=\'margin-top:6px;font-weight:700;font-size:10px\'>"+(bd2.naam||"Vollebregt Cyclamen")+"</div>"
          +"<div style=\'margin-top:2px\'>"+(bd2.telefoon||"")+"&nbsp;&nbsp;"+(bd2.email||"")+"</div>"
          +(bd2.iban?"<div style=\'margin-top:2px;color:#888\'>IBAN: "+bd2.iban+"</div>":"")
          +"<div style=\'margin-top:18px;display:flex;gap:50px;\'>"
            +"<div style=\'border-top:1px solid #bbb;padding-top:3px;min-width:120px\'>Voor akkoord klant</div>"
            +"<div style=\'border-top:1px solid #bbb;padding-top:3px;min-width:80px\'>Datum</div>"
          +"</div>"
        +"</div>"

      +"</div>"

      // ── FOOTER ──
      +"<div style=\'background:#f0f7f4;padding:6px 20px;font-size:7px;color:#888;display:flex;justify-content:space-between;border-top:1px solid #c8e6c9;\'>"
        +"<span>"+(bd2.naam||"Vollebregt Cyclamen")+" &nbsp;&middot;&nbsp; "+(bd2.adres||"")+" "+(bd2.postcode||"")+" "+(bd2.plaats||"")+"</span>"
        +(bd2.iban?"<span>IBAN: "+bd2.iban+"</span>":"")
        +(bd2.kvk?"<span>KVK: "+bd2.kvk+"</span>":"")
      +"</div>"

      +"</body></html>";

    const onderwerp = "Seizoensoverzicht weken "+alleWkn.join(", ")+" - Vollebregt Cyclamen";
    setMailMatrixStatus("📧 Versturen...");
    fetch(mailUrl, {
      method: "POST",
      mode: "no-cors",
      headers: {"Content-Type": "text/plain;charset=utf-8"},
      body: JSON.stringify({to_email: klant.email, onderwerp: onderwerp, bericht: "", html: berichtHtml})
    }).then(function() {
      const gemaileWeken = klantOrders.map(o=>weekLabel(o.leverdatum));
      const logEntry = {datum: new Date().toLocaleString("nl-NL"), klant: klant.naam, klantId: klant.id, email: klant.email, onderwerp: onderwerp, week: "seizoen", weken: gemaileWeken};
      const log = JSON.parse(localStorage.getItem("ta_maillog")||"[]");
      localStorage.setItem("ta_maillog", JSON.stringify([logEntry,...log].slice(0,50)));
      setMailMatrixStatus("✅ Mail verstuurd naar "+klant.email);
      setTimeout(function(){setMailMatrixStatus("");}, 4000);
    }).catch(function(){setMailMatrixStatus("⚠️ Versturen mislukt");});

    // Markeer orders direct — no-cors geeft geen betrouwbare then() callback
    const gemaileWekenDirect = klantOrders.map(o=>weekLabel(o.leverdatum));
    const aantalGematcht = orders.filter(o=>String(o.klantId)===String(klant.id)&&o.status!=="geleverd").length;
    const nu = new Date().toISOString();
    // Schrijf direct naar localStorage zodat het altijd bewaard wordt
    const opgeslagen = JSON.parse(localStorage.getItem('ta_orders')||'[]');
    const bijgewerktOpgeslagen = opgeslagen.map(o=>{
      if(String(o.klantId)===String(klant.id)&&gemaileWekenDirect.includes(weekLabel(o.leverdatum))&&o.status!=="geleverd"){
        return {...o, seizoensGemaild: nu};
      }
      return o;
    });
    localStorage.setItem('ta_orders', JSON.stringify(bijgewerktOpgeslagen));
    // Update ook React state
    setOrders(bijgewerktOpgeslagen);
    window.dispatchEvent(new CustomEvent("seizoensGemaild",{detail:{klantId:klant.id, nu}}));
  }


  const klantenMetOpen = klanten.filter(k=>orders.some(o=>o.klantId===k.id&&!o.bevestigingNr&&o.status!=="geleverd"))
    .sort((a,b)=>a.naam.localeCompare(b.naam));

  function wekenVoorKlant(klantId) {
    return [...new Set(orders.filter(o=>o.klantId===klantId&&o.status!=="geleverd").map(o=>weekLabel(o.leverdatum)))].sort();
  }
  function onbevestigdWeken(klantId) {
    return new Set(orders.filter(o=>o.klantId===klantId&&!o.bevestigingNr&&o.status!=="geleverd").map(o=>weekLabel(o.leverdatum)));
  }

  function kiesKlant(k) {
    setSelKlant(k);
    setHerdruk(false);
    setSelWeken([...onbevestigdWeken(k.id)]);
  }

  function toggleWeek(wk) {
    setSelWeken(prev=>prev.includes(wk)?prev.filter(w=>w!==wk):[...prev,wk].sort());
  }

  const selOrders = selKlant && selWeken.length>0
    ? orders.filter(o=>o.klantId===selKlant.id&&selWeken.includes(weekLabel(o.leverdatum))&&o.status!=="geleverd")
        .sort((a,b)=>new Date(a.leverdatum)-new Date(b.leverdatum))
    : [];

  function bevestigenEnPrinten() {
    if(!selKlant||selWeken.length===0) return;
    let volgendNr = Math.max(0,...orders.filter(x=>x.bevestigingNr).map(x=>Number(x.bevestigingNr)||0))+1;
    const vandaag = new Date().toLocaleDateString("nl-NL");
    const bijgewerkt = orders.map(o=>{
      if(o.klantId===selKlant.id&&selWeken.includes(weekLabel(o.leverdatum))&&!o.bevestigingNr&&o.status!=="geleverd") {
        const regelsMetVast=o.regels.map(r=>{const vd=verpDef.find(v=>v.naam===r.verpakking);return {...r,vastPlanten:(vd?.aantal||0)*r.aantal};});
        return {...o,regels:regelsMetVast,bevestigingNr:String(volgendNr++).padStart(4,"0"),bevestigdOp:vandaag};
      }
      return o;
    });
    setOrders(bijgewerkt);
    const bevOrders=bijgewerkt.filter(o=>o.klantId===selKlant.id&&selWeken.includes(weekLabel(o.leverdatum))&&o.status!=="geleverd");
    setPrintMulti({klant:selKlant,weken:selWeken.sort(),orders:bevOrders});
    setSelWeken([]);
  }

  const th={padding:"3px 5px",background:"#e8f5ee",color:"#2d6a4f",border:"1px solid #c8e6c9",fontSize:10,textAlign:"right"};

      matrixRijen[key].weken[wk]=(matrixRijen[key].weken[wk]||0)+plantenVast(r);
      if(r.prijs) matrixRijen[key].prijs=r.prijs;
    });
  });
  const matrixArr=Object.values(matrixRijen).sort((a,b)=>a.soort.localeCompare(b.soort));

      {/* Links: klantenlijst */}

          <div style={{fontSize:11,fontWeight:700,color:groen,textTransform:"uppercase",letterSpacing:1}}>Bevestiging</div>
          {(()=>{

                <span style={{fontSize:10,color:subtekst}}>
                  {klantenMetOpen.length} klant{klantenMetOpen.length!==1?"en":""}

              </div>
            );

        </div>
        <div style={{flex:1,overflowY:"auto",padding:6}}>

                  border:`1px solid ${actief?groen:rand}`,borderRadius:6,cursor:"pointer",
                  background:actief?"#f0fff4":wit}}>
                <div style={{fontWeight:700,fontSize:12,color:actief?groen:"#222"}}>{k.naam}</div>
                <div style={{fontSize:10,color:subtekst}}>{wkn.length} wk · {tot.toLocaleString("nl-NL")} pl.</div>
                <div style={{fontSize:10,color:"#f59e0b",fontWeight:600}}>{wkn.join(", ")}</div>
              </button>
            );
          })}
          {/* Herdruk sectie met verzendstatus filter */}
          <div style={{marginTop:10,paddingTop:8,borderTop:`1px solid ${rand}`}}>
            {(()=>{
              const [verzendFilter, setVerzendFilter] = React.useState("alle");
              const bevestigdeKlanten = klanten.filter(k=>orders.some(o=>o.klantId===k.id&&o.bevestigingNr&&o.status!=="geleverd"))
                .sort((a,b)=>a.naam.localeCompare(b.naam));
              const gefilterd = bevestigdeKlanten.filter(k=>{
                if(verzendFilter==="verzonden") return orders.some(o=>o.klantId===k.id&&o.bevestigingNr&&o.bevestigingGemaild&&o.status!=="geleverd");
                if(verzendFilter==="niet") return orders.some(o=>o.klantId===k.id&&o.bevestigingNr&&!o.bevestigingGemaild&&o.status!=="geleverd");
                return true;
              });
              const aantalNiet = bevestigdeKlanten.filter(k=>orders.some(o=>o.klantId===k.id&&o.bevestigingNr&&!o.bevestigingGemaild&&o.status!=="geleverd")).length;
              return (<>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{fontSize:10,fontWeight:700,color:subtekst,textTransform:"uppercase",letterSpacing:0.5}}>Herdruk</div>
                  <div style={{display:"flex",gap:3}}>
                    {[["alle","Alle"],["niet","📄 Niet"],["verzonden","✅ Wel"]].map(([v,l])=>(
                      <button key={v} onClick={()=>setVerzendFilter(v)}
                        style={{padding:"1px 6px",borderRadius:10,border:"none",cursor:"pointer",fontSize:9,fontWeight:600,
                          background:verzendFilter===v?(v==="niet"?"#f59e0b":groen):"#e5e7eb",
                          color:verzendFilter===v?"#fff":subtekst}}>
                        {l}
                      </button>
                    ))}
                  </div>
                </div>
                {aantalNiet>0&&verzendFilter==="alle"&&(
                  <div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:4,padding:"3px 8px",fontSize:10,color:"#c2410c",marginBottom:6,fontWeight:600}}>

                  </div>
                )}
                {gefilterd.map(k=>{
                  const actief=selKlant?.id===k.id&&herdruk;
                  const heeftOnverzonden = orders.some(o=>o.klantId===k.id&&o.bevestigingNr&&!o.bevestigingGemaild&&o.status!=="geleverd");
                  return (
                    <button key={k.id} onClick={()=>{setHerdruk(true);setSelKlant(k);setSelWeken(wekenVoorKlant(k.id));}}
                      style={{width:"100%",textAlign:"left",padding:"5px 8px",marginBottom:3,
                        border:`1px solid ${actief?"#1d4ed8":heeftOnverzonden?"#fed7aa":rand}`,borderRadius:6,cursor:"pointer",
                        background:actief?"#eff6ff":heeftOnverzonden?"#fff7ed":wit}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div style={{fontWeight:700,fontSize:12,color:actief?"#1d4ed8":"#222"}}>{k.naam}</div>
                        <span style={{fontSize:9,fontWeight:700,color:heeftOnverzonden?"#c2410c":"#16a34a"}}>

                      </div>
                      <div style={{fontSize:10,color:subtekst}}>{wekenVoorKlant(k.id).length} wk bevestigd</div>
                    </button>

            })()}
          </div>
        </div>
        {selKlant&&(
          <div style={{padding:8,borderTop:`1px solid ${rand}`,display:"flex",flexDirection:"column",gap:4}}>
            <button style={{...gs.knopPrimair,background:"#9ca3af",width:"100%",fontSize:11,cursor:"not-allowed",opacity:0.6}} disabled title="Tijdelijk uitgeschakeld — gebruik Herdruk">🖨️ Seizoensmatrix</button>
            <button style={{...gs.knopPrimair,background:"#9ca3af",width:"100%",fontSize:11,cursor:"not-allowed",opacity:0.6}} disabled title="Tijdelijk uitgeschakeld">📧 Mail seizoensmatrix</button>
            {mailMatrixStatus&&<div style={{fontSize:10,color:mailMatrixStatus.startsWith("✅")?"#16a34a":"#f59e0b",textAlign:"center"}}>{mailMatrixStatus}</div>}
          </div>
        )}
      </div>

      {/* Midden: weekkeuze */}

            <button style={{...gs.knopSecundair,fontSize:10,flex:1,padding:"2px 4px"}} onClick={()=>setSelWeken([])}>Geen</button>

          {wekenVoorKlant(selKlant.id).map(wk=>{

            const wkPl=orders.filter(o=>o.klantId===selKlant.id&&weekLabel(o.leverdatum)===wk&&o.status!=="geleverd").reduce((s,o)=>s+plantenTotaal(o.regels),0);

        {selOrders.length>0&&(

            </div>
            <table style={{borderCollapse:"collapse",width:"100%",fontSize:10}}>
              <thead>
                <tr>

                  <th style={{...th,textAlign:"left",width:70}}>Fust</th>

                      {matrixWeken.map(wk=><td key={wk} style={{...td,fontWeight:r.weken[wk]?600:300,color:r.weken[wk]?"#222":"#ddd"}}>{r.weken[wk]?r.weken[wk].toLocaleString("nl-NL"):"—"}</td>)}
                      <td style={{...td,fontWeight:700,color:groen,background:"#f0fff4"}}>{tot.toLocaleString("nl-NL")}</td>

              <tfoot>

                  <td colSpan={3} style={{...td,textAlign:"left",color:groen,borderTop:"2px solid #2d6a4f"}}>Totaal</td>
                  {matrixWeken.map(wk=>{

    </div>
  );
}

// BEVESTIGING PRINT COMPONENT
// ════════════════════════════════════════════════════════
function BevestigingPrint({ order, klant, bedrijf, verpDef, onSluit }) {
  const vandaag = new Date().toLocaleDateString("nl-NL");

  function plantenVast(r) {
    const vd = vindVd(verpDef, r.verpakking);
    return r.vastPlanten ?? ((vd?.aantal||0)*r.aantal);
  }
  function totaalBedrag() {
    return order.regels.reduce((s,r)=>s+Number(r.prijs||0)*r.aantal,0);
  }

  const stijl = {
    fontFamily:"Arial, sans-serif", fontSize:11, color:"#1a1a1a", lineHeight:1.4
  };

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.6)",zIndex:500,overflowY:"auto",padding:20}}>

        {/* Knoppen boven het document */}

            w.document.close();w.print();
          }}>📧 Openen voor mail</button>
          <button style={gs.knopSecundair} onClick={onSluit}>✕ Sluiten</button>
        </div>

        {/* Document inhoud */}
        <div id="bevestiging-print-inhoud" style={{padding:"24px 32px",...stijl}}>

          {/* Header: bedrijf links, klant rechts */}

              <div>{bedrijf.adres}</div>
              <div>{bedrijf.postcode} {bedrijf.plaats}</div>
              <div style={{marginTop:4}}>Tel: {bedrijf.telefoon}</div>
              <div>E-mail: {bedrijf.email}</div>
              {bedrijf.iban&&<div style={{marginTop:4}}>IBAN: {bedrijf.iban}</div>}
              {bedrijf.kvk&&<div>KVK: {bedrijf.kvk}</div>}
              {bedrijf.btw&&<div>BTW: {bedrijf.btw}</div>}
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{klant?.naam}</div>
              <div>{klant?.adres}</div>
              <div>{klant?.postcode} {klant?.plaats}</div>
              {klant?.telefoon&&<div>Tel: {klant.telefoon}</div>}
              {klant?.email&&<div>{klant.email}</div>}

                    <td style={{padding:"5px 8px",border:"1px solid #e0e0e0",textAlign:"right"}}>€ {Number(r.prijs||0).toFixed(3)}</td>

                );

            </tbody>
            <tfoot>
              <tr style={{background:"#e8f5ee",fontWeight:700}}>
                <td colSpan={3} style={{padding:"6px 8px",border:"1px solid #c8e6c9",color:"#2d6a4f"}}>Totaal</td>
                <td style={{padding:"6px 8px",border:"1px solid #c8e6c9",textAlign:"right",color:"#2d6a4f"}}>{order.regels.reduce((s,r)=>s+r.aantal,0)}</td>
                <td style={{padding:"6px 8px",border:"1px solid #c8e6c9",textAlign:"right",color:"#2d6a4f"}}>{order.regels.reduce((s,r)=>s+plantenVast(r),0).toLocaleString("nl-NL")}</td>
                <td style={{padding:"6px 8px",border:"1px solid #c8e6c9"}}></td>
                <td style={{padding:"6px 8px",border:"1px solid #c8e6c9",textAlign:"right",color:"#2d6a4f"}}>€ {totaalBedrag().toFixed(2)}</td>

            </tfoot>
          </table>

          {/* Footer */}
          <div style={{borderTop:"1px solid #e0e0e0",paddingTop:10,fontSize:10,color:"#888",display:"flex",justifyContent:"space-between"}}>
            <span>{bedrijf.naam} · {bedrijf.adres}, {bedrijf.postcode} {bedrijf.plaats}</span>
            <span>IBAN: {bedrijf.iban}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// MULTI-WEEK MATRIX BEVESTIGING
// ════════════════════════════════════════════════════════
function MultiBevestigingPrint({ data, bedrijf, verpDef, onSluit }) {
  const { klant, weken, orders } = data;
  const vandaag = new Date().toLocaleDateString("nl-NL");

  function plantenVast(r){
    const vd=verpDef.find(v=>v.naam===r.verpakking);
    return r.vastPlanten??((vd?.aantal||0)*r.aantal);
  }

  // Bouw matrix: rijen = unieke gewas+soort+verpakking, kolommen = weken
  const rijMap = {};
  orders.forEach(o=>{
    const wk=weekLabel(o.leverdatum);
    o.regels.forEach(r=>{
      const key=r.gewas+"||"+r.soort+"||"+r.verpakking;
      if(!rijMap[key]) rijMap[key]={gewas:r.gewas,soort:r.soort,verpakking:r.verpakking,prijs:r.prijs,weken:{}};
      rijMap[key].weken[wk]=(rijMap[key].weken[wk]||0)+plantenVast(r);
      // update prijs als aanwezig
      if(r.prijs) rijMap[key].prijs=r.prijs;
    });
  });
  const rijen=Object.values(rijMap).sort((a,b)=>a.gewas.localeCompare(b.gewas)||a.soort.localeCompare(b.soort));

  // Totaal per week
  function weekTotaal(wk){return rijen.reduce((s,r)=>s+(r.weken[wk]||0),0);}
  function rijTotaal(r){return weken.reduce((s,wk)=>s+(r.weken[wk]||0),0);}
  const grootTotaal=weken.reduce((s,wk)=>s+weekTotaal(wk),0);

  const cH={padding:"6px 8px",background:"#e8f5ee",color:"#2d6a4f",fontWeight:700,fontSize:11,border:"1px solid #c8e6c9",textAlign:"center"};
  const cL={padding:"6px 8px",background:"#e8f5ee",color:"#2d6a4f",fontWeight:700,fontSize:11,border:"1px solid #c8e6c9",textAlign:"left"};
  const cD={padding:"5px 8px",fontSize:11,border:"1px solid #e0e0e0",textAlign:"center"};
  const cDL={padding:"5px 8px",fontSize:11,border:"1px solid #e0e0e0",textAlign:"left"};

  // Bevestigingsnummers verzamelen
  const bevNrs=[...new Set(orders.filter(o=>o.bevestigingNr).map(o=>o.bevestigingNr))].join(", ");

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.6)",zIndex:500,overflowY:"auto",padding:20}}>
      <div style={{maxWidth:900,margin:"0 auto",background:"#fff",borderRadius:8,overflow:"hidden",boxShadow:"0 8px 40px rgba(0,0,0,0.3)"}}>

        {/* Knoppen */}
        <div style={{display:"flex",gap:8,padding:"10px 16px",background:"#f0f7f4",borderBottom:"1px solid #e2e8e4"}}>
          <button style={{background:"#2d6a4f",color:"#fff",border:"none",borderRadius:6,padding:"5px 14px",cursor:"pointer",fontSize:14,fontWeight:600}} onClick={()=>{
            const el=document.getElementById("multi-print-inhoud");
            const w=window.open("","_blank");

function WegzetlijstMatrixPrint({ data, bedrijf, onSluit }) {
  const { wk, orders, klanten, gewassen, verpDef, teeltduur } = data;
  const vandaag = new Date().toLocaleDateString("nl-NL");

  function getDuur(gewas, soort, fust, veld) {
    return (teeltduur||[]).find(t=>
      t.gewas?.toLowerCase()===gewas?.toLowerCase()&&
      t.soort?.toLowerCase()===soort?.toLowerCase()&&
      t.fust?.toLowerCase()===fust?.toLowerCase()
    )?.[veld]??null;
  }

  // Verzamel alle rijen waarvoor inboetweek = wk
  const rijen = [];
  orders.filter(o=>o.status!=="geleverd").forEach(o=>{
    const kl = klanten.find(k=>k.id===o.klantId)||{};
    const leverWk = getWeekNr(o.leverdatum);
    const leverJaar = getJaar(o.leverdatum);
    o.regels.forEach(r=>{
      const inboetWeken = getDuur(r.gewas, r.soort, r.verpakking, "inboet");
      if(inboetWeken===null) return;
      let inbWk = leverWk - inboetWeken;
      let inbJaar = leverJaar;
      if(inbWk<=0){inbWk+=52;inbJaar--;}
      const inbLbl = String(inbJaar).slice(-2)+String(inbWk).padStart(2,"0");
      if(inbLbl!==wk) return;
      const gw = gewassen.find(g=>g.naam===r.gewas);
      const internNr = (gw?.internNrs||{})[r.soort]||"";
      rijen.push({
        klantId: o.klantId,
        klantNaam: kl.naam||"?",
        klantcode: kl.klantcode||kl.naam?.substring(0,4)||"?",
        gewas: r.gewas,
        soort: r.soort,
        internNr,
        verpakking: r.verpakking,
        aantal: r.aantal,
        afleverWeek: weekLabel(o.leverdatum),
      });
    });
  });

  // Unieke traymaten
  const traymaten = [...new Set(rijen.map(r=>r.verpakking))].sort();

  function printDoc() {
    const el = document.getElementById("wegzetmatrix-inhoud");
    const w = window.open("","_blank");
    w.document.write(`<html><head><title>Wegzetlijst week ${wk}</title><style>
      @page{size:A4 portrait;margin:8mm}
      body{font-family:Arial,sans-serif;font-size:10px;color:#1a1a1a;margin:0}
      table{border-collapse:collapse;width:676px;min-width:676px;table-layout:fixed}
      th{background:#e8f5ee;color:#2d6a4f;padding:2px 3px;border:1.5px solid #b2d8c0;font-size:9px;font-weight:700;text-align:center;white-space:nowrap}
      th.gewas{text-align:left;font-size:9px;width:60px;min-width:60px;max-width:60px;overflow:hidden}
      th.soort-h{text-align:left;font-size:9px;width:200px;min-width:200px}
      th.nr-h{width:16px;min-width:16px;max-width:16px;font-size:8px}
      th.klant{text-align:center;padding:3px 2px;width:40px;min-width:40px;max-width:40px;font-size:9px;white-space:nowrap;overflow:hidden}
      th.totaal-h{width:30px;min-width:30px;font-size:9px;background:#c8e6c9}
      td{padding:3px 3px;border:1.5px solid #ccc;font-size:10px;text-align:center;line-height:1.6}
      td.gewas-cel{text-align:left;font-weight:700;font-size:9px;width:60px;max-width:60px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
      td.soort-cel{text-align:left;font-size:9px;width:200px;min-width:200px;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:clip}
      td.nr{color:#888;font-size:8px;width:16px;max-width:16px;text-align:center}
      td.klant-cel{width:40px;font-size:10px}
      td.totaal-cel{width:30px;font-weight:700;color:#2d6a4f;background:#f0fff4}
      th.aantekening-h{width:50px;min-width:50px;background:#fff8e1;color:#92400e}
      td.aantekening-cel{width:50px;background:#fffde7;border:1.5px solid #f59e0b}
      tr td{height:auto;line-height:1.5}
      tr.totaal td{background:#e8f5ee;font-weight:700;border-top:2px solid #2d6a4f}
      tr.subtitel td{background:#f0f7f4;font-weight:700;color:#2d6a4f;font-size:10px;border-top:3px solid #2d6a4f}
      .pagina-break{page-break-before:always}
      @media print{button{display:none}}
    </style></head><body>${el.innerHTML}</body></html>`);
    w.document.close();
    setTimeout(()=>w.print(),400);
  }

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.6)",zIndex:500,overflowY:"auto",padding:20}}>
      <div style={{maxWidth:1400,margin:"0 auto",background:"#fff",borderRadius:8,overflow:"hidden",boxShadow:"0 8px 40px rgba(0,0,0,0.3)"}}>
        <div style={{display:"flex",gap:8,padding:"10px 16px",background:"#f0f7f4",borderBottom:`1px solid ${rand}`,alignItems:"center"}}>
          <button style={gs.knopPrimair} onClick={printDoc}>🖨️ Afdrukken</button>
          <button style={gs.knopSecundair} onClick={onSluit}>✕ Sluiten</button>
          <span style={{fontSize:12,color:subtekst}}>Wegzetlijst week {wk} · {rijen.length} regels</span>
        </div>
        <div id="wegzetmatrix-inhoud" style={{padding:"16px 20px",overflowX:"auto"}}>
          {traymaten.length===0&&<div style={{color:subtekst,padding:20,textAlign:"center"}}>Geen inboetregels voor week {wk}</div>}
          {traymaten.map((tray,ti)=>{
            const trayRijen = rijen.filter(r=>r.verpakking===tray);
            // Unieke klanten voor deze traymaat, gesorteerd
            const klantIds = [...new Set(trayRijen.map(r=>r.klantId))];
            const klantLijst = klantIds.map(id=>({
              id,
              naam: trayRijen.find(r=>r.klantId===id)?.klantNaam||"?",
              code: trayRijen.find(r=>r.klantId===id)?.klantcode||"?",
            })).sort((a,b)=>a.naam.localeCompare(b.naam));

            // Unieke soorten (gewas + soort), gesorteerd gewas+soort alfabetisch
            const soortKeys = [...new Set(trayRijen.map(r=>r.gewas+"||"+r.soort))].sort((a,b)=>{
              const [ag,as_]=a.split("||"); const [bg,bs_]=b.split("||");
              const g=ag.localeCompare(bg,"nl"); return g!==0?g:as_.localeCompare(bs_,"nl");
            });

            // Matrix: soortKey → klantId → aantal
            const matrix = {};
            trayRijen.forEach(r=>{
              const key = r.gewas+"||"+r.soort;
              if(!matrix[key]) matrix[key]={gewas:r.gewas,soort:r.soort,internNr:r.internNr,klanten:{}};
              matrix[key].klanten[r.klantId]=(matrix[key].klanten[r.klantId]||0)+r.aantal;
            });

            // Totalen per klant
            const totPerKlant = {};
            klantLijst.forEach(k=>{totPerKlant[k.id]=soortKeys.reduce((s,key)=>s+(matrix[key]?.klanten[k.id]||0),0);});
            const totTotaal = Object.values(totPerKlant).reduce((s,v)=>s+v,0);

            return (
              <div key={tray} style={{marginBottom:24}} className={ti>0?"pagina-break":""}>
                <div style={{fontWeight:700,fontSize:13,color:"#fff",background:"#2d6a4f",padding:"5px 10px",borderRadius:"4px 4px 0 0",marginBottom:0}}>
                  {tray} — week {wk} — {trayRijen.reduce((s,r)=>s+r.aantal,0)} trays
                </div>
                <table>
                  <thead>
                    <tr>
                      <th colSpan={klantLijst.slice(0,8).length+4} style={{textAlign:"left",fontSize:12,color:"#2d6a4f",background:"#e8f5ee",fontWeight:700,padding:"5px 8px",borderBottom:"2px solid #2d6a4f"}}>
                        Uitleverweken: {[...new Set(trayRijen.map(r=>r.afleverWeek))].sort().join(" · ")}
                      </th>
                    </tr>
                    <tr>
                      <th className="gewas">Gewas</th>
                      <th className="soort-h">Soort</th>
                      <th className="nr-h">Nr.</th>
                      {klantLijst.slice(0,8).map(k=>(
                        <th key={k.id} className="klant" title={k.naam}>{k.naam.substring(0,10)}</th>
                      ))}
                      <th className="totaal-h">Totaal</th>
                      <th className="aantekening-h"></th>
                    </tr>
                  </thead>
                  <tbody>
                    {soortKeys.map((key,i)=>{
                      const rij = matrix[key];
                      const rijTot = klantLijst.reduce((s,k)=>s+(rij.klanten[k.id]||0),0);
                      return (
                        <tr key={key} style={{background:i%2===0?wit:"#f0f7f4"}}>
                          <td className="gewas-cel">{rij.gewas}</td>
                          <td className="soort-cel">{rij.soort}</td>
                          <td className="nr">{rij.internNr}</td>
                          {klantLijst.slice(0,8).map(k=>(
                            <td key={k.id} className="klant-cel" style={{color:rij.klanten[k.id]?"#1a1a1a":"#ddd",fontWeight:rij.klanten[k.id]?700:400}}>
                              {rij.klanten[k.id]||"—"}
                            </td>
                          ))}
                          <td className="totaal-cel">{rijTot}</td>
                          <td className="aantekening-cel"></td>
                        </tr>
                      );
                    })}
                  </tbody>
                  <tfoot>
                    <tr className="totaal">
                      <td colSpan={3} style={{textAlign:"left",fontWeight:700,fontSize:9}}>Totaal</td>
                      {klantLijst.slice(0,8).map(k=>(
                        <td key={k.id} className="klant-cel" style={{fontWeight:700,color:"#2d6a4f"}}>{totPerKlant[k.id]||"—"}</td>
                      ))}
                      <td style={{fontWeight:700,color:"#2d6a4f",background:"#c8e6c9"}}>{totTotaal}</td>
                      <td className="aantekening-cel"></td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function ControlelijstPrint({ data, bedrijf, onSluit }) {
  const { wk, orders, klanten, gewassen, verpDef, teeltduur, kiemkracht } = data;
  const vandaag = new Date().toLocaleDateString("nl-NL");

  function getDuur(gewas, soort, fust, veld) {
    return (teeltduur||[]).find(t=>
      t.gewas?.toLowerCase()===gewas?.toLowerCase()&&
      t.soort?.toLowerCase()===soort?.toLowerCase()&&
      t.fust?.toLowerCase()===fust?.toLowerCase()
    )?.[veld]??null;
  }

  // Vind orders waarvan de inboetweek = wk
  // Per orderregel: inboetweek = leverweek - inboetduur
  const rijen = [];
  orders.filter(o=>o.status!=="geleverd").forEach(o=>{
    const kl = klanten.find(k=>k.id===o.klantId)||{};
    const leverWk = getWeekNr(o.leverdatum);
    const leverJaar = getJaar(o.leverdatum);
    o.regels.forEach(r=>{
      const inboetWeken = getDuur(r.gewas, r.soort, r.verpakking, "inboet");
      if(inboetWeken===null) return;
      let inbWk = leverWk - inboetWeken;
      let inbJaar = leverJaar;
      if(inbWk<=0){inbWk+=52;inbJaar--;}
      const inbLbl = String(inbJaar).slice(-2)+String(inbWk).padStart(2,"0");
      if(inbLbl!==wk) return;
      const gw = gewassen.find(g=>g.naam===r.gewas);
      const internNr = (gw?.internNrs||{})[r.soort]||"";
      const soortMet = r.soort+(internNr?" "+internNr:"");
      rijen.push({
        klantcode: kl.klantcode||kl.naam?.substring(0,6)||"?",
        klantNaam: kl.naam||"?",
        klantId: o.klantId,
        gewas: r.gewas,
        soort: soortMet,
        verpakking: r.verpakking,
        aantal: r.aantal,
        afleverWeek: weekLabel(o.leverdatum),
      });
    });
  });

  // Groepeer per traymaat
  const perTray = {};
  rijen.forEach(r=>{
    if(!perTray[r.verpakking]) perTray[r.verpakking]={tray:r.verpakking,rijen:[],totaal:0};
    perTray[r.verpakking].rijen.push(r);
    perTray[r.verpakking].totaal += r.aantal;
  });

  // Sorteer rijen per traymaat per klant
  Object.values(perTray).forEach(t=>{
    t.rijen.sort((a,b)=>a.klantNaam.localeCompare(b.klantNaam)||a.gewas.localeCompare(b.gewas)||a.soort.localeCompare(b.soort));
  });

  function printDoc() {
    const el = document.getElementById("controlelijst-print-inhoud");
    const w = window.open("","_blank");
    w.document.write(`<html><head><title>Controlelijst week ${wk}</title><style>
      @page{size:A4 portrait;margin:10mm}
      body{font-family:Arial,sans-serif;font-size:10px;color:#1a1a1a;margin:0}

      .pagina-break{page-break-before:always}
      @media print{button{display:none}}
    </style></head><body>${el.innerHTML}</body></html>`);
    w.document.close();
    setTimeout(()=>w.print(),400);
  }

  const traysGesorteerd = Object.keys(perTray).sort();

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.6)",zIndex:500,overflowY:"auto",padding:20}}>
      <div style={{maxWidth:1000,margin:"0 auto",background:"#fff",borderRadius:8,overflow:"hidden",boxShadow:"0 8px 40px rgba(0,0,0,0.3)"}}>

            const t = perTray[tray];
            // Groepeer per klant voor subtotalen
            const perKlant = {};
            t.rijen.forEach(r=>{
              if(!perKlant[r.klantId]) perKlant[r.klantId]={naam:r.klantNaam,code:r.klantcode,rijen:[],totaal:0};
              perKlant[r.klantId].rijen.push(r);
              perKlant[r.klantId].totaal += r.aantal;

            return (

                    <div style={{fontWeight:700,fontSize:20,color:"#1a1a1a",marginTop:2}}>

                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontWeight:700,fontSize:18,color:"#2d6a4f"}}>{t.totaal} trays</div>
                    <div style={{fontSize:11,color:"#555"}}>{vandaag}</div>

                {/* Tabel */}
                <table>
                  <thead>
                    <tr>
                      <th style={{minWidth:100,maxWidth:100}}>Klant</th>
                      <th style={{minWidth:70,maxWidth:80}}>Serie</th>
                      <th style={{minWidth:160}}>Kleur</th>
                      <th style={{minWidth:50,textAlign:"right"}}>Aantal</th>
                      <th style={{minWidth:50,textAlign:"right"}}></th>
                      <th style={{minWidth:40}}></th>
                      <th style={{minWidth:40}}></th>
                      <th style={{minWidth:40}}></th>
                      <th style={{minWidth:50}}>Init.</th>
                    </tr>
                  </thead>
                  <tbody>
                    {Object.values(perKlant).map((kd,ki)=>(
                      <React.Fragment key={ki}>
                        {kd.rijen.map((r,ri)=>(
                          <tr key={ri} style={{background:ri%2===0?wit:"#f0f7f4"}}>

                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                          </tr>
                        ))}
                        {/* Subtotaal per klant — donkere rij */}
                        <tr className="subtotaal" style={{background:"#444",color:"#fff"}}>
                          <td style={{color:"#fff",fontWeight:700,whiteSpace:"nowrap"}}>{kd.naam}</td>
                          <td colSpan={2} style={{color:"#fff"}}></td>
                          <td style={{textAlign:"right",color:"#fff",fontWeight:700}}>{kd.totaal}</td>
                          <td style={{color:"#fff",fontWeight:700,textAlign:"right"}}>{kd.totaal}</td>
                          <td></td><td></td><td></td>
                          <td style={{color:"#fff"}}>✓</td>
                        </tr>
                      </React.Fragment>
                    ))}
                    {/* Totaalrij */}
                    <tr style={{background:"#e8f5ee",fontWeight:700,borderTop:"2px solid #2d6a4f"}}>
                      <td colSpan={3} style={{color:"#2d6a4f",fontWeight:700}}>Totaal {tray}</td>
                      <td style={{textAlign:"right",color:"#2d6a4f",fontWeight:700}}>{t.totaal}</td>
                      <td colSpan={5}></td>
                    </tr>

                </table>

            );

        </div>
      </div>
    </div>
  );
}

function WerklijstPrint({ data, bedrijf, onSluit }) {
  const { wk, blok, type } = data;
  const isZaai = type === "zaai";
  const rijen = Object.values(isZaai ? blok.zaai : blok.inboet);
  const vandaag = new Date().toLocaleDateString("nl-NL");

  // Groepeer per fust, gesorteerd gewas+soort alfabetisch
  const perFust = {};
  rijen.forEach(r => {
    if(!perFust[r.fust]) perFust[r.fust] = [];
    perFust[r.fust].push(r);
  });
  Object.values(perFust).forEach(fr => {
    fr.sort((a,b)=>{
      // Uitzaai: eerst op volgorde (1-5), dan gewas, dan soort
      if(isZaai) {
        const va = parseInt(a.volgorde)||99;
        const vb = parseInt(b.volgorde)||99;
        if(va!==vb) return va-vb;
      }
      const g = a.gewas.localeCompare(b.gewas,"nl");
      return g!==0 ? g : a.soort.localeCompare(b.soort,"nl");
    });
  });

  const kleur = isZaai ? "#1d4ed8" : "#0891b2";
  const titel = isZaai ? "WERKLIJST UITZAAI" : "WERKLIJST INBOET";

  function printDoc() {
    const el = document.getElementById("wl-print-inhoud");
    const w = window.open("","_blank");
    w.document.write(`<html><head><title>${titel} ${wk}</title><style>
      body{font-family:Arial,sans-serif;font-size:11px;color:#1a1a1a;padding:20px;margin:0}
      table{border-collapse:collapse;width:100%}
      .titelbalk{background:#444!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:9px 14px;display:flex;justify-content:space-between;align-items:center;border-radius:4px 4px 0 0;margin-bottom:0}
      th{background:#e0e0e0!important;color:#000;padding:6px 8px;text-align:left;font-size:11px;border:1px solid #bbb;-webkit-print-color-adjust:exact;print-color-adjust:exact}
      td{padding:7px 8px;border:1px solid #ddd;font-size:11px;vertical-align:top}
      .totaalrij td{background:#e8e8e8!important;font-weight:700;border-top:2px solid #444;-webkit-print-color-adjust:exact;print-color-adjust:exact}
      @media print{button{display:none}}
    </style></head><body>${el.innerHTML}</body></html>`);
    w.document.close();
    w.print();
  }

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.6)",zIndex:500,overflowY:"auto",padding:20}}>
      <div style={{maxWidth:760,margin:"0 auto",background:"#fff",borderRadius:8,overflow:"hidden",boxShadow:"0 8px 40px rgba(0,0,0,0.3)"}}>

          <button style={{background:"#fff",color:"#1b1b1b",border:"1px solid #e2e8e4",borderRadius:6,padding:"5px 14px",cursor:"pointer",fontSize:14}} onClick={onSluit}>✕ Sluiten</button>
        </div>

        {/* Document */}
        <div id="wl-print-inhoud" style={{padding:"24px 32px",fontFamily:"Arial, sans-serif",fontSize:11}}>



          {/* Per fust een blok — titelbalk bevat week + fust + totaal */}
          {Object.entries(perFust).map(([fust, fustrijen])=>(
            <div key={fust} style={{marginBottom:24}}>
              {/* Titelbalk: grijs voor zwart-wit print */}
              <div style={{background:"#444",color:"#fff",padding:"9px 14px",borderRadius:"4px 4px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:0}}>
                <div style={{fontWeight:700,fontSize:14}}>{isZaai?"🌰":"🪴"} WERKLIJST NODIG — {fust}</div>

              </div>

              <table style={{borderCollapse:"collapse",width:"100%"}}>
                <thead>
                  <tr>
                    <th style={{padding:"6px 8px",background:"#e8f5ee",color:"#2d6a4f",border:"1px solid #c8e6c9",textAlign:"left",minWidth:120}}>Gewas</th>
                    <th style={{padding:"6px 8px",background:"#e8f5ee",color:"#2d6a4f",border:"1px solid #c8e6c9",textAlign:"left",minWidth:160}}>Soort</th>
                    <th style={{padding:"6px 2px",background:"#e8f5ee",color:"#2d6a4f",border:"1px solid #c8e6c9",textAlign:"left",width:30,minWidth:30}}>Nr.</th>

                      <td style={{padding:"7px 8px",border:"1px solid #ddd"}}></td>

                      {isZaai&&<td style={{padding:"7px 4px",border:"1px solid #ddd",textAlign:"center",fontWeight:700,color:"#92400e",fontSize:13}}>{r.volgorde||""}</td>}
                    </tr>
                  ))}
                </tbody>
                <tfoot>
                  <tr style={{background:"#e8f5ee",fontWeight:700}}>
