function maakBestellingDoc(bestellingen, alleSleutels, verbVerbruikt2, verbSzn2, verb3w2, bd, leverancierNaam, contactpersoon) {
  const vandaag = new Date().toLocaleDateString("nl-NL",{day:"2-digit",month:"long",year:"numeric"});
  const logo = bd.logo?"<img src='"+bd.logo+"' style='height:45px;max-width:120px;object-fit:contain'/>":"";

  const th  = "padding:3px 6px;background:#b8ddc8;color:#0f3320;border:2px solid #8cbfac;text-align:left;font-size:11px;font-weight:700;white-space:nowrap;";
  const thR = "padding:3px 6px;background:#b8ddc8;color:#0f3320;border:2px solid #8cbfac;text-align:right;font-size:11px;font-weight:700;white-space:nowrap;";
  const td  = "padding:2px 6px;border:1px solid #eee;font-size:11px;";
  const tdR = "padding:2px 6px;border:1px solid #eee;font-size:11px;text-align:right;";
  const tdG = "padding:2px 6px;border:1px solid #eee;font-size:11px;text-align:right;font-weight:700;color:#2d6a4f;";

  // Blok 1: bestelling
  const bestelRijen = bestellingen.map(({key,adv},i)=>{
    const [gewas,soort] = key.split("||");
    const aantalZaden = Math.ceil(adv.tekort3w/1000)*1000;
    // Verdeling in zakjes
    let zakjes = [];
    if(aantalZaden >= 10000) { zakjes.push(`${Math.ceil(aantalZaden/10000)}x 10k`); }
    else {
      let rest = aantalZaden;
      const z5 = Math.floor(rest/5000); rest -= z5*5000;
      const z1 = Math.ceil(rest/1000);
      if(z5>0) zakjes.push(`${z5}x 5k`);
      if(z1>0) zakjes.push(`${z1}x 1k`);
    }
    const zakjesTxt = zakjes.join(" + ");
    const bg = i%2===0?wit:"#f0f7f4";
    return "<tr style='background:"+bg+"'>"
      +"<td style='"+td+"font-weight:600'>"+gewas+"</td>"
      +"<td style='"+td+"'>"+soort+"</td>"
      +"<td style='"+tdG+"'>"+aantalZaden.toLocaleString("nl-NL")+"</td>"
      +"<td style='"+tdR+"color:#1d4ed8;font-weight:600'>"+zakjesTxt+"</td>"
      +"</tr>";
  }).join("");

  // Blok 2: jaarprognose — 1 kolom, compact
  const prognoseRijen = alleSleutels.map((key,i)=>{
    const [gewas,soort] = key.split("||");
    const jaarProg = verbSzn2[key]||0;
    const verbruikt = verbVerbruikt2[key]||0;
    const huidigBestel = bestellingen.find(b=>b.key===key);
    const bestelAantal = huidigBestel ? Math.ceil(huidigBestel.adv.tekort3w/1000)*1000 : 0;
    const restant = jaarProg - verbruikt - bestelAantal;
    const bg = i%2===0?wit:"#f0f7f4";
    const restKleur = restant<0?";color:#dc2626;font-weight:700":restant===0?";color:#888":"";
    return "<tr style='background:"+bg+"'>"
      +"<td style='"+td+"font-weight:600'>"+gewas+"</td>"
      +"<td style='"+td+"'>"+soort+"</td>"
      +"<td style='"+tdR+"'>"+jaarProg.toLocaleString("nl-NL")+"</td>"
      +"<td style='"+tdR+"'>"+verbruikt.toLocaleString("nl-NL")+"</td>"
      +"<td style='"+tdR+(bestelAantal>0?";font-weight:700;color:#dc2626":"")+"'>"+bestelAantal.toLocaleString("nl-NL")+"</td>"
      +"<td style='"+tdR+restKleur+"'>"+restant.toLocaleString("nl-NL")+"</td>"
      +"</tr>";
  }).join("");

  const aanhef = contactpersoon ? "Geachte "+contactpersoon+"," : "Geachte heer/mevrouw,";

  const headerBlok = "<div style='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #2d6a4f'>"
    +"<div style='display:flex;gap:10px;align-items:center'>"+logo+"<div>"
      +"<div style='font-size:13px;font-weight:700;color:#2d6a4f'>"+(bd.naam||"")+"</div>"
      +"<div style='font-size:11px;color:#555'>"+(bd.adres||"")+", "+(bd.postcode||"")+" "+(bd.plaats||"")+"</div>"
      +"<div style='font-size:11px;color:#555'>"+(bd.email||"")+"</div>"
    +"</div></div>"
    +"<div style='text-align:right'>"
      +"<div style='font-size:20px;font-weight:700;color:#2d6a4f'>ZAADBESTELLING</div>"
      +"<div style='font-size:11px;color:#555;margin-top:2px'>Datum: "+vandaag+"</div>"
      +(leverancierNaam?"<div style='font-size:11px;color:#555'>Aan: "+leverancierNaam+"</div>":"")
    +"</div>"
  +"</div>";

  return "<!DOCTYPE html><html><head><meta charset='UTF-8'>"
    +"<style>"
      +"@page{size:A4 portrait;margin:14mm}"
      +"body{font-family:Arial,sans-serif;font-size:11px;color:#222;margin:0}"
      +"table{border-collapse:collapse;width:100%}"
      +"thead{display:table-header-group}"
      +"tr{page-break-inside:avoid}"
      +".herhaal-header{display:none} @media print{.herhaal-header{display:table-header-group}}"
      +"@media print{button{display:none}}"
    +"</style></head><body>"
    +headerBlok
    // Brieftekst
    +"<div style='font-size:11px;color:#444;line-height:1.6;margin-bottom:14px'>"
      +aanhef+"<br/><br/>"
      +"Hierbij verzoeken wij u vriendelijk of wij de onderstaande zaden bij u kunnen afroepen op basis van onze huidige teeltplanning. "
      +"Wij ontvangen graag een bevestiging van beschikbaarheid en de verwachte levertijd. "
      +"Mocht u vragen hebben, neem dan gerust contact met ons op."
    +"</div>"
    // Blok 1
    +"<div style='font-size:11px;font-weight:700;color:#2d6a4f;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px'>Benodigd per ommegaande</div>"
    +"<table style='margin-bottom:16px'>"
      +"<thead><tr>"
        +"<th style='"+th+"'>Gewas</th>"
        +"<th style='"+th+"'>Soort</th>"
        +"<th style='"+thR+"'>Aantal zaden</th>"
        +"<th style='"+thR+"'>Verdeling zakjes</th>"
      +"</tr></thead>"
      +"<tbody>"+bestelRijen+"</tbody>"
    +"</table>"
    // Blok 2
    +"<div style='font-size:11px;font-weight:700;color:#2d6a4f;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px'>Jaarprognose alle soorten</div>"
    +"<table>"
      +"<thead><tr>"
        +"<th style='"+th+"'>Gewas</th>"
        +"<th style='"+th+"'>Soort</th>"
        +"<th style='"+thR+"'>Jaar</th>"
        +"<th style='"+thR+"'>Al geleverd</th>"
        +"<th style='"+thR+"'>Deze afroep</th>"
        +"<th style='"+thR+"'>Restant</th>"
      +"</tr></thead>"
      +"<tbody>"+prognoseRijen+"</tbody>"
    +"</table>"
    +"<div style='margin-top:16px;font-size:11px;color:#555'>"
      +"<div>Met vriendelijke groet,</div>"
      +"<div style='margin-top:4px;font-weight:700;font-size:12px'>"+(bd.naam||"")+"</div>"
      +"<div>"+(bd.email||"")+"</div>"
    +"</div>"
    +"</body></html>";
}

function mailBestelling(bestellingen, setStatus, alleSleutels, verbVerbruikt2, verbSzn2, verb3w2, contactpersoon) {
  const mailUrl = localStorage.getItem('ta_mailUrl')||'';
  if(!mailUrl) { alert('Geen mail URL ingesteld. Ga naar ⚙️ Instellingen.'); return; }

  const bd = JSON.parse(localStorage.getItem('ta_bedrijf')||'{}');
  const vandaag = new Date().toLocaleDateString("nl-NL",{day:"2-digit",month:"long",year:"numeric"});
  const leverEmail = bd.leverancierEmail||"";
  if(!leverEmail) { alert('Geen e-mailadres leverancier ingesteld.'); setStatus(""); return; }

  const pdfDoc = maakBestellingDoc(bestellingen, alleSleutels, verbVerbruikt2, verbSzn2, verb3w2, bd, bd.leverancierNaam||"", contactpersoon||"");

  // Genereer PDF via html2canvas + jsPDF
  async function verstuur() {
    setStatus("📄 PDF genereren...");
    try {
      const div = document.createElement('div');
      div.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;background:#fff;padding:15px;font-family:Arial,sans-serif;font-size:10px';
      div.innerHTML = pdfDoc.replace(/<style>.*?<\/style>/gs,'').replace(/<[!][^>]*>/g,'').replace(/<html[^>]*>|<\/html>|<head[^>]*>.*?<\/head>|<body[^>]*>|<\/body>/gs,'');
      document.body.appendChild(div);
      const canvas = await window.html2canvas(div,{scale:1.5,useCORS:true,backgroundColor:'#fff'});
      document.body.removeChild(div);
      const {jsPDF} = window.jspdf;
      const pdf = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
      const imgData = canvas.toDataURL('image/jpeg',0.88);
      const pdfW = pdf.internal.pageSize.getWidth();
      const pdfH = (canvas.height*pdfW)/canvas.width;
      const pageH = pdf.internal.pageSize.getHeight();
      let y=0;
      while(y<pdfH){if(y>0)pdf.addPage();pdf.addImage(imgData,'JPEG',0,-y,pdfW,pdfH);y+=pageH;}
      const pdfBase64 = pdf.output('datauristring').split(',')[1];
      const bestandsnaam = 'Zaadbestelling_'+new Date().toISOString().slice(0,10)+'.pdf';
      const onderwerp = "Zaadbestelling "+new Date().toLocaleDateString("nl-NL")+" - "+(bd.naam||"Vollebregt Cyclamen");

      // Mail body (kort)
      const mailHtml = "<p>Geachte heer/mevrouw,</p><p>Hierbij ontvangt u onze zaadbestelling. Zie de bijgevoegde PDF voor de details en jaarprognose.</p><p>Met vriendelijke groet,<br/><strong>"+(bd.naam||"")+"</strong><br/>"+(bd.telefoon||"")+"</p>";

      setStatus("📧 Versturen...");
      await fetch(mailUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:JSON.stringify({to_email:leverEmail,onderwerp,bericht:"",html:mailHtml,attachment:pdfBase64,attachment_name:bestandsnaam})
      });
      const logEntry={datum:new Date().toLocaleString("nl-NL"),klant:"Zaadleverancier",email:leverEmail,onderwerp,week:"—"};
      const log=JSON.parse(localStorage.getItem('ta_maillog')||'[]');
      localStorage.setItem('ta_maillog',JSON.stringify([logEntry,...log].slice(0,50)));
      setStatus("✅ Bestelling verstuurd naar "+leverEmail);
      setTimeout(()=>setStatus(""),5000);
    } catch(err) {
      setStatus("⚠️ Fout: "+err.message);
    }
  }
  verstuur();
}

function ZaadVoorraad({ zaadinkoop, orders, gewassen, kiemkracht, teeltduur, bedrijf, leveranciers }) {
  const [toonBestel, setToonBestel] = useState(false);
  const [mailBestelStatus, setMailBestelStatus] = useState("");
  const [selLev, setSelLev] = useState(null);
  const [selBestelLev, setSelBestelLev] = useState(""); // gekozen leverancier in besteladvies

  const nu = new Date();
  const huidigWk = getWeekNr(nu);
  const huidigJaar = getJaar(nu);
  const eindeSeizoensWk = 40;
  const eindeSeizoensJaar = huidigWk < 40 ? huidigJaar : huidigJaar + 1;
  const eindeLabel = `${String(eindeSeizoensJaar).slice(-2)}${String(eindeSeizoensWk).padStart(2,"0")}`;

  function wkLabel(offset) {
    let wk = huidigWk + offset; let jaar = huidigJaar;
    while(wk > 52) { wk -= 52; jaar++; }
    return `${String(jaar).slice(-2)}${String(wk).padStart(2,"0")}`;
  }
  const nu3w = wkLabel(0);
  const grens3w = wkLabel(3);

  function getKiem(gewas, soort) {
    const k = (kiemkracht||[]).find(x=>x.gewas?.toLowerCase()===gewas?.toLowerCase()&&x.soort?.toLowerCase()===soort?.toLowerCase());
    return k ? k.waarde/100 : 1;
  }
  function getDuur(gewas, soort, fust, veld) {
    return (teeltduur||[]).find(t=>t.gewas?.toLowerCase()===gewas?.toLowerCase()&&t.soort?.toLowerCase()===soort?.toLowerCase()&&t.fust?.toLowerCase()===fust?.toLowerCase())?.[veld]??null;
  }

  const seizoenStartJaar = huidigWk >= 40 ? huidigJaar : huidigJaar - 1;
  const seizoenStartLabel = `${String(seizoenStartJaar).slice(-2)}40`;

  const inkoop2 = {};
  (zaadinkoop||[]).forEach(z=>{ const key = z.gewas+"||"+z.soort; inkoop2[key] = (inkoop2[key]||0) + z.aantal; });

  const verbSzn2 = {}, verbVerbruikt2 = {}, verb3w2 = {};
  (orders||[]).filter(o=>o.status==="bevestigd"||o.status==="reservering"||o.status==="geleverd").forEach(o=>{
    (o.regels||[]).forEach(r=>{
      const kiem = getKiem(r.gewas, r.soort);
      const uitzaaiWeken = getDuur(r.gewas, r.soort, r.verpakking, "uitzaai");
      if(uitzaaiWeken===null) return;
      let zaaiWk = getWeekNr(o.leverdatum) - uitzaaiWeken;
      let zaaiJaar = getJaar(o.leverdatum);
      if(zaaiWk<=0){zaaiWk+=52;zaaiJaar--;}
      const zaaiLbl = String(zaaiJaar).slice(-2)+String(zaaiWk).padStart(2,"0");
      const fustL = r.verpakking?.toLowerCase()||"";
      const is65 = fustL.includes("65")||fustL.includes("66");
      const zaaiTrays = is65?Math.ceil(Math.ceil(r.aantal/kiem)/4):(kiem>0?Math.ceil(r.aantal/kiem):r.aantal);
      const aantalPerTray = fustL.includes("179")||fustL.includes("180")?180:264;
      const zaad = zaaiTrays * aantalPerTray;
      const key = r.gewas+"||"+r.soort;
      if(zaaiLbl >= seizoenStartLabel && zaaiLbl <= eindeLabel) {
        verbSzn2[key] = (verbSzn2[key]||0) + zaad;
        if(zaaiLbl < nu3w) verbVerbruikt2[key] = (verbVerbruikt2[key]||0) + zaad;
        if(zaaiLbl >= nu3w && zaaiLbl <= grens3w) verb3w2[key] = (verb3w2[key]||0) + zaad;
      }
    });
  });

  const alleSleutels = [...new Set([...Object.keys(inkoop2), ...Object.keys(verbSzn2)])].sort();

  function bestelAdvies(key) {
    const k1 = verbSzn2[key]||0;
    const k2 = inkoop2[key]||0;
    const k4 = verbVerbruikt2[key]||0;
    const k5 = k2 - k4;
    const k6 = verb3w2[key]||0;
    const k7 = k5 - k6;
    const restSzn = k1 - k2;
    if(restSzn <= 0) return null;
    if(k7 >= 0) return null;
    const tekort = Math.abs(k7);
    let advies = [];
    if(tekort >= 10000) { advies.push(`${Math.ceil(tekort/10000)}x 10k`); }
    else {
      let rest = Math.ceil(tekort/1000)*1000;
      const z5 = Math.floor(rest/5000); rest -= z5*5000;
      const z1 = Math.ceil(rest/1000);
      if(z5>0) advies.push(`${z5}x 5k`);
      if(z1>0) advies.push(`${z1}x 1k`);
    }
    return { tekort3w: tekort, advies: advies.join(" + ") };
  }

  const bestellingen = alleSleutels.map(key=>({key,adv:bestelAdvies(key)})).filter(x=>x.adv);

  return (
    <div style={{flex:1,overflowY:"auto",padding:16,position:"relative"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        {bestellingen.length===0
          ? <span style={{...gs.badge,background:"#e5e7eb",color:subtekst}}>Niets te bestellen</span>
          : <button style={{...gs.knopPrimair,background:"#dc2626"}} onClick={()=>setToonBestel(true)}>
              Besteladvies ({bestellingen.length} soorten)
            </button>
        }
        <span style={{fontSize:11,color:subtekst}}>Seizoen t/m week {eindeSeizoensWk} · 3-weken horizon</span>
      </div>

      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead>
          <tr>{["Gewas","Soort","Jaarprognose","Geleverd","Rest seizoen","Verbruikt","Huidige voorraad","Verbruik 3w","Saldo 3w","Besteladvies"].map((h,i)=>(
            <th key={h} style={{...TH,textAlign:i>=2?"right":"left",position:"sticky",top:0,zIndex:2}}>{h}</th>
          ))}</tr>
        </thead>
        <tbody>
          {alleSleutels.map((key,i)=>{
            const [gewas,soort] = key.split("||");
            const k1 = verbSzn2[key]||0;
            const k2 = inkoop2[key]||0;
            const k3 = k1 - k2;
            const k4 = verbVerbruikt2[key]||0;
            const k5 = k2 - k4;
            const k6 = verb3w2[key]||0;
            const k7 = k5 - k6;
            const adv = bestelAdvies(key);
            return (
              <tr key={key} style={{background:adv?"#fff5f5":i%2===0?wit:"#f0f7f4"}}>
                <td style={TD}><strong>{gewas}</strong></td>
                <td style={TD}>{soort}</td>
                <td style={{...TD,textAlign:"right",color:subtekst}}>{k1>0?k1.toLocaleString("nl-NL"):"—"}</td>
                <td style={{...TD,textAlign:"right",fontWeight:600}}>{k2>0?k2.toLocaleString("nl-NL"):"0"}</td>
                <td style={{...TD,textAlign:"right",color:k3<0?"#dc2626":subtekst}}>{k1>0?k3.toLocaleString("nl-NL"):"—"}</td>
                <td style={{...TD,textAlign:"right",color:subtekst}}>{k4>0?k4.toLocaleString("nl-NL"):"—"}</td>
                <td style={{...TD,textAlign:"right",fontWeight:600,color:k5<0?"#dc2626":groen}}>{k5.toLocaleString("nl-NL")}</td>
                <td style={{...TD,textAlign:"right",color:subtekst}}>{k6>0?k6.toLocaleString("nl-NL"):"—"}</td>
                <td style={{...TD,textAlign:"right",fontWeight:700,color:k7<0?"#dc2626":"#ccc"}}>
                  {k7<0?`⚠️ ${k7.toLocaleString("nl-NL")}`:"—"}
                </td>
                <td style={{...TD,textAlign:"right"}}>
                  {adv?<span style={{background:"#fee2e2",color:"#dc2626",borderRadius:4,padding:"2px 8px",fontWeight:700,fontSize:11}}>{adv.advies}</span>
                      :<span style={{color:"#ccc",fontSize:11}}>—</span>}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
      {alleSleutels.length===0&&<div style={{textAlign:"center",color:subtekst,padding:60}}><div style={{fontSize:40,marginBottom:10}}>📦</div><div>Geen data</div></div>}

      {toonBestel&&(
        <div style={gs.overlay}><div style={{...gs.modal,width:520}}>
          <div style={{...gs.modalTitel,color:"#dc2626"}}>Besteladvies zaad</div>
          <div style={{fontSize:11,color:subtekst,marginBottom:10}}>Tekort binnen 3 weken · seizoen t/m week {eindeSeizoensWk}</div>

          {/* Leverancier kiezer */}
          {leveranciers&&leveranciers.length>0&&(
            <div style={{marginBottom:12}}>
              <label style={gs.label}>Leverancier</label>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                <button onClick={()=>setSelBestelLev("")}
                  style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${rand}`,cursor:"pointer",fontSize:11,
                    background:selBestelLev===""?groen:"transparent",color:selBestelLev===""?wit:subtekst,fontWeight:selBestelLev===""?700:400}}>
                  Alle
                </button>
                {leveranciers.map(lev=>{
                  const aantalVoorLev = bestellingen.filter(({key})=>{
                    const [gewas]=key.split("||");
                    const gw=gewassen.find(g=>g.naam===gewas);
                    return String(gw?.leverancierId)===String(lev.id);
                  }).length;
                  if(aantalVoorLev===0) return null;
                  return (
                    <button key={lev.id} onClick={()=>setSelBestelLev(lev.id)}
                      style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${rand}`,cursor:"pointer",fontSize:11,
                        background:selBestelLev===lev.id?groen:"transparent",color:selBestelLev===lev.id?wit:subtekst,fontWeight:selBestelLev===lev.id?700:400}}>
                      {lev.naam} ({aantalVoorLev})
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* Tabel gefilterd op leverancier */}
          {(()=>{
            const gefilterd = bestellingen.filter(({key})=>{
              if(!selBestelLev) return true;
              const [gewas]=key.split("||");
              const gw=gewassen.find(g=>g.naam===gewas);
              return String(gw?.leverancierId)===String(selBestelLev);
            });
            const selLevObj = leveranciers?.find(l=>String(l.id)===String(selBestelLev));
            return (<>
              <table style={{width:"100%",marginBottom:12}}>
                <thead><tr>
                  <th style={TH}>Gewas</th><th style={TH}>Soort</th>
                  <th style={{...TH,textAlign:"right"}}>Tekort 3w</th>
                  <th style={{...TH,textAlign:"right"}}>Bestellen</th>
                </tr></thead>
                <tbody>
                  {gefilterd.map(({key,adv})=>{
                    const [gewas,soort]=key.split("||");
                    const gw=gewassen.find(g=>g.naam===gewas);
                    const lev=leveranciers?.find(l=>l.id===gw?.leverancierId);
                    return (
                      <tr key={key} style={{borderBottom:`1px solid ${rand}`}}>
                        <td style={{...TD,fontWeight:600}}>{gewas}</td>
                        <td style={TD}>{soort}</td>

                        <td style={{...TD,textAlign:"right",fontWeight:700,color:groen}}>{adv.advies}</td>

                    );
                  })}
                  {gefilterd.length===0&&<tr><td colSpan={4} style={{...TD,textAlign:"center",color:subtekst,padding:16}}>Geen bestellingen voor deze leverancier</td></tr>}
                </tbody>
              </table>
              {selLevObj&&<div style={{fontSize:11,color:subtekst,marginBottom:8}}>
                📧 Wordt verstuurd naar: <strong>{selLevObj.email||"— geen e-mail ingesteld —"}</strong>
              </div>}
              {mailBestelStatus&&<div style={{fontSize:11,margin:"6px 0",color:mailBestelStatus.startsWith("✅")?"#16a34a":"#f59e0b",textAlign:"center"}}>{mailBestelStatus}</div>}

                  const w = window.open("","_blank");
                  if(w){w.document.open();w.document.write(doc);w.document.close();setTimeout(()=>w.print(),400);}
                }}>👁️ Preview PDF</button>
                <button style={{...gs.knopPrimair,background:"#1d4ed8"}} onClick={()=>{
                  const gefilterdBestel = bestellingen.filter(({key})=>{
                    if(!selBestelLev) return true;
                    const [gewas]=key.split("||");
                    const gw=gewassen.find(g=>g.naam===gewas);
                    return String(gw?.leverancierId)===String(selBestelLev);
                  });
                  if(!selBestelLev){alert("Kies eerst een leverancier");return;}
                  if(!selLevObj){
                    alert("Leverancier niet gevonden (id="+selBestelLev+", beschikbaar: "+leveranciers.map(l=>l.id).join(",")+")");
                    return;
                  }
                  const leverEmail = selLevObj.email||"";
                  if(!leverEmail){alert("Geen e-mailadres ingesteld voor "+selLevObj.naam+". Ga naar ⚙️ Stamdata → Leveranciers.");return;}
                  const mailUrl = localStorage.getItem("ta_mailUrl")||"";
                  if(!mailUrl){alert("Geen mail URL ingesteld. Ga naar ⚙️ Instellingen.");return;}
                  const bdMetEmail = {...(bedrijf||{}), leverancierEmail: leverEmail, leverancierNaam: selLevObj.naam||""};
                  const tmpBd = JSON.stringify(bdMetEmail);
                  const origBd = localStorage.getItem("ta_bedrijf");
                  localStorage.setItem("ta_bedrijf", tmpBd);
                  mailBestelling(gefilterdBestel, setMailBestelStatus, alleSleutels, verbVerbruikt2, verbSzn2, verb3w2, selLevObj?.contactpersoon||"");
                  setTimeout(()=>localStorage.setItem("ta_bedrijf", origBd||"{}"), 500);
                }}>📧 Bestelling mailen</button>
                <button style={gs.knopSecundair} onClick={()=>{setToonBestel(false);setSelBestelLev("");}}>Sluiten</button>

function Zaadinkoop({ gewassen, zaadinkoop, setZaadinkoop, orders, teeltduur, kiemkracht, verpDef, bedrijf, leveranciers }) {
  const [tab, setTab] = useState("inkoop");
  const [laasteGewas, setLaatsteGewas] = useState("");
  const [laastePrijs, setLaastePrijs] = useState("");
  const leeg = () => ({id:null, datum:new Date().toISOString().split("T")[0], gewas:laasteGewas, soort:laasteGewas?gewassen.find(g=>g.naam===laasteGewas)?.soorten[0]||"":"", leverancier:"", code:"", kiemkracht:90, aantal:"", prijs:laastePrijs});
  const [data, setData] = useState(leeg());
  const [aantalDisplay, setAantalDisplay] = useState("");
  const [delId, setDelId] = useState(null);
  const [filtGewas, setFiltGewas] = useState("");
  const [sorteer, setSorteer] = useState("datum");
  const [sortDir, setSortDir] = useState(-1);
  const [importZaad, setImportZaad] = useState(false);
  const [importZaadVoorbeeld, setImportZaadVoorbeeld] = useState(null);
  const [importZaadBezig, setImportZaadBezig] = useState(false);

  // Haal nummer uit soortnaam (laatste getal in de string)
  function vindNummerUitNaam(naam) {
    const m = naam.match(/(\d{3,6})\s*$/);
    return m ? m[1] : null;
  }

  // Zoek soort in gewassen op basis van intern nummer
  function vindSoortOpNummer(nummer) {
    for(const gw of gewassen) {
      for(const soort of gw.soorten) {
        const internNr = (gw.internNrs||{})[soort]||"";
        if(internNr && String(internNr) === String(nummer)) {
          return { gewas: gw.naam, soort };
        }
      }
    }
    return null;
  }

  // Weeknr+dag naar datum (zaterdag van die week)
  function weekDagNaarDatum(wkDag) {
    const m = wkDag.trim().match(/^(\d{2})(\d{2})\s*(MA|DI|WO|DO|VR|ZA|ZO)/i);
    if(!m) return new Date().toISOString().split("T")[0];
    const jaar = 2000 + parseInt(m[1]);
    const wk = parseInt(m[2]);
    const dagMap = {MA:1,DI:2,WO:3,DO:4,VR:5,ZA:6,ZO:0};
    const dag = dagMap[m[3].toUpperCase()]??0;
    // Maandag van die ISO week
    const jan4 = new Date(jaar, 0, 4);
    const ma = new Date(jan4);
    ma.setDate(jan4.getDate() - (jan4.getDay()||7) + 1 + (wk-1)*7);
    const d = new Date(ma);
    d.setDate(ma.getDate() + dag - 1);
    return d.toISOString().split("T")[0];
  }

  function verwerkZaadTekst(tekst) {
    setImportZaadBezig(true);
    const regels = tekst.trim().split("\n").map(r=>r.split("\t"));
    const resultaat = [];
    const onbekend = [];

    regels.forEach((cols, i) => {
      if(cols.length < 4) return;
      const [datumRaw, teelt, kleur, aantalRaw] = cols;
      const datum = weekDagNaarDatum(datumRaw);
      const aantal = parseInt(aantalRaw)||0;
      if(!teelt||!kleur||!aantal) return;

      const nummer = vindNummerUitNaam(kleur);
      const match = nummer ? vindSoortOpNummer(nummer) : null;

      if(match) {
        resultaat.push({
          datum, gewas:match.gewas, soort:match.soort, // app-naam
          aantal, aantalK:Math.round(aantal/1000),
          leverancier:"", code:nummer||"", kiemkracht:90, prijs:null,
          _origineel: kleur.trim(), // originele Excel-naam ter info
        });
      } else {
        onbekend.push({
          rij: i+1, datumRaw: datumRaw.trim(),
          teelt: teelt.trim(), kleur: kleur.trim(),
          nummer: nummer||"?", aantal,
        });
      }
    });

    setImportZaadVoorbeeld({ resultaat, onbekend });
    setImportZaadBezig(false);
  }

  function bevestigZaadImport() {
    if(!importZaadVoorbeeld) return;
    const nieuw = importZaadVoorbeeld.resultaat.map(r=>({
      id: Date.now()+Math.random(),
      datum: r.datum, gewas: r.gewas, soort: r.soort,
      leverancier: r.leverancier, code: r.code,
      kiemkracht: r.kiemkracht, aantal: r.aantal, prijs: r.prijs,
    }));
    setZaadinkoop(prev=>[...prev, ...nieuw]);
    setImportZaad(false);
    setImportZaadVoorbeeld(null);
    alert(`✅ ${nieuw.length} zaadinkoop regels geïmporteerd.`);
  }

  const soorten = gewassen.find(g=>g.naam===data.gewas)?.soorten||[];

  function setV(k,v) {
    if(k==="gewas") {
      const gw = gewassen.find(g=>g.naam===v);
      const soort = gw?.soorten[0]||"";
      const prijs = soort&&gw?.inkoopPrijzen?.[soort]||laastePrijs;
      setData({...data,gewas:v,soort,prijs});
    } else if(k==="soort") {
      const gw = gewassen.find(g=>g.naam===data.gewas);
      const inkoopPrijs = gw?.inkoopPrijzen?.[v]||"";
      const prijs = inkoopPrijs||laastePrijs;
      setData({...data,soort:v,prijs});
    } else {
      setData({...data,[k]:v});
    }
  }

  function opslaan(enNieuw=false) {
    const aantalWerkelijk = Number(aantalDisplay) * 1000;
    if(!data.datum||!data.gewas||!aantalWerkelijk) return;
    const gw = gewassen.find(g=>g.naam===data.gewas);
    const levId = gw?.leverancierId;
    const levNaam = levId ? ((leveranciers||[]).find(l=>l.id===levId)?.naam||"") : "";
    const lev = data.leverancier || levNaam;
    const inkoopPrijs = data.prijs || gw?.inkoopPrijzen?.[data.soort] || null;
    const r = {...data, aantal:aantalWerkelijk, prijs:inkoopPrijs?Number(inkoopPrijs):null, leverancier:lev};
    if(r.id) setZaadinkoop(zaadinkoop.map(x=>x.id===r.id?r:x));
    else setZaadinkoop(prev=>[...prev, {...r, id:Date.now()}]);
    setLaatsteGewas(data.gewas);
    if(enNieuw) { setData({...leeg(),gewas:data.gewas,soort:data.soort}); setAantalDisplay(""); }
    else setData(leeg()); setAantalDisplay(""); if(!enNieuw) setData(leeg());
  }

  function bewerken(z) { setData({...z}); setAantalDisplay(String(z.aantal/1000)); }
  function verwijder(id) { setZaadinkoop(zaadinkoop.filter(x=>x.id!==id)); setDelId(null); }
  function klikSort(kol) {
    if(sorteer===kol) setSortDir(prev=>prev*-1);
    else { setSorteer(kol); setSortDir(kol==="datum"?-1:1); }
  }

  const gefilterd = [...zaadinkoop]
    .filter(z=>!filtGewas||z.gewas===filtGewas)
    .sort((a,b)=>{
      // Primaire sortering op gekozen kolom
      let v = 0;
      if(sorteer==="datum")       v = a.datum.localeCompare(b.datum) * sortDir;
      else if(sorteer==="gewas")  v = (a.gewas||"").localeCompare(b.gewas||"","nl") * sortDir;
      else if(sorteer==="soort")  v = (a.soort||"").localeCompare(b.soort||"","nl") * sortDir;
      if(v!==0) return v;
      // Secundair altijd: datum desc, gewas asc, soort asc
      if(a.datum!==b.datum) return b.datum.localeCompare(a.datum);
      if(a.gewas!==b.gewas) return (a.gewas||"").localeCompare(b.gewas||"","nl");
      return (a.soort||"").localeCompare(b.soort||"","nl");
    });

  const totaalAantal = gefilterd.reduce((s,z)=>s+z.aantal,0);
  const totaalBedrag = gefilterd.reduce((s,z)=>{
    const gw2 = gewassen.find(g=>g.naam===z.gewas);
    const prijs = z.prijs || gw2?.inkoopPrijzen?.[z.soort] || 0;
    return s+(prijs&&z.aantal?(Number(prijs)*z.aantal/1000):0);
  },0);

  const sTH = {...TH, padding:"4px 6px", fontSize:11, position:"sticky", top:0, zIndex:2};
  const sTD = {padding:"4px 6px", fontSize:12, borderBottom:`1px solid ${rand}`, verticalAlign:"middle"};

  return (
    <div style={{display:"flex", flexDirection:"column", height:"calc(100vh - 50px)"}}>
      {/* Tabs */}
      <div style={{display:"flex",gap:3,padding:"8px 12px",background:"rgba(0,0,0,0.06)",margin:"0",alignItems:"center"}}>
        {[["inkoop","📋 Inkoop"],["voorraad","📦 Zaadvoorraad"]].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)}
            style={{padding:"5px 16px",border:"none",borderRadius:6,cursor:"pointer",fontSize:14,
              fontWeight:tab===v?700:400, background:tab===v?groen:"transparent", color:tab===v?wit:subtekst}}>
            {l}
          </button>
        ))}
        <button onClick={()=>{setImportZaad(true);setImportZaadVoorbeeld(null);}}
          style={{marginLeft:"auto",padding:"5px 14px",background:"#e8f5ee",border:`1px solid ${groen}`,borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:600,color:groen}}>
          📥 Importeer zaaddata
        </button>
      </div>

      {tab==="voorraad" && (
        <ZaadVoorraad
          zaadinkoop={zaadinkoop||[]} orders={orders||[]} gewassen={gewassen||[]}
          kiemkracht={kiemkracht||[]} teeltduur={teeltduur||[]} bedrijf={bedrijf||{}}
          leveranciers={leveranciers||[]}
        />
      )}

      {tab==="inkoop" && (
      <div style={{display:"flex", flex:1, overflow:"hidden"}}>
        {/* Links: filter + formulier */}
        <div style={{width:230, borderRight:`1px solid ${rand}`, background:wit, overflowY:"auto", flexShrink:0, display:"flex", flexDirection:"column"}}>
          <div style={{padding:10, borderBottom:`1px solid ${rand}`}}>
            <div style={{fontSize:11,fontWeight:700,color:groen,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Zaadinkoop</div>
            <div style={{fontSize:10,color:subtekst,marginBottom:3}}>Gewas</div>
            <select style={{...gs.input,fontSize:11,marginBottom:8}} value={filtGewas} onChange={e=>setFiltGewas(e.target.value)}>
              <option value="">Alle gewassen</option>
              {gewassen.map(g=><option key={g.naam}>{g.naam}</option>)}
            </select>
            <div style={{display:"flex",gap:4,marginBottom:8}}>
              {[["datum","Datum"],["gewas","Gewas"],["soort","Soort"]].map(([v,l])=>(
                <button key={v} onClick={()=>klikSort(v)}
                  style={{flex:1,padding:"3px 6px",border:"none",borderRadius:4,cursor:"pointer",fontSize:11,
                    background:sorteer===v?groen:"#f0f0f0",color:sorteer===v?wit:subtekst}}>
                  {l}{sorteer===v?(sortDir===1?" ↑":" ↓"):""}
                </button>
              ))}
            </div>
            <div style={{display:"flex",gap:12}}>
              <div><div style={{fontSize:10,color:subtekst}}>Zaden</div><div style={{fontSize:14,fontWeight:700,color:groen}}>{(totaalAantal).toLocaleString("nl-NL")}</div></div>
              <div><div style={{fontSize:10,color:subtekst}}>Inkopen</div><div style={{fontSize:14,fontWeight:700,color:groen}}>{gefilterd.length}</div></div>
            </div>
          </div>

          <div style={{padding:10,flex:1,background:"#f0f7f3",borderTop:`2px solid ${groen}`}}>
            <div style={{fontSize:11,fontWeight:700,color:groen,marginBottom:8}}>{data.id?"Bewerken":"Nieuwe inkoop"}</div>
            <div style={gs.veldGroep}>
              <label style={gs.label}>Datum</label>
              <input style={gs.input} type="date" value={data.datum} onChange={e=>setV("datum",e.target.value)} />
            </div>
            <div style={gs.veldGroep}>
              <label style={gs.label}>Gewas</label>
              <select style={gs.input} value={data.gewas} onChange={e=>setV("gewas",e.target.value)}>
                <option value="">— Kies —</option>

            </div>
            <div style={gs.veldGroep}>
              <label style={gs.label}>Soort</label>
              <select style={gs.input} value={data.soort} onChange={e=>setV("soort",e.target.value)} disabled={!data.gewas}>

              </select>
            </div>
            <div style={{display:"flex",gap:6}}>
              <div style={{...gs.veldGroep,flex:1}}>
                <label style={gs.label}>Aantal <span style={{color:subtekst}}>(×1000)</span></label>
                <input style={gs.input} type="number" min="0" step="1" placeholder="0"

              </div>
              <div style={{...gs.veldGroep,flex:1}}>
                <label style={gs.label}>Kiem%</label>
                <input style={gs.input} type="number" min="0" max="100" step="1" value={data.kiemkracht}

              </div>
            </div>
            <div style={gs.veldGroep}>
              <label style={gs.label}>Code</label>
              <input style={gs.input} type="text" placeholder="L2024-001" value={data.code} onChange={e=>setV("code",e.target.value)} />
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              <button style={{...gs.knopPrimair,width:"100%"}} onClick={()=>opslaan(true)}>+ Opslaan & Nieuw</button>
              <button style={{...gs.knopSecundair,width:"100%"}} onClick={()=>opslaan(false)}>Opslaan</button>
              {data.id&&<button style={{...gs.knopSecundair,width:"100%",fontSize:11}} onClick={()=>{setData(leeg());setAantalDisplay("");}}>Annuleren</button>}
            </div>
          </div>
        </div>

        {/* Rechts: overzicht */}
        <div style={{flex:1,overflowY:"auto",padding:10}}>
          {gefilterd.length===0 ? (
            <div style={{textAlign:"center",color:subtekst,padding:60}}>
              <div style={{fontSize:40,marginBottom:10}}>🌰</div>
              <div>Nog geen zaadinkoop ingevoerd</div>
            </div>
          ) : (
            <table style={{width:"auto",minWidth:"100%",borderCollapse:"collapse"}}>
              <thead>
                <tr>
                  {[["Datum","datum"],["Gewas","gewas"],["Soort","soort"],["Aantal",null],["Kiem%",null],["Code",null],["Leverancier",null],["Bedrag",null],["",null]].map(([h,kol],i)=>{
                    const actief = kol&&sorteer===kol;
                    return <th key={h||i}
                      onClick={kol?()=>klikSort(kol):undefined}
                      style={{...sTH,textAlign:i>=3&&i<=4||i===7?"right":"left",
                        cursor:kol?"pointer":"default",userSelect:"none",
                        background:actief?"#b8ddc8":sTH.background}}>
                      {h}{kol&&<span style={{marginLeft:3,color:actief?"#0f3320":"#6aaa88"}}>{actief?(sortDir===1?"↑":"↓"):"⇅"}</span>}
                    </th>;
                  })}
                </tr>
              </thead>
              <tbody>
                {gefilterd.map((z,i)=>(
                  <tr key={z.id} style={{background:i%2===0?wit:"#f0f7f4"}}>
                    <td style={sTD}>{z.datum}</td>
                    <td style={sTD}><strong>{z.gewas}</strong></td>
                    <td style={sTD}>{z.soort}</td>
                    <td style={{...sTD,textAlign:"right",fontWeight:700,color:groen}}>{(z.aantal).toLocaleString("nl-NL")}</td>
                    <td style={{...sTD,textAlign:"right"}}>{z.kiemkracht!=null?`${z.kiemkracht}%`:"—"}</td>
                    <td style={sTD}>{z.code||"—"}</td>
                    <td style={sTD}>{(()=>{
                      if(z.leverancier) return z.leverancier;
                      const gw2 = gewassen.find(g=>g.naam===z.gewas);
                      const levId = gw2?.leverancierId;
                      if(levId) return (leveranciers||[]).find(l=>l.id===levId)?.naam||"—";
                      return "—";
                    })()}</td>
                    <td style={{...sTD,textAlign:"right",color:groen,fontWeight:600}}>{(()=>{
                      const gw2 = gewassen.find(g=>g.naam===z.gewas);
                      const prijs = z.prijs || gw2?.inkoopPrijzen?.[z.soort] || null;
                      return prijs&&z.aantal?"€ "+(Number(prijs)*z.aantal/1000).toFixed(2):"—";
                    })()}</td>
                    <td style={{...sTD,textAlign:"right",whiteSpace:"nowrap"}}>
                      <button style={gs.knopKlein} onClick={()=>bewerken(z)}>✏️</button>
                      <button style={{...gs.knopVerwijder,marginLeft:4}} onClick={()=>setDelId(z.id)}>🗑️</button>
                    </td>
                  </tr>
                ))}
              </tbody>
              <tfoot>
                <tr style={{background:"#e8f5ee",fontWeight:700}}>
                  <td colSpan={3} style={{...sTD,color:groen}}>Totaal</td>
                  <td style={{...sTD,textAlign:"right",color:groen}}>{(totaalAantal).toLocaleString("nl-NL")}</td>
                  <td colSpan={3} style={sTD}></td>
                  <td style={{...sTD,textAlign:"right",color:groen,fontWeight:700}}>€ {totaalBedrag.toFixed(2)}</td>
                </tr>
              </tfoot>
            </table>
          )}
        </div>
      </div>
      )}
      {delId&&<BevestigModal tekst="Inkoop verwijderen?" onJa={()=>verwijder(delId)} onNee={()=>setDelId(null)} />}

      {/* ── ZAAD IMPORT MODAL ── */}
      {importZaad&&(
        <div style={gs.overlay}>
          <div style={{...gs.modal,width:740,maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{fontWeight:700,fontSize:15,marginBottom:10,color:groen}}>📥 Zaaddata importeren</div>
            {!importZaadVoorbeeld&&(
              <div>
                <div style={{fontSize:12,color:subtekst,marginBottom:8}}>
                  Plak hieronder de gekopieerde data (tab-gescheiden: Datum, Teelt, Kleur, Aantal). Matching op nummer achteraan de soortnaam.
                </div>
                <textarea
                  style={{width:"100%",height:200,fontFamily:"monospace",fontSize:11,padding:8,border:`1px solid ${rand}`,borderRadius:6,resize:"vertical",boxSizing:"border-box"}}
                  placeholder={"2626 DI\tMacro\tKester MAC633\t60000\n2626 DI\tCarino\tBergwint CAR131\t60000"}
                  onChange={e=>{if(e.target.value.includes("\t")) verwerkZaadTekst(e.target.value);}}
                />
                {importZaadBezig&&<div style={{textAlign:"center",padding:20,color:subtekst}}>⏳ Verwerken...</div>}
                <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:10}}>
                  <button style={gs.knopSecundair} onClick={()=>setImportZaad(false)}>Annuleren</button>
                </div>
              </div>
            )}
            {importZaadVoorbeeld&&(()=>{
              const {resultaat,onbekend}=importZaadVoorbeeld;
              return (
                <div>
                  <div style={{display:"flex",gap:8,marginBottom:12}}>
                    <div style={{background:"#dcfce7",border:"1px solid #c8e6c9",borderRadius:8,padding:"8px 14px"}}>
                      <div style={{fontSize:11,color:groen}}>Herkend</div>
                      <div style={{fontSize:22,fontWeight:700,color:groen}}>{resultaat.length}</div>
                    </div>
                    {onbekend.length>0&&(
                      <div style={{background:"#fee2e2",border:"1px solid #fca5a5",borderRadius:8,padding:"8px 14px"}}>
                        <div style={{fontSize:11,color:"#dc2626"}}>Niet herkend</div>
                        <div style={{fontSize:22,fontWeight:700,color:"#dc2626"}}>{onbekend.length}</div>
                      </div>
                    )}
                  </div>
                  {onbekend.length>0&&(
                    <div style={{background:"#fff8f8",border:"1px solid #fca5a5",borderRadius:6,padding:10,marginBottom:12}}>
                      <div style={{fontWeight:700,fontSize:12,color:"#dc2626",marginBottom:6}}>⚠️ Niet herkend — nummer niet gevonden in stamdata</div>
                      <div style={{maxHeight:120,overflowY:"auto"}}>
                        {onbekend.map((r,i)=>(
                          <div key={i} style={{fontSize:11,color:"#dc2626",marginBottom:2}}>
                            • rij {r.rij}: {r.teelt} — {r.kleur} (nr: {r.nummer}, {Math.round(r.aantal/1000)}k)
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                  <div style={{maxHeight:320,overflowY:"auto",border:`1px solid ${rand}`,borderRadius:6,marginBottom:12}}>
                    <table style={{borderCollapse:"collapse",width:"100%",fontSize:11}}>
                      <thead>
                        <tr style={{background:"#e8f5ee",position:"sticky",top:0}}>
                          {["Datum","Gewas","Soort","Origineel (Excel)","Aantal"].map(h=>(
                            <th key={h} style={{padding:"4px 8px",textAlign:"left",color:groen,fontWeight:700,borderBottom:`1px solid ${rand}`}}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {resultaat.map((r,i)=>(
                          <tr key={i} style={{background:i%2===0?wit:"#f0f7f4"}}>
                            <td style={{padding:"3px 8px"}}>{r.datum}</td>
                            <td style={{padding:"3px 8px",fontWeight:600,color:groen}}>{r.gewas}</td>
                            <td style={{padding:"3px 8px"}}>{r.soort}</td>
                            <td style={{padding:"3px 8px",color:subtekst,fontSize:10}}>{r._origineel}</td>
                            <td style={{padding:"3px 8px",textAlign:"right",fontWeight:600}}>{Math.round(r.aantal/1000).toLocaleString("nl-NL")}k</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                    <button style={gs.knopSecundair} onClick={()=>setImportZaadVoorbeeld(null)}>← Terug</button>
                    <button style={gs.knopSecundair} onClick={()=>{setImportZaad(false);setImportZaadVoorbeeld(null);}}>Annuleren</button>
                    {resultaat.length>0&&(
                      <button style={gs.knopPrimair} onClick={bevestigZaadImport}>✅ Importeer {resultaat.length} regels</button>
                    )}
                  </div>
                </div>
              );
            })()}
          </div>
        </div>
      )}
    </div>
  );
}

function Uitval({ gewassen, uitval, setUitval, verpDef }) {
  const huidigWk = String(getJaar(new Date().toISOString().split("T")[0])).slice(-2)+String(getWeekNr(new Date().toISOString().split("T")[0])).padStart(2,"0");
  const eersteGewas = (gewassen||[]).sort((a,b)=>a.naam.localeCompare(b.naam,"nl"))[0]?.naam||"";
  const eersteVerpDef = (verpDef||[])[0];

  function leegData() {
    const gw = gewassen.find(g=>g.naam===eersteGewas);
    const soort = gw?.soorten?.[0]||"";
    const vd = eersteVerpDef;
    return {id:null,week:huidigWk,gewas:eersteGewas,soort,verpakking:vd?.naam||"",trays:0,aantalPerTray:vd?.aantal||0,opmerking:""};
  }

  const [data, setData] = useState(leegData);
  const [delId, setDelId] = useState(null);
  const [filtGewas, setFiltGewas] = useState("");
  const [filtSoort, setFiltSoort] = useState("");
  const [filtWeek, setFiltWeek] = useState("");

  // Letter-cycling state
  const gewasLetterRef = React.useRef({letter:"",idx:0});
  const soortLetterRef = React.useRef({letter:"",idx:0});
  const fustLetterRef  = React.useRef({letter:"",idx:0});

  const refGewas   = React.useRef();
  React.useEffect(()=>{ setTimeout(()=>refGewas.current?.focus(),100); },[]);
  const refSoort   = React.useRef();
  const refFust    = React.useRef();
  const refTrays   = React.useRef();
  const refOpslaan = React.useRef();
  const refOpmerk  = React.useRef();

  function focus(ref) { setTimeout(()=>ref.current?.focus(),50); }

  const soorten = (gewassen.find(g=>g.naam===data.gewas)?.soorten||[]).sort((a,b)=>a.localeCompare(b,"nl"));
  const verpakkingen = verpDef||[];
  const gesorteerdeGewassen = (gewassen||[]).sort((a,b)=>a.naam.localeCompare(b.naam,"nl"));

  // Zet gewas + reset soort/fust
  function setGewas(naam) {
    const gw = gewassen.find(g=>g.naam===naam);
    const soort = gw?.soorten?.[0]||"";
    const vd = verpDef[0];
    setData(prev=>({...prev,gewas:naam,soort,verpakking:vd?.naam||"",aantalPerTray:vd?.aantal||0}));
  }
  function setSoort(naam) { setData(prev=>({...prev,soort:naam})); }
  function setFust(naam) {
    const vd = verpDef.find(v=>v.naam===naam);
    setData(prev=>({...prev,verpakking:naam,aantalPerTray:vd?.aantal||0}));
  }

  // Letter-cycling helper
  function cycleLetter(letter, items, getVal, setVal, cycleRef) {
    const l = letter.toLowerCase();
    const matches = items.filter(x=>getVal(x).toLowerCase().startsWith(l));
    if(!matches.length) return false;
    const ref = cycleRef.current;
    if(ref.letter !== l) { ref.letter=l; ref.idx=0; }
    else { ref.idx=(ref.idx+1)%matches.length; }
    setVal(matches[ref.idx]);
    return true;
  }

  function opslaan() {
    if(!data.week||!data.gewas||!data.soort||!data.verpakking||!data.trays) return false;
    if(data.id) setUitval(prev=>prev.map(u=>u.id===data.id?{...data}:u));
    else setUitval(prev=>[...prev,{...data,id:Date.now()}]);
    setData(leegData());
    setTimeout(()=>refGewas.current?.focus(),50);
    return true;
  }

  function verwijder(id) { setUitval(prev=>prev.filter(u=>u.id!==id)); setDelId(null); }
  function bewerken(u) { setData({...u}); setTimeout(()=>refGewas.current?.focus(),50); }

  const gefilterd = [...uitval]
    .filter(u=>(!filtGewas||u.gewas===filtGewas)&&(!filtSoort||u.soort===filtSoort)&&(!filtWeek||u.week===filtWeek))
    .sort((a,b)=>b.week.localeCompare(a.week)||a.gewas.localeCompare(b.gewas,"nl")||a.soort.localeCompare(b.soort,"nl"));

  const totaalTrays = gefilterd.reduce((s,u)=>s+Number(u.trays||0),0);
  const totaalPlanten = gefilterd.reduce((s,u)=>s+Math.round(Number(u.trays||0)*Number(u.aantalPerTray||0)),0);
  const alleWeken = [...new Set(uitval.map(u=>u.week))].sort((a,b)=>b.localeCompare(a));
  const alleSoorten = [...new Set(uitval.filter(u=>!filtGewas||u.gewas===filtGewas).map(u=>u.soort))].sort((a,b)=>a.localeCompare(b,"nl"));

  const sTH = {...TH,padding:"5px 8px",fontSize:11};
  const sTD = {padding:"5px 8px",fontSize:12,borderBottom:`1px solid ${rand}`};
  const sTDR = {...sTD,textAlign:"right"};

  // Weken dropdown (huidige ±8)
  const wkOpties = (()=>{
    const nu=new Date(); const opts=[];
    for(let i=-8;i<=4;i++){
      const d=new Date(nu); d.setDate(nu.getDate()+i*7);
      const ds=d.toISOString().split("T")[0];
      const lbl=String(getJaar(ds)).slice(-2)+String(getWeekNr(ds)).padStart(2,"0");
      if(!opts.includes(lbl)) opts.push(lbl);
    }
    return opts;
  })();

  return (
    <div style={{display:"flex",height:"calc(100vh - 50px)",overflow:"hidden"}}>
      {/* Linker formulier */}
      <div style={{width:260,borderRight:`1px solid ${rand}`,background:"#f9fcfb",padding:14,display:"flex",flexDirection:"column",gap:8,overflowY:"auto",flexShrink:0}}>
        <div style={{fontWeight:700,fontSize:13,color:groen,marginBottom:2}}>{data.id?"✏️ Bewerken":"➕ Nieuwe uitval"}</div>

        {/* Gewas */}
        <div style={gs.veldGroep}>
          <label style={gs.label}>Gewas <span style={{fontSize:10,color:subtekst}}>(letter=zoek, ↓=lijst, Tab→soort)</span></label>
          <select ref={refGewas} style={gs.input} value={data.gewas}
            onChange={e=>setGewas(e.target.value)}
            onKeyDown={e=>{
              if(e.key==="Tab"&&!e.shiftKey){e.preventDefault();focus(refSoort);}
              if(e.key==="Tab"&&e.shiftKey){e.preventDefault();} // laat browser teruggaan
              if(e.key.length===1&&e.key.match(/[a-zA-Z]/i)){
                e.preventDefault();
                cycleLetter(e.key,gesorteerdeGewassen,g=>g.naam,g=>setGewas(g.naam),gewasLetterRef);
              }
            }}>
            {gesorteerdeGewassen.map(g=><option key={g.naam} value={g.naam}>{g.naam}</option>)}
          </select>
        </div>

        {/* Soort */}
        <div style={gs.veldGroep}>
          <label style={gs.label}>Soort <span style={{fontSize:10,color:subtekst}}>(letter=zoek, ↓=lijst, Tab→fust)</span></label>
          <select ref={refSoort} style={gs.input} value={data.soort}
            onChange={e=>setSoort(e.target.value)}
            onKeyDown={e=>{
              if(e.key==="Tab"&&!e.shiftKey){e.preventDefault();focus(refFust);}
              if(e.key==="Tab"&&e.shiftKey){e.preventDefault();focus(refGewas);}
              if(e.key.length===1&&e.key.match(/[a-zA-Z]/i)){
                e.preventDefault();
                cycleLetter(e.key,soorten,s=>s,s=>setSoort(s),soortLetterRef);
              }
            }}>
            {soorten.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </div>

        {/* Fust */}
        <div style={gs.veldGroep}>
          <label style={gs.label}>Fust <span style={{fontSize:10,color:subtekst}}>(letter=zoek, ↓=lijst, Tab→trays)</span></label>
          <select ref={refFust} style={gs.input} value={data.verpakking}
            onChange={e=>setFust(e.target.value)}
            onKeyDown={e=>{
              if(e.key==="Tab"&&!e.shiftKey){e.preventDefault();focus(refTrays);}
              if(e.key==="Tab"&&e.shiftKey){e.preventDefault();focus(refSoort);}
              if(e.key.length===1&&e.key.match(/[a-zA-Z]/i)){
                e.preventDefault();
                cycleLetter(e.key,verpakkingen,v=>v.naam,v=>setFust(v.naam),fustLetterRef);
              }
            }}>
            {verpakkingen.map(v=><option key={v.naam} value={v.naam}>{v.naam} ({v.aantal} pl.)</option>)}
          </select>
        </div>

        {/* Trays */}
        <div style={gs.veldGroep}>
          <label style={gs.label}>Trays uitval <span style={{fontSize:10,color:subtekst}}>(↑↓ = ±0,25, Tab→toevoegen)</span></label>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <button tabIndex={-1} style={{...gs.knopSecundair,padding:"2px 8px",fontSize:14}}
              onClick={()=>setData(prev=>({...prev,trays:Math.max(0,Math.round((Number(prev.trays||0)-0.25)*100)/100)}))}>−</button>
            <input ref={refTrays} type="number" step="0.25" min="0"
              style={{...gs.input,textAlign:"center",width:80}}
              value={data.trays}
              onChange={e=>setData({...data,trays:Number(e.target.value)||0})}
              onKeyDown={e=>{
                if(e.key==="ArrowUp"){e.preventDefault();setData(prev=>({...prev,trays:Math.round((Number(prev.trays||0)+0.25)*100)/100}));}
                if(e.key==="ArrowDown"){e.preventDefault();setData(prev=>({...prev,trays:Math.max(0,Math.round((Number(prev.trays||0)-0.25)*100)/100)}));}
                if(e.key==="Tab"&&!e.shiftKey){e.preventDefault();focus(refOpslaan);}
                if(e.key==="Tab"&&e.shiftKey){e.preventDefault();focus(refFust);}
              }}
            />
            <button tabIndex={-1} style={{...gs.knopSecundair,padding:"2px 8px",fontSize:14}}
              onClick={()=>setData(prev=>({...prev,trays:Math.round((Number(prev.trays||0)+0.25)*100)/100}))}>+</button>
          </div>
          {data.verpakking&&data.trays>0&&(
            <div style={{fontSize:11,color:subtekst,marginTop:3}}>
              = {Math.round(data.trays*data.aantalPerTray).toLocaleString("nl-NL")} planten
            </div>
          )}
        </div>

        {/* Toevoegen knop */}
        <button ref={refOpslaan}
          style={{...gs.knopPrimair,marginTop:2}}
          disabled={!data.week||!data.gewas||!data.soort||!data.verpakking||!data.trays}
          onKeyDown={e=>{
            if(e.key==="Enter"){e.preventDefault();if(opslaan()){};}
            if(e.key==="Tab"&&!e.shiftKey){e.preventDefault();focus(refOpmerk);}
            if(e.key==="Tab"&&e.shiftKey){e.preventDefault();focus(refTrays);}
          }}
          onClick={opslaan}>
          {data.id?"💾 Opslaan":"➕ Toevoegen"}
        </button>
        {data.id&&<button style={gs.knopSecundair} onClick={()=>{setData(leegData());setTimeout(()=>refGewas.current?.focus(),50);}}>Annuleren</button>}

        {/* Week — onder toevoegen */}
        <div style={gs.veldGroep}>
          <label style={gs.label}>Week</label>
          <select tabIndex={-1} style={gs.input} value={data.week}
            onChange={e=>setData({...data,week:e.target.value})}>
            {wkOpties.map(w=><option key={w} value={w}>{w}</option>)}
          </select>
        </div>

        {/* Opmerking — onder toevoegen */}
        <div style={gs.veldGroep}>
          <label style={gs.label}>Opmerking <span style={{fontSize:10,color:subtekst}}>(optioneel, Enter=opslaan)</span></label>
          <input ref={refOpmerk} style={gs.input} placeholder="bijv. te klein, slechte kieming..."
            value={data.opmerking||""}
            onChange={e=>setData({...data,opmerking:e.target.value})}
            onKeyDown={e=>{
              if(e.key==="Enter"){e.preventDefault();opslaan();}
              if(e.key==="Tab"&&e.shiftKey){e.preventDefault();focus(refOpslaan);}
            }}
          />
        </div>

        <hr style={{border:`1px solid ${rand}`,margin:"4px 0"}}/>

        {/* Filter */}
        <div style={{fontSize:11,fontWeight:700,color:groen}}>Filter</div>
        <div style={gs.veldGroep}>
          <label style={gs.label}>Week</label>
          <select style={gs.input} value={filtWeek} onChange={e=>setFiltWeek(e.target.value)}>
            <option value="">Alle weken</option>
            {alleWeken.map(w=><option key={w} value={w}>{w}</option>)}
          </select>
        </div>
        <div style={gs.veldGroep}>
          <label style={gs.label}>Gewas</label>
          <select style={gs.input} value={filtGewas} onChange={e=>{setFiltGewas(e.target.value);setFiltSoort("");}}>
            <option value="">Alle gewassen</option>
            {gesorteerdeGewassen.map(g=><option key={g.naam} value={g.naam}>{g.naam}</option>)}
          </select>
        </div>
        <div style={gs.veldGroep}>
          <label style={gs.label}>Soort</label>
          <select style={gs.input} value={filtSoort} onChange={e=>setFiltSoort(e.target.value)}>
            <option value="">Alle soorten</option>
            {alleSoorten.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </div>
        {(filtWeek||filtGewas||filtSoort)&&<button style={gs.knopSecundair} onClick={()=>{setFiltWeek("");setFiltGewas("");setFiltSoort("");}}>✕ Wis filter</button>}
      </div>

      {/* Rechter tabel */}
      <div style={{flex:1,overflowY:"auto",overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:600}}>
          <thead>
            <tr>
              {["Week","Gewas","Soort","Fust","Trays","Planten","Opmerking",""].map((h,i)=>(
                <th key={h+i} style={{...sTH,textAlign:i>=4&&i<=5?"right":"left",position:"sticky",top:0,zIndex:2}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {gefilterd.length===0&&(
              <tr><td colSpan={8} style={{...sTD,textAlign:"center",color:subtekst,padding:24}}>Nog geen uitval geregistreerd</td></tr>
            )}
            {gefilterd.map((u,i)=>(
              <tr key={u.id} style={{background:i%2===0?wit:"#f0f7f4"}}>
                <td style={{...sTD,color:subtekst,fontSize:11}}>{u.week}</td>
                <td style={{...sTD,fontWeight:700,color:groen}}>{u.gewas}</td>
                <td style={sTD}>{u.soort}</td>
                <td style={sTD}><span style={gs.badge}>{u.verpakking}</span></td>
                <td style={{...sTDR,fontWeight:600}}>{Number(u.trays).toLocaleString("nl-NL",{maximumFractionDigits:2})}</td>
                <td style={{...sTDR,color:groen,fontWeight:600}}>{Math.round(Number(u.trays)*Number(u.aantalPerTray||0)).toLocaleString("nl-NL")}</td>
                <td style={{...sTD,fontSize:11,color:subtekst}}>{u.opmerking||"—"}</td>
                <td style={{...sTD,textAlign:"right"}}>
                  <button style={{...gs.knopKlein,marginRight:4}} onClick={()=>bewerken(u)}>✏️</button>
                  <button style={gs.knopVerwijder} onClick={()=>setDelId(u.id)}>🗑️</button>
                </td>
              </tr>
            ))}
          </tbody>
          {gefilterd.length>0&&(
            <tfoot>
              <tr style={{background:"#e8f5ee",borderTop:"2px solid #2d6a4f",fontWeight:700}}>
                <td colSpan={4} style={{...sTD,color:groen}}>Totaal</td>
                <td style={{...sTDR,color:groen}}>{totaalTrays.toLocaleString("nl-NL",{maximumFractionDigits:2})}</td>
                <td style={{...sTDR,color:groen}}>{totaalPlanten.toLocaleString("nl-NL")}</td>
                <td colSpan={2} style={sTD}></td>
              </tr>
            </tfoot>
          )}
        </table>
      </div>

      {delId&&<BevestigModal tekst="Uitval verwijderen?" onJa={()=>verwijder(delId)} onNee={()=>setDelId(null)} />}
    </div>
  );
}


function Dashboard({ gewassen, zaadinkoop, uitval, orders, prijzen, verpDef, teeltduur, kiemkracht, leveranciers, klanten }) {
  const [selGewas, setSelGewas] = useState("");
  const [selSoort, setSelSoort] = useState("");
  const [openBlok, setOpenBlok] = useState({inkoop:false,zaai:false,inboet:false,lever:false,uitval:false});
  const toggle = k => setOpenBlok(prev=>({...prev,[k]:!prev[k]}));

  const gewasSoorten = selGewas ? (gewassen.find(g=>g.naam===selGewas)?.soorten||[]) : [];
  const toonData = selGewas && selSoort;
  const gw = (gewassen||[]).find(g=>g.naam===selGewas);
  const levId = gw?.leverancierId;
  const leverancier = levId ? (leveranciers||[]).find(l=>l.id===levId)?.naam||"" : "";
  const internNr = (gw?.internNrs||{})[selSoort]||"";
  const kiemSetting = (kiemkracht||[]).find(k=>k.gewas?.toLowerCase()===selGewas?.toLowerCase()&&k.soort?.toLowerCase()===selSoort?.toLowerCase());
  const teeltSetting = (teeltduur||[]).find(t=>t.gewas?.toLowerCase()===selGewas?.toLowerCase()&&t.soort?.toLowerCase()===selSoort?.toLowerCase());

  function haalNummer(naam) { const m=(naam||"").match(/(\d{3,6})\s*$/); return m?m[1]:null; }
  const selInternNr = internNr||haalNummer(selSoort);

  // Inkoop
  const inkoopRegels = (zaadinkoop||[])
    .filter(z=>z.gewas===selGewas&&(z.soort===selSoort||(selInternNr&&(haalNummer(z.soort)===selInternNr||z.code===selInternNr))))
    .sort((a,b)=>a.datum.localeCompare(b.datum));
  const totZaad = inkoopRegels.reduce((s,z)=>s+(z.aantal||0),0);
  const totInkoopBedrag = inkoopRegels.reduce((s,z)=>{
    const pr=z.prijs||gw?.inkoopPrijzen?.[selSoort]||0;
    return s+Number(pr)*(z.aantal||0)/1000;
  },0);

  // Zaai en inboet
  const zaaiMomenten=[]; const inboetMomenten=[];
  (orders||[]).forEach(o=>{
    (o.regels||[]).forEach(r=>{
      if(r.gewas!==selGewas||r.soort!==selSoort) return;
      const vd=(verpDef||[]).find(v=>v.naam===r.verpakking);
      const pl=r.vastPlanten??((vd?.aantal||0)*r.aantal);
      const kl=(klanten||[]).find(k=>k.id===o.klantId)?.naam||"?";
      const kiem=(kiemkracht||[]).find(k=>k.gewas?.toLowerCase()===selGewas?.toLowerCase()&&k.soort?.toLowerCase()===selSoort?.toLowerCase());
      const kiemPct=kiem?kiem.waarde/100:0.9;
      // Zoek teeltduur specifiek voor dit fust, anders algemeen
      const td=(teeltduur||[]).find(t=>
        t.gewas?.toLowerCase()===selGewas?.toLowerCase()&&
        t.soort?.toLowerCase()===selSoort?.toLowerCase()&&
        t.fust?.toLowerCase()===r.verpakking?.toLowerCase()
      ) || teeltSetting;
      const zaaiWk=td?.uitzaai;
      const inboetWk=td?.inboet;
      if(zaaiWk!=null){
        const d=new Date(o.leverdatum); d.setDate(d.getDate()-zaaiWk*7);
        const ds=d.toISOString().split("T")[0];
        const wk=String(getJaar(ds)).slice(-2)+String(getWeekNr(ds)).padStart(2,"0");
        // Bereken zaden zelfde methode als zaadvoorraad: zaaiTrays × aantalPerTray
        const fustL=(r.verpakking||"").toLowerCase();
        const is65=fustL.includes("65")||fustL.includes("66");
        const zaaiTrays=is65?Math.ceil(Math.ceil(r.aantal/kiemPct)/4):(kiemPct>0?Math.ceil(r.aantal/kiemPct):r.aantal);
        const aantalPerTray=fustL.includes("179")||fustL.includes("180")?180:264;
        const zaadBerekend=zaaiTrays*aantalPerTray;
        zaaiMomenten.push({week:wk,datum:ds,klant:kl,fust:r.verpakking,zaaiWk,zaden:zaadBerekend,planten:pl,leverweek:weekLabel(o.leverdatum)});
      }
      if(inboetWk!=null){
        const d=new Date(o.leverdatum); d.setDate(d.getDate()-inboetWk*7);
        const ds=d.toISOString().split("T")[0];
        const wk=String(getJaar(ds)).slice(-2)+String(getWeekNr(ds)).padStart(2,"0");
        inboetMomenten.push({week:wk,datum:ds,klant:kl,fust:r.verpakking,inboetWk,planten:pl,leverweek:weekLabel(o.leverdatum)});
      }
    });
  });
  const zaaiPerWeek={};
  zaaiMomenten.sort((a,b)=>a.datum.localeCompare(b.datum)).forEach(z=>{
    if(!zaaiPerWeek[z.week]) zaaiPerWeek[z.week]={week:z.week,zaden:0,regels:[]};
    zaaiPerWeek[z.week].zaden+=z.zaden; zaaiPerWeek[z.week].regels.push(z);
  });
  const inboetPerWeek={};
  inboetMomenten.sort((a,b)=>a.datum.localeCompare(b.datum)).forEach(z=>{
    if(!inboetPerWeek[z.week]) inboetPerWeek[z.week]={week:z.week,planten:0,regels:[]};
    inboetPerWeek[z.week].planten+=z.planten; inboetPerWeek[z.week].regels.push(z);
  });
  const totZaaiZaden=zaaiMomenten.reduce((s,z)=>s+z.zaden,0);
  const totInboetPlanten=inboetMomenten.reduce((s,z)=>s+z.planten,0);

  // Orders per klant
  const perKlant={};
  (orders||[]).forEach(o=>{
    (o.regels||[]).forEach(r=>{
      if(r.gewas!==selGewas||r.soort!==selSoort) return;
      const kl=(klanten||[]).find(k=>k.id===o.klantId);
      const naam=kl?.naam||"?";
      const vd=(verpDef||[]).find(v=>v.naam===r.verpakking);
      const pl=r.vastPlanten??((vd?.aantal||0)*r.aantal);
      const prijs=r.prijs?Number(r.prijs):null;
      const bedrag=prijs&&pl?prijs*pl:0;
      if(!perKlant[naam]) perKlant[naam]={naam,planten:0,bedrag:0,geleverd:0,geleverdBedrag:0,regels:[]};
      perKlant[naam].planten+=pl; perKlant[naam].bedrag+=bedrag;
      if(o.status==="geleverd"){perKlant[naam].geleverd+=pl;perKlant[naam].geleverdBedrag+=bedrag;}
      perKlant[naam].regels.push({week:weekLabel(o.leverdatum),leverdatum:o.leverdatum,verpakking:r.verpakking,trays:r.aantal,planten:pl,prijs,bedrag,status:o.status});
    });
  });
  const klantLijst=Object.values(perKlant).sort((a,b)=>a.naam.localeCompare(b.naam,"nl"));
  klantLijst.forEach(k=>k.regels.sort((a,b)=>a.leverdatum.localeCompare(b.leverdatum)));
  const totPlanten=klantLijst.reduce((s,k)=>s+k.planten,0);
  const totBedrag=klantLijst.reduce((s,k)=>s+k.bedrag,0);
  const totGeleverd=klantLijst.reduce((s,k)=>s+k.geleverd,0);
  const totGeleverdBedrag=klantLijst.reduce((s,k)=>s+k.geleverdBedrag,0);

  // Nog te... berekeningen
  const nogTeZaaien = Math.max(0, totZaad - totZaaiZaden);
  const nogTeInboeten = Math.max(0, totZaaiZaden - totInboetPlanten);
  const nogTeLeveren = Math.max(0, totPlanten - totGeleverd);
  const nogTeLeverenBedrag = Math.max(0, totBedrag - totGeleverdBedrag);

  // Uitval voor geselecteerde soort (buiten IIFE zodat blok er bij kan)
  const uitvalDezesoort = toonData ? (uitval||[]).filter(u=>u.gewas===selGewas&&u.soort===selSoort) : [];
  const uitvalTrays = uitvalDezesoort.reduce((s,u)=>s+Number(u.trays||0),0);
  const uitvalPlanten = uitvalDezesoort.reduce((s,u)=>{
    const vd=(verpDef||[]).find(v=>v.naam===u.verpakking);
    return s+Math.round(Number(u.trays||0)*(vd?.aantal||u.aantalPerTray||0));
  },0);

  const fmt=n=>n>0?n.toLocaleString("nl-NL"):"—";
  const eur=n=>n>0?"€ "+n.toFixed(0):"—";
  const eurp=n=>n?"€ "+Number(n).toFixed(3):"—";

  // Groen palet
  const G = {
    donker:  "#1a4731",
    midden:  "#2d6a4f",
    licht:   "#52a87a",
    bg1:     "#e8f5ee", // lichtst
    bg2:     "#d0eadd",
    bg3:     "#b8ddc8",
    rand:    "#a8cfc0",
    wit:     "#fff",
  };

  const blokStijl = (open) => ({
    border:`1px solid ${G.rand}`,
    borderRadius:8,
    overflow:"hidden",
    marginBottom:0,
  });
  const blokHeader = (open) => ({
    display:"flex", justifyContent:"space-between", alignItems:"center",
    padding:"8px 12px", background:open?G.bg2:G.bg1,
    cursor:"pointer", userSelect:"none",
    borderBottom: open?`1px solid ${G.rand}`:"none",
  });
  const TH3 = {...TH, fontSize:11, padding:"4px 10px", background:G.bg2, color:G.donker};
  const TD3 = {padding:"4px 10px", fontSize:11, borderBottom:`1px solid ${G.bg1}`};
  const TDr = {...TD3, textAlign:"right"};

  return (
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 50px)"}}>

      {/* Selectiebalk */}
      <div style={{padding:"8px 16px",background:G.bg1,borderBottom:`1px solid ${G.rand}`,display:"flex",gap:10,alignItems:"flex-end",flexShrink:0,flexWrap:"wrap"}}>
        <strong style={{color:G.donker,fontSize:14,marginBottom:4}}>🌱 Dashboard</strong>
        <div style={{display:"flex",flexDirection:"column",gap:1}}>
          <label style={{fontSize:10,color:G.midden}}>Gewas</label>
          <select style={{...gs.input,minWidth:160,fontSize:12}} value={selGewas}
            onChange={e=>{setSelGewas(e.target.value);setSelSoort("");setOpenBlok({inkoop:false,zaai:false,inboet:false,lever:false});}}>
            <option value="">— Kies gewas —</option>
            {(gewassen||[]).sort((a,b)=>a.naam.localeCompare(b.naam,"nl")).map(g=>(
              <option key={g.naam} value={g.naam}>{g.naam}</option>
            ))}
          </select>
        </div>
        {selGewas&&<div style={{display:"flex",flexDirection:"column",gap:1}}>
          <label style={{fontSize:10,color:G.midden}}>Soort</label>
          <select style={{...gs.input,minWidth:200,fontSize:12}} value={selSoort}
            onChange={e=>{setSelSoort(e.target.value);setOpenBlok({inkoop:false,zaai:false,inboet:false,lever:false});}}>
            <option value="">— Kies soort —</option>
            {gewasSoorten.sort((a,b)=>a.localeCompare(b,"nl")).map(s=>(
              <option key={s} value={s}>{s}{(gw?.internNrs||{})[s]?" #"+(gw.internNrs[s]):""}</option>
            ))}
          </select>
        </div>}
        {toonData&&(
          <div style={{marginLeft:"auto",display:"flex",gap:10,alignItems:"center",
            background:G.bg2,border:`1px solid ${G.rand}`,borderRadius:6,padding:"5px 12px",fontSize:11,color:G.donker,flexWrap:"wrap"}}>
            {leverancier&&<span><span style={{color:G.midden}}>Leverancier: </span><strong>{leverancier}</strong></span>}
            {kiemSetting&&<span><span style={{color:G.midden}}>Kiem ingesteld: </span><strong>{kiemSetting.waarde}%</strong></span>}
            {(()=>{
              // Werkelijke kieming = (verkoop + uitval) / gezaaid × 100
              const totVerkoop = klantLijst.reduce((s,k)=>s+k.planten,0);
              const totUitvalPlanten = (uitval||[])
                .filter(u=>u.gewas===selGewas&&u.soort===selSoort)
                .reduce((s,u)=>{
                  const vd=(verpDef||[]).find(v=>v.naam===u.verpakking);
                  return s+Math.round(Number(u.trays||0)*(vd?.aantal||u.aantalPerTray||0));
                },0);
              if(totZaaiZaden<=0) return null;
              const werkKiem = Math.round((totVerkoop+totUitvalPlanten)/totZaaiZaden*100);
              const pctGeleverd = totPlanten>0?Math.round(totGeleverd/totPlanten*100):0;
              const voldoendeData = pctGeleverd>=50;
              const kleur = !voldoendeData?"#999":Math.abs(werkKiem-(kiemSetting?.waarde||90))<=3?"#166534":"#b45309";
              return (
                <span style={{borderLeft:`1px solid ${G.rand}`,paddingLeft:8}}>
                  <span style={{color:G.midden}}>Kiem werkelijk: </span>
                  <strong style={{color:kleur}}>{werkKiem}%</strong>
                  {!voldoendeData&&<span style={{fontSize:9,color:"#999",marginLeft:3}}>(onvolledig)</span>}
                </span>
              );
            })()}
            {(()=>{
              // Toon per fust de teelttijden
              const fustTijden = (teeltduur||[]).filter(t=>
                t.gewas?.toLowerCase()===selGewas?.toLowerCase()&&
                t.soort?.toLowerCase()===selSoort?.toLowerCase()&&
                t.fust
              );
              if(fustTijden.length>0) return fustTijden.map(t=>(

function HerstelBackup() {
  const [herstelStatus, setHerstelStatus] = React.useState("");
  const [bevestigHerstel, setBevestigHerstel] = React.useState(null);
  const ALL_KEYS = ["ta_klanten","ta_gewassen","ta_prijzen","ta_orders","ta_verp",
    "ta_kiemkracht","ta_teeltduur","ta_zaadinkoop","ta_bedrijf","ta_realisatie",
    "ta_traykosten","ta_leveranciers"];

  function herstel() {
    const d = bevestigHerstel.data;
    // Wis alles eerst
    ALL_KEYS.forEach(k => localStorage.removeItem(k));
    // Zet terug
    ALL_KEYS.forEach(k => {
      if(d[k] !== undefined) {
        try { localStorage.setItem(k, JSON.stringify(d[k])); } catch(e) {}
      }
    });
    localStorage.setItem("ta_backup_laats", new Date().toISOString());
    setBevestigHerstel(null);
    setHerstelStatus("✅ Backup hersteld! Pagina wordt herladen...");
    setTimeout(() => window.location.reload(), 1500);
  }

  return (
    <div>
      {!bevestigHerstel ? (
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <label style={{...gs.knopPrimair,background:"#7c3aed",cursor:"pointer",display:"inline-block"}}>
            📂 Backup bestand kiezen
            <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{
              const file = e.target.files[0];
              if(!file) return;
              const reader = new FileReader();
              reader.onload = ev => {
                try {
                  const data = JSON.parse(ev.target.result);
                  if(!data.versie || !data.versie.startsWith("TuinApp-backup")) {
                    setHerstelStatus("⚠️ Ongeldig bestand — geen TuinApp backup");
                    return;
                  }
                  setHerstelStatus("");
                  setBevestigHerstel({data, bestandsnaam: file.name});
                } catch(err) {
                  setHerstelStatus("⚠️ Fout bij lezen: "+err.message);
                }
              };
              reader.readAsText(file);
              e.target.value = "";
            }}/>
          </label>
          {herstelStatus && (
            <span style={{fontSize:12,fontWeight:600,color:herstelStatus.startsWith("✅")?groen:"#dc2626"}}>
              {herstelStatus}
            </span>
          )}
        </div>
      ) : (
        <div style={{background:"#fef3c7",border:"1px solid #f59e0b",borderRadius:6,padding:"10px 14px"}}>
          <div style={{fontWeight:700,color:"#92400e",marginBottom:4}}>
            ⚠️ {bevestigHerstel.bestandsnaam}
          </div>
          <div style={{fontSize:11,color:"#92400e",marginBottom:10,lineHeight:1.7}}>
            Datum backup: {new Date(bevestigHerstel.data.datum).toLocaleString("nl-NL")}<br/>
            Klanten: <strong>{(bevestigHerstel.data.ta_klanten||[]).length}</strong> &nbsp;·&nbsp;
            Orders: <strong>{(bevestigHerstel.data.ta_orders||[]).length}</strong> &nbsp;·&nbsp;
            Gewassen: <strong>{(bevestigHerstel.data.ta_gewassen||[]).length}</strong> &nbsp;·&nbsp;
            Prijzen: <strong>{(bevestigHerstel.data.ta_prijzen||[]).length}</strong><br/>
            <strong>Huidige data wordt volledig overschreven.</strong>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button style={gs.knopRood} onClick={herstel}>✅ Ja, terugzetten</button>
            <button style={gs.knopSecundair} onClick={()=>{setBevestigHerstel(null);}}>Annuleren</button>
          </div>
        </div>
      )}
    </div>
  );
}

        <div style={gs.sectieLabel}>📐 Fust & aantallen per tray</div>

            <th style={TH}>Fust</th>

// MODULE — OFFERTES
function Offertes({ klanten, gewassen, prijzen, verpDef, bedrijf }) {
  const [selKlant, setSelKlant] = useState(null);
  const [geselecteerd, setGeselecteerd] = useState({});
  const [gesGroepen, setGesGroepen] = useState({}); // geselecteerde gewasgroepen
  const [offerteNr, setOfferteNr] = useState(()=>{
    const nr = parseInt(localStorage.getItem("ta_offerte_nr")||"0")+1;
    return String(nr).padStart(4,"0");
  });
  const [datum, setDatum] = useState(()=>new Date().toISOString().slice(0,10));
  const [geldigheid, setGeldigheid] = useState("30");
  const [notitie, setNotitie] = useState("");
  const [histOpen, setHistOpen] = useState(false);

  // ── OFFERTEHISTORIE ──
  const [historie, setHistorie] = React.useState(()=>{
    try{ return JSON.parse(localStorage.getItem("ta_offerte_historie")||"[]"); }catch(e){ return []; }
  });
  function slaHistorieOp(entry) {
    setHistorie(prev=>{
      const nieuw=[entry,...prev].slice(0,50);
      try{ localStorage.setItem("ta_offerte_historie", JSON.stringify(nieuw)); }catch(e){}
      return nieuw;
    });
  }

  // Groepen komen uit prijzen met soort="__groep__" — per gewas per klant
  function klantGroepen(klantId) {
    // Verzamel alle gewassen waarvoor een groepsprijs bestaat
    const gewasNamen = [...new Set(
      prijzen.filter(p=>p.klantId===klantId&&p.soort==="__groep__").map(p=>p.gewas)
    )];
    return gewasNamen.map(gewas=>{
      function normFust(naam){const n=(naam||"").toLowerCase();if(n.includes("65")||n.includes("66"))return "66";if(n.includes("179")||n.includes("180"))return "180";if(n.includes("260")||n.includes("264"))return "264";return null;}
      const groepPrijzen = prijzen.filter(p=>p.klantId===klantId&&p.gewas===gewas&&p.soort==="__groep__");
      const p64={}, p80={}, p66={};
      groepPrijzen.forEach(p=>{
        const fn=normFust(p.verpakking);
        if(fn==="264") p64[fn]=p.prijs;
