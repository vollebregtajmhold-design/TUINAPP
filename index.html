function Instellingen({ bedrijf, setBedrijf, verpDef, setVerpDef }) {
  const [b, setB] = useState({...bedrijf});
  const [fustNaam, setFustNaam] = useState("");
  const [fustAantal, setFustAantal] = useState("");
  const [fustBewerk, setFustBewerk] = useState(null);

  function veld(lbl, k, type="text") {
    return (
      <div style={gs.veldGroep}>
        <label style={gs.label}>{lbl}</label>
        <input style={gs.input} type={type} value={b[k]||""} onChange={e=>setB({...b,[k]:e.target.value})} />
      </div>
    );
  }

  return (
    <div style={{padding:20,maxWidth:520,overflowY:"auto"}}>
      <h2 style={{fontSize:15,fontWeight:700,marginBottom:14,color:groen}}>Instellingen</h2>

      {/* Fust */}
      <div style={{...gs.sectie,marginBottom:16}}>
        <div style={gs.sectieLabel}>📐 Fust & aantallen per tray</div>
        <table style={{width:"100%",marginBottom:10}}>
          <thead><tr>
            <th style={TH}>Fust</th>
            <th style={{...TH,textAlign:"right"}}>Planten/tray</th>
            <th style={TH}></th>
          </tr></thead>
          <tbody>{verpDef.map(v=>(
            <tr key={v.naam}>
              <td style={TD}><strong>{v.naam}</strong></td>
              <td style={{...TD,textAlign:"right",fontWeight:600,color:groen}}>{v.aantal}</td>
              <td style={{...TD,textAlign:"right"}}>
                <button style={gs.knopKlein} onClick={()=>{setFustBewerk(v.naam);setFustNaam(v.naam);setFustAantal(String(v.aantal));}}>✏️</button>
                <button style={{...gs.knopVerwijder,marginLeft:4}} onClick={()=>setVerpDef(verpDef.filter(x=>x.naam!==v.naam))}>🗑️</button>
              </td>
            </tr>
          ))}</tbody>
        </table>
        <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
          <div style={{flex:2}}><label style={gs.label}>Naam</label>
            <input style={gs.input} placeholder="bijv. Tray 400" value={fustNaam} onChange={e=>setFustNaam(e.target.value)} /></div>
          <div style={{flex:1}}><label style={gs.label}>Planten</label>
            <input style={gs.input} type="number" min="1" placeholder="400" value={fustAantal} onChange={e=>setFustAantal(e.target.value)} /></div>
          <button style={gs.knopPrimair} onClick={()=>{
            if(!fustNaam.trim()||!fustAantal) return;
            if(fustBewerk) setVerpDef(verpDef.map(v=>v.naam===fustBewerk?{naam:fustNaam,aantal:Number(fustAantal)}:v));
            else if(!verpDef.find(v=>v.naam===fustNaam)) setVerpDef([...verpDef,{naam:fustNaam,aantal:Number(fustAantal)}]);
            setFustNaam("");setFustAantal("");setFustBewerk(null);
          }}>💾</button>
          {fustBewerk&&<button style={gs.knopSecundair} onClick={()=>{setFustBewerk(null);setFustNaam("");setFustAantal("");}}>✕</button>}
        </div>
      </div>

      {/* Bedrijfsgegevens */}
      <div style={gs.sectie}>
        <div style={gs.sectieLabel}>Bedrijfsgegevens</div>
        {veld("Bedrijfsnaam","naam")}
        {veld("Adres","adres")}
        <div style={{display:"flex",gap:10}}>{veld("Postcode","postcode")}{veld("Plaats","plaats")}</div>
        {veld("Telefoon","telefoon","tel")}
        {veld("E-mail","email","email")}
        {veld("Website","website")}
      </div>
      <div style={gs.sectie}>
        <div style={gs.sectieLabel}>Financieel</div>
        {veld("IBAN","iban")}
        {veld("KVK-nummer","kvk")}
        {veld("BTW-nummer","btw")}
      </div>
      <div style={gs.sectie}>
        <div style={gs.sectieLabel}>Logo</div>
        <div style={gs.veldGroep}>
          {b.logo&&<div style={{marginBottom:8}}><img src={b.logo} style={{maxHeight:80,maxWidth:200,borderRadius:4,border:`1px solid ${rand}`}} alt="logo"/></div>}
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <label style={{...gs.knopPrimair,cursor:"pointer",display:"inline-block"}}>
              📷 Logo kiezen
              <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{
                const file=e.target.files[0]; if(!file) return;
                const reader=new FileReader();
                reader.onload=ev=>setB({...b,logo:ev.target.result});
                reader.readAsDataURL(file);
              }}/>
            </label>
            {b.logo&&<button style={gs.knopSecundair} onClick={()=>setB({...b,logo:""})}>✕ Verwijder</button>}
          </div>
        </div>
      </div>
      <button style={gs.knopPrimair} onClick={()=>setBedrijf({...b})}>💾 Opslaan</button>
    </div>
  );
}

function App() {
  const { useEffect: ue } = React;
  const [pagina,setPagina]     = useState("orders");
  const [kiemkracht,setKiemkracht] = useState(()=>laad("ta_kiemkracht", []));
  const [teeltduur,setTeeltduur]   = useState(()=>laad("ta_teeltduur", []));
  const [zaadinkoop,setZaadinkoop] = useState(()=>laad("ta_zaadinkoop", []));
  const [bedrijf,setBedrijf]   = useState(()=>laad("ta_bedrijf", {
    naam:"Uw Bedrijfsnaam BV", adres:"Straatnaam 1", postcode:"1234 AB", plaats:"Plaats",
    telefoon:"010-1234567", email:"info@uwbedrijf.nl", website:"", iban:"NL00 BANK 0000 0000 00",
    kvk:"", btw:""
  }));
  const [klanten,setKlanten]   = useState(()=>laad("ta_klanten",  SK));
  const [gewassen,setGewassen] = useState(()=>laad("ta_gewassen", SG));
  const [prijzen,setPrijzen]   = useState(()=>laad("ta_prijzen",  SP));
  const [orders,setOrders]     = useState(()=>laad("ta_orders",   SO));
  const [verpDef,setVerpDef]   = useState(()=>zorgVerpDef(laad("ta_verp", VERPAKKINGEN_DEF)));
  const [syncStatus,setSyncStatus] = useState("⏳ Verbinden met Firebase...");
  const [geladen,setGeladen]   = useState(false);

  // Laad data uit Firebase bij opstarten
  useEffect(()=>{
    async function laadVanFirebase() {
      setSyncStatus("⏳ Data laden...");
      try {
        const [k,g,p,o,v,km,td] = await Promise.all([
          fbLoadAll("klanten"), fbLoadAll("gewassen"), fbLoadAll("prijzen"),
          fbLoadAll("orders"),  fbLoadAll("verpakkingen"), fbLoadAll("kiemkracht"), fbLoadAll("teeltduur")
        ]);
        if(k) setKlanten(k);
        if(g) setGewassen(g);
        if(p) { console.log("Prijzen geladen:", p.length); setPrijzen(p); }
        if(o) setOrders(o);
        if(v) setVerpDef(zorgVerpDef(v));
        if(km) setKiemkracht(km);
        if(td) setTeeltduur(td);
        setSyncStatus("✅ Firebase verbonden ("+(p?.length||0)+" prijzen)");
      } catch(e) {
        setSyncStatus("⚠️ Offline — lokale data");
      }
      setGeladen(true);
    }
    if(window._firebaseReady) laadVanFirebase();
    else window.addEventListener("firebaseReady", laadVanFirebase, {once:true});
  }, []);

  // Sla op naar Firebase + localStorage bij elke wijziging (alleen na init)
  useEffect(()=>{ if(!geladen) return; bewaar("ta_klanten",klanten); fbSaveAll("klanten",klanten).then(()=>setSyncStatus("☁️ Opgeslagen")); },[klanten]);
  useEffect(()=>{ if(!geladen) return; bewaar("ta_gewassen",gewassen); fbSaveAll("gewassen",gewassen).then(()=>setSyncStatus("☁️ Opgeslagen")); },[gewassen]);
  useEffect(()=>{ if(!geladen) return; bewaar("ta_prijzen",prijzen); fbSaveAll("prijzen",prijzen).then(()=>setSyncStatus("☁️ Opgeslagen")); },[prijzen]);
  useEffect(()=>{ if(!geladen) return; bewaar("ta_orders",orders); fbSaveAll("orders",orders).then(()=>setSyncStatus("☁️ Opgeslagen")); },[orders]);
  useEffect(()=>{ if(!geladen) return; bewaar("ta_verp",verpDef); fbSaveAll("verpakkingen",verpDef).then(()=>setSyncStatus("☁️ Opgeslagen")); },[verpDef]);
  useEffect(()=>{ bewaar("ta_zaadinkoop",zaadinkoop); fbSaveAll("zaadinkoop",zaadinkoop).then(()=>setSyncStatus("☁️ Opgeslagen")); },[zaadinkoop]);
  useEffect(()=>{ bewaar("ta_bedrijf",bedrijf); },[bedrijf]);
  useEffect(()=>{ bewaar("ta_teeltduur",teeltduur); fbSaveAll("teeltduur",teeltduur).then(()=>setSyncStatus("☁️ Opgeslagen")); },[teeltduur]);
  useEffect(()=>{ bewaar("ta_kiemkracht",kiemkracht); fbSaveAll("kiemkracht",kiemkracht).then(()=>setSyncStatus("☁️ Opgeslagen")); },[kiemkracht]);

  function reset(){
    if(!window.confirm("Alle data wissen? Dit verwijdert ook de Firebase data!"))return;
    ["ta_klanten","ta_gewassen","ta_prijzen","ta_orders","ta_verp"].forEach(k=>localStorage.removeItem(k));
    setKlanten(SK);setGewassen(SG);setPrijzen(SP);setOrders(SO);setVerpDef(VERPAKKINGEN_DEF);
  }

  const menu=[
    {id:"orders",      label:"📦 Orders"},
    {id:"zaadinkoop",  label:"🌰 Zaadinkoop"},
    {id:"planning",    label:"📅 Werklijsten"},
    {id:"bevestiging", label:"✅ Bevestiging"},
    {id:"klanten",     label:"👤 Klanten"},
    {id:"teelten",     label:"🌱 Teelten"},
    {id:"teeltduur",   label:"🕐 Teeltduur"},
    {id:"prijzen",     label:"💰 Prijzen"},
    {id:"kiemkracht",  label:"🌱 Kiemkracht"},
    {id:"instellingen",label:"⚙️ Instellingen"},
  ];

  return (
    <div style={{minHeight:"100vh",background:achtergrond}}>
      <div style={{background:groen,display:"flex",alignItems:"center",height:50,padding:"0 14px",gap:3}}>
        <div style={{color:wit,fontWeight:700,fontSize:15,marginRight:16}}>🌱 TuinApp</div>
        {menu.map(m=>(
          <button key={m.id} onClick={()=>setPagina(m.id)}
            style={{background:pagina===m.id?"rgba(255,255,255,0.2)":"transparent",color:wit,border:"none",
              borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:14,fontWeight:pagina===m.id?700:400}}>
            {m.label}
          </button>
        ))}
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:10}}>
          <span style={{color:"rgba(255,255,255,0.65)",fontSize:11}}>{syncStatus}</span>
          <button onClick={reset} style={{background:"rgba(255,255,255,0.15)",color:wit,border:"1px solid rgba(255,255,255,0.3)",borderRadius:5,padding:"3px 9px",cursor:"pointer",fontSize:11}}>🔄 Reset</button>
        </div>
      </div>
      {pagina==="orders"       && <Orders      klanten={klanten} gewassen={gewassen} prijzen={prijzen} orders={orders} setOrders={setOrders} verpDef={verpDef} bedrijf={bedrijf} />}
      {pagina==="klanten"      && <Klantenbeheer klanten={klanten} setKlanten={setKlanten} gewassen={gewassen} verpDef={verpDef} />}
      {pagina==="teelten"      && <Teelten     gewassen={gewassen} setGewassen={setGewassen} />}
      {pagina==="prijzen"      && <Prijzen     klanten={klanten} gewassen={gewassen} prijzen={prijzen} setPrijzen={setPrijzen} verpDef={verpDef} />}
      {pagina==="bevestiging"  && <Bevestiging klanten={klanten} gewassen={gewassen} orders={orders} setOrders={setOrders} verpDef={verpDef} bedrijf={bedrijf} />}
      {pagina==="teeltduur"    && <Teeltduur gewassen={gewassen} verpDef={verpDef} teeltduur={teeltduur} setTeeltduur={setTeeltduur} />}
      {pagina==="planning"      && <Teeltplanning klanten={klanten} gewassen={gewassen} verpDef={verpDef} orders={orders} teeltduur={teeltduur} kiemkracht={kiemkracht} bedrijf={bedrijf} />}
      {pagina==="zaadinkoop"   && <Zaadinkoop gewassen={gewassen} zaadinkoop={zaadinkoop} setZaadinkoop={setZaadinkoop} orders={orders} teeltduur={teeltduur} kiemkracht={kiemkracht} verpDef={verpDef} bedrijf={bedrijf} />}
      {pagina==="kiemkracht"   && <Kiemkracht gewassen={gewassen} kiemkracht={kiemkracht} setKiemkracht={setKiemkracht} />}
      {pagina==="verpakkingen" && <Verpakkingen verpDef={verpDef} setVerpDef={setVerpDef} />}
      {pagina==="instellingen"  && <Instellingen bedrijf={bedrijf} setBedrijf={setBedrijf} gewassen={gewassen} setGewassen={setGewassen} orders={orders} setOrders={setOrders} prijzen={prijzen} setPrijzen={setPrijzen} kiemkracht={kiemkracht} setKiemkracht={setKiemkracht} teeltduur={teeltduur} setTeeltduur={setTeeltduur} verpDef={verpDef} setVerpDef={setVerpDef} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
